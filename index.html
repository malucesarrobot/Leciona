'15/11/1889: golpe militar e o "povo bestializado"':{
planejamento:`OBJETIVOS: Compreender os eventos de 15/11/1889; analisar o caráter golpista; refletir sobre o conceito de "povo bestializado".

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "O que aconteceu em 15/11/1889?"
2. CONTEXTUALIZAÇÃO (10 min): O dia no Campo de Santana — quem estava lá? Quem não estava?
3. ANÁLISE (15 min): Por que "proclamação" e não golpe? Papel do positivismo e do "povo bestializado".
4. LEITURA (12 min): Rui Barbosa sobre o "povo bestializado".
5. SÍNTESE (8 min): "A República de 15/11 foi de quem?"

REFERÊNCIAS:
CARVALHO, José Murilo de. Os bestializados. São Paulo: Companhia das Letras, 1987.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
SODRÉ, Nelson Werneck. História da burguesia brasileira. Rio de Janeiro: Civilização Brasileira, 1964.`,
textoQuadro:`15/11/1889: GOLPE MILITAR E O "POVO BESTIALIZADO"

15/11/1889: militares proclamam a República no Campo de Santana (RJ)
- Deodoro da Fonseca: marechal que liderou o golpe
- Presentes: militares, intelectuais, poucos civis
- Ausentes: povo, mulheres, negros, indígenas, analfabetos

"Povo bestializado": Rui Barbosa — povo incapaz de governar

Positivismo: "Ordem e Progresso" — Augusto Comte
- Ordem = controle social, não democracia

Primeira medida: governo provisório, sem eleições

Definição: "Proclamação" é escolha política — esconde a violência do golpe e dá falsa aparência de legitimidade.`,
textoAluno:`15/11/1889: golpe militar e o "povo bestializado"

Em 15 de novembro de 1889, militares liderados pelo marechal Deodoro da Fonseca proclamaram a República no Campo de Santana. Os livros didáticos chamam de "Proclamação da República", mas foi um golpe militar: mudança de regime imposta de cima para baixo, sem consulta popular, sem eleições.

Quem estava presente? Alguns militares, poucos civis, intelectuais republicanos. Benjamin Constant formou uma geração de oficiais republicanos. Rui Barbosa, o jurista, também apoiou.

Mas quem não estava lá? O povo. As mulheres. Os negros recém-libertados. Os indígenas. Os analfabetos, maioria da população. A República nasceu excluindo quem a construiria.

A ideologia era o positivismo. O lema "Ordem e Progresso", na bandeira brasileira, vem de Augusto Comte. Para os positivistas, o Brasil precisava de ordem antes de progresso — e ordem significava controle social, não democracia. Rui Barbosa escreveu que o povo brasileiro era "bestializado", incapaz de participar da política. Essa ideia justificava a exclusão: a República seria governada por elite ilustrada.

A primeira medida do governo provisório foi suspender as garantias constitucionais. Não houve eleições imediatas. A República que nasceu era, desde o início, uma República de elites.

PERGUNTAS DE REFLEXÃO:
1. Por que a história oficial chama de "Proclamação" e não de "golpe militar"?
2. O que o conceito de "povo bestializado" revela sobre quem a República considerava digno de política?

REFERÊNCIAS:
CARVALHO, José Murilo de. Os bestializados. São Paulo: Companhia das Letras, 1987.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.`,

atividade:[{"enunciado":"Complete: Em ____________ de novembro de ____________, o marechal ____________ proclamou a República no Campo de Santana. Foi um ____________ militar, sem consulta ____________. A ideologia era o ____________, com lema ____________ e ____________. ____________ escreveu que o povo era 'bestializado'. BANCO: 1889, 15, Deodoro da Fonseca, golpe, Ordem, popular, positivismo, Progresso, Rui Barbosa."},{"enunciado":"Relacione: 1. Deodoro da Fonseca; 2. Benjamin Constant; 3. Rui Barbosa; 4. Positivismo; 5. Campo de Santana. Com: a) Jurista, 'bestializado'; b) Marechal, liderou o golpe; c) Professor, formou republicanos; d) Ideologia de Comte; e) Local do golpe."},{"enunciado":"Análise: 'A Proclamação da República foi momento de união nacional, em que o povo se levantou contra a monarquia.' — Está correto? Reescreva incorporando que foi golpe militar excludente. Mínimo 5 linhas."},{"enunciado":"Leia: 'Foto de 1889 mostra militares uniformizados no Campo de Santana. Ao fundo, poucos civis. Não há mulheres, negros, indígenas. Bandeira republicana é hasteada por oficial branco.' — O que revela sobre a composição social da República? Mínimo 4 linhas."},{"enunciado":"O positivismo de Augusto Comte influenciou a República. Em texto de mínimo 5 linhas: o que era o positivismo? Como justificava a exclusão de negros, mulheres e pobres? Quem se beneficiava?"}],
gabarito:[{"resposta":"Em 15 de novembro de 1889, o marechal Deodoro da Fonseca proclamou a República no Campo de Santana. Foi um golpe militar, sem consulta popular. A ideologia era o positivismo, com lema Ordem e Progresso. Rui Barbosa escreveu que o povo era 'bestializado'.","comentario":"15/11/1889, Deodoro, positivismo de Comte, 'bestializado' justificava exclusão."},{"resposta":"1-b; 2-c; 3-a; 4-d; 5-e.","comentario":"Deodoro (b), Benjamin Constant (c), Rui Barbosa (a), Positivismo (d), Campo de Santana (e)."},{"resposta":"O trecho está incorreto. Não foi união nacional, mas golpe de elites. O povo não participou — mulheres, negros, indígenas e pobres foram excluídos. A República era projeto de elite, não democracia popular. O termo 'proclamação' esconde a violência e dá falsa aparência de legitimidade.","comentario":"O aluno deve reconhecer o caráter golpista e excludente."},{"resposta":"A imagem mostra que a República era projeto de militares brancos e elites. A ausência de mulheres, negros e indígenas revela exclusão desde o nascimento do regime. A bandeira hasteada por oficial branco simboliza poder concentrado em minoria.","comentario":"Análise deve identificar composição social excludente."},{"resposta":"Positivismo era ideologia de Augusto Comte que defendia ordem social como condição para progresso. No Brasil, justificava a exclusão de negros, mulheres e pobres, argumentando que não estavam 'preparados' para democracia. A ideia de 'povo bestializado' mantinha poder nas mãos de elites brancas. Beneficiavam-se militares, grandes proprietários e intelectuais.","comentario":"O aluno deve explicar o positivismo e sua função de justificar exclusão."}],
questoes:[{"enunciado":"Texto I: 'A Proclamação da República foi o momento mais glorioso da história brasileira.' — Livro didático, 1980. Texto II: 'Em 15/11/1889, militares proclamaram a República sem consultar o povo. Mulheres, negros e indígenas estavam excluídos.' — Historiadora, 2020. A análise permite concluir que:","alternativas":["ambos concordam que foi projeto popular.","o texto I reproduz narrativa oficial que omite o caráter golpista.","o texto II é irrelevante.","foi proclamada por plebiscito.","ambos reconhecem participação de mulheres e negros."],"correta":1,"comentario":"Texto I reproduz narrativa oficial. Texto II desconstroi. B é correta."},{"enunciado":"O lema 'Ordem e Progresso' vem do positivismo de Augusto Comte. Sobre essa ideologia, é correto afirmar que:","alternativas":["defendia democracia direta.","justificava exclusão de negros, mulheres e pobres em nome da 'ordem'.","era ideologia indígena.","propunha abolição de hierarquias.","foi rejeitada pelos fundadores da República."],"correta":1,"comentario":"O positivismo justificava controle social e exclusão das massas. B é correta."},{"enunciado":"Rui Barbosa escreveu que o povo brasileiro era 'bestializado'. Sobre essa expressão, é correto afirmar que:","alternativas":["demonstrava respeito pela capacidade política do povo.","revelava concepção elitista que justificava exclusão das massas.","era crítica ao tratamento de animais.","defendia educação popular ampla.","era elogio à força de trabalho."],"correta":1,"comentario":"'Bestializado' revela concepção elitista que via o povo como incapaz de política. B é correta."},{"enunciado":"Analisando a 'Proclamação da República' pela lente decolonial, é correto afirmar que:","alternativas":["o termo 'proclamação' legitima processo sem participação popular.","foi projeto democrático e inclusivo.","negros, mulheres e indígenas foram consultados.","o golpe fortaleceu a democracia.","a monarquia caiu porque o povo exigiu a República."],"correta":0,"comentario":"O termo 'proclamação' esconde a violência do golpe. A é correta."},{"enunciado":"A primeira medida do governo provisório em 1889 foi suspender garantias constitucionais. Sobre isso, é correto afirmar que:","alternativas":["demonstrava compromisso com democracia.","revelava que a República era projeto de elite que excluía as massas.","foi exceção logo substituída por eleições universais.","atendeu reivindicações populares.","fortaleceu direitos dos escravos recém-libertados."],"correta":1,"comentario":"A suspensão de garantias revela caráter elitista desde o nascimento. B é correta."}],
flashcards:[{"frente":"O que aconteceu em 15 de novembro de 1889?","verso":"Militares liderados por Deodoro da Fonseca proclamaram a República no Campo de Santana. Foi golpe militar, não revolução popular."},{"frente":"Quem estava presente no Campo de Santana? Quem estava ausente?","verso":"Presentes: militares, intelectuais. Ausentes: povo, mulheres, negros, indígenas, analfabetos. A República nasceu excluindo a maioria."},{"frente":"Quem foi Deodoro da Fonseca?","verso":"Marechal que liderou o golpe de 1889. Primeiro presidente do Brasil republicano."},{"frente":"O que era o positivismo e como influenciou a República?","verso":"Ideologia de Augusto Comte com lema 'Ordem e Progresso'. Justificava exclusão das massas, priorizando controle social sobre democracia."},{"frente":"O que Rui Barbosa quis dizer com 'povo bestializado'?","verso":"Expressão elitista que considerava o povo incapaz de política. Justificava exclusão de negros, mulheres e pobres do poder."},{"frente":"Quem foi Benjamin Constant?","verso":"Professor da Escola Militar que formou oficiais republicanos. Organizador intelectual do golpe de 1889."},{"frente":"Por que chamar de 'Proclamação' e não de 'golpe'?","verso":"O termo 'proclamação' esconde a violência do golpe e dá falsa aparência de legitimidade popular. É escolha política da narrativa oficial."},{"frente":"Qual foi a primeira medida do governo provisório?","verso":"Suspensão das garantias constitucionais e concentração do poder em militares e civis ilustrados. Sem eleições imediatas."}],
mapaMental:`# 15/11/1889: golpe militar e o "povo bestializado"
## O evento
- 15 de novembro de 1889
- Campo de Santana, Rio de Janeiro
- Deodoro da Fonseca lidera
- Golpe militar, não revolução popular
## Quem estava lá
- Militares e Benjamin Constant
- Rui Barbosa (jurista)
## Quem não estava
- Povo, mulheres, negros, indígenas, analfabetos
## A ideologia
- Positivismo (Augusto Comte)
- Lema: "Ordem e Progresso"
- Ordem = controle social
## O "povo bestializado"
- Rui Barbosa: povo incapaz de governar
- Justificativa para exclusão política
## Lente decolonial
- "Proclamação" esconde o golpe
- Massas excluídas do projeto de nação`
},
'A República que excluiu negros, mulheres e analfabetos':{
planejamento:`OBJETIVOS: Compreender a Constituição de 1891 e suas exclusões; analisar o racismo de Estado; refletir sobre heranças dessas exclusões.

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "Quem podia votar em 1890? E hoje?"
2. CONTEXTUALIZAÇÃO (10 min): Constituição de 1891 — quem era cidadão? Quem era excluído?
3. ANÁLISE (15 min): Voto censitário, política de branqueamento, Lei de Terras.
4. LEITURA (12 min): Trechos da Constituição de 1891 sobre direitos políticos.
5. SÍNTESE (8 min): "A República de 1891 era de quem?"

REFERÊNCIAS:
SKIDMORE, Thomas E. Preto no branco. São Paulo: Paz e Terra, 1974.
CARVALHO, José Murilo de. A construção da ordem. Rio de Janeiro: Campus, 1980.
ANDREWS, George Reid. Afro-Latinoamérica, 1800-2000. Madrid: Iberoamericana, 2019.`,
textoQuadro:`A REPÚBLICA QUE EXCLUIU NEGROS, MULHERES E ANALFABETOS

Constituição de 1891:
- Cidadão ativo: homem, branco, alfabetizado, com renda mínima
- Excluídos: negros, mulheres, analfabetos, indígenas, pobres
- Voto censitário: só quem tinha renda podia votar

Política de branqueamento:
- Imigração europeia incentivada com subsídios para "melhorar a raça"
- Teorias raciais: negros e indígenas "inferiores"
- Negros libertos: sem terra, trabalho ou direitos

Lei de Terras de 1850 + República:
- Terra vendida, não concedida — concentração fundiária agrava

Heranças: desigualdade racial, concentração de renda, analfabetismo estrutural`,
textoAluno:`A República que excluiu negros, mulheres e analfabetos

A República brasileira prometia modernidade e liberdade. Mas essa liberdade era seletiva. A Constituição de 1891 definiu com clareza quem seria cidadão e quem seria excluído.

Para ser "cidadão ativo" era preciso ser homem, maior de 21 anos, alfabetizado e com renda mínima. Mulheres não podiam votar. Analfabetos (cerca de 80% da população) não podiam votar. Negros, recém-libertados e sem acesso à educação, eram excluídos em massa. Indígenas nem eram considerados cidadãos.

O voto censitário mantinha o poder nas mãos da elite econômica. A República era uma oligarquia disfarçada.

O racismo de Estado se estruturou explicitamente. A República adotou política de branqueamento, incentivando imigração europeia para "melhorar a raça". Imigração italiana, portuguesa, alemã e japonesa foi incentivada com subsídios, enquanto negros libertos eram deixados sem terra, trabalho e direitos.

A Lei de Terras de 1850 continuou vigente. Terra vendida, não concedida. A concentração fundiária se agravou, e o trabalho precário substituiu o escravo.

A lente decolonial revela que a República de 1891 não foi projeto de inclusão. Foi projeto de exclusão sistemática, que manteve negros, mulheres, indígenas e pobres fora da cidadania. As heranças persistem até hoje.

PERGUNTAS DE REFLEXÃO:
1. Por que a República, após abolir a escravidão, excluiu os negros recém-libertados da cidadania?
2. De que formas a "política de branqueamento" ainda influencia a sociedade brasileira hoje?

REFERÊNCIAS:
SKIDMORE, Thomas E. Preto no branco. São Paulo: Paz e Terra, 1974.
CARVALHO, José Murilo de. A construção da ordem. Rio de Janeiro: Campus, 1980.
ANDREWS, George Reid. Afro-Latinoamérica, 1800-2000. Madrid: Iberoamericana, 2019.`,

atividade:[{"enunciado":"Complete: A Constituição de ____________ definiu que só homens, brancos, ____________ e com ____________ mínima poderiam votar. ____________, ____________, ____________ e ____________ foram excluídos da cidadania. A República adotou política de ____________, incentivando ____________ europeia com subsídios. BANCO: 1891, alfabetizados, analfabetos, branqueamento, imigração, indígenas, mulheres, negros, renda."},{"enunciado":"Relacione: 1. Voto censitário; 2. Política de branqueamento; 3. Lei de Terras de 1850; 4. Cidadão ativo; 5. Analfabetismo. Com: a) Exigência de renda para votar; b) Imigração europeia para 'melhorar a raça'; c) Terra vendida, não concedida; d) Homem, branco, alfabetizado, com renda; e) Ferramenta de exclusão política."},{"enunciado":"Análise: 'A Constituição de 1891 garantia liberdade e igualdade para todos os brasileiros.' — Está correto? Reescreva incorporando as exclusões. Mínimo 5 linhas."},{"enunciado":"Leia: 'Foto de 1890 mostra sessão do Congresso Nacional. Todos os presentes são homens brancos, de terno e gravata. Não há mulheres, negros, indígenas. O plenário é amplo e vazio, pois poucos têm direito de ocupar cadeiras.' — O que revela sobre a representação política na República? Mínimo 4 linhas."},{"enunciado":"A 'política de branqueamento' incentivou imigração europeia e deixou negros libertos sem terra. Em texto de mínimo 5 linhas: quem se beneficiou? Quem foi prejudicado? Como isso se relaciona com a desigualdade racial de hoje?"}],
gabarito:[{"resposta":"A Constituição de 1891 definiu que só homens, brancos, alfabetizados e com renda mínima poderiam votar. Mulheres, negros, analfabetos e indígenas foram excluídos da cidadania. A República adotou política de branqueamento, incentivando imigração europeia com subsídios.","comentario":"A Constituição de 1891 excluiu a maioria. Voto censitário e branqueamento mantinham poder nas mãos de elites."},{"resposta":"1-a; 2-b; 3-c; 4-d; 5-e.","comentario":"Voto censitário (a), branqueamento (b), Lei de Terras (c), cidadão ativo (d), analfabetismo (e)."},{"resposta":"O trecho está incorreto. A Constituição de 1891 não garantia liberdade e igualdade para todos. Excluía mulheres, negros, analfabetos, indígenas e pobres. O voto censitário e a política de branqueamento mantinham estruturas de exclusão. A 'liberdade' era seletiva: beneficiava elites brancas, homens e proprietários.","comentario":"O aluno deve reconhecer as exclusões da Constituição de 1891."},{"resposta":"A imagem mostra que a representação política na República era exclusiva de homens brancos ricos. A ausência de mulheres, negros e indígenas revela que o Congresso não representava a população. O plenário vazio simboliza que a democracia era teórica. A República era, na prática, uma oligarquia.","comentario":"Análise deve identificar composição elitista. Lente decolonial reconhece quem está ausente."},{"resposta":"Quem se beneficiou foi a elite rural e industrial, que obteve mão de obra barata. Imigrantes europeus receberam subsídios e terras. Negros libertos foram prejudicados: sem terra, sem trabalho, sem direitos, competiam com imigrantes por empregos precários. Isso consolidou a desigualdade racial que persiste hoje.","comentario":"O aluno deve identificar beneficiários e prejudicados."}],
questoes:[{"enunciado":"A Constituição de 1891 estabeleceu que apenas homens, maiores de 21 anos, alfabetizados e com renda mínima poderiam votar. Sobre essa medida, é correto afirmar que:","alternativas":["ampliou a participação política das massas trabalhadoras.","manteve o poder nas mãos de uma elite branca, masculina e proprietária.","garantiu o voto universal e direto para todos os brasileiros.","foi resultado de pressão popular por mais democracia.","eliminou as desigualdades sociais herdadas do Império."],"correta":1,"comentario":"O voto censitário e as exigências excluíam a maioria. B é correta."},{"enunciado":"A 'política de branqueamento', adotada pela República, consistia em:","alternativas":["promover a igualdade racial através de políticas afirmativas.","incentivar a imigração europeia para 'melhorar a raça brasileira'.","proteger os territórios indígenas contra a expansão agrícola.","garantir acesso à terra para negros libertos.","promover educação universal para todos os brasileiros."],"correta":1,"comentario":"Política de branqueamento incentivava imigração europeia com base em teorias raciais. B é correta."},{"enunciado":"A Lei de Terras de 1850, mantida pela República, estabelecia que a terra deveria ser vendida, não concedida. Sobre essa lei, é correto afirmar que:","alternativas":["facilitou o acesso de negros libertos e pobres à propriedade.","contribuiu para a concentração fundiária e exclusão dos mais pobres.","foi abolida pela República para promover reforma agrária.","beneficiou igualmente todos os grupos sociais.","não teve impacto na estrutura social."],"correta":1,"comentario":"A Lei de Terras impediu acesso de pobres e negros. B é correta."},{"enunciado":"Analisando a República de 1891 pela lente decolonial, é correto afirmar que:","alternativas":["a República promoveu inclusão de negros, mulheres e indígenas.","a exclusão sistemática de grupos marginalizados reproduziu estruturas de poder colonial.","a democracia representativa funcionou plenamente desde o início.","a Constituição de 1891 eliminou o racismo e a desigualdade de gênero.","o voto censitário foi medida temporária, logo substituída pelo voto universal."],"correta":1,"comentario":"A lente decolonial revela que a República reproduziu lógicas coloniais de exclusão. B é correta."},{"enunciado":"Texto I: 'A República trouxe liberdade e progresso para o Brasil.' — Livro didático, 1970. Texto II: 'A República de 1891 excluiu negros, mulheres, analfabetos e pobres da cidadania.' — Historiadora, 2020. A análise dos textos permite concluir que:","alternativas":["ambos concordam sobre o caráter progressista e inclusivo.","o texto I reproduz narrativa oficial que omite as exclusões do regime republicano.","o texto II é irrelevante para a compreensão histórica.","a República de 1891 foi genuinamente democrática e representativa.","ambos reconhecem que mulheres e negros participaram plenamente."],"correta":1,"comentario":"Texto I reproduz narrativa de progresso. Texto II desconstroi. B é correta."}],
flashcards:[{"frente":"O que dizia a Constituição de 1891 sobre quem podia votar?","verso":"Só homens, brancos, alfabetizados e com renda mínima. Mulheres, negros, analfabetos, indígenas e pobres eram excluídos."},{"frente":"O que era o voto censitário?","verso":"Exigência de renda mínima para votar. Forma de manter o poder nas mãos da elite econômica."},{"frente":"O que era a 'política de branqueamento'?","verso":"Incentivo à imigração europeia para 'melhorar a raça brasileira'. Baseada em teorias raciais que consideravam negros e indígenas 'inferiores'."},{"frente":"Quem se beneficiou com a política de branqueamento?","verso":"Elite rural e industrial (mão de obra barata), imigrantes europeus (subsídios e terras). Negros libertos foram prejudicados."},{"frente":"Como a Lei de Terras de 1850 afetou negros e pobres na República?","verso":"Terra era vendida, não concedida. Quem não tinha dinheiro ficava de fora. Concentração fundiária agravou. Trabalho precário substituiu escravidão."},{"frente":"Por que a República excluiu mulheres da cidadania?","verso":"Ideia de que mulheres deveriam ficar no espaço doméstico. Papel restrito à esfera privada. Voto feminino só veio em 1932."},{"frente":"Quais heranças da República de 1891 persistem hoje?","verso":"Desigualdade racial, concentração de renda e terra, analfabetismo em algumas regiões."},{"frente":"Por que a lente decolonial é importante para estudar a República de 1891?","verso":"Revela que a 'liberdade' republicana era seletiva. Questiona quem se beneficiou e quem foi excluído. Mostra continuidades entre passado e presente."}],
mapaMental:`# A República que excluiu negros, mulheres e analfabetos
## Constituição de 1891
- Cidadão ativo: homem, branco, alfabetizado, com renda
- Excluídos: negros, mulheres, analfabetos, indígenas, pobres
- Voto censitário: poder nas mãos da elite
## Exclusão das mulheres

## Negros e analfabetos
- 80% analfabeta em 1890
- 'Liberdade' sem direitos
## Política de branqueamento
- Imigração europeia incentivada
- Negros libertos sem terra, trabalho, direitos
## Lei de Terras de 1850
- Terra vendida, não concedida
- Concentração fundiária agrava
## Lente decolonial
- Heranças: desigualdade racial, concentração
- A República de 1891 excluiu — e nós pagamos o preço`

'Símbolos e mitos republicanos (positivismo, Tiradentes)':{
planejamento:`OBJETIVOS: Compreender como símbolos e mitos legitimaram a República; analisar o positivismo e a ressignificação de Tiradentes; refletir sobre omissões nos símbolos oficiais.

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "O que é um herói nacional? Quem escolhe os heróis?"
2. CONTEXTUALIZAÇÃO (10 min): Bandeira, Hino Nacional, Tiradentes.
3. ANÁLISE (15 min): Como símbolos excluem negros, mulheres e indígenas.
4. LEITURA (12 min): Trecho do Hino Nacional. Quem é o 'povo heroico'?
5. SÍNTESE (8 min): "Quem é o 'povo' do hino nacional?"

REFERÊNCIAS:
CARVALHO, José Murilo de. A formação das almas. São Paulo: Companhia das Letras, 1990.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
HOLANDA, Sérgio Buarque de. Raízes do Brasil. São Paulo: Companhia das Letras, 1995.`,
textoQuadro:`SÍMBOLOS E MITOS REPUBLICANOS (POSITIVISMO, TIRADENTES)

Bandeira: "Ordem e Progresso" — positivismo de Augusto Comte
Hino Nacional: letra de Joaquim Osório Duque-Estrada, 1909

Tiradentes: ressignificado como "mártir da República"
- 21 de abril: feriado da execução (1792)
- Inconfidência Mineira (1789): conspiração de elites, não movimento popular
- Era elite branca, proprietária de escravos

Símbolos escondem: exclusão de negros, mulheres, indígenas

Definição: Símbolos são instrumentos de poder — quem os cria define quem pertence à nação.`,
textoAluno:`Símbolos e mitos republicanos (positivismo, Tiradentes)

A República brasileira investiu na construção de símbolos e mitos que legitimavam o novo regime. Esses símbolos não eram neutros: carregavam ideologias, excluíam grupos e criavam uma narrativa oficial.

A bandeira brasileira tem o lema "Ordem e Progresso", do positivismo de Augusto Comte. A ideia é clara: o Brasil precisa de ordem antes de progresso. Mas "ordem" para quem? Para as elites. "Progresso" para quem? Para quem já tinha poder.

O Hino Nacional (1909) celebra a independência e o "povo heroico". Mas quem era esse povo? Elites portuguesas e descendentes. Negros, indígenas e pobres não eram "heróis" — eram trabalhadores invisíveis. O hino constrói memória seletiva.

Tiradentes foi ressignificado como herói republicano. Em 1789, participou da Inconfidência Mineira, conspiração contra o domínio português. Mas não era republicana no sentido moderno: seus líderes eram elites brancas, proprietárias de escravos. A escolha de Tiradentes cria uma origem heroica falsa para um regime que nasceu de golpe militar.

A lente decolonial desmonta esses mitos. Símbolos são instrumentos de poder. Quem escolhe os heróis? Quem escreve os hinos? A resposta é sempre a mesma: as elites. E quem fica de fora? Os mesmos de sempre: negros, mulheres, indígenas, pobres.

PERGUNTAS DE REFLEXÃO:
1. Por que a República escolheu Tiradentes como herói?
2. Como os símbolos oficiais excluem negros, mulheres e indígenas?

REFERÊNCIAS:
CARVALHO, José Murilo de. A formação das almas. São Paulo: Companhia das Letras, 1990.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.`,

gabarito:[{"resposta":"A bandeira tem o lema 'Ordem e Progresso', do positivismo de Augusto Comte. O Hino Nacional foi escrito por Joaquim Osório Duque-Estrada em 1909. Tiradentes foi ressignificado como herói, apesar da Inconfidência não ser republicana moderna. Era elite branca, proprietária de escravos. A data 21 de abril celebra sua execução.","comentario":"Símbolos construídos por elites. Tiradentes ressignificado para criar origem heroica falsa."},{"resposta":"1-a; 2-b; 3-c; 4-d; 5-e.","comentario":"Ordem e Progresso (a), Hino (b), Tiradentes (c), 21 de abril (d), Inconfidência (e)."},{"resposta":"O trecho está incorreto. Tiradentes era elite branca e proprietária de escravos. A Inconfidência não era republicana democrática. A República que o escolheu excluía negros, mulheres e pobres. A 'liberdade' de Tiradentes não incluía seus escravos. A escolha serve para criar origem falsa para regime golpista.","comentario":"O aluno deve reconhecer contradições do mito."},{"resposta":"A pintura mostra memória seletiva e idealizada. Deodoro e civis representam elite branca masculina. Ausência de negros, mulheres e indígenas revela exclusão desde o nascimento. Céu azul e limpo simboliza narrativa de progresso que omite violências. É propaganda, não registro histórico.","comentario":"Análise deve identificar memória seletiva."},{"resposta":"O 'povo heroico' eram elites portuguesas. Negros, indígenas e pobres foram excluídos, apesar de construírem o país. O Hino reproduz memória seletiva, celebrando elites e omitindo massas. Símbolos da República continuam tradição de identidade nacional branca, masculina e elitista. Quem nomeia símbolos define quem pertence à nação.","comentario":"O aluno deve conectar 'povo' do hino com realidade de exclusão."}],

'Lei de Terras de 1850: a terra vira mercadoria':{
planejamento:`OBJETIVOS: Compreender a Lei de Terras de 1850; analisar como transformou terra em mercadoria; identificar beneficiados e prejudicados; refletir sobre heranças na concentração fundiária.

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "A terra é um direito ou uma mercadoria?"
2. CONTEXTUALIZAÇÃO (10 min): Expansão do café, sistema de sesmarias, medo de revoltas.
3. ANÁLISE (15 min): A lei — quem compra, quem fica de fora.
4. LEITURA (12 min): Trecho da lei. Quem está incluído? Excluído?
5. SÍNTESE (8 min): "Por que a terra virou mercadoria?"

REFERÊNCIAS:
PRADO JÚNIOR, Caio. Formação do Brasil contemporâneo. São Paulo: Brasiliense, 1942.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
STEDILE, João Pedro. A luta pela terra no Brasil. São Paulo: Expressão Popular, 2014.`,
textoQuadro:`LEI DE TERRAS DE 1850: A TERRA VIRA MERCADORIA

1850: encerra sistema de sesmarias
- Terra vendida, não concedida pelo Estado
- Propriedade privada consolidada

Contexto: expansão do café e medo de revoltas de escravos e pobres

Beneficiados: grandes proprietários, comerciantes, elite
Prejudicados: pobres, negros libertos, trabalhadores rurais, indígenas

"Quem não tem dinheiro, não tem terra."

Herança: Brasil é um dos países com maior concentração de terras

Definição: Terra como mercadoria = quem não tem dinheiro não tem acesso.`,
textoAluno:`Lei de Terras de 1850: a terra vira mercadoria

Em 1850, o Império aprovou a Lei de Terras, uma das leis mais desastrosas para a maioria. Encerrou o sistema de sesmarias e transformou a terra em mercadoria.

O contexto era de expansão do café no Vale do Paraíba. A elite cafeeira precisava de mais terras. Ao mesmo tempo, o Império temia revoltas de escravos e pobres que ocupavam terras sem título. A lei foi resposta a esse medo: se a terra fosse vendida, apenas quem tivesse dinheiro poderia comprar.

Os beneficiados foram claros: grandes proprietários, comerciantes, elite econômica. Os prejudicados: pobres, negros que seriam libertos em 1888 (sem terra, sem trabalho, sem reparação), trabalhadores rurais, indígenas.

A herança é visível até hoje. O Brasil é um dos países com maior concentração de terras. Poucos detêm vastas extensões, enquanto milhões vivem sem terra ou em assentamentos precários. A lei de 1850 consolidou uma estrutura de poder que, com escravidão e trabalho precário, manteve elite no topo e massas na base.

A lente decolonial entende que a Lei de Terras não foi neutra. Foi escolha política que beneficiou elites e prejudicou pobres. A terra, que deveria ser direito, virou mercadoria.

PERGUNTAS DE REFLEXÃO:
1. Por que a lei foi aprovada enquanto a escravidão existia?
2. Como a concentração fundiária ainda afeta o Brasil hoje?

REFERÊNCIAS:
PRADO JÚNIOR, Caio. Formação do Brasil contemporâneo. São Paulo: Brasiliense, 1942.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
STEDILE, João Pedro. A luta pela terra no Brasil. São Paulo: Expressão Popular, 2014.`,

gabarito:[{"resposta":"A Lei de Terras de 1850 encerrou as sesmarias. A terra passou a ser vendida, não concedida pelo Estado. Quem tinha dinheiro comprava; quem não tinha ficava de fora. Contexto: expansão do café e medo de revoltas.","comentario":"Lei transformou terra em mercadoria. Beneficiou elites e prejudicou pobres, negros e indígenas."},{"resposta":"1-b; 2-a; 3-c; 4-d; 5-e.","comentario":"Lei de Terras (b), sesmarias (a), propriedade privada (c), elite cafeeira (d), negros libertos (e)."},{"resposta":"O trecho está incorreto. A lei não modernizou de forma inclusiva. Garantiu propriedade privada para quem tinha poder e dinheiro. Excluiu pobres, negros e indígenas, consolidando concentração fundiária. 'Desenvolvimento' beneficiou elites. Foi escolha política que reproduziu desigualdades.","comentario":"O aluno deve reconhecer que a lei não foi neutra."},{"resposta":"A imagem mostra que o acesso à terra era exclusivo de elites brancas. Homens de fraque e cartola representam quem tinha dinheiro. Trabalhadores atrás da cerca simbolizam exclusão: podiam ver, mas não participar. Ausência de negros, mulheres e indígenas revela que a lei não os incluía.","comentario":"Análise deve identificar exclusão visual e simbólica."},{"resposta":"Após 1888, negros libertos não receberam terra, trabalho nem reparação. A Lei de Terras já havia fechado o acesso à terra como mercadoria. Negros ficaram sem alternativa senão trabalho precário, migração ou ocupação clandestina. Isso se relaciona com desigualdade de hoje: negros ainda são maioria entre sem-terra, desempregados e moradores de periferias. Quem se beneficia é elite rural e urbana.","comentario":"O aluno deve conectar lei de 1850 com abolição de 1888 e desigualdades contemporâneas."}],
questoes:[{"enunciado":"A Lei de Terras de 1850 estabeleceu que terra deveria ser vendida, não concedida. Sobre isso, é correto afirmar que:","alternativas":["democratizou acesso à terra para todos.","foi aprovada no contexto de expansão do café e medo de revoltas.","garantiu terras gratuitas para negros libertos.","eliminou a propriedade privada.","não teve impacto social."],"correta":1,"comentario":"Lei foi aprovada no contexto de expansão cafeeira e medo de revoltas. B é correta."},{"enunciado":"A Lei de Terras consolidou a propriedade privada. Pela lente decolonial, é correto afirmar que:","alternativas":["beneficiou igualmente todas as classes sociais.","reproduziu estruturas de poder colonial, concentrando terras em elites.","foi medida neutra, sem impacto político.","priorizou acesso de indígenas e negros.","eliminou concentração fundiária."],"correta":1,"comentario":"Lei reproduziu lógicas coloniais de concentração de poder. B é correta."},{"enunciado":"Texto I: 'A Lei de Terras modernizou o Brasil, garantindo propriedade privada e desenvolvimento.' — Livro didático, 1980. Texto II: 'A Lei de Terras excluiu pobres, negros e indígenas, consolidando concentração fundiária.' — Historiadora, 2020. A análise permite concluir que:","alternativas":["ambos concordam sobre benefícios para todos.","o texto I reproduz narrativa oficial que omite exclusões.","o texto II é irrelevante.","a lei democratizou acesso à terra.","ambos reconhecem que negros e indígenas se beneficiaram."],"correta":1,"comentario":"Texto I reproduz narrativa de 'modernização'. Texto II desconstroi. B é correta."},{"enunciado":"A concentração fundiária brasileira persiste até hoje. Sobre essa herança, é correto afirmar que:","alternativas":["Brasil tem menor concentração de terras do mundo.","poucos proprietários detêm vastas extensões, enquanto milhões vivem sem terra.","reforma agrária foi implementada com sucesso.","acesso à terra é igualitário no Brasil.","indígenas e negros são principais proprietários de terras."],"correta":1,"comentario":"Brasil tem uma das maiores concentrações de terras do mundo. B é correta."},{"enunciado":"A Lei de Terras (1850) e a abolição (1888), analisadas conjuntamente, permitem concluir que:","alternativas":["negros receberam terras e reparação.","abolição sem terra e sem reparação, combinada com a Lei de Terras, condenou negros à miséria.","escravidão e concentração de terras foram eliminadas.","Brasil se tornou democracia racial.","a Lei de Terras não teve relação com negros libertos."],"correta":1,"comentario":"Abolição sem reparação, combinada com Lei de Terras, excluiu negros do acesso à terra. B é correta."}],
flashcards:[{"frente":"O que estabelecia a Lei de Terras de 1850?","verso":"Terra passava a ser vendida, não concedida. Encerrou sesmarias. Consolidou propriedade privada."},{"frente":"Quem se beneficiou com a Lei de Terras?","verso":"Grandes proprietários, comerciantes, elite econômica. Quem tinha dinheiro e poder podia comprar mais terras."},{"frente":"Quem foi prejudicado pela Lei de Terras?","verso":"Pobres, negros escravos e libertos, trabalhadores rurais, indígenas. Quem não tinha dinheiro ficava de fora."},{"frente":"Qual era o contexto da aprovação?","verso":"Expansão do café no Vale do Paraíba e medo de revoltas de escravos e pobres. Elite precisava de terras e controle social."},{"frente":"Como a lei afetou negros libertos após 1888?","verso":"Negros não receberam terra, trabalho nem reparação. Lei já havia fechado acesso à terra. Ficaram sem alternativa senão trabalho precário."},{"frente":"Qual é a herança da Lei de Terras hoje?","verso":"Concentração fundiária extrema. Brasil é um dos piores do mundo. Milhões sem terra ou em assentamentos precários."},{"frente":"O que eram as sesmarias?","verso":"Sistema pelo qual Coroa portuguesa concedia terras para colonização. Encerrado pela Lei de Terras de 1850."},{"frente":"Por que a lente decolonial é importante para estudar a Lei de Terras?","verso":"Revela que a lei não foi neutra, mas escolha política que beneficiou elites e prejudicou pobres. Terra como direito vs. mercadoria."}],

'1888: abolição sem terra, trabalho ou reparação':{
planejamento:`OBJETIVOS: Compreender a Lei Áurea e suas limitações; analisar consequências da abolição sem reparação; refletir sobre heranças da abolição mal feita.

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "O que é liberdade? Liberdade sem direitos é liberdade?"
2. CONTEXTUALIZAÇÃO (10 min): Lei Áurea — o que disse e o que não disse.
3. ANÁLISE (15 min): Consequências para negros libertos; comparação com outras abolições.
4. LEITURA (12 min): Depoimento de ex-escravo pós-abolição.
5. SÍNTESE (8 min): "A abolição libertou quem?"

REFERÊNCIAS:
CONRAD, Robert. Os últimos anos da escravidão no Brasil. Rio de Janeiro: Civilização Brasileira, 1978.
ANDREWS, George Reid. Afro-Latinoamérica, 1800-2000. Madrid: Iberoamericana, 2019.
FERNANDES, Florestan. A integração do negro na sociedade de classes. São Paulo: Dominus, 1964.`,
textoQuadro:`1888: ABOLIÇÃO SEM TERRA, TRABALHO OU REPARAÇÃO

Lei Áurea (13/05/1888): abolição da escravidão — princesa Isabel
- Sem indenização aos senhores (irritou elite rural)
- Sem terra, trabalho ou reparação aos libertos
- Negros libertos: sem onde morar, sem como sobreviver
- Senhores: mantiveram terras e poder econômico

"Liberdade" = miséria para milhões de negros

Lei de Terras (1850): ainda vigente — impede acesso à terra

Herança: desigualdade racial estrutural que persiste até hoje

Pergunta: "A abolição libertou quem?" `,
textoAluno:`1888: abolição sem terra, trabalho ou reparação

Em 13 de maio de 1888, a princesa Isabel assinou a Lei Áurea, que aboliu a escravidão no Brasil. Foi o fim de um sistema que escravizou milhões de africanos e seus descendentes por mais de três séculos. Mas essa abolição foi, na prática, uma libertação incompleta.

A Lei Áurea não previa nenhuma forma de reparação ou assistência aos libertos. Negros que haviam trabalhado a vida inteira sem remuneração foram simplesmente "libertados" e abandonados. Sem terra, sem trabalho, sem dinheiro, sem educação, sem moradia. A "liberdade" virou miséria.

Os senhores de escravos, por outro lado, mantiveram suas terras, seu poder econômico e sua posição social. A estrutura de poder não mudou.

As consequências foram devastadoras. Muitos negros libertos ficaram nas fazendas como trabalhadores assalariados precários. Outros migraram para cidades, onde formaram favelas e cortiços. A Lei de Terras de 1850, ainda vigente, impedia o acesso à terra.

A abolição sem reparação criou uma desigualdade racial estrutural que persiste até hoje. Negros continuam sendo maioria entre os mais pobres, os menos escolarizados, os que vivem em periferias.

A lente decolonial revela que a abolição brasileira foi uma das piores do mundo. Nos EUA, após a abolição, houve Reconstrução. Na Jamaica, ex-escravos receberam terras. No Brasil, nada. A abolição foi feita de cima para baixo, sem participação dos escravos.

PERGUNTAS DE REFLEXÃO:
1. Por que a abolição brasileira não incluiu reparação aos libertos?
2. De que formas a abolição mal feita de 1888 ainda afeta a sociedade brasileira?

REFERÊNCIAS:
CONRAD, Robert. Os últimos anos da escravidão no Brasil. Rio de Janeiro: Civilização Brasileira, 1978.
ANDREWS, George Reid. Afro-Latinoamérica, 1800-2000. Madrid: Iberoamericana, 2019.
FERNANDES, Florestan. A integração do negro na sociedade de classes. São Paulo: Dominus, 1964.`,

atividade:[{"enunciado":"Complete: A Lei Áurea (13/05/1888) aboliu a ____________ no Brasil, assinada pela princesa __________. Não previa ____________ aos senhores nem ____________, ____________ ou ____________ aos libertos. Negros foram simplesmente 'libertos' e __________. Senhores ____________ terras e ____________ econômico. BANCO: abandonados, abolição, escravidão, indenização, Isabel, mantiveram, poder, reparação, terra, trabalho."},{"enunciado":"Relacione: 1. Lei Áurea (1888); 2. Lei de Terras (1850); 3. Senhores de escravos; 4. Negros libertos; 5. Abolição brasileira. Com: a) Abolição sem reparação; b) Barreira para acesso à terra; c) Mantiveram terras e poder; d) Sem terra, trabalho nem reparação; e) Uma das piores do mundo."},{"enunciado":"Análise: 'A Lei Áurea de 1888 foi a maior conquista da história brasileira, que libertou os negros e lhes deu cidadania e direitos.' — Está correto? Reescreva incorporando que foi sem terra, sem reparação e sem direitos. Mínimo 5 linhas."},{"enunciado":"Leia: 'Foto de 1889 mostra grupo de negros libertos em frente a uma fazenda. Estão descalços, com roupas surradas. Ao fundo, o senhor de escravos observa da varanda. A terra da fazenda se estende até o horizonte. Não há casa para os libertos.' — O que revela sobre a abolição? Mínimo 4 linhas."},{"enunciado":"A abolição brasileira é considerada uma das piores do mundo. Em texto de mínimo 5 linhas: compare com abolições em outros países (EUA, Jamaica). Por que a brasileira foi diferente? E como isso se relaciona com desigualdade racial de hoje?"}],
gabarito:[{"resposta":"A Lei Áurea (13/05/1888) aboliu a escravidão no Brasil, assinada pela princesa Isabel. Não previa indenização aos senhores nem terra, trabalho ou reparação aos libertos. Negros foram simplesmente 'libertos' e abandonados. Senhores mantiveram terras e poder econômico.","comentario":"Lei Áurea aboliu escravidão sem reparação. Beneficiou elites e prejudicou negros."},{"resposta":"1-a; 2-b; 3-c; 4-d; 5-e.","comentario":"Lei Áurea (a), Lei de Terras (b), senhores (c), negros libertos (d), abolição brasileira (e)."},{"resposta":"O trecho está incorreto. Lei Áurea não deu cidadania nem direitos. Foi abolição sem terra, sem reparação, sem trabalho, sem educação, sem moradia. Negros foram abandonados à própria sorte. Senhores mantiveram terras e poder. 'Liberdade' virou miséria. Foi decisão de elite que beneficiou elites e prejudicou negros.","comentario":"O aluno deve reconhecer limitações da Lei Áurea."},{"resposta":"A imagem mostra a realidade da abolição: negros libertos descalços e com roupas surradas, sem condições dignas. Senhor na varanda simboliza poder que não mudou. Terra se estendendo até o horizonte mostra que senhores mantiveram propriedades. Ausência de casa e trabalho garantido revela que libertos foram abandonados.","comentario":"Análise deve identificar contradição entre liberdade e realidade."},{"resposta":"Nos EUA, após a abolição, houve Reconstrução com reformas. Na Jamaica, ex-escravos receberam terras. No Brasil, nada: sem terra, sem reparação, sem plano. Abolição brasileira foi diferente porque foi decisão de elite, sem participação dos escravos. Isso se relaciona com desigualdade racial de hoje: negros ainda são maioria entre pobres, desescolarizados e periféricos.","comentario":"O aluno deve comparar abolições e conectar com desigualdade contemporânea."}],
questoes:[{"enunciado":"A Lei Áurea de 1888 aboliu a escravidão no Brasil. Sobre essa lei e suas consequências, é correto afirmar que:","alternativas":["garantiu terra, trabalho e reparação aos negros libertos.","não previu indenização aos senhores nem reparação aos libertos.","distribuiu terras igualitariamente entre todos os brasileiros.","eliminou a desigualdade racial no país.","foi resultado de revolução popular liderada pelos escravos."],"correta":1,"comentario":"Lei Áurea não previu indenização nem reparação. B é correta."},{"enunciado":"Analisando a abolição brasileira pela lente decolonial, é correto afirmar que:","alternativas":["foi uma das piores abolições do mundo, sem reparação e sem participação dos escravos.","promoveu a igualdade racial e a inclusão social imediata.","garantiu direitos plenos aos negros libertos.","eliminou as estruturas de poder herdadas da escravidão.","não teve impacto na estrutura social brasileira."],"correta":0,"comentario":"A lente decolonial revela que abolição brasileira foi uma das piores, sem reparação. A é correta."},{"enunciado":"Texto I: 'A Lei Áurea foi a maior conquista da história brasileira.' — Livro didático, 1980. Texto II: 'A Lei Áurea abandonou negros sem terra, trabalho ou reparação, condenando-os à miséria.' — Historiadora, 2020. A análise permite concluir que:","alternativas":["ambos concordam sobre dignidade dos libertos.","o texto I reproduz narrativa oficial que omite abandono e miséria.","o texto II é irrelevante.","a Lei Áurea garantiu direitos plenos.","ambos reconhecem que negros receberam terra."],"correta":1,"comentario":"Texto I reproduz narrativa de 'conquista'. Texto II desconstroi. B é correta."},{"enunciado":"A herança da abolição mal feita de 1888 pode ser observada na sociedade contemporânea através da:","alternativas":["desigualdade racial estrutural que persiste.","eliminação completa do racismo no Brasil.","democracia racial plenamente realizada.","distribuição igualitária de renda e terras.","ausência de qualquer relação entre passado escravista e presente."],"correta":0,"comentario":"Herança inclui desigualdade racial estrutural. A é correta."},{"enunciado":"A comparação entre a abolição brasileira (1888) e a abolição nos EUA (1865) permite concluir que:","alternativas":["ambas garantiram terra e reparação aos libertos.","a abolição brasileira foi mais completa e inclusiva que a americana.","nos EUA houve Reconstrução (mesmo que imperfeita), enquanto no Brasil não houve nenhum plano de inclusão.","ambas eliminaram desigualdades raciais imediatamente.","a abolição brasileira foi resultado de revolução popular."],"correta":2,"comentario":"Nos EUA houve Reconstrução; no Brasil, nenhum plano. C é correta."}],
flashcards:[{"frente":"O que foi a Lei Áurea de 1888?","verso":"Lei que aboliu a escravidão no Brasil, assinada pela princesa Isabel em 13 de maio de 1888. Não previa reparação aos libertos."},{"frente":"Por que a abolição brasileira foi considerada 'mal feita'?","verso":"Não incluiu terra, trabalho, reparação, educação nem moradia aos libertos. Negros foram abandonados à miséria."},{"frente":"Quem se beneficiou com a Lei Áurea?","verso":"Senhores de escravos mantiveram terras e poder. Perderam mão de obra escrava, mas ganharam assalariada barata."},{"frente":"Quem foi prejudicado pela Lei Áurea?","verso":"Negros libertos, abandonados sem terra, trabalho, reparação, educação ou moradia. Condenados à pobreza estrutural."},{"frente":"Como a Lei de Terras de 1850 afetou negros libertos?","verso":"Impediu acesso à terra. Terra era vendida, não concedida. Quem não tinha dinheiro não podia comprar."},{"frente":"Quais foram as alternativas para negros libertos após 1888?","verso":"Trabalho precário nas fazendas, migração para cidades (favelas e cortiços), ocupação clandestina de terras."},{"frente":"Como a abolição brasileira se comparou com outras?","verso":"Foi uma das piores. Nos EUA houve Reconstrução; na Jamaica, ex-escravos receberam terras. No Brasil, nada."},{"frente":"Por que a lente decolonial é importante para estudar a abolição?","verso":"Revela que abolição foi decisão de elite, sem participação dos escravos. 'Liberdade' sem direitos é nova forma de opressão."}],

'Racismo de Estado: teorias raciais e branqueamento':{
planejamento:`OBJETIVOS: Compreender o racismo de Estado na República; analisar teorias raciais eugenêsicas e branqueamento; refletir sobre heranças do racismo científico no Brasil.

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "'Ciência' pode ser usada para discriminar? Já foi?"
2. CONTEXTUALIZAÇÃO (10 min): Racismo científico no século XIX — teorias eugenêsicas.
3. ANÁLISE (15 min): Lacerda, Nina Rodrigues, política de branqueamento.
4. LEITURA (12 min): Trecho de texto racista da época.
5. SÍNTESE (8 min): "Como o Estado usou 'ciência' para discriminar?"

REFERÊNCIAS:
SKIDMORE, Thomas E. Preto no branco. São Paulo: Paz e Terra, 1974.
SCHWARCZ, Lilia Moritz. O espetáculo das raças. São Paulo: Companhia das Letras, 1993.
HOCHMAN, Gilberto. A era do saneamento. São Paulo: Hucitec, 1998.`,
textoQuadro:`RACISMO DE ESTADO: TEORIAS RACIAIS E BRANQUEAMENTO

Racismo científico: teorias eugenêsicas do século XIX
- Negros e indígenas considerados "inferiores" pela "ciência"
- Pseudociência: completamente desacreditada hoje

Política de branqueamento:
- João Batista de Lacerda: "em 100 anos o Brasil será branco" (1911)
- Nina Rodrigues: "criminalidade do homem de cor"
- Imigração europeia incentivada com subsídios

Racismo de Estado: leis, políticas e práticas que discriminavam

Herança: mito da "democracia racial" e invisibilidade do racismo estrutural`,
textoAluno:`Racismo de Estado: teorias raciais e branqueamento

A República brasileira não apenas excluiu negros e indígenas da cidadania. Ela também construiu uma ideologia racista que justificava essa exclusão como "natural" e "científica". Esse foi o racismo de Estado.

No final do século XIX e início do XX, teorias eugenêsicas e raciais dominavam o pensamento científico europeu e americano. Essas teorias classificavam seres humanos em "raças" hierarquizadas. A "ciência" da época — hoje completamente desacreditada — afirmava que negros eram "inferiores" intelectual e moralmente.

No Brasil, intelectuais e políticos adotaram essas teorias para justificar a política de branqueamento. João Batista de Lacerda, médico e político, escreveu em 1911 que "em 100 anos o Brasil será branco". A ideia era que o Brasil se "melhoraria" através da miscigenação com europeus. A imigração europeia foi incentivada com subsídios.

Nina Rodrigues, médico baiano, escreveu estudos sobre a "criminalidade do homem de cor", atribuindo a negros uma suposta predisposição ao crime. Essas ideias justificavam a exclusão de negros do mercado de trabalho, da educação e da política.

A herança dessas ideias persiste. O mito da "democracia racial" — a ideia de que no Brasil não há racismo porque todos são "mestiços" — é herança do branqueamento. A lente decolonial desmonta essas ideias: não há raças biológicas, são construções sociais. O branqueamento foi um projeto de genocídio cultural.

PERGUNTAS DE REFLEXÃO:
1. Como teorias raciais "científicas" justificavam a exclusão de negros e indígenas?
2. De que formas a política de branqueamento ainda influencia a sociedade brasileira?

REFERÊNCIAS:
SKIDMORE, Thomas E. Preto no branco. São Paulo: Paz e Terra, 1974.
SCHWARCZ, Lilia Moritz. O espetáculo das raças. São Paulo: Companhia das Letras, 1993.
HOCHMAN, Gilberto. A era do saneamento. São Paulo: Hucitec, 1998.`,
slides:[{"titulo":"Racismo científico","topicos":["Teorias eugenêsicas do século XIX","'Raças' hierarquizadas: brancos no topo","Negros e indígenas 'inferiores'","Pseudociência que justificava discriminação"]},{"titulo":"João Batista de Lacerda","topicos":["'Em 100 anos o Brasil será branco' (1911)","Ideia de miscigenação com europeus","Branqueamento como 'melhoria' racial","Projeto de apagar presença negra e indígena"]},{"titulo":"Nina Rodrigues","topicos":["'Criminalidade do homem de cor'","Atribuía a negros predisposição ao crime","Racismo vestido de ciência","Justificativa para exclusão"]},{"titulo":"Política de branqueamento","topicos":["Imigração europeia incentivada com subsídios","Negros libertos deixados de lado","Mensagem: brancos bem-vindos, negros devem desaparecer"]},{"titulo":"Heranças e lente decolonial","topicos":["Mito da 'democracia racial'","Invisibilidade do racismo estrutural","Não há raças biológicas: construções sociais","Branqueamento = genocídio cultural"]}],
atividade:[{"enunciado":"Complete: O racismo de Estado na República construiu ____________ racista que justificava exclusão como 'natural' e 'científica'. Teorias ____________ classificavam seres humanos em 'raças' hierarquizadas. João Batista de ____________ escreveu que 'em ____________ anos o Brasil será branco'. Nina ____________ escreveu sobre 'criminalidade do homem de cor'. A política de ____________ incentivou imigração europeia com subsídios. BANCO: 100, branqueamento, científicas, eugenêsicas, ideologia, Lacerda, Rodrigues."},{"enunciado":"Relacione: 1. Racismo científico; 2. João Batista de Lacerda; 3. Nina Rodrigues; 4. Política de branqueamento; 5. Democracia racial. Com: a) Teorias que hierarquizavam 'raças'; b) 'Em 100 anos o Brasil será branco'; c) 'Criminalidade do homem de cor'; d) Imigração europeia incentivada; e) Mito de que no Brasil não há racismo."},{"enunciado":"Análise: 'As teorias raciais do século XIX eram baseadas em evidências científicas sólidas e ajudaram o Brasil a se desenvolver.' — Está correto? Reescreva incorporando que eram pseudociência e justificavam discriminação. Mínimo 5 linhas."},{"enunciado":"Leia: 'Foto de 1920 mostra família de imigrantes europeus em fazenda no Sul do Brasil com casa, terra e gado. Ao lado, barraco de negros libertos, sem terra, sem gado, sem direitos. A placa diz: Colônia de imigrantes europeus — subsídios do governo.' — O que revela sobre a política de branqueamento? Mínimo 4 linhas."},{"enunciado":"O mito da 'democracia racial' é herança do branqueamento. Em texto de mínimo 5 linhas: o que é esse mito? Como ele esconde o racismo estrutural? Como a lente decolonial ajuda a desmontá-lo?"}],
gabarito:[{"resposta":"O racismo de Estado na República construiu ideologia racista que justificava exclusão como 'natural' e 'científica'. Teorias eugenêsicas classificavam seres humanos em 'raças' hierarquizadas. João Batista de Lacerda escreveu que 'em 100 anos o Brasil será branco'. Nina Rodrigues escreveu sobre 'criminalidade do homem de cor'. A política de branqueamento incentivou imigração europeia com subsídios.","comentario":"Racismo de Estado usou pseudociência para justificar discriminação."},{"resposta":"1-a; 2-b; 3-c; 4-d; 5-e.","comentario":"Racismo científico (a), Lacerda (b), Nina Rodrigues (c), branqueamento (d), democracia racial (e)."},{"resposta":"O trecho está incorreto. Teorias raciais não eram baseadas em evidências científicas. Era pseudociência, completamente desacreditada hoje. Classificavam seres humanos em 'raças' hierarquizadas sem base biológica. Usadas para justificar discriminação, exclusão e genocídio. A 'ciência' serviu ao poder, não à verdade.","comentario":"O aluno deve reconhecer que teorias raciais eram pseudociência."},{"resposta":"A imagem mostra a política de branqueamento em ação: imigrantes europeus com casa, terra e gado, subsidiados pelo governo. Negros libertos ao lado, em barraco, sem terra, sem gado, sem direitos. A placa 'subsídios do governo' mostra que branqueamento era política pública. A imagem é prova visual do racismo de Estado.","comentario":"Análise deve identificar contraste entre imigrantes e negros."},{"resposta":"Mito da 'democracia racial' é ideia de que no Brasil não há racismo porque todos são 'mestiços'. Esconde racismo estrutural ao dizer que miscigenação eliminou preconceito. Na prática, desigualdade racial é enorme: negros são maioria entre pobres, desescolarizados, encarcerados. A lente decolonial desmonta o mito mostrando que miscigenação não eliminou racismo, mas criou novo tipo: racismo que nega sua própria existência.","comentario":"O aluno deve explicar mito e mostrar como esconde desigualdade."}],
questoes:[{"enunciado":"João Batista de Lacerda afirmou em 1911 que 'em 100 anos o Brasil será branco'. Sobre essa afirmação, é correto afirmar que:","alternativas":["expressava uma política de inclusão racial e valorização da diversidade.","refletia a política de branqueamento que incentivava imigração europeia e marginalizava negros.","era uma previsão científica baseada em evidências biológicas sólidas.","defendia a preservação das culturas africana e indígena no Brasil.","não tinha relação com as políticas do Estado republicano."],"correta":1,"comentario":"Afirmação refletia política de branqueamento. B é correta."},{"enunciado":"Nina Rodrigues escreveu sobre a 'criminalidade do homem de cor'. Sobre esse estudo, é correto afirmar que:","alternativas":["era uma análise científica rigorosa e isenta de preconceitos.","atribuía a negros uma suposta predisposição ao crime, justificando discriminação.","defendia os direitos dos negros e criticava o racismo.","não teve impacto nas políticas públicas da época.","era uma crítica ao sistema prisional brasileiro."],"correta":1,"comentario":"Estudo atribuía predisposição ao crime, justificando discriminação. B é correta."},{"enunciado":"A política de branqueamento, adotada pela República, consistia em:","alternativas":["promover a igualdade racial através de políticas afirmativas.","incentivar a imigração europeia para 'melhorar a raça' e marginalizar negros.","proteger territórios indígenas contra expansão agrícola.","garantir acesso à terra para negros libertos.","promover educação universal para todos os brasileiros."],"correta":1,"comentario":"Política de branqueamento incentivava imigração europeia e marginalizava negros. B é correta."},{"enunciado":"Analisando o racismo de Estado pela lente decolonial, é correto afirmar que:","alternativas":["teorias raciais eram pseudociência usada para justificar discriminação e exclusão.","eram baseadas em evidências científicas sólidas e neutras.","promoviam a inclusão de negros e indígenas na sociedade.","eliminaram hierarquias sociais baseadas em raça.","não tiveram impacto na estrutura social."],"correta":0,"comentario":"A lente decolonial revela que teorias raciais eram pseudociência. A é correta."},{"enunciado":"O mito da 'democracia racial' pode ser entendido como:","alternativas":["uma verdade científica comprovada pela história brasileira.","uma ideologia que esconde o racismo estrutural e naturaliza a desigualdade racial.","um projeto de inclusão social e racial no país.","uma crítica ao sistema escravista brasileiro.","um movimento de resistência negra contra a discriminação."],"correta":1,"comentario":"Mito esconde racismo estrutural e naturaliza desigualdade. B é correta."}],
flashcards:[{"frente":"O que era o racismo de Estado na República?","verso":"Sistema de discriminação legitimado pela pseudociência. Leis, políticas e práticas que excluíam negros e indígenas."},{"frente":"O que eram teorias raciais eugenêsicas?","verso":"Pseudociência que classificava seres humanos em 'raças' hierarquizadas. Completamente desacreditada hoje."},{"frente":"Quem foi João Batista de Lacerda?","verso":"Médico e político que escreveu 'em 100 anos o Brasil será branco' (1911). Defendia branqueamento através de miscigenação com europeus."},{"frente":"Quem foi Nina Rodrigues?","verso":"Médico baiano que escreveu sobre 'criminalidade do homem de cor'. Atribuía a negros predisposição ao crime. Racismo vestido de ciência."},{"frente":"O que era a política de branqueamento?","verso":"Imigração europeia incentivada com subsídios para 'melhorar a raça'. Negros libertos deixados de lado."},{"frente":"Qual é a herança do racismo de Estado?","verso":"Mito da 'democracia racial', invisibilidade do racismo estrutural, naturalização da desigualdade racial."},{"frente":"O que é o mito da 'democracia racial'?","verso":"Ideia de que no Brasil não há racismo porque todos são 'mestiços'. Esconde racismo estrutural e desigualdade racial enorme."},{"frente":"Por que a lente decolonial é importante para estudar racismo de Estado?","verso":"Desmonta pseudociência. Mostra que não há raças biológicas. Revela branqueamento como genocídio cultural."}],

'Revolta da Vacina (1904): ciência e autoritarismo':{
planejamento:`OBJETIVOS: Compreender a Revolta da Vacina de 1904; analisar a relação entre ciência, higienismo e autoritarismo; refletir sobre a tensão entre "progresso" e direitos populares.

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "Como resistir a uma medida do governo que parece errada?"
2. CONTEXTUALIZAÇÃO (10 min): Rio de Janeiro 1904, governo Rodrigues Alves, Oswaldo Cruz.
3. ANÁLISE (15 min): A revolta — causas, eventos e resultado. Quem resistiu? Por quê?
4. LEITURA (12 min): Depoimento de morador do Rio de 1904.
5. SÍNTESE (8 min): "A vacina era boa, mas a obrigatoriedade era justa?"

REFERÊNCIAS:
HOCHMAN, Gilberto. A era do saneamento. São Paulo: Hucitec, 1998.
SEVCENKO, Nicolau. A revolta da vacina. São Paulo: Brasiliense, 1984.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.`,
textoQuadro:`REVOLTA DA VACINA (1904): CIÊNCIA E AUTORITARISMO

1904: Rio de Janeiro, governo de Rodrigues Alves
- Oswaldo Cruz: diretor de Saúde Pública, vacinação obrigatória
- Vacina contra varíola imposta de forma autoritária

População resistiu:
- Invasão de domicílios, vacinação à força, sem explicação
- Pobres, negros, imigrantes, trabalhadores — sem voz, sem direito de recusar

Revolta: 10 a 16 de novembro de 1904 — barricadas, confrontos com polícia

Resultado: vacinação suspensa, Oswaldo Cruz exilado, mas saneamento continuou

Pergunta: "A vacina era boa, mas a obrigatoriedade era justa?" `,
textoAluno:`Revolta da Vacina (1904): ciência e autoritarismo

Em 1904, o Rio de Janeiro viveu uma das revoltas mais significativas da Primeira República: a Revolta da Vacina. O conflito não era contra a ciência, mas contra a forma autoritária como a ciência era imposta.

O contexto era de "modernização" urbana. O presidente Rodrigues Alves e o diretor de Saúde Pública, Oswaldo Cruz, queriam transformar o Rio em uma cidade "civilizada". A varíola era endêmica, matando milhares. A vacinação era necessária. Mas a forma como foi imposta gerou resistência.

A vacinação era obrigatória. Agentes de saúde invadiam casas, vacinavam à força, sem explicar o que faziam. A população — principalmente pobres, negros, imigrantes e trabalhadores — não tinha voz. A "ciência" chegava como ordem, não como direito.

A resistência explodiu entre 10 e 16 de novembro de 1904. Barricadas foram erguidas nas ruas. A elite, que apoiava a "modernização", via a revolta como "barbárie" do povo. Mas o povo via a obrigatoriedade como violência do Estado. A revolta não era contra a vacina, mas contra o autoritarismo.

O resultado foi a suspensão da vacinação obrigatória. Mas o saneamento continuou, e o Rio foi transformado. A lente decolonial revela que a "modernização" era seletiva. Beneficiava elites. Prejudicava pobres que tinham suas casas invadidas, suas ruas demolidas. A ciência, sem diálogo, sem participação, sem direitos, vira autoritarismo.

PERGUNTAS DE REFLEXÃO:
1. Por que a população resistiu à vacinação obrigatória?
2. Como a Revolta da Vacina revela a tensão entre "progresso" e direitos populares?

REFERÊNCIAS:
HOCHMAN, Gilberto. A era do saneamento. São Paulo: Hucitec, 1998.
SEVCENKO, Nicolau. A revolta da vacina. São Paulo: Brasiliense, 1984.
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.`,

atividade:[{"enunciado":"Complete: Em ____________, o Rio de Janeiro viveu a Revolta da ______________. O governo de Rodrigues ____________ e o diretor de Saúde Pública, ____________ Cruz, queriam modernizar a cidade. A vacinação era ____________, mas os agentes invadiam ____________, vacinavam à força, sem ______________. A revolta explodiu entre ____________ e ____________ de novembro de 1904, com barricadas e confrontos. BANCO: 1904, 10, 16, Alves, domicílios, explicar, obrigatória, Oswaldo, Vacina."},{"enunciado":"Relacione: 1. Oswaldo Cruz; 2. Vacinação obrigatória; 3. Revolta da Vacina; 4. Elite carioca; 5. População pobre. Com: a) Diretor de Saúde Pública; b) Medida que gerou resistência; c) Revolta de 1904 contra autoritarismo; d) Apoiou 'modernização'; e) Resistiu à invasão de domicílios."},{"enunciado":"Análise: 'A Revolta da Vacina foi um movimento de ignorantes contra a ciência e o progresso.' — Está correto? Reescreva incorporando que a revolta era contra autoritarismo, não contra ciência. Mínimo 5 linhas."},{"enunciado":"Leia: 'Foto de 1904 mostra barricada na rua do Rio. Trabalhadores, mulheres e crianças atrás de barricada de móveis e entulho. Policiais a cavalo ao fundo. Cartaz diz: Não à vacinação à força.' — O que revela sobre a revolta? Mínimo 4 linhas."},{"enunciado":"A Revolta da Vacina coloca uma questão atual: ciência pode ser imposta sem consentimento? Em texto de mínimo 5 linhas: como a tensão entre 'progresso' e direitos populares se manifesta hoje? E como a lente decolonial ajuda a entender essa tensão?"}],
gabarito:[{"resposta":"Em 1904, o Rio de Janeiro viveu a Revolta da Vacina. O governo de Rodrigues Alves e o diretor Oswaldo Cruz queriam modernizar a cidade. A vacinação era obrigatória, mas os agentes invadiam domicílios, vacinavam à força, sem explicar. A revolta explodiu entre 10 e 16 de novembro de 1904, com barricadas e confrontos.","comentario":"Revolta da Vacina foi resistência contra autoritarismo, não contra ciência."},{"resposta":"1-a; 2-b; 3-c; 4-d; 5-e.","comentario":"Oswaldo Cruz (a), vacinação obrigatória (b), Revolta da Vacina (c), elite carioca (d), população pobre (e)."},{"resposta":"O trecho está incorreto. A revolta não foi de ignorantes contra ciência. Foi resistência contra autoritarismo. A população não era contra vacina, mas contra obrigatoriedade e invasão de domicílios. A 'ciência' foi imposta sem diálogo, sem participação, sem direitos. Elite chamou de 'barbárie', mas povo defendia dignidade.","comentario":"O aluno deve reconhecer que revolta era contra autoritarismo."},{"resposta":"A imagem mostra revolta como resistência popular organizada. Trabalhadores, mulheres e crianças em barricada mostram que resistência era de famílias. Cartaz 'Não à vacinação à força' revela que povo não era contra vacina, mas contra violência. Policiais a cavalo representam repressão do Estado.","comentario":"Análise deve identificar resistência popular organizada."},{"resposta":"Tensão entre progresso e direitos se manifesta hoje em debates sobre vacinação obrigatória, remoções forçadas, projetos de desenvolvimento que desrespeitam comunidades. A lente decolonial revela que 'progresso' frequentemente é definido por elites e imposto a populações pobres e negras. Ciência deve ser democrática: com informação, participação e respeito aos direitos.","comentario":"O aluno deve conectar revolta histórica com debates contemporâneos."}],

herança da Revolta da Vacina pode ser observada em debates contemporâneos sobre:","alternativas":["a relação entre políticas de saúde pública e respeito aos direitos individuais.","a eliminação da medicina moderna.","a proibição de vacinas no Brasil.","o fim do saneamento urbano.","a segregação racial nas cidades."],"correta":0,"comentario":"Herança se observa em debates sobre saúde pública e direitos. A é correta."}],

'JK e os "50 anos em 5": a construção de Brasília':{
planejamento:`OBJETIVOS — 2 AULAS:

Aula 1 — JK e o desenvolvimentismo:
- Compreender o contexto político-econômico do governo JK (1956-1961).
- Analisar o desenvolvimentismo como projeto de modernização.
- Identificar os setores beneficiados pelo Plano de Metas.
- Refletir sobre quem pagou o preço dessa modernização.

Aula 2 — Brasília: contradições e impactos:
- Compreender a construção de Brasília como símbolo do desenvolvimentismo.
- Analisar as condições dos candangos e o deslocamento de povos indígenas.
- Refletir sobre as desigualdades urbanas desde a origem da cidade.
- Conectar o passado com o presente: heranças em Goiás.

SEQUÊNCIA:

Aula 1 (50 min):
5min — Introdução: "50 anos em 5 para quem?"
10min — Cenário político pós-1955; Plano de Metas (5 setores).
15min — Quem se beneficiou? Empreiteiras, industriais, bancos. Quem ficou de fora? Rurais, indígenas, pequenos produtores.
12min — Leitura de imagem: fotos da construção. Quem aparece? Quem não aparece?
8min — Síntese escrita: "50 anos em 5: para quem?"

Aula 2 (50 min):
5min — Retomada: "Quem construiu Brasília com as próprias mãos?"
12min — Os candangos: condições precárias, invisibilidade nos discursos oficiais.
10min — Povos indígenas: Xavante, Xerente, Kayapó — territórios invadidos, doenças.
10min — Ceilândia e a segregação urbana desde a origem.
8min — Impactos em Goiás: território perdido, especulação, pequenos produtores expulsos.
5min — Fechamento: "Brasília é de quem?"

REFERÊNCIAS:
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
PAVIANI, Aldo. Brasília: ideologia e realidade. Brasília: UnB, 1988.
RIBEIRO, Darcy. O povo brasileiro. São Paulo: Companhia das Letras, 1995.
ARANTES, Antonio A. A cidade bela: Brasília, modernismo e identidade nacional. Campinas: Unicamp, 1996.`,
textoQuadro:`JK E OS "50 ANOS EM 5": A CONSTRUÇÃO DE BRASÍLIA

Juscelino Kubitschek (1956-1961): lema "50 anos em 5"
- Plano de Metas: energia, transportes, alimentação, indústria de base, educação
- Brasília (1956-1960): nova capital no Planalto Central

Candangos: trabalhadores pobres (nordestinos, negros, goianos)
- Condições precárias: salários baixos, acampamentos, doenças
- Invisíveis nos discursos oficiais de modernização

Povos indígenas: Xavante, Xerente, Kayapó
- Territórios invadidos, aldeias deslocadas, doenças

Contradição: Brasília planejada para elites; pobres excluídos para Ceilândia

Goiás: perda territorial para o DF; especulação imobiliária; pequenos produtores expulsos

Pergunta: "Modernização para quem?" `,
textoAluno:`JK, Brasília e o preço da "modernização"

Em 1956, Juscelino Kubitschek assumiu a presidência com uma promessa ambiciosa: fazer o país avançar "50 anos em 5". Esse projeto ficou conhecido como desenvolvimentismo — uma aposta na industrialização acelerada, na construção de infraestrutura e na atração de investimentos estrangeiros.

O símbolo máximo desse projeto foi a construção de Brasília, no Planalto Central. Em menos de quatro anos, uma cidade saiu do nada. Mas essa "obra do século" escondia contradições profundas.

Quem construiu? Os candangos — trabalhadores pobres vindos principalmente do Nordeste, de Minas Gerais e de Goiás. Negros, mestiços e analfabetos que aceitaram salários baixos, moraram em acampamentos precários e enfrentaram doenças e acidentes. Muitos morreram sem registro. Eles eram invisíveis nos discursos oficiais de modernização.

Quem perdeu território? Os povos indígenas do Planalto Central — Xavante, Xerente, Kayapó e outros. Seus territórios tradicionais foram invadidos, suas aldeias deslocadas. A chegada dos construtores trouxe também doenças que dizimaram comunidades inteiras.

Quem morava na cidade? Brasília foi planejada para elites: funcionários públicos, políticos, empresários. Os pobres foram relegados a Ceilândia e outras cidades-satélite, criando uma segregação urbana que persiste até hoje.

E Goiás? O estado perdeu território para a criação do Distrito Federal. Pequenos produtores foram expulsos enquanto especuladores se beneficiavam com a valorização da terra.

A história de Brasília não pode ser contada apenas como triunfo da arquitetura moderna. É também uma história de trabalho precário, exclusão indígena, desigualdade urbana e território arrancado.

PERGUNTAS DE REFLEXÃO:
1. Por que a história oficial de Brasília destaca a arquitetura e omite os candangos e os povos indígenas?
2. De que formas a segregação urbana planejada em Brasília se repete em outras cidades hoje?

REFERÊNCIAS:
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
PAVIANI, Aldo. Brasília: ideologia e realidade. Brasília: UnB, 1988.
RIBEIRO, Darcy. O povo brasileiro. São Paulo: Companhia das Letras, 1995.
ARANTES, Antonio A. A cidade bela. Campinas: Unicamp, 1996.`,

atividade:[{"enunciado":"Complete: O governo de ____________ (1956-1961) prometeu '__________ anos em __________'. O símbolo desse projeto foi a construção de ____________, no Planalto Central. Os trabalhadores que construíram a cidade eram chamados de ____________, enquanto povos como os ____________, ____________ e ____________ tiveram seus territórios invadidos. A cidade foi planejada para ____________, enquanto os pobres foram relegados a ____________. BANCO: 5, 50, Brasília, candangos, Ceilândia, elites, Juscelino Kubitschek, Kayapó, Xavante, Xerente."},{"enunciado":"Relacione: (Coluna A) 1. Plano de Metas; 2. Lúcio Costa e Oscar Niemeyer; 3. Candangos; 4. Ceilândia; 5. Xavante, Xerente, Kayapó. (Coluna B) a) Trabalhadores pobres que construíram Brasília; b) Povos indígenas do Planalto Central; c) Cidade-satélite para onde foram relegados os pobres; d) Projeto de desenvolvimento em 5 setores; e) Arquiteto e urbanista responsáveis pelo projeto. Escreva os pares."},{"enunciado":"Análise de trecho: 'Brasília é a cidade mais importante do Brasil porque representa o triunfo da arquitetura moderna e do progresso nacional.' — Reescreva esse trecho incorporando a lente decolonial: inclua os candangos, os povos indígenas e a segregação urbana. Mínimo 5 linhas."},{"enunciado":"Leia a descrição da imagem: 'Foto em preto e branco mostra o Congresso Nacional em construção. No primeiro plano, trabalhadores descalços carregam vigas de madeira. Ao fundo, a estrutura moderna do edifício já começa a tomar forma. Não há mulheres, crianças, indígenas.' — Descreva o que essa imagem revela sobre as contradições da construção de Brasília. Mínimo 4 linhas."},{"enunciado":"Goiás perdeu território para a criação do Distrito Federal. Em texto de mínimo 5 linhas, explique: quem eram os habitantes locais antes da chegada dos construtores? O que aconteceu com eles? E quem se beneficiou com a valorização da terra?"}],
gabarito:[{"resposta":"O governo de Juscelino Kubitschek (1956-1961) prometeu '50 anos em 5'. O símbolo desse projeto foi a construção de Brasília. Os trabalhadores que construíram a cidade eram chamados de candangos, enquanto povos como os Xavante, Xerente e Kayapó tiveram seus territórios invadidos. A cidade foi planejada para elites, enquanto os pobres foram relegados a Ceilândia.","comentario":"A frase '50 anos em 5' é o lema de JK. Os candangos construíram em condições precárias. Os povos indígenas tiveram territórios invadidos. A segregação urbana foi planejada desde o início."},{"resposta":"1-d; 2-e; 3-a; 4-c; 5-b.","comentario":"Plano de Metas (d), Lúcio Costa e Niemeyer (e), candangos (a), Ceilândia (c), povos indígenas (b)."},{"resposta":"Brasília também representa o trabalho precário dos candangos (nordestinos, negros, pobres), a expulsão dos povos indígenas do Planalto Central (Xavante, Xerente, Kayapó) e a segregação urbana que relegou os pobres a Ceilândia enquanto elites ocupavam a cidade planejada. A 'modernização' teve um preço pago pelos mais excluídos.","comentario":"A lente decolonial exige colocar no centro os sujeitos historicamente marginalizados."},{"resposta":"A imagem mostra a contradição entre modernização (Congresso moderno ao fundo) e trabalho precário (trabalhadores descalços no primeiro plano). A ausência de mulheres, crianças e indígenas revela quem era invisibilizado na narrativa oficial. Os que construíam não eram os que usufruíam da cidade.","comentario":"A análise deve identificar a contradição entre discurso e prática."},{"resposta":"Os habitantes locais eram pequenos produtores rurais, posseiros e povos indígenas. Com a chegada dos construtores, muitos foram expulsos de suas terras, valorizadas para especulação imobiliária. Empresários, políticos e grandes proprietários se beneficiaram. Pequenos produtores e comunidades tradicionais perderam território e modo de vida.","comentario":"O aluno deve identificar os atores sociais e as desigualdades de poder."}],

/* Retorna o conteúdo pré-gerado para um tema, se existir */
function getPrebuilt(t){ return PREBUILT_OBJ[t.nome]||null; }
/* Aplica conteúdo pré-gerado a um tema que ainda não tem objetos gerados */
function applyPrebuiltIfEmpty(t){
  if(!t||!t.nome) return false;
  const pb=getPrebuilt(t);
  if(!pb) return false;
  const jaTemConteudo=t.obj && Object.keys(t.obj).some(k=>{ const v=t.obj[k]; return v&&(Array.isArray(v)?v.length:String(v).trim()); });
  if(jaTemConteudo) return false; // não sobrescreve gerado pelo usuário
  t.obj=Object.assign({},pb);
  persistTema(t);
  return true;
}

/* ---------- Firebase / localStorage ---------- */
function mergeRemote(local, remote){
  remote = remote||{}; local = local||{};
  const out = Object.assign({}, remote); const pushBack=[];
  for(const id in local){ const l=local[id], r=remote[id];
    if(!r){ out[id]=l; pushBack.push(id); }                         // só existe local: mantém e re-sincroniza
    else if((l.updatedAt||0) > (r.updatedAt||0)){ out[id]=l; pushBack.push(id); } // local mais novo: mantém
  }
  return {merged:out, pushBack};
}
function initFirebase(){
  let cfg=null;
  try{ cfg=JSON.parse(localStorage.getItem(LS_FB)||'null'); }catch(e){}
  if(!cfg || !cfg.databaseURL){ setConn(false); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    DB = firebase.database();
    setConn(true);
    DB.ref('anthropicKey').on('value', s=>{ window.__key = s.val()||''; });
    DB.ref('relCfg').on('value', s=>{ const v=s.val(); if(v&&v.ordem){ let ord=v.ordem.filter(k=>REL_KEYS.includes(k)); REL_KEYS.forEach(k=>{ if(!ord.includes(k)) ord.push(k); }); relCfg.ordem=ord; relCfg.rotulos=Object.assign({},REL_LABELS_DEFAULT,v.rotulos||{}); } });
    DB.ref('leciona/conteudos').on('value', s=>{ const m=mergeRemote(conteudos, s.val()); conteudos=m.merged; m.pushBack.forEach(id=>{ try{ DB.ref('leciona/conteudos/'+id).set(conteudos[id]); }catch(e){} }); lsSet(LS_CONT, JSON.stringify(conteudos)); migrateAndRender(); });
    DB.ref('leciona/temas').on('value', s=>{ const m=mergeRemote(temas, s.val()); temas=m.merged; m.pushBack.forEach(id=>{ try{ DB.ref('leciona/temas/'+id).set(temas[id]); }catch(e){} }); lsSet(LS_TEMAS, JSON.stringify(temas)); migrateAndRender(); });
    DB.ref('leciona/turmas').on('value', s=>{ const m=mergeRemote(turmas, s.val()); turmas=m.merged; m.pushBack.forEach(id=>{ try{ DB.ref('leciona/turmas/'+id).set(turmas[id]); }catch(e){} }); lsSet(LS_TURMAS, JSON.stringify(turmas)); seedTurmasIfEmpty(); renderThemes(); });
  }catch(e){ console.error(e); setConn(false); toast('Falha ao conectar Firebase: '+e.message,'err'); }
}
function setConn(on){
  const el=document.getElementById('conn');
  el.classList.toggle('online',on);
  document.getElementById('connTxt').textContent = on?'Firebase':'Local';
}

  try{ turmas = JSON.parse(localStorage.getItem(LS_TURMAS)||'{}'); }catch(e){ turmas={}; }

}
function persistConteudo(c){
  c.updatedAt=Date.now(); conteudos[c.id]=c;

  if(DB) DB.ref('leciona/conteudos/'+c.id).set(c).catch(e=>toast('⚠ Falha ao gravar conteúdo no Firebase (mantido localmente). Verifique as Regras do banco. '+e.message,'err'));
}

}
