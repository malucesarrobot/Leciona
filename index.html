<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#14201f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leciona">
<title>Leciona</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14201f; --board-fg:#f3efe6; --paper:#e9ece7; --surface:#f6f8f4;
  --green:#2f6b5e; --green-d:#234f45; --ochre:#c47a3d; --line:#d2d8cf;
  --muted:#6a7370; --ink-soft:#2a3a38; --danger:#a8442f; --ok:#2f6b5e;
  --radius:10px; --shadow:0 1px 2px rgba(20,32,31,.06),0 8px 24px rgba(20,32,31,.06);
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}
h1,h2,h3{margin:0;font-weight:600}
.hidden{display:none!important}
.serif{font-family:var(--serif)}

#app{display:flex;flex-direction:column;height:100%}
header.topbar{display:flex;align-items:center;gap:16px;padding:10px 18px;background:var(--ink);color:var(--board-fg);flex:0 0 auto}
.brand{display:flex;align-items:baseline;gap:10px;font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:.3px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--ochre);display:inline-block;transform:translateY(-2px)}
.brand small{font-family:var(--sans);font-weight:500;font-size:11px;color:#9fb0ab;letter-spacing:.14em;text-transform:uppercase}
.topbar .spacer{flex:1}
.topbar nav{display:flex;gap:4px;background:rgba(255,255,255,.06);padding:4px;border-radius:8px}
.topbar nav button{background:transparent;border:0;color:#bcc8c4;padding:7px 14px;border-radius:6px;font-weight:500;font-size:13px}
.topbar nav button.active{background:var(--board-fg);color:var(--ink)}
.icon-btn{background:rgba(255,255,255,.06);border:0;color:var(--board-fg);width:34px;height:34px;border-radius:8px;font-size:15px}
.icon-btn:hover{background:rgba(255,255,255,.14)}
.conn{font-size:11px;color:#9fb0ab;display:flex;align-items:center;gap:6px}
.conn .led{width:8px;height:8px;border-radius:50%;background:var(--ochre)}
.conn.online .led{background:#6fcaa9}

#viewGestao{flex:1;display:flex;min-height:0}
#viewHoje{flex:1;overflow:auto}
#viewAcervo{flex:1;overflow:auto}
#viewNotas{flex:1;overflow:auto}
.notas-wrap{max-width:1100px;margin:0 auto;padding:16px}
.notas-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.notas-toolbar h3{font-family:var(--serif);font-size:17px;flex:1;margin:0}
.notas-table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.notas-table{border-collapse:collapse;width:100%;min-width:600px;font-size:13px}
.notas-table th{background:var(--surface);padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-weight:600;position:sticky;top:0;z-index:2}
.notas-table th.aluno-col{min-width:160px;position:sticky;left:0;z-index:3;background:var(--surface)}
.notas-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.notas-table td.aluno-nome{font-weight:500;position:sticky;left:0;background:var(--card);z-index:1;min-width:160px}
.notas-table tr:hover td{background:var(--hover)}
.notas-table tr:hover td.aluno-nome{background:var(--hover)}
.nota-input{width:48px;padding:3px 5px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);font-size:13px;text-align:center}
.nota-input:focus{border-color:var(--green);outline:none}
.nota-input.baixa{border-color:var(--err);color:var(--err)}
.nota-input.alta{border-color:var(--green)}
.nota-media{font-size:12px;font-weight:600;padding:3px 6px;border-radius:5px;background:var(--surface)}
.nota-media.aprovado{color:var(--green)}
.nota-media.reprovado{color:var(--err)}
.nota-check{width:22px;height:22px;cursor:pointer;accent-color:var(--green)}
.atv-col-header{padding:4px 2px 2px;display:block;text-align:center}
.atv-remover{cursor:pointer;color:var(--muted);font-size:11px;display:inline-block;padding:1px 5px;border-radius:4px}
.atv-remover:hover{background:var(--err);color:#fff}
.notas-progresso{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:14px}
.notas-progresso .prog-titulo{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.prog-barra-wrap{background:var(--surface);border-radius:20px;height:8px;margin-bottom:8px;overflow:hidden}
.prog-barra{height:8px;border-radius:20px;background:var(--green);transition:.4s}
.prog-objetos{display:flex;flex-wrap:wrap;gap:6px}
.prog-obj{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.prog-obj.feito{background:var(--green);color:#fff;border-color:var(--green)}
.rel-table{border-collapse:collapse;width:100%;font-size:13px;margin-top:10px}
.rel-table th,.rel-table td{padding:7px 10px;border:1px solid var(--border);text-align:center}
.rel-table th{background:var(--surface);font-weight:600}
.rel-table td:first-child{text-align:left;font-weight:500}
.notas-stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.apl-faixa{margin-bottom:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.apl-faixa summary{cursor:pointer;font-size:13px;color:var(--muted);font-weight:600}
.apl-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 0;border-top:1px solid var(--border);margin-top:6px}
.apl-tema{font-size:13px;flex:1;min-width:140px}
.apl-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:100px}
.stat-box strong{display:block;font-size:20px;font-weight:700;color:var(--green)}
.stat-box span{font-size:11px;color:var(--muted)}
.atv-tipo{font-size:10px;display:block;color:var(--muted);font-weight:normal}
.acervo-wrap{max-width:860px;margin:0 auto;padding:16px}
.acervo-filtros{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.acervo-filtros input{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);font-size:14px;outline:none}
.acervo-filtros input:focus{border-color:var(--green)}
.acervo-filtros select{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px}
.acervo-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px;transition:.15s}
.acervo-card:hover{border-color:var(--green)}
.acervo-card h4{font-family:var(--serif);font-size:15px;margin:0 0 4px;color:var(--text)}
.acervo-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.acervo-turmas{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.acervo-tu{font-size:12px;padding:3px 8px;border-radius:12px;border:1px solid var(--border);background:var(--surface)}
.acervo-tu.tem-conteudo{border-color:var(--green);color:var(--green)}
.acervo-tu.aplicado{background:var(--green);color:#fff;border-color:var(--green)}
.dup-fix{cursor:pointer;text-decoration:underline dotted}
.dup-fix:hover{opacity:.7}
.acervo-acoes{display:flex;gap:6px}
.acervo-vazio{text-align:center;color:var(--muted);padding:40px 20px}
.obj-status-row{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 2px}
.obj-dot{font-size:11px;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--muted)}
.obj-dot.feito{background:var(--green);color:#fff;border-color:var(--green)}
.hoje-wrap{max-width:760px;margin:0 auto;padding:30px 22px}
.hoje-head h2{font-family:Spectral,serif;font-size:30px;margin:0 0 4px}
.hoje-nav{display:flex;gap:8px;margin:6px 0}
.hoje-data{color:var(--muted);font-size:13px;margin-bottom:22px}
.hoje-list{display:flex;flex-direction:column;gap:10px}
.hoje-row{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.hoje-hora{flex:0 0 64px;font-weight:700;color:var(--green);font-size:16px;display:flex;flex-direction:column;line-height:1.15}
.hoje-hora small{font-weight:500;color:var(--muted);font-size:11px}
.hoje-info{flex:1;display:flex;flex-direction:column;gap:2px}
.hoje-info b{font-size:15px}
.hoje-info span{font-size:12px;color:var(--muted)}
.hoje-acoes{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.hoje-wrap .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:16px}
@media(max-width:560px){.hoje-row{flex-wrap:wrap}.hoje-acoes{width:100%;justify-content:flex-start}}
.scope{flex:0 0 290px;border-right:1px solid var(--line);background:var(--surface);padding:18px 16px;overflow:auto;display:flex;flex-direction:column;gap:14px}
.scope .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:600}
.scope select,.scope input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.scope .lbl-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.scope .lbl-row .btn.sm{padding:2px 9px;text-transform:none;letter-spacing:0}
.scope .sep{height:1px;background:var(--line);margin:4px 0}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 13px;border-radius:8px;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.12s}
.btn:hover{border-color:#b9c2b6}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:var(--green-d)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--ink);background:rgba(20,32,31,.05)}
.btn.full{width:100%;justify-content:center}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.danger{color:var(--danger);border-color:transparent}
.btn.danger:hover{background:rgba(168,68,47,.08)}

.themes{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.themes-head{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--surface)}
.themes-head h2{font-family:var(--serif);font-size:18px}
.themes-head .crumb{font-size:12px;color:var(--muted)}
.themes-body{flex:1;overflow:auto;padding:18px 22px}

/* Conteúdo > Tema */
.conteudo{border:1px solid var(--line);background:#fff;border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.conteudo-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(47,107,94,.05);border-bottom:1px solid var(--line)}
.conteudo-head .cname{font-family:var(--serif);font-size:16px;font-weight:600;flex:1;cursor:pointer}
.conteudo-head .ordbtns{display:flex;flex-direction:column;gap:1px}
.ordbtns button{border:1px solid var(--line);background:#fff;width:22px;height:17px;line-height:1;border-radius:4px;font-size:10px;color:var(--muted);padding:0}
.ordbtns button:hover{border-color:var(--green);color:var(--green)}
.conteudo-body{padding:10px 14px}
.selos{display:inline-flex;gap:4px;flex-wrap:wrap}
.selo{font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.selo.revisa{background:#e7efe9;color:#2f6b5e}
.selo.ser{background:#efe6db;color:#a06a2e}
.selo.goiastec{background:#e6e9ef;color:#3a4a8a}

.tlist{display:grid;gap:9px}
.tcard{border:1px solid var(--line);background:#fff;border-radius:9px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.12s}
.tcard:hover{border-color:var(--green);box-shadow:var(--shadow)}
.tcard .tname{font-family:var(--serif);font-size:15px;font-weight:600}
.tcard .tcode{font-size:11px;color:var(--green);font-weight:600;letter-spacing:.04em;margin-right:8px}
.tcard .tsub{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.tcard .tmeta{flex:1;min-width:0}
.tcard .prog{display:flex;gap:3px}
.tcard .prog i{width:7px;height:7px;border-radius:2px;background:var(--line)}
.tcard .prog i.on{background:var(--green)}
.statusdot{font-size:11px;color:var(--muted)}
.statusdot b{color:var(--green)}
.empty{color:var(--muted);text-align:center;padding:44px 20px;font-size:14px}
.empty p{max-width:420px;margin:8px auto}
.addrow{display:flex;gap:8px;margin-top:10px}

/* Editor */
.editor{position:fixed;inset:0;background:var(--paper);z-index:40;display:flex;flex-direction:column}
.editor-top{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--surface)}
.editor-top input.tema-nome{font-family:var(--serif);font-size:20px;font-weight:600;border:0;background:transparent;flex:1;color:var(--ink);padding:4px}
.editor-top input.tema-nome:focus{outline:0;border-bottom:2px solid var(--green)}
.editor-body{flex:1;display:flex;min-height:0}
.meta-pane{flex:0 0 312px;border-right:1px solid var(--line);padding:18px;overflow:auto;background:var(--surface)}
.meta-pane .field{margin-bottom:14px}
.meta-pane label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
.meta-pane input,.meta-pane textarea,.meta-pane select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
.meta-pane textarea{resize:vertical;min-height:60px}
.meta-block{border:1px solid var(--line);border-radius:9px;background:#fff;padding:11px;margin-bottom:14px}
.meta-block h4{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.turma-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.turma-row .tn{font-weight:600;font-size:13px;flex:1;min-width:70px}
.turma-row select,.turma-row input{padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:12px}
.turma-row input.dt{width:128px}
.img-thumbs{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.img-thumbs .it{position:relative;width:74px;height:54px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.img-thumbs .it img{width:100%;height:100%;object-fit:cover}
.img-thumbs .it button{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:0;background:rgba(20,32,31,.78);color:#fff;font-size:11px;line-height:1;padding:0}

.obj-pane{flex:1;display:flex;flex-direction:column;min-width:0}
.obj-tabs{display:flex;gap:2px;padding:10px 16px 0;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--surface)}
.obj-tabs button{border:0;background:transparent;padding:9px 13px;border-radius:8px 8px 0 0;color:var(--muted);font-weight:500;font-size:13px;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
.obj-tabs button.active{color:var(--ink);border-bottom-color:var(--green)}
.obj-tabs button .badge{width:7px;height:7px;border-radius:50%;background:var(--line)}
.obj-tabs button.done .badge{background:var(--green)}
.obj-content{flex:1;overflow:auto;padding:20px 24px;max-width:920px;width:100%;margin:0 auto}
.obj-actions{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.obj-actions .title{font-family:var(--serif);font-size:17px;font-weight:600;flex:1}
.obj-hint{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.45}
.aval-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.aval-tab{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:13px;cursor:pointer;color:var(--text);transition:.15s}
.aval-tab:hover{background:var(--hover)}
.aval-tab.active{background:var(--green);color:#fff;border-color:var(--green)}
.reg-table{width:100%;border-collapse:collapse;font-size:13px}
.reg-table th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:600}
.reg-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.reg-table tr:last-child td{border-bottom:none}
.reg-table td:nth-child(3){max-width:120px;word-break:break-word}
.reg-table td:nth-child(5){max-width:140px;word-break:break-word;font-size:12px;color:var(--muted)}
.reg-table .btn{padding:2px 6px;font-size:11px}
.busca-bar{padding:8px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;background:var(--surface);position:sticky;top:0;z-index:5}
#buscaTemas{flex:1;padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);font-size:14px;outline:none;transition:.15s;min-width:0}
#buscaTemas:focus{border-color:var(--green)}
.busca-count{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.rel-temas-list{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:8px;margin-top:6px}
.rel-temas-grupo{margin-bottom:10px}
.rel-temas-grupo strong{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.check.sm{font-size:13px;padding:2px 0}
@media(max-width:600px){#buscaTemas{width:140px}#buscaTemas:focus{width:160px}}
.reg-badge{display:inline-block;background:#2f6b5e;color:#fff;font-size:11px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:600}
.hoje-row.aplicada{border-left:3px solid var(--green);padding-left:10px}
.fmt-bar{display:flex;gap:4px;margin-bottom:6px}
textarea.big{width:100%;min-height:320px;padding:14px;border:1px solid var(--line);border-radius:10px;background:#fff;line-height:1.6;resize:vertical}
.card-list{display:grid;gap:12px}
.mini-card{border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px}
.mini-card .row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.mini-card input,.mini-card textarea,.mini-card select{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff}
.mini-card textarea{resize:vertical;min-height:48px}
.mini-card .num{font-family:var(--serif);font-weight:700;color:var(--green);font-size:14px;flex:0 0 auto}
.mini-card label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin:6px 0 3px}

/* Projeção */
#viewProjecao{position:fixed;inset:0;background:var(--ink);color:var(--board-fg);z-index:50;display:flex;flex-direction:column}
#viewProjecao.theme-light{background:#faf8f2;color:#1a1a1a}
#viewProjecao.theme-contrast{background:#000;color:#fff}
.proj-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(0,0,0,.25);flex:0 0 auto}
.theme-light .proj-bar{background:rgba(0,0,0,.05)}
.proj-bar .ptitle{font-family:var(--serif);font-weight:600;font-size:15px;opacity:.85;max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-bar .spacer{flex:1}
.obj-switch{display:flex;gap:2px;background:rgba(255,255,255,.08);padding:4px;border-radius:9px;overflow-x:auto;max-width:60vw}
.theme-light .obj-switch{background:rgba(0,0,0,.06)}
.obj-switch button{border:0;background:transparent;color:inherit;opacity:.6;padding:6px 11px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap}

.nav-dots{display:flex;gap:8px;justify-content:center;margin-top:20px}

.nav-dots i.on{background:var(--ochre)}
.proj-foot{display:flex;align-items:center;justify-content:center;gap:18px;padding:10px;font-size:13px;opacity:.6;flex:0 0 auto}
.proj-foot button{border:0;background:transparent;color:inherit;font-size:13px;text-decoration:underline;cursor:pointer}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;width:100%;max-width:1000px}
.img-grid img{width:100%;border-radius:10px;cursor:pointer;border:2px solid transparent}
.img-grid img:hover{border-color:var(--ochre)}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:14px;padding:3px 10px;font-size:12px;margin:2px 2px;display:inline-block;cursor:pointer}
.chip:hover{border-color:var(--green);color:var(--green)}
.img-grid .pick{position:relative;cursor:pointer}
.img-grid .pick img{width:100%;border-radius:8px;display:block}
.img-grid .pick.sel img{outline:3px solid var(--green);outline-offset:-1px}
.img-grid .pick.sel::after{content:"\2713";position:absolute;top:6px;right:6px;background:var(--green);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.img-grid .pick{position:relative}
.img-grid .pick .fix{position:absolute;bottom:8px;right:8px}
.img-big{max-width:90vw;max-height:74vh;border-radius:12px}

/* Modais / toast */
.modal-bg{position:fixed;inset:0;background:rgba(20,32,31,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow)}

.modal-h h3{font-family:var(--serif);font-size:18px;flex:1}
.modal-b{padding:20px 22px}
.modal-b .field{margin-bottom:14px}
.modal-b label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.modal-b input,.modal-b textarea,.modal-b select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px}
.modal-b textarea.mono{min-height:90px;font-family:ui-monospace,monospace;font-size:12px;resize:vertical}
.modal-b small{color:var(--muted);font-size:12px;display:block;margin-top:5px;line-height:1.4}
.modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.check{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;margin-bottom:7px}
.turma-list .tl{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.turma-list .tl b{flex:1}
.turma-list .tl span{font-size:12px;color:var(--muted)}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:var(--board-fg);padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);max-width:80vw}
.toast.err{background:var(--danger)}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}

@media (max-width:820px){

  .topbar nav button{padding:7px 10px}
}

<div id="loginGate" style="position:fixed;inset:0;background:var(--ink);color:var(--board-fg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:20px">

  <p id="loginErro" style="color:#f0a; font-size:12px; max-width:320px"></p>
</div>
<div id="app" class="hidden">
  <header class="topbar">
    <div class="brand">Leciona<span class="dot"></span><small>Acervo &amp; Projeção</small></div>

      <button id="tabHoje" class="active" onclick="setView('hoje')">Hoje</button>
      <button id="tabAcervo" onclick="setView('acervo')">📚 Acervo</button>
      <button id="tabNotas" onclick="setView('notas')">📊 Notas</button>

      <button id="tabProjecao" onclick="abrirProjecaoAtual()">Projetar</button>

    <span class="conn" id="conn" onclick="location.reload()" style="cursor:pointer" title="Toque para recarregar o app"><span class="led"></span><span id="connTxt">Local</span></span>
    <button class="icon-btn" title="Assistente (chat livre com IA)" onclick="openAssistente()">&#128172;</button>
    <button class="icon-btn" title="Turmas" onclick="openTurmas()">&#128101;</button>
    <button class="icon-btn" title="Configurações" onclick="openConfig()">&#9881;</button>

  <div id="viewHoje"><div class="hoje-wrap" id="hojeBody"></div></div>

      <button class="btn primary full" onclick="novoConteudo()">+ Novo conteúdo</button>
      <button class="btn full" onclick="openPartirMatriz()">&#10022; Partir da matriz (temas + subtemas)</button>

      <div class="meta-block">

      <button title="Sair" onclick="fecharProjecao()">✕</button>

  <div class="proj-stage" id="projStage"></div>
  <div class="proj-foot" id="projFoot"></div>
</div>

<div id="toast"></div>

/* =========================================================
   LECIONA — lógica (v2: Conteúdo→Tema, turmas, ordem, selos, PDF)

/* ---------- Disciplinas / séries / bimestres ---------- */
const SERIES_BY_DISC = {
  'História':   ['6º ano','7º ano','8º ano','9º ano','1ª série EM','2ª série EM','3ª série EM'],
  'Filosofia':  ['1ª série EM','2ª série EM','3ª série EM'],
  'Sociologia': ['1ª série EM','2ª série EM','3ª série EM'],

function turmaNome(t){

}

/* Migra temas antigos (9 objetos) para nova estrutura (5 objetos) */
function migrarObjTema(t){
  if(!t||!t.obj||t._objV===2) return false;
  const o=t.obj;
  let changed=false;
  // textoQuadro → quadro
  if(o.textoQuadro!==undefined && o.quadro===undefined){ o.quadro=o.textoQuadro; delete o.textoQuadro; changed=true; }
  // textoAluno → estudo
  if(o.textoAluno!==undefined && o.estudo===undefined){ o.estudo=o.textoAluno; delete o.textoAluno; changed=true; }
  // planejamento → drop (era só metadado interno)
  if(o.planejamento!==undefined){ delete o.planejamento; changed=true; }
  // atividade + gabarito + questoes + flashcards → avaliacao{}
  const avalFields=['questoes','flashcards','atividade','gabarito'];
  const hasOldAval=avalFields.some(k=>o[k]!==undefined);
  if(hasOldAval && !o.avaliacao){
    o.avaliacao={};
    avalFields.forEach(k=>{ if(o[k]!==undefined){ o.avaliacao[k]=o[k]; delete o[k]; } });
    changed=true;
  }
  if(changed) t._objV=2;
  return changed;
}

/* Reparo estrutural: garante que TODO tema tem os 5 campos de obj com o
   tipo certo (quadro/estudo/mapaMental=string, slides=array,
   avaliacao=objeto com 4 sub-arrays). Roda sempre (idempotente), mesmo em
   temas já "migrados" — corrige temas antigos que nunca tiveram slides/
   avaliacao gerados e que travavam a edição/projeção por causa disso.
   Não grava sozinho — só muda em memória (ver migrateAndRender). */
function repararObjTema(t){
  if(!t) return false;
  if(!t.obj) t.obj={};
  const o=t.obj;
  let changed=false;
  if(o.quadro==null){ o.quadro=''; changed=true; }
  if(o.estudo==null){ o.estudo=''; changed=true; }
  if(o.mapaMental==null){ o.mapaMental=''; changed=true; }
  if(!Array.isArray(o.slides)){ o.slides=[]; changed=true; }
  if(!o.avaliacao || typeof o.avaliacao!=='object' || Array.isArray(o.avaliacao)){
    o.avaliacao={questoes:[],flashcards:[],atividade:[],gabarito:[]}; changed=true;
  } else {
    ['questoes','flashcards','atividade','gabarito'].forEach(k=>{
      if(!Array.isArray(o.avaliacao[k])){ o.avaliacao[k]=[]; changed=true; }
    });
  }
  return changed;
}

/* ---------- Firebase / localStorage ---------- */
function mergeRemote(local, remote){
  remote = remote||{}; local = local||{};
  const out = Object.assign({}, remote); const pushBack=[];
  for(const id in local){ const l=local[id], r=remote[id];
    if(!r){ out[id]=l; pushBack.push(id); }                         // só existe local: mantém e re-sincroniza
    else if((l.updatedAt||0) > (r.updatedAt||0)){ out[id]=l; pushBack.push(id); } // local mais novo: mantém
  }
  return {merged:out, pushBack};
}
let _pushBackCount=0, _pushBackWindowStart=0;
function pushBackSeguro(path, upd){
  const agora=Date.now();
  if(agora-_pushBackWindowStart>10000){ _pushBackWindowStart=agora; _pushBackCount=0; }
  _pushBackCount++;
  if(_pushBackCount>8){
    toast('⚠ Sincronização com o Firebase pausada automaticamente (muitas gravações repetidas em pouco tempo). Recarregue a página quando puder.','err');
    return;
  }
  DB.ref().update(upd).catch(e=>console.warn('pushBack '+path+':',e));
}

/* ── Registros de Aplicação ────────────────────────────────────────────────
   Histórico de o que foi aplicado em cada turma — base para ERP de notas.
   Exportável como CSV. Cada registro é independente por turma+tema+data.
──────────────────────────────────────────────────────────────────────── */
function novoRegistro(temaId, turmaId, objetos, entrega, nota){
  return {
    id: uid(),
    temaId, turmaId,
    data: new Date().toISOString().slice(0,10),
    objetos: objetos||[],     // ['slides','estudo'] — o que foi usado
    entrega: entrega||'sala', // sala | grupo | híbrido | assíncrono
    nota: nota||'',           // campo livre; futuramente: link com avaliação
    _ts: Date.now()
  };
}
function persistRegistro(r){
  r._ts=Date.now();
  registros[r.id]=r;
  lsSet(LS_REG, JSON.stringify(registros));
  if(DB) DB.ref('leciona/registros/'+r.id).set(r).catch(e=>console.warn('Registro Firebase:',e));
  // Ponte registro → notas: se a Avaliação foi aplicada, garante uma coluna
  // de nota correspondente na tabela daquela turma (peso 1, sem duplicar).
  try{ if((r.objetos||[]).includes('avaliacao')) criarColunaAvaliacao(r.temaId, r.turmaId); }catch(e){ console.warn('coluna aval:',e); }
}
/* Cria (se ainda não existir) uma coluna de nota para a Avaliação de um tema
   aplicado numa turma. Idempotente: registrar o mesmo tema de novo não duplica. */
function criarColunaAvaliacao(temaId, turmaId){
  const tema=temas[temaId]; if(!tema) return;
  const marca='aval:'+temaId; // marcador único por tema
  const jaExiste=Object.values(atividadesCtrl).find(av=>av.origem===marca && (av.turmaIds||[]).includes(turmaId));
  if(jaExiste) return;
  // se existe a atividade para outra turma, só adiciona esta turma à lista
  const daMesmaOrigem=Object.values(atividadesCtrl).find(av=>av.origem===marca);
  if(daMesmaOrigem){
    if(!daMesmaOrigem.turmaIds.includes(turmaId)){ daMesmaOrigem.turmaIds.push(turmaId); persistAtivCtrl(daMesmaOrigem); }
    return;
  }
  const nomeCurto=(tema.nome||'Avaliação').slice(0,28);
  const av={
    id:uid(),
    nome:'Aval. — '+nomeCurto,
    tipo:'atividade',          // herda cor rosa de ATIV_TIPOS.atividade
    data:new Date().toISOString().slice(0,10),
    peso:1,
    valorMax:10,
    checklist:false,
    turmaIds:[turmaId],
    disciplina:tema.disciplina||scope.disc,
    bimestre:tema.bimestre||scope.bim,
    origem:marca               // liga a coluna ao tema de origem
  };
  persistAtivCtrl(av);
  if(!document.getElementById('viewNotas').classList.contains('hidden')) renderNotas();
}

/* ── Ocorrências (turma sem aula normal: passeio, palestra, dispensa...) ──
   Registro rápido, sem precisar entrar na turma nem escolher tema — feito
   direto da tela Hoje. Enquanto existir uma ocorrência não resolvida pra uma
   turma, ela aparece marcada como "atrasada" até a professora resolver (na
   mão, ou gerando uma aula condensada de recuperação). ────────────────── */
const OCORR_CATEGORIAS = {
  atividade_extra: 'Atividade extra',
  palestra: 'Palestra',
  passeio: 'Passeio',
  dispensada: 'Dispensada / sem aula',
  outro: 'Outro',
};
function persistOcorrencia(o){
  o._ts=Date.now();
  ocorrencias[o.id]=o;
  lsSet(LS_OCORR, JSON.stringify(ocorrencias));
  if(DB) DB.ref('leciona/ocorrencias/'+o.id).set(o).catch(e=>toast('⚠ Salvo localmente, mas falhou ao sincronizar com o Firebase: '+e.message,'err'));
}
function registrarOcorrencia(turmaId, categoria, observacao){
  const o={id:uid(), turmaId, data:new Date().toISOString().slice(0,10), categoria, observacao:observacao||'', resolvida:false};
  persistOcorrencia(o);
  return o;
}
function ocorrenciasAbertas(turmaId){
  return Object.values(ocorrencias).filter(o=>o.turmaId===turmaId && !o.resolvida).sort((a,b)=>b.data.localeCompare(a.data));
}
function turmaAtrasada(turmaId){
  return ocorrenciasAbertas(turmaId).length>0;
}
function resolverOcorrencia(id){
  const o=ocorrencias[id]; if(!o) return;
  o.resolvida=true;
  persistOcorrencia(o);
}
function resolverOcorrenciasDaTurma(turmaId){
  ocorrenciasAbertas(turmaId).forEach(o=>{ o.resolvida=true; persistOcorrencia(o); });
}

/* Aula de recuperação: condensa 2 temas num quadro só, via IA, pra turma que
   ficou pra trás (passeio/palestra/dispensa) não atrasar em relação às
   outras. Cria um tema novo marcado "⚡ Recuperação" e resolve as
   ocorrências em aberto da turma. */
function abrirRecuperacao(){
  if(!scope.turma){ toast('Selecione uma turma.','err'); return; }
  const tu=turmas[scope.turma]||{};
  const conts=conteudosDoScope();
  const todosTemas=[];
  conts.forEach(c=>temasDoConteudo(c.id).forEach(t=>todosTemas.push(t)));
  if(todosTemas.length<2){ toast('Essa turma precisa de pelo menos 2 temas cadastrados pra condensar.','err'); return; }
  const naoAplicados=todosTemas.filter(t=>!registrosDoTema(t.id).some(r=>r.turmaId===scope.turma));
  const sugestao=(naoAplicados.length>=2?naoAplicados:todosTemas).slice(0,2);
  const opts=(sel)=>todosTemas.map(t=>'<option value="'+t.id+'"'+(sel&&sel.id===t.id?' selected':'')+'>'+esc((t.nome||'(sem nome)').slice(0,60))+'</option>').join('');
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:480px">'+
    '<div class="modal-h"><h3>⚡ Aula de recuperação — '+esc(turmaNome(tu))+'</h3></div>'+
    '<div class="modal-b">'+
      '<small>A IA condensa os dois temas escolhidos num quadro só, enxuto o bastante pra dar numa aula, pra essa turma não ficar pra trás das outras.</small>'+
      '<div class="field" style="margin-top:10px"><label>Tema que ficou pra trás</label><select id="recTema1">'+opts(sugestao[0])+'</select></div>'+
      '<div class="field"><label>Próximo tema planejado</label><select id="recTema2">'+opts(sugestao[1])+'</select></div>'+
      '<div class="field"><label>Foco opcional</label><input id="recFoco" placeholder="ex.: priorizar o essencial de cada um"></div>'+
      '<div id="recProg" class="statusdot"></div>'+
    '</div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" id="recBtn" onclick="gerarRecuperacao()">Gerar</button></div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);
}
async function gerarRecuperacao(){
  const id1=(document.getElementById('recTema1')||{}).value, id2=(document.getElementById('recTema2')||{}).value;
  if(!id1||!id2||id1===id2){ toast('Escolha dois temas diferentes.','err'); return; }
  const t1=temas[id1], t2=temas[id2]; if(!t1||!t2) return;
  const foco=(document.getElementById('recFoco')||{}).value||'';
  const btn=document.getElementById('recBtn'); const prog=document.getElementById('recProg');
  if(btn) btn.disabled=true; if(prog) prog.innerHTML='<span class="spin dark"></span> gerando…';
  try{
    const sys='Você é professora experiente de '+(t1.disciplina||scope.disc)+' ('+(t1.serie||scope.serie)+'), rede estadual de Goiás, com lente decolonial e pan-africanista. Uma turma ficou sem uma aula (passeio, palestra, imprevisto da escola) e precisa recuperar o conteúdo sem atrasar em relação às outras turmas.';
    const usr='Condense os DOIS temas abaixo num único TEXTO DE QUADRO (esquemático, pra copiar da lousa), enxuto o bastante pra caber em UMA aula, cobrindo o essencial de cada um sem virar uma lista corrida — priorize os pontos que realmente não podem faltar em cada tema.'+(foco?(' Foco adicional: '+foco):'')+'\n\n'+
      'TEMA 1 ('+(t1.nome||'')+'):\n'+((t1.obj&&(t1.obj.quadro||t1.obj.estudo))||'(sem conteúdo gerado ainda — use o título e a habilidade abaixo)')+
      (t1.habilidade?('\nHabilidade: '+t1.habilidade):'')+
      '\n\nTEMA 2 ('+(t2.nome||'')+'):\n'+((t2.obj&&(t2.obj.quadro||t2.obj.estudo))||'(sem conteúdo gerado ainda — use o título e a habilidade abaixo)')+
      (t2.habilidade?('\nHabilidade: '+t2.habilidade):'');
    const quadro=await callClaude(sys,usr);
    const cid=t1.conteudoId||t2.conteudoId;
    const novo=blankTema(cid,{
      nome:'⚡ Recuperação: '+(t1.nome||'')+' + '+(t2.nome||''),
      dcgo:t1.dcgo||t2.dcgo||'',
      habilidade:[t1.habilidade,t2.habilidade].filter(Boolean).join(' · '),
      resumo:'Aula condensada de recuperação — turma ficou sem aula normal e precisou juntar dois temas numa aula só.',
      ordem:nextOrdemTema(cid),
    });
    novo.obj.quadro=quadro;
    persistTema(novo);
    resolverOcorrenciasDaTurma(scope.turma);
    closeModal();
    renderThemes(); renderProgressoBar();
    toast('Aula de recuperação criada e a turma foi marcada como em dia.','ok');
  }catch(e){
    if(prog) prog.textContent='Erro ao gerar: '+e.message;
    if(btn) btn.disabled=false;
  }
}
/* Prepara um valor para célula CSV com segurança:
   - escapa aspas, vírgulas e quebras de linha (senão quebram as colunas);
   - neutraliza "CSV injection": valores iniciados por = + - @ podem ser
     executados como fórmula ao abrir no Excel/Sheets. Prefixamos com ' para
     desativar isso sem alterar o texto visível. */
function csvCell(v){
  let s=(v==null?'':String(v));
  if(/^[=+\-@\t\r]/.test(s)) s="'"+s;
  if(/[",\n\r]/.test(s)) s='"'+s.replace(/"/g,'""')+'"';
  return s;
}
function registrosTodosCSV(){
  const header='Data,Turma,Disciplina,Série,Unidade,Tema,Objetos,Entrega,Nota';
  const rows=Object.values(registros).sort((a,b)=>b.data.localeCompare(a.data)).map(r=>{
    const t=temas[r.temaId]||{}, tu=turmas[r.turmaId]||{};
    return [r.data, turmaNome(tu), tu.disciplina||'', tu.serie||'', tu.unidade||'', t.nome||'', (r.objetos||[]).join(';'), r.entrega, r.nota||''].map(csvCell).join(',');
  });
  return header+'\n'+rows.join('\n');
}
function exportarRegistrosCSV(){
  const csv=registrosTodosCSV();
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='Leciona_Registros_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exportado.','ok');
}
let _lsContPendente=false, _lsTemasPendente=false, _lsFlushAgendado=false;
function _agendarFlushLocal(){
  if(_lsFlushAgendado) return;
  _lsFlushAgendado=true;
  setTimeout(()=>{
    _lsFlushAgendado=false;
    if(_lsContPendente){ _lsContPendente=false; lsSet(LS_CONT, JSON.stringify(conteudos)); }
    if(_lsTemasPendente){ _lsTemasPendente=false; lsSet(LS_TEMAS, JSON.stringify(temas)); }
  }, 3000);
}
function persistConteudo(c){
  c.updatedAt=Date.now(); conteudos[c.id]=c;
  _lsContPendente=true; _agendarFlushLocal(); // grava local em lote a cada 3s, não a cada chamada
  if(DB) DB.ref('leciona/conteudos/'+c.id).set(c).catch(e=>toast('⚠ Falha ao gravar conteúdo no Firebase (mantido localmente). Verifique as Regras do banco. '+e.message,'err'));
}
function persistTema(t){ _temaIdx=null; // invalida índice
  t._ts=Date.now(); t.updatedAt=t._ts; temas[t.id]=t;
  _lsTemasPendente=true; _agendarFlushLocal();
  if(DB) DB.ref('leciona/temas/'+t.id).set(t).catch(e=>toast('⚠ Falha ao gravar tema no Firebase (mantido localmente). Verifique as Regras do banco. '+e.message,'err'));
}
window.addEventListener('beforeunload', ()=>{
  // Garante a cópia local (síncrona, nunca falha por timing). O Firebase já
  // recebeu os writes durante a edição (persistTema/persistConteudo gravam

  try{ if(editing) flushEditor(); }catch(e){}
  if(_lsContPendente) lsSet(LS_CONT, JSON.stringify(conteudos));
  if(_lsTemasPendente) lsSet(LS_TEMAS, JSON.stringify(temas));
});

/* ---------- Migração: garante turma + conteúdo para tudo ---------- */
let migrated=false;
function autoTurma(d,s){
  let tu=Object.values(turmas).find(x=>x.disciplina===d&&x.serie===s&&x._auto);
  if(!tu){ tu={id:uid(),nome:'Geral — '+s,disciplina:d,serie:s,letra:'',unidade:(scope.unidade||UNIDADES[0]),_auto:true,updatedAt:Date.now()}; persistTurma(tu); }
  return tu.id;
}
/* Popula PREBUILT em todos os temas vazios que têm conteúdo disponível.
   Roda no boot — silencioso, só escreve se o tema está realmente vazio. */
function seedAllPrebuilt(){
  const tocados=[];
  Object.values(temas).forEach(t=>{
    if(t && t.nome && typeof applyPrebuiltIfEmptySilent!=='undefined' && applyPrebuiltIfEmptySilent(t)) tocados.push(t);
  });
  if(tocados.length) console.log('[Leciona] PREBUILT aplicado a '+tocados.length+' tema(s).');
  return tocados;
}
let _ultimoMigrate=0;
let _migrateAgendado=false;
function migrateAndRender(){
  const agora=Date.now();
  if(agora-_ultimoMigrate<1500){
    // chamada rápida demais depois da última — provavelmente eco da nossa
    // própria gravação disparando o listener do Firebase de novo. Em vez
    // de reprocessar tudo na hora (o que pode virar um loop sem fim),
    // agenda UMA única checagem mais adiante e ignora o resto.
    if(!_migrateAgendado){
      _migrateAgendado=true;
      setTimeout(()=>{ _migrateAgendado=false; migrateAndRender(); }, 1600);
    }
    return;
  }
  _ultimoMigrate=agora;
  _migrateAndRenderReal();
}
function _migrateAndRenderReal(){
  const contsTocados=[], temasTocados=[];
  // temas/conteúdos sem turma -> turma automática (planos por turma)
  Object.values(conteudos).forEach(c=>{ if(c && !c.turmaId){ c.turmaId=autoTurma(c.disciplina,c.serie); contsTocados.push(c); } });
  Object.values(temas).forEach(t=>{
    if(!t) return;
    let tocou=false;
    if(t.conteudoId && !t.turmaId){ const c=conteudos[t.conteudoId]; t.turmaId=c?c.turmaId:autoTurma(t.disciplina,t.serie); tocou=true; }
    // Migra estrutura de 9 objetos → 5 objetos (roda uma vez, idempotente)
    if(migrarObjTema(t)) tocou=true;
    // Repara obj incompleto (slides/avaliação ausentes) — roda sempre
    if(repararObjTema(t)) tocou=true;
    if(tocou) temasTocados.push(t);
  });
  const orphans = Object.values(temas).filter(t=>t && !t.conteudoId);
  if(orphans.length){
    // agrupa por disciplina|serie|bimestre, cria conteúdo "Conteúdos avulsos"
    const groups={};
    orphans.forEach(t=>{ const k=t.disciplina+'|'+t.serie+'|'+(t.bimestre||'3º Bimestre'); (groups[k]=groups[k]||[]).push(t); });
    Object.keys(groups).forEach(k=>{
      const [d,s,b]=k.split('|');
      let cont = Object.values(conteudos).find(c=>c.disciplina===d&&c.serie===s&&c.bimestre===b&&c._avulsos);
      if(!cont){
        cont={id:uid(),disciplina:d,serie:s,bimestre:b,turmaId:autoTurma(d,s),nome:'Conteúdos avulsos',resumo:'',ordem:0,_avulsos:true,updatedAt:Date.now()};
        conteudos[cont.id]=cont; contsTocados.push(cont);
      }
      groups[k].forEach((t,i)=>{ t.conteudoId=cont.id; if(t.ordem==null) t.ordem=i; temasTocados.push(t); });
    });
    if(!migrated){ migrated=true; toast('Temas da versão anterior reorganizados em "Conteúdos avulsos".','ok'); }
  }
  seedAllPrebuilt().forEach(t=>temasTocados.push(t));

  // grava tudo de uma vez só (nunca tema por tema — é isso que trava o
  // navegador quando há muitos temas para migrar/reparar de uma vez,
  // como na primeira conexão com um Firebase cheio de conteúdo)
  if(contsTocados.length || temasTocados.length){
    _temaIdx=null;
    if(contsTocados.length) lsSet(LS_CONT, JSON.stringify(conteudos));
    if(temasTocados.length) lsSet(LS_TEMAS, JSON.stringify(temas));
    if(DB){
      const updates={};
      contsTocados.forEach(c=>updates['leciona/conteudos/'+c.id]=c);
      temasTocados.forEach(t=>{ t._ts=Date.now(); t.updatedAt=t._ts; updates['leciona/temas/'+t.id]=t; });
      if(Object.keys(updates).length) DB.ref().update(updates).catch(e=>toast('⚠ Falha ao sincronizar com o Firebase (mantido localmente). '+e.message,'err'));
    }
  }
  renderThemes();
}

/* ---------- Boot ---------- */
function loadScope(){
  try{ const x=JSON.parse(localStorage.getItem('leciona_scope')||'null');
    if(x){ scope.disc=x.disc||scope.disc; scope.unidade=x.unidade||scope.unidade; scope.serie=x.serie||scope.serie; scope.turma=x.turma||''; scope.bim=x.bim||scope.bim; }
  }catch(e){}
}
function saveScope(){
  // Limpar busca e seleção PDF ao trocar contexto
  _buscaTerm='';
  const b=document.getElementById('buscaTemas'); if(b) b.value='';
  const cnt=document.getElementById('buscaCount'); if(cnt) cnt.textContent='';
  _relTemasIncluidos=null; try{ localStorage.setItem('leciona_scope', JSON.stringify(scope)); }catch(e){} }
function boot(){
  checarSchema();
  const d=document.getElementById('selDisc');
  Object.keys(SERIES_BY_DISC).forEach(x=>d.add(new Option(x,x)));
  BIMESTRES.forEach(b=>document.getElementById('selBim').add(new Option(b,b)));
  loadScope();
  const us=document.getElementById('selUnidade'); UNIDADES.forEach(u=>us.add(new Option(u,u)));
  loadLocal();
  initFirebase();
  if(!DB) seedTurmasIfEmpty();
  // aplica o contexto salvo aos seletores, na ordem certa
  d.value = (SERIES_BY_DISC[scope.disc]?scope.disc:'História');
  us.value = scope.unidade||UNIDADES[0];
  refreshSeries();
  if((SERIES_BY_DISC[scope.disc]||[]).includes(scope.serie)) document.getElementById('selSerie').value=scope.serie;
  document.getElementById('selBim').value = scope.bim;
  refreshTurmas();
  if(scope.turma && turmas[scope.turma]) document.getElementById('selTurma').value=scope.turma;
  onScopeChange();
  let viewSalva='hoje', offsetSalvo=0;
  try{ viewSalva=localStorage.getItem('leciona_lastview')||'hoje'; offsetSalvo=parseInt(localStorage.getItem('leciona_hojeoffset'),10)||0; }catch(e){}
  hojeOffset=offsetSalvo;
  setView(viewSalva);
  // sw.js não fornecido — Service Worker desabilitado até implementação
  document.addEventListener('keydown', projKeys);
}
function refreshSeries(){
  const s=document.getElementById('selSerie'); s.innerHTML='';
  (SERIES_BY_DISC[document.getElementById('selDisc').value]||[]).forEach(x=>s.add(new Option(x,x)));
}
function refreshTurmas(preferId){
  const sel=document.getElementById('selTurma'); if(!sel) return;
  const d=document.getElementById('selDisc').value, s=document.getElementById('selSerie').value;
  const u=(document.getElementById('selUnidade')||{}).value || scope.unidade;
  const list=Object.values(turmas).filter(t=>t.disciplina===d && t.serie===s && (t.unidade? t.unidade===u : true)).sort((a,b)=>turmaNome(a).localeCompare(turmaNome(b)));
  sel.innerHTML='';
  if(!list.length){ sel.add(new Option('— sem turma (cadastre em + turmas) —','')); }
  list.forEach(t=>sel.add(new Option(turmaNome(t),t.id)));
  // Prioridade: 1) o que o usuário acabou de escolher no <select> (preferId) 2) scope.turma 3) primeira da lista
  const want = (preferId && list.find(t=>t.id===preferId)) ? preferId
             : (list.find(t=>t.id===scope.turma) ? scope.turma : (list.length?list[0].id:''));
  scope.turma = want; sel.value = want;
}
function onScopeChange(){
  try{ const ed=document.getElementById('editor'); if(editing && ed && !ed.classList.contains('hidden')) flushEditor(); }catch(e){}
  const dv=document.getElementById('selDisc').value;
  const turmaEscolhidaPeloUsuario = document.getElementById('selTurma').value; // captura ANTES de reconstruir a lista
  if(scope.disc!==dv){ scope.disc=dv; refreshSeries(); }
  scope.disc=dv;
  scope.unidade=(document.getElementById('selUnidade')||{}).value||scope.unidade;
  scope.serie=document.getElementById('selSerie').value;
  refreshTurmas(turmaEscolhidaPeloUsuario);
  scope.bim=document.getElementById('selBim').value;
  setBusca(''); // garantir busca limpa na troca de turma/bimestre
  saveScope();
  renderThemes();
}

/* ---------- Selos ---------- */
function selosHtml(d,s,b,code){
  const it=matrizItem(d,s,b,code);
  if(!it) return '';
  if(it.r==null && it.s==null && it.g==null) return '<span class="statusdot" style="font-size:10px">selos do '+esc(b)+' não informados</span>';
  let h='';
  if(it.r===1) h+='<span class="selo revisa">REVISA</span>';
  if(it.s===1) h+='<span class="selo ser">SER</span>';
  if(it.g===1) h+='<span class="selo goiastec">GoiásTec</span>';

function selosConteudo(c){

/* ---------- Listagem Conteúdo > Tema ---------- */
function conteudosDoScope(){
  return Object.values(conteudos)
    .filter(c=>c.turmaId===scope.turma && c.bimestre===scope.bim)
    .sort((a,b)=>(a.ordem||0)-(b.ordem||0));
}
function setBusca(v){
  _buscaTerm = (v||'').toLowerCase().trim();
  renderThemes();
}
function _buildTemasIdx(){
  _temaIdx={};
  Object.values(temas).forEach(t=>{ if(!t||!t.conteudoId) return; (_temaIdx[t.conteudoId]||(_temaIdx[t.conteudoId]=[])).push(t); });
}
function temasDoConteudo(cid){
  if(!_temaIdx) _buildTemasIdx();

function nextOrdemConteudo(){
  const arr=conteudosDoScope();

}
function nextOrdemTema(cid){
  const arr=temasDoConteudo(cid);

function statusResumo(t){
  const st=t.status||{}; const e=st.estado||'';
  const lbl = e==='aplicado' ? ('✓ Aplicado'+(st.data?(' '+st.data.split('-').reverse().join('/')):'')) : e==='planejado' ? '◔ Planejado' : '○ status';
  return '<button class="stchip st-'+(e||'none')+'" onclick="event.stopPropagation();cycleStatus(\''+t.id+'\')" title="Tocar para alternar: — → Planejado → Aplicado">'+lbl+'</button>';
}
function cycleStatus(tid){
  const t=temas[tid]; if(!t) return;
  const cur=(t.status&&t.status.estado)||'';
  const nxt = cur==='' ? 'planejado' : cur==='planejado' ? 'aplicado' : '';
  t.status={estado:nxt, data: nxt==='aplicado'? new Date().toISOString().slice(0,10) : ''};
  persistTema(t);
  if(!DB) renderThemes();
  toast(nxt? ('Marcado como '+nxt+'.') : 'Status removido.','ok');
}
function isFilled(t,k){
  if(!t||!t.obj) return false;
  if(k==='avaliacao'){
    const av=t.obj.avaliacao||{};
    return Object.values(av).some(v=>Array.isArray(v)?v.length>0:String(v||'').trim().length>0);
  }
  const v=t.obj&&t.obj[k];
  if(v==null) return false;
  if(Array.isArray(v)) return v.length>0;
  return String(v).trim().length>0;
}
function toggleConteudo(id){ expanded[id]=!(expanded[id]!==false); renderThemes(); }

/* ---------- Reordenar ---------- */
function moverConteudo(id,dir){
  const arr=conteudosDoScope(); const i=arr.findIndex(c=>c.id===id); const j=i+dir;
  if(i<0||j<0||j>=arr.length) return;
  const a=arr[i],b=arr[j]; const ta=a.ordem,tb=b.ordem; a.ordem=tb; b.ordem=ta;
  persistConteudo(a); persistConteudo(b); if(!DB) renderThemes();
}
function moverTema(id,dir){
  const t=temas[id]; const arr=temasDoConteudo(t.conteudoId); const i=arr.findIndex(x=>x.id===id); const j=i+dir;
  if(i<0||j<0||j>=arr.length) return;
  const a=arr[i],b=arr[j]; const ta=a.ordem,tb=b.ordem; a.ordem=tb; b.ordem=ta;
  persistTema(a); persistTema(b); if(!DB) renderThemes();
}

function excluirTema(id){
  const t=temas[id]; if(!t) return;
  const nRegs=registrosDoTema(id).length;
  const aviso = nRegs
    ? 'Excluir a aula "'+(t.nome||'')+'"? Isso também apaga '+nRegs+' registro(s) de aplicação dela. Não pode ser desfeito.'
    : 'Excluir a aula "'+(t.nome||'')+'"? Não pode ser desfeito.';

function excluirConteudo(id){
  const ts=temasDoConteudo(id);
  if(ts.length && !confirm('Este conteúdo tem '+ts.length+' tema(s). Excluir o conteúdo E os temas dentro dele?')) return;
  if(!ts.length && !confirm('Excluir este conteúdo?')) return;
  ts.forEach(t=>removeTema(t.id));
  removeConteudo(id); if(!DB) renderThemes();
}

function pmModeChange(){ const v=document.querySelector('input[name=pmMode]:checked').value; document.getElementById('pmObjs').style.display = v==='gerar'?'':'none'; }

function pmToggle(k){ if(pmSel.has(k))pmSel.delete(k); else pmSel.add(k); }
async function sugerirSubtemas(){
  const arr=matrizDoScope(); const btn=document.getElementById('pmSubBtn'); const msg=document.getElementById('pmSubMsg');
  const usarWeb=(document.getElementById('pmWeb')||{}).checked;
  if(usarWeb && !confirm('A busca na web faz pesquisas reais na internet e consome MAIS créditos da API (cobrança à parte, por busca). Sem ela, a IA sugere subtemas só pelo conhecimento dela, mais rápido e barato. Usar busca na web mesmo assim?')) { if(btn) btn.disabled=false; return; }
  if(btn) btn.disabled=true; if(msg) msg.innerHTML='<span class="spin dark"></span> '+(usarWeb?'buscando em portais educacionais…':'ampliando os subtemas…');
  // roda pra TODAS as habilidades do recorte — mesmo as que já têm subtemas
  // do catálogo. A ideia é a IA complementar/ampliar a abrangência, não só
  // preencher o que está vazio.
  const alvo=arr.map((it,i)=>({it,i}));
  if(!alvo.length){ if(msg) msg.textContent='Nenhuma habilidade neste recorte.'; if(btn) btn.disabled=false; return; }
  const lista=alvo.map((f,n)=>{
    const jaTem=(pmSubs[f.i]||[]).map(o=>(o&&o.s)||o);
    return (n+1)+'. '+(f.it.t||f.it.h)+' ('+f.it.c+')'+(jaTem.length?('\n   já cobertos, não repetir: '+jaTem.join('; ')):'');
  }).join('\n');
  try{
    const sys='Você é professora de '+scope.serie+' ('+scope.disc+') no Brasil, com lente decolonial e pan-africanista. Sugira subtemas didáticos relevantes e alinhados à BNCC/DC-GO'+(usarWeb?', pesquisando em portais educacionais e de governo brasileiros (gov.br, secretarias de educação, repositórios públicos)':'')+'.';
    const usr='Para CADA habilidade abaixo, sugira de 2 a 4 subtemas NOVOS e concretos para '+scope.serie+', que ampliem a abrangência da aula sem repetir os subtemas já cobertos (listados abaixo de cada habilidade, quando houver). Mantenha o mesmo critério pedagógico e o mesmo nível de detalhe dos exemplos já cobertos. Responda APENAS um JSON: array (na MESMA ordem) de arrays de strings curtas. Nada fora do JSON.\n\n'+lista;
    const raw=usarWeb ? await callClaudeWeb(sys,usr) : await callClaude(sys,usr);
    const j=raw.replace(/```json|```/g,'').trim(); const mt=j.match(/\[[\s\S]*\]/); const data=JSON.parse(mt?mt[0]:j);
    let nAdicionados=0;
    if(Array.isArray(data)) data.forEach((subsArr,k)=>{
      if(!Array.isArray(subsArr)||!alvo[k]) return;
      const idx=alvo[k].i;
      const existentesLow=new Set((pmSubs[idx]||[]).map(o=>((o&&o.s)||o).toLowerCase().trim()));
      const novos=subsArr.map(x=>String(x).slice(0,90)).filter(s=>s.trim()&&!existentesLow.has(s.toLowerCase().trim())).map(s=>({s,a:null}));
      pmSubs[idx]=(pmSubs[idx]||[]).concat(novos);
      nAdicionados+=novos.length;
    });
    if(msg) msg.textContent=nAdicionados?(nAdicionados+' subtema(s) novo(s) sugerido(s) — marque os que quiser.'):'A IA não trouxe subtemas novos além dos já cobertos.';
    renderPmList();
  }catch(e){ if(msg) msg.textContent='Não consegui buscar subtemas agora ('+e.message+'). Você ainda pode criar as habilidades.'; }
  if(btn) btn.disabled=false;
}
async function criarPartirMatriz(){
  const arr=matrizDoScope();
  const mode=document.querySelector('input[name=pmMode]:checked').value;
  const objs = mode==='gerar' ? [...document.querySelectorAll('#pmObjs input[type=checkbox]:checked')].map(c=>c.value) : [];
  const sel=[];
  arr.forEach((it,i)=>{ if(pmSel.has('h:'+i)) sel.push({nome:(it.t||it.h||it.c), it}); (pmSubs[i]||[]).forEach((sb,j)=>{ if(pmSel.has('s:'+i+':'+j)){ const nm=(sb&&sb.s)||sb; sel.push({nome:nm, it, tempo:(sb&&sb.a)||''}); } }); });
  if(!sel.length){ toast('Selecione ao menos um tema/subtema.','err'); return; }
  if(mode==='gerar'){ const nGer=sel.length*objs.length; if(nGer>0 && !confirm('Isto criará '+sel.length+' tema(s) e fará '+nGer+' geração(ões) na API (consome créditos da sua conta). Continuar?')) return; }
  const btn=document.getElementById('pmBtn'); if(btn)btn.disabled=true; const prog=document.getElementById('pmProg');
  let cont=Object.values(conteudos).find(c=>c.turmaId===scope.turma&&c.bimestre===scope.bim&&c.nome==='Matriz — '+scope.bim);
  if(!cont){ cont={id:uid(),disciplina:scope.disc,serie:scope.serie,turmaId:scope.turma,bimestre:scope.bim,nome:'Matriz — '+scope.bim,resumo:'',ordem:nextOrdemConteudo(),updatedAt:Date.now()}; persistConteudo(cont); }
  expanded[cont.id]=true;
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  const totalObj=Math.max(1, sel.length*objs.length); const t0=Date.now();
  let i=0, okObj=0, falhaObj=0, feito=0, ultimoErro='';
  for(const item of sel){
    i++;
    // Não recriar se já existe tema com mesmo dcgo e nome neste conteúdo
    const jaExiste=temasDoConteudo(cont.id).find(t=>t.dcgo===item.it.c&&t.nome===String(item.nome).slice(0,80));
    const tema=jaExiste||blankTema(cont.id,{nome:String(item.nome).slice(0,80),dcgo:item.it.c,habilidade:item.it.h,resumo:item.it.h,tempo:item.tempo||'',ordem:nextOrdemTema(cont.id)});
    const ehNovo=!jaExiste;
    // sempre tenta o pré-pronto primeiro, seja qual for o modo — é grátis e instantâneo
    const pegouPrebuilt = (typeof applyPrebuiltIfEmpty!=='undefined') && applyPrebuiltIfEmpty(tema);
    if(objs.length){
      const ordK=OBJ_DEFS.map(o=>o.k); const ks=objs.slice().sort((a,b)=>ordK.indexOf(a)-ordK.indexOf(b));
      for(const k of ks){
        // já veio preenchido pelo pré-pronto? não gasta IA com isso
        if(typeof isFilled==='function' && isFilled(tema,k)){ feito++; continue; }
        const pct=Math.round(feito/totalObj*100);
        const elapsed=(Date.now()-t0)/1000; const rest = feito? Math.round(elapsed/feito*(totalObj-feito)) : 0;
        if(prog) prog.innerHTML='<span class="spin dark"></span> <b>'+pct+'%</b> · '+esc(tema.nome)+' — '+k+(rest?(' · ~'+rest+'s restantes'):'')+'…';
        try{ const v=await genObjFor(tema,k); if(v!=null){ tema.obj[k]=v; okObj++; } else falhaObj++; }
        catch(e){ falhaObj++; ultimoErro=e.message; }
        feito++;
        await sleep(350);
      }
    }
    if(ehNovo||objs.length||pegouPrebuilt) persistTema(tema);
  }
  if(btn)btn.disabled=false; if(!DB) renderThemes();
  if(objs.length && prog){
    prog.innerHTML = 'Pronto: <b>'+sel.length+'</b> tema(s) criados · <b>'+okObj+'</b> objeto(s) gerados'+(falhaObj?(' · <b style="color:#b4451f">'+falhaObj+' falharam</b>'+(ultimoErro?(' ('+esc(ultimoErro.slice(0,120))+')'):'')):'')+'. Pode fechar.';
  } else { closeModal(); }
  toast(sel.length+' tema(s) em "Matriz — '+scope.bim+'"'+(objs.length?(' · '+okObj+' objetos gerados'+(falhaObj?(', '+falhaObj+' falharam'):'')):'')+'.', falhaObj?'err':'ok');
}

/* Popula TODAS as turmas, em TODOS os bimestres que a matriz cobre, de uma vez:
   cria os temas que faltam (a partir da MATRIZ) e já aplica o pré-pronto
   correspondente na hora, sem IA e sem precisar abrir turma por turma.
   Não sobrescreve tema que já tem conteúdo. */
function chaveTurma(t){
  if(!t) return '';
  if(t._auto) return '__auto__'+t.id; // registro especial (fallback) — nunca funde com nada
  const raw=turmaNome(t).toUpperCase();
  const m=raw.match(/(\d+)\s*[ºO°]?\s*([A-Z])(?![A-Z])/);
  const serieLetra = m ? (m[1]+m[2]) : raw.replace(/[^A-Z0-9]/g,'');
  const unidade=(t.unidade||'').trim().toUpperCase();
  return (t.disciplina||'')+'|'+serieLetra+'|'+unidade;
}
async function limparTurmasDuplicadas(){
  if(!confirm('Isso vai unificar turmas duplicadas (mesmo nome e mesma escola), movendo todo o conteúdo pra uma só e apagando as cópias vazias. Continuar?')) return;
  closeModal();
  toast('Verificando turmas duplicadas…','');

  const grupos={};
  Object.values(turmas).forEach(t=>{ if(!t) return; const k=chaveTurma(t); (grupos[k]=grupos[k]||[]).push(t); });

  let turmasRemovidas=0, gruposAfetados=0;
  const contsAtualizados=[], temasAtualizados=[], regsAtualizados=[], alunosAtualizados=[], notasAtualizadas=[], ativsAtualizadas=[], turmasApagar=[];
  const chaves=Object.keys(grupos);
  for(let i=0;i<chaves.length;i++){
    const lista=grupos[chaves[i]];
    if(lista.length>1){
      gruposAfetados++;
      const pontuar=t=>{
        let p = t.letra ? 1000 : 0; // formato novo (serie+letra) tem prioridade sobre nome digitado à mão
        p += Object.values(alunos).filter(a=>a.turmaId===t.id).length*50; // turma com alunos de verdade tem prioridade
        p += Object.values(conteudos).filter(c=>c.turmaId===t.id).length*10;
        return p;
      };
      const ordenado=lista.slice().sort((a,b)=>pontuar(b)-pontuar(a));
      const manter=ordenado[0];
      ordenado.slice(1).forEach(perdedor=>{
        Object.values(conteudos).forEach(c=>{ if(c.turmaId===perdedor.id){ c.turmaId=manter.id; contsAtualizados.push(c); } });
        Object.values(temas).forEach(t=>{ if(t.turmaId===perdedor.id){ t.turmaId=manter.id; temasAtualizados.push(t); } });
        // registros de aplicação, alunos, notas e atividades de controle também
        // referenciam turmaId/turmaIds — sem migrar isso junto, ficam órfãos
        // apontando pra uma turma apagada (alunos inteiros "somem" da tela de Notas).
        Object.values(registros).forEach(r=>{ if(r.turmaId===perdedor.id){ r.turmaId=manter.id; regsAtualizados.push(r); } });
        Object.values(alunos).forEach(a=>{ if(a.turmaId===perdedor.id){ a.turmaId=manter.id; alunosAtualizados.push(a); } });
        Object.values(notasCtrl).forEach(n=>{ if(n.turmaId===perdedor.id){ n.turmaId=manter.id; notasAtualizadas.push(n); } });
        Object.values(atividadesCtrl).forEach(av=>{
          if((av.turmaIds||[]).includes(perdedor.id)){
            av.turmaIds=av.turmaIds.filter(tid=>tid!==perdedor.id);
            if(!av.turmaIds.includes(manter.id)) av.turmaIds.push(manter.id);
            ativsAtualizadas.push(av);
          }
        });
        turmasApagar.push(perdedor.id);
        turmasRemovidas++;
      });
    }
    if(i>0 && i%200===0) await new Promise(r=>setTimeout(r,0));
  }

  if(!turmasRemovidas){ toast('Nenhuma turma duplicada encontrada.','ok'); return; }

  turmasApagar.forEach(id=>delete turmas[id]);
  _temaIdx=null;
  lsSet(LS_TURMAS, JSON.stringify(turmas));
  lsSet(LS_CONT, JSON.stringify(conteudos));
  lsSet(LS_TEMAS, JSON.stringify(temas));
  if(regsAtualizados.length) lsSet(LS_REG, JSON.stringify(registros));
  if(alunosAtualizados.length) lsSet(LS_ALUNOS, JSON.stringify(alunos));
  if(notasAtualizadas.length) lsSet(LS_NOTAS, JSON.stringify(notasCtrl));
  if(ativsAtualizadas.length) lsSet(LS_ATVCTRL, JSON.stringify(atividadesCtrl));
  if(DB){
    const updates={};
    turmasApagar.forEach(id=>updates['leciona/turmas/'+id]=null);
    contsAtualizados.forEach(c=>updates['leciona/conteudos/'+c.id]=c);
    temasAtualizados.forEach(t=>updates['leciona/temas/'+t.id]=t);
    regsAtualizados.forEach(r=>updates['leciona/registros/'+r.id]=r);
    alunosAtualizados.forEach(a=>updates['leciona/alunos/'+a.id]=a);
    notasAtualizadas.forEach(n=>updates['leciona/notas_ctrl/'+n.id]=n);
    ativsAtualizadas.forEach(av=>updates['leciona/atividades_ctrl/'+av.id]=av);
    DB.ref().update(updates).catch(e=>toast('⚠ Falha ao sincronizar com o Firebase (mantido localmente). '+e.message,'err'));
  }
  renderThemes();
  toast(turmasRemovidas+' turma(s) duplicada(s) unificada(s) em '+gruposAfetados+' grupo(s). Agora rode "Limpar duplicatas (banco inteiro)" de novo, pra juntar os temas que ficaram repetidos na turma unificada.','ok');
}
async function limparDuplicatasGeral(){
  if(typeof PREBUILT_OBJ==='undefined'){ toast('Aguarde o carregamento terminar e tente de novo.','err'); return; }
  if(!confirm('Isso vai varrer TODOS os seus temas, agrupar por turma+código DC-GO, manter só o mais completo de cada grupo (priorizando o que já foi aplicado em sala) e apagar os duplicados. Não pode ser desfeito. Continuar?')) return;
  closeModal();
  toast('Varrendo o banco inteiro… não feche a aba.','');

  const grupos={};

    if(!t||!t.dcgo||!t.turmaId) return;
    const chave=t.turmaId+'::'+t.dcgo;
    (grupos[chave]=grupos[chave]||[]).push(t);
  });
  const pontuar=t=>{
    let p=0;
    if((registrosDoTema(t.id)||[]).length) p+=1000;
    p += OBJ_DEFS.filter(o=>isFilled(t,o.k)).length*10;
    p += (t.updatedAt||0)/1e13;
    return p;
  };
  const idsParaApagar=[]; let gruposAfetados=0;
  const chaves=Object.keys(grupos);
  for(let i=0;i<chaves.length;i++){
    const lista=grupos[chaves[i]];
    if(lista.length>1){
      gruposAfetados++;
      const ordenado=lista.slice().sort((a,b)=>pontuar(b)-pontuar(a));
      ordenado.slice(1).forEach(t=>idsParaApagar.push(t.id));
    }
    if(i>0 && i%200===0){ toast('Varrendo… '+i+'/'+chaves.length+' grupos.',''); await new Promise(r=>setTimeout(r,0)); }
  }

  if(!idsParaApagar.length){ toast('Nenhuma duplicata encontrada — está tudo limpo.','ok'); return; }

  // registros de aplicação do tema perdedor ficariam órfãos (apontando pra um
  // tema que não existe mais) se não forem removidos junto.
  const idsSet=new Set(idsParaApagar);
  const regsApagar=Object.values(registros).filter(r=>idsSet.has(r.temaId));

  idsParaApagar.forEach(id=>{ delete temas[id]; });
  regsApagar.forEach(r=>{ delete registros[r.id]; });
  _temaIdx=null;
  lsSet(LS_TEMAS, JSON.stringify(temas));
  if(regsApagar.length) lsSet(LS_REG, JSON.stringify(registros));
  if(DB){
    const updates={};
    idsParaApagar.forEach(id=>updates['leciona/temas/'+id]=null); // null apaga no Firebase, em lote
    regsApagar.forEach(r=>updates['leciona/registros/'+r.id]=null);
    DB.ref().update(updates).catch(e=>toast('⚠ Falha ao sincronizar exclusões com o Firebase (removido localmente). '+e.message,'err'));
  }
  renderThemes();
  toast(idsParaApagar.length+' tema(s) duplicado(s) removidos, em '+gruposAfetados+' grupo(s) — mantido sempre o mais completo de cada um.'+(regsApagar.length?(' '+regsApagar.length+' registro(s) órfão(s) também limpo(s).'):''), 'ok');
}

async function popularTudoAutomaticamente(filtro){
  filtro=filtro||{};
  if(typeof PREBUILT_OBJ==='undefined'){ toast('O conteúdo pré-pronto ainda está carregando. Aguarde alguns segundos e tente de novo.','err'); return; }
  let turmasArr=Object.values(turmas).filter(t=>t&&!t._auto);
  if(filtro.disciplina) turmasArr=turmasArr.filter(t=>t.disciplina===filtro.disciplina);
  if(filtro.unidade) turmasArr=turmasArr.filter(t=>t.unidade===filtro.unidade);
  if(!turmasArr.length){ toast('Nenhuma turma corresponde a esse filtro.','err'); return; }
  const bimestresAlvo = filtro.bimestre ? [filtro.bimestre] : BIMESTRES;
  const descr = (filtro.disciplina||'todas as disciplinas')+' · '+(filtro.unidade||'todas as escolas')+' · '+(filtro.bimestre||'todos os bimestres');
  if(!confirm('Criar os temas que faltam em '+turmasArr.length+' turma(s) ('+descr+'), aplicando o conteúdo pré-pronto? Temas já existentes não são alterados.')) return;
  closeModal();
  toast('Processando '+turmasArr.length+' turma(s)… não feche a aba.','');

  let turmasProcessadas=0, temasCriados=0, temasComPrebuilt=0;
  const contsNovos=[], temasNovos=[];
  const idxTemas={};
  Object.values(temas).forEach(t=>{ if(t&&t.conteudoId){ (idxTemas[t.conteudoId]||(idxTemas[t.conteudoId]=[])).push(t); } });
  const idxConteudos={};
  Object.values(conteudos).forEach(c=>{ if(c&&c.turmaId&&c.bimestre){ const k=c.turmaId+'|'+c.bimestre; if(!idxConteudos[k]) idxConteudos[k]=c; } });

  for(let ti=0; ti<turmasArr.length; ti++){
    const tu=turmasArr[ti];
    const disc=tu.disciplina, serie=tu.serie;
    if(disc && serie && disc!=='Eletiva'){
      let turmaTocada=false;
      bimestresAlvo.forEach(bim=>{
        const arr=MATRIZ[matrizKey(disc,serie,bim)]||[];
        if(!arr.length) return;
        turmaTocada=true;
        const chaveCont=tu.id+'|'+bim;
        let cont=idxConteudos[chaveCont];
        if(!cont){
          cont={id:uid(),disciplina:disc,serie,turmaId:tu.id,bimestre:bim,nome:'Matriz — '+bim,resumo:'',ordem:0,updatedAt:Date.now()};
          conteudos[cont.id]=cont; idxConteudos[chaveCont]=cont; contsNovos.push(cont);
        }
        const jaTem=idxTemas[cont.id]||[];
        const existentes=new Set(jaTem.map(t=>t.dcgo));
        let base=jaTem.length ? Math.max(...jaTem.map(t=>t.ordem||0))+1 : 0;
        arr.forEach(it=>{
          if(existentes.has(it.c)) return;
          const tema=blankTema(cont.id,{nome:it.t,dcgo:it.c,habilidade:it.h,resumo:it.h,ordem:base++,turmaId:tu.id,disciplina:disc,serie:serie,bimestre:bim});
          tema._ts=Date.now(); tema.updatedAt=tema._ts;
          temas[tema.id]=tema;
          (idxTemas[cont.id]||(idxTemas[cont.id]=[])).push(tema);
          temasCriados++;
          if(applyPrebuiltIfEmptySilent(tema)) temasComPrebuilt++;
          temasNovos.push(tema);
        });
      });
      if(turmaTocada) turmasProcessadas++;
    }
    // cede o controle ao navegador antes da próxima turma — é isso que
    // evita o aviso de "página sem resposta" em bases grandes
    if(ti>0 && ti%5===0) toast('Processando… '+ti+'/'+turmasArr.length+' turmas.','');
    await new Promise(r=>setTimeout(r,0));
  }

  // grava tudo de uma vez só: 1x no localStorage, 1x no Firebase (multi-path update)
  _temaIdx=null;
  lsSet(LS_CONT, JSON.stringify(conteudos));
  lsSet(LS_TEMAS, JSON.stringify(temas));
  if(DB){
    const updates={};
    contsNovos.forEach(c=>updates['leciona/conteudos/'+c.id]=c);
    temasNovos.forEach(t=>updates['leciona/temas/'+t.id]=t);
    if(Object.keys(updates).length){
      DB.ref().update(updates).catch(e=>toast('⚠ Falha ao sincronizar com o Firebase (mantido localmente). '+e.message,'err'));
    }
  }

  renderThemes();
  toast('Pronto: '+temasCriados+' tema(s) criados em '+turmasProcessadas+' turma(s) · '+temasComPrebuilt+' já vieram com conteúdo pré-pronto aplicado.', 'ok');
}
/* Igual a applyPrebuiltIfEmpty, mas sem chamar persistTema sozinho —
   usado durante popularTudoAutomaticamente() pra não gravar tema por tema. */
function applyPrebuiltIfEmptySilent(t){
  const pb=getPrebuilt(t);
  if(!pb) return false;
  if(!t.obj) t.obj={};
  const o=t.obj;
  const campoVazio=(k)=>{
    const v=o[k];
    if(v==null) return true;
    if(k==='avaliacao'){
      return !(typeof v==='object' && !Array.isArray(v) && Object.values(v).some(a=>Array.isArray(a)?a.length>0:String(a||'').trim().length>0));
    }
    if(Array.isArray(v)) return v.length===0;
    if(typeof v==='object') return Object.keys(v).length===0;
    return !String(v).trim();
  };
  let mudou=false;
  ['quadro','estudo','slides','mapaMental','avaliacao'].forEach(k=>{
    if(campoVazio(k) && pb[k]!=null){ o[k]=pb[k]; mudou=true; }
  });
  return mudou;
}

/* Verifica todo tema cujo NOME bate exatamente com um subtema do
   prebuilt.js, e confere se o conteúdo aplicado (quadro) é realmente
   o daquele subtema — ou se, por causa do bug de prioridade (código
   antes do nome), veio o conteúdo de outro subtema do mesmo código.
   Corrige em lote, uma única gravação no final (mesma lição do
   Popular tudo agora — nunca gravar tema por tema num loop). */
function corrigirPrebuiltAplicadoErrado(){
  if(typeof PREBUILT_OBJ==='undefined'){ toast('O conteúdo pré-pronto ainda está carregando. Aguarde e tente de novo.','err'); return; }
  const divergentes=[];
  Object.values(temas).forEach(t=>{
    if(!t||!t.nome||!t.obj) return;
    const nome=t.nome.trim();
    const correto=PREBUILT_OBJ[nome];
    if(!correto) return; // nome genérico (nível habilidade) — não mexe
    const quadroAtual=(t.obj.quadro||'').trim();
    if(!quadroAtual) return; // ainda vazio, não é caso de conteúdo errado
    if(quadroAtual!==correto.quadro.trim()){
      divergentes.push(t);
    }
  });
  if(!divergentes.length){ toast('Nenhum tema com conteúdo trocado encontrado. Tudo certo.','ok'); return; }
  if(!confirm('Encontrei '+divergentes.length+' tema(s) cujo nome bate com um subtema específico, mas o conteúdo aplicado é de OUTRO subtema do mesmo código (bug de correspondência). Corrigir agora, substituindo pelo conteúdo certo?')) return;
  divergentes.forEach(t=>{ t.obj=Object.assign({}, PREBUILT_OBJ[t.nome.trim()]); t._ts=Date.now(); t.updatedAt=t._ts; });
  _temaIdx=null;
  lsSet(LS_TEMAS, JSON.stringify(temas));
  if(DB){
    const updates={};
    divergentes.forEach(t=>updates['leciona/temas/'+t.id]=t);
    DB.ref().update(updates).catch(e=>toast('⚠ Falha ao sincronizar com o Firebase (mantido localmente). '+e.message,'err'));
  }
  renderThemes();
  toast(divergentes.length+' tema(s) corrigido(s) — conteúdo trocado pelo certo.','ok');
}

function fecharEditor(){
  clearTimeout(_saveT);

  document.getElementById('editor').classList.add('hidden'); editing=null; dirty=false;

let _saveT=null;
function setSaveStatus(estado){
  const el=document.getElementById('saveStatus'); if(!el) return;
  if(estado==='editando'){ el.textContent='• editando…'; el.style.color='var(--muted,#888)'; }
  else if(estado==='salvando'){ el.textContent='salvando…'; el.style.color='var(--muted,#888)'; }
  else if(estado==='salvo'){ el.textContent='✓ salvo'; el.style.color='var(--green,#2f6b5e)'; }

function autosave(){

function flushEditor(){ try{ clearTimeout(_saveT); if(editing){ saveActiveObj(); collectMeta(); persistTema(editing); setSaveStatus('salvo'); } }catch(e){} }

function setStatus(field,val){

/* ---- Exportar conteúdo (e temas) para outra(s) turma(s) ----
   Multi-seleção: pode marcar turmas avulsas, "todas da mesma série" (atalho)
   ou "todas" de uma vez — útil pra distribuir o mesmo conteúdo/aula pra
   várias turmas paralelas sem repetir a operação. */
function _checksDestino(alvos, origem, cssClass){
  const mesmaSerieIds=alvos.filter(x=>x.disciplina===origem.disciplina && x.serie===origem.serie).map(x=>x.id);
  const todosIds=alvos.map(x=>x.id);
  const checks=alvos.map(x=>'<label class="check"><input type="checkbox" class="'+cssClass+'" value="'+x.id+'">'+esc(turmaNome(x))+' — '+esc(x.disciplina)+' · '+esc(x.unidade||'—')+'</label>').join('');
  const marcar=(ids)=>'expMarcar(\''+cssClass+'\',['+ids.map(id=>'\''+id+'\'').join(',')+'])';
  const botoes='<div class="addrow" style="margin:10px 0 4px;flex-wrap:wrap">'+
    (mesmaSerieIds.length>1?'<button class="btn ghost sm" type="button" onclick="'+marcar(mesmaSerieIds)+'">marcar todas de '+esc(origem.serie||'')+'</button>':'')+
    '<button class="btn ghost sm" type="button" onclick="'+marcar(todosIds)+'">marcar todas ('+todosIds.length+')</button>'+
    '<button class="btn ghost sm" type="button" onclick="'+marcar([])+'">limpar</button>'+
  '</div>';
  return botoes+'<div class="rel-temas-list">'+checks+'</div>';
}
function expMarcar(cssClass, ids){
  document.querySelectorAll('.'+cssClass).forEach(cb=>{ cb.checked=ids.includes(cb.value); });
}
function openExportConteudo(cid){
  const c=conteudos[cid]; if(!c) return;
  const origem=turmas[c.turmaId]||{};
  const alvos=Object.values(turmas).filter(t=>t.id!==c.turmaId).sort((a,b)=>((a.disciplina||'')+(a.serie||'')+turmaNome(a)).localeCompare((b.disciplina||'')+(b.serie||'')+turmaNome(b)));
  const inner = alvos.length
    ? '<small>Copia o conteúdo "<b>'+esc(c.nome)+'</b>" e todos os seus temas/objetos pras turmas marcadas (útil para projetos interdisciplinares e temas transversais). Cada cópia fica <b>independente</b>: editar ou excluir numa não afeta as outras.</small>'+
      _checksDestino(alvos, origem, 'expDestC')
    : '<small>Não há outra turma cadastrada. Crie a turma de destino em "+ turmas" primeiro.</small>';
  const foot = alvos.length ? '<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="doExportConteudo(\''+cid+'\')">Copiar</button>' : '<button class="btn ghost" onclick="closeModal()">Fechar</button>';
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h3>Copiar para outra(s) turma(s)</h3></div><div class="modal-b">'+inner+'</div><div class="modal-f">'+foot+'</div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);
}
function doExportConteudo(cid){
  const c=conteudos[cid]; if(!c) return;
  const destIds=[...document.querySelectorAll('.expDestC:checked')].map(cb=>cb.value);
  if(!destIds.length){ toast('Marque ao menos uma turma de destino.','err'); return; }
  const nomes=destIds.map(id=>turmaNome(turmas[id])).join(', ');
  if(!confirm('Copiar "'+c.nome+'" e todos os seus temas para: '+nomes+'?\nCada cópia será independente da turma de origem.')) return;
  let feitas=0;
  destIds.forEach(dest=>{
    const dt=turmas[dest]; if(!dt) return;
    const novoC=JSON.parse(JSON.stringify(c)); novoC.id=uid(); novoC.turmaId=dest; novoC.disciplina=dt.disciplina; novoC.serie=dt.serie; novoC._avulsos=false; novoC.ordem=99; novoC.updatedAt=Date.now();
    novoC.planejamento=[]; // cronograma referencia temaIds da origem — não faz sentido na cópia
    persistConteudo(novoC);
    temasDoConteudo(cid).forEach((t,i)=>{
      const nt=JSON.parse(JSON.stringify(t)); nt.id=uid(); nt.conteudoId=novoC.id; nt.turmaId=dest; nt.disciplina=dt.disciplina; nt.serie=dt.serie; nt.status={estado:'',data:''}; nt.ordem=i; nt.updatedAt=Date.now();
      persistTema(nt);
    });
    feitas++;
  });
  closeModal(); if(!DB) renderThemes();
  toast('Conteúdo copiado para '+feitas+' turma(s).','ok');
}
function openExportTema(tid){
  const t=temas[tid]; if(!t) return;

  const alvos=Object.values(turmas).filter(x=>x.id!==t.turmaId).sort((a,b)=>((a.disciplina||'')+(a.serie||'')+turmaNome(a)).localeCompare((b.disciplina||'')+(b.serie||'')+turmaNome(b)));
  const inner = alvos.length
    ? '<small>Copia <b>somente esta aula</b> ("'+esc(t.nome)+'") pras turmas marcadas. Cada cópia é independente (excluir numa não afeta as outras).</small>'+
      _checksDestino(alvos, origem, 'expDestT')
    : '<small>Não há outra turma cadastrada.</small>';
  const foot = alvos.length ? '<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="doExportTema(\''+tid+'\')">Copiar aula</button>' : '<button class="btn ghost" onclick="closeModal()">Fechar</button>';
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h3>Copiar aula para outra(s) turma(s)</h3></div><div class="modal-b">'+inner+'</div><div class="modal-f">'+foot+'</div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);

function doExportTema(tid){
  const t=temas[tid]; if(!t) return;

    if(!destC){ destC={id:uid(),disciplina:dt.disciplina,serie:dt.serie,turmaId:dest,bimestre:t.bimestre,nome:nomeC,resumo:'',ordem:99,updatedAt:Date.now()}; persistConteudo(destC); }
    const nt=JSON.parse(JSON.stringify(t)); nt.id=uid(); nt.conteudoId=destC.id; nt.turmaId=dest; nt.disciplina=dt.disciplina; nt.serie=dt.serie; nt.status={estado:'',data:''}; nt.ordem=nextOrdemTema(destC.id); nt.updatedAt=Date.now();
    persistTema(nt);

  });

  toast('Aula copiada para '+feitas+' turma(s).','ok');
}
function renderImagensEditor(){
