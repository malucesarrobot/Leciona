<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#14201f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leciona">
<title>Leciona</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14201f; --board-fg:#f3efe6; --paper:#e9ece7; --surface:#f6f8f4;
  --green:#2f6b5e; --green-d:#234f45; --ochre:#c47a3d; --line:#d2d8cf;
  --muted:#6a7370; --ink-soft:#2a3a38; --danger:#a8442f; --ok:#2f6b5e;
  --radius:10px; --shadow:0 1px 2px rgba(20,32,31,.06),0 8px 24px rgba(20,32,31,.06);
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}
h1,h2,h3{margin:0;font-weight:600}
.hidden{display:none!important}
.serif{font-family:var(--serif)}

#app{display:flex;flex-direction:column;height:100%}
header.topbar{display:flex;align-items:center;gap:16px;padding:10px 18px;background:var(--ink);color:var(--board-fg);flex:0 0 auto}
.brand{display:flex;align-items:baseline;gap:10px;font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:.3px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--ochre);display:inline-block;transform:translateY(-2px)}
.brand small{font-family:var(--sans);font-weight:500;font-size:11px;color:#9fb0ab;letter-spacing:.14em;text-transform:uppercase}
.topbar .spacer{flex:1}
.topbar nav{display:flex;gap:4px;background:rgba(255,255,255,.06);padding:4px;border-radius:8px}
.topbar nav button{background:transparent;border:0;color:#bcc8c4;padding:7px 14px;border-radius:6px;font-weight:500;font-size:13px}
.topbar nav button.active{background:var(--board-fg);color:var(--ink)}
.icon-btn{background:rgba(255,255,255,.06);border:0;color:var(--board-fg);width:34px;height:34px;border-radius:8px;font-size:15px}
.icon-btn:hover{background:rgba(255,255,255,.14)}
.conn{font-size:11px;color:#9fb0ab;display:flex;align-items:center;gap:6px}
.conn .led{width:8px;height:8px;border-radius:50%;background:var(--ochre)}
.conn.online .led{background:#6fcaa9}

#viewGestao{flex:1;display:flex;min-height:0}
#viewHoje{flex:1;overflow:auto}
.hoje-wrap{max-width:760px;margin:0 auto;padding:30px 22px}
.hoje-head h2{font-family:Spectral,serif;font-size:30px;margin:0 0 4px}
.hoje-nav{display:flex;gap:8px;margin:6px 0}
.hoje-data{color:var(--muted);font-size:13px;margin-bottom:22px}
.hoje-list{display:flex;flex-direction:column;gap:10px}
.hoje-row{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.hoje-hora{flex:0 0 64px;font-weight:700;color:var(--green);font-size:16px;display:flex;flex-direction:column;line-height:1.15}
.hoje-hora small{font-weight:500;color:var(--muted);font-size:11px}
.hoje-info{flex:1;display:flex;flex-direction:column;gap:2px}
.hoje-info b{font-size:15px}
.hoje-info span{font-size:12px;color:var(--muted)}
.hoje-acoes{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.hoje-wrap .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:16px}
@media(max-width:560px){.hoje-row{flex-wrap:wrap}.hoje-acoes{width:100%;justify-content:flex-start}}
.scope{flex:0 0 290px;border-right:1px solid var(--line);background:var(--surface);padding:18px 16px;overflow:auto;display:flex;flex-direction:column;gap:14px}
.scope .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:600}
.scope select,.scope input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.scope .lbl-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.scope .lbl-row .btn.sm{padding:2px 9px;text-transform:none;letter-spacing:0}
.scope .sep{height:1px;background:var(--line);margin:4px 0}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 13px;border-radius:8px;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.12s}
.btn:hover{border-color:#b9c2b6}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:var(--green-d)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--ink);background:rgba(20,32,31,.05)}
.btn.full{width:100%;justify-content:center}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.danger{color:var(--danger);border-color:transparent}
.btn.danger:hover{background:rgba(168,68,47,.08)}

.themes{flex:1;display:flex;flex-direction:column;min-width:0}
.themes-head{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--surface)}
.themes-head h2{font-family:var(--serif);font-size:18px}
.themes-head .crumb{font-size:12px;color:var(--muted)}
.themes-body{flex:1;overflow:auto;padding:18px 22px}

/* Conteúdo > Tema */
.conteudo{border:1px solid var(--line);background:#fff;border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.conteudo-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(47,107,94,.05);border-bottom:1px solid var(--line)}
.conteudo-head .cname{font-family:var(--serif);font-size:16px;font-weight:600;flex:1;cursor:pointer}
.conteudo-head .ordbtns{display:flex;flex-direction:column;gap:1px}
.ordbtns button{border:1px solid var(--line);background:#fff;width:22px;height:17px;line-height:1;border-radius:4px;font-size:10px;color:var(--muted);padding:0}
.ordbtns button:hover{border-color:var(--green);color:var(--green)}
.conteudo-body{padding:10px 14px}
.selos{display:inline-flex;gap:4px;flex-wrap:wrap}
.selo{font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.selo.revisa{background:#e7efe9;color:#2f6b5e}
.selo.ser{background:#efe6db;color:#a06a2e}
.selo.goiastec{background:#e6e9ef;color:#3a4a8a}

.tlist{display:grid;gap:9px}
.tcard{border:1px solid var(--line);background:#fff;border-radius:9px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.12s}
.tcard:hover{border-color:var(--green);box-shadow:var(--shadow)}
.tcard .tname{font-family:var(--serif);font-size:15px;font-weight:600}
.tcard .tcode{font-size:11px;color:var(--green);font-weight:600;letter-spacing:.04em;margin-right:8px}
.tcard .tsub{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.tcard .tmeta{flex:1;min-width:0}
.tcard .prog{display:flex;gap:3px}
.tcard .prog i{width:7px;height:7px;border-radius:2px;background:var(--line)}
.tcard .prog i.on{background:var(--green)}
.statusdot{font-size:11px;color:var(--muted)}
.statusdot b{color:var(--green)}
.empty{color:var(--muted);text-align:center;padding:44px 20px;font-size:14px}
.empty p{max-width:420px;margin:8px auto}
.addrow{display:flex;gap:8px;margin-top:10px}

/* Editor */
.editor{position:fixed;inset:0;background:var(--paper);z-index:40;display:flex;flex-direction:column}
.editor-top{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--surface)}
.editor-top input.tema-nome{font-family:var(--serif);font-size:20px;font-weight:600;border:0;background:transparent;flex:1;color:var(--ink);padding:4px}
.editor-top input.tema-nome:focus{outline:0;border-bottom:2px solid var(--green)}
.editor-body{flex:1;display:flex;min-height:0}
.meta-pane{flex:0 0 312px;border-right:1px solid var(--line);padding:18px;overflow:auto;background:var(--surface)}
.meta-pane .field{margin-bottom:14px}
.meta-pane label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
.meta-pane input,.meta-pane textarea,.meta-pane select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
.meta-pane textarea{resize:vertical;min-height:60px}
.meta-block{border:1px solid var(--line);border-radius:9px;background:#fff;padding:11px;margin-bottom:14px}
.meta-block h4{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.turma-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.turma-row .tn{font-weight:600;font-size:13px;flex:1;min-width:70px}
.turma-row select,.turma-row input{padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:12px}
.turma-row input.dt{width:128px}
.img-thumbs{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.img-thumbs .it{position:relative;width:74px;height:54px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.img-thumbs .it img{width:100%;height:100%;object-fit:cover}
.img-thumbs .it button{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:0;background:rgba(20,32,31,.78);color:#fff;font-size:11px;line-height:1;padding:0}

.obj-pane{flex:1;display:flex;flex-direction:column;min-width:0}
.obj-tabs{display:flex;gap:2px;padding:10px 16px 0;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--surface)}
.obj-tabs button{border:0;background:transparent;padding:9px 13px;border-radius:8px 8px 0 0;color:var(--muted);font-weight:500;font-size:13px;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
.obj-tabs button.active{color:var(--ink);border-bottom-color:var(--green)}
.obj-tabs button .badge{width:7px;height:7px;border-radius:50%;background:var(--line)}
.obj-tabs button.done .badge{background:var(--green)}
.obj-content{flex:1;overflow:auto;padding:20px 24px;max-width:920px;width:100%;margin:0 auto}
.obj-actions{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.obj-actions .title{font-family:var(--serif);font-size:17px;font-weight:600;flex:1}
.obj-hint{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.45}
textarea.big{width:100%;min-height:320px;padding:14px;border:1px solid var(--line);border-radius:10px;background:#fff;line-height:1.6;resize:vertical}
.card-list{display:grid;gap:12px}
.mini-card{border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px}
.mini-card .row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.mini-card input,.mini-card textarea,.mini-card select{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff}
.mini-card textarea{resize:vertical;min-height:48px}
.mini-card .num{font-family:var(--serif);font-weight:700;color:var(--green);font-size:14px;flex:0 0 auto}
.mini-card label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin:6px 0 3px}

/* Projeção */
#viewProjecao{position:fixed;inset:0;background:var(--ink);color:var(--board-fg);z-index:50;display:flex;flex-direction:column}
#viewProjecao.theme-light{background:#faf8f2;color:#1a1a1a}
#viewProjecao.theme-contrast{background:#000;color:#fff}
.proj-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(0,0,0,.25);flex:0 0 auto}
.theme-light .proj-bar{background:rgba(0,0,0,.05)}
.proj-bar .ptitle{font-family:var(--serif);font-weight:600;font-size:15px;opacity:.85;max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-bar .spacer{flex:1}
.obj-switch{display:flex;gap:2px;background:rgba(255,255,255,.08);padding:4px;border-radius:9px;overflow-x:auto;max-width:60vw}
.theme-light .obj-switch{background:rgba(0,0,0,.06)}
.obj-switch button{border:0;background:transparent;color:inherit;opacity:.6;padding:6px 11px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap}
.obj-switch button.active{background:rgba(255,255,255,.16);opacity:1}
.theme-light .obj-switch button.active{background:rgba(0,0,0,.1)}
.proj-ctrl{display:flex;align-items:center;gap:4px}
.proj-ctrl button{border:0;background:rgba(255,255,255,.08);color:inherit;width:32px;height:32px;border-radius:7px;font-size:14px}
.theme-light .proj-ctrl button{background:rgba(0,0,0,.06)}
.proj-ctrl button:hover{background:rgba(255,255,255,.18)}
.proj-stage{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:5vh 6vw}
.proj-canvas{width:100%;max-width:1100px;font-size:var(--proj-fs,30px);line-height:var(--proj-lh,1.6)}
.proj-canvas h2{font-family:var(--serif);font-size:1.5em;margin-bottom:.6em;color:var(--ochre)}
.theme-contrast .proj-canvas h2{color:#ffd479}
.proj-canvas p{margin:0 0 .8em}
.proj-canvas ul{margin:0 0 .8em;padding-left:1.3em}
.proj-canvas li{margin-bottom:.4em}
.proj-canvas .q{margin-bottom:1.2em}
.proj-canvas .alt{padding:.25em .6em;border-radius:8px;margin:.2em 0}
.proj-canvas .alt.correct{background:rgba(111,202,169,.22);outline:2px solid #6fcaa9}
.theme-light .proj-canvas .alt.correct{background:rgba(47,107,94,.16);outline-color:var(--green)}
.reveal-box{margin-top:.6em;padding:.5em .8em;border-left:4px solid var(--ochre);background:rgba(255,255,255,.06);border-radius:6px;font-size:.85em}
.theme-light .reveal-box{background:rgba(0,0,0,.04)}
.flash{width:100%;max-width:820px;min-height:46vh;border-radius:18px;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;text-align:center;padding:6vh 6vw;cursor:pointer;font-family:var(--serif);font-size:1.2em;position:relative;user-select:none}
.theme-light .flash{border-color:rgba(0,0,0,.14)}
.flash .side-label{position:absolute;top:14px;left:18px;font-family:var(--sans);font-size:13px;letter-spacing:.1em;text-transform:uppercase;opacity:.5}
.slide{width:100%;max-width:1000px;min-height:50vh;border-radius:16px;background:rgba(255,255,255,.05);padding:6vh 6vw;border:1px solid rgba(255,255,255,.1)}
.theme-light .slide{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08)}
.slide h2{font-family:var(--serif);font-size:1.6em;margin-bottom:.7em;color:var(--ochre)}
.theme-contrast .slide h2{color:#ffd479}
.slide li{margin-bottom:.6em;font-size:clamp(15px,1em,28px)}
.slide{max-height:78vh;overflow:auto}
.slide h2{font-size:clamp(20px,1.25em,36px)}
.proj-canvas{overflow-wrap:break-word}
.foco{width:100%;margin:8px 0 2px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface,#fff);color:inherit;font-size:13px}
.foco::placeholder{color:#9aa39d}
/* status chip no card */
.stchip{border:1px solid var(--line);background:#fff;border-radius:12px;padding:2px 9px;font-size:11px;cursor:pointer;margin-left:8px;color:var(--ink-soft);white-space:nowrap}
.stchip:hover{border-color:var(--green)}
.stchip.st-planejado{border-color:#c98a33;color:#9a6b1f;background:#fbf3e5}
.stchip.st-aplicado{border-color:#2f6b5e;color:#235247;background:#e9f3ef}
/* painel bimestre */
.bim-grade{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.bim-day{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--ink-soft)}
.bim-day input{width:52px;padding:5px;border:1px solid var(--line);border-radius:7px;text-align:center}
.bim-tot{font-size:14px;margin:6px 0}
.bim-list{display:flex;flex-direction:column;gap:5px}
.bim-row{display:flex;align-items:center;gap:10px}
.bim-faixa{flex:0 0 96px;font-size:12px;color:var(--green);font-weight:600}
.bim-tema{flex:1;font-size:13px;display:flex;flex-direction:column;gap:2px}
.bim-det{font-size:11px;color:#8a938c}
.gt-checks{display:grid;grid-template-columns:1fr 1fr;gap:7px 16px;margin-top:6px}
.gt-checks .check{display:flex;align-items:center;gap:8px;margin:0;font-size:13px}
.gt-checks .check input{flex:0 0 auto;margin:0}
.pm-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow:auto;padding:2px}
.pm-group{border:1px solid var(--line);border-radius:9px;padding:8px 10px}
.pm-hab{display:flex;align-items:flex-start;gap:8px;margin:0;font-size:13px}
.pm-cod{font-size:10px;color:#8a938c;background:rgba(127,127,127,.1);border-radius:6px;padding:1px 6px;margin-left:auto}
.pm-subs{margin:6px 0 0 24px;display:flex;flex-direction:column;gap:4px}
.pm-sub{display:flex;align-items:flex-start;gap:8px;margin:0;font-size:12.5px;color:var(--ink-soft)}
.bim-n{width:54px;padding:5px;border:1px solid var(--line);border-radius:7px;text-align:center}
.bim-saldo{margin-top:10px;font-size:13px}
/* editor de ordem do PDF */
.rel-list{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow:auto;padding:2px}
.rel-row{display:flex;align-items:center;gap:8px}
.rel-row .rel-up{display:flex;gap:3px;flex:0 0 auto}
.rel-row .rel-up button{padding:2px 8px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;color:var(--ink)}
.rel-row .rel-up button:disabled{opacity:.3;cursor:default}
.rel-lbl{flex:1;padding:5px 9px;border:1px solid var(--line);border-radius:7px;font-size:13px}
/* mapa mental interativo na projeção */
.mmint{width:100%;max-width:1100px;text-align:left;font-size:calc(var(--proj-fs,30px)*0.62);line-height:1.35}
.mm-radial{width:100%;max-width:1200px;display:flex;flex-direction:column;align-items:center;text-align:center}
.mm-center{display:inline-block;font-weight:bold;font-size:calc(var(--proj-fs,30px)*0.7);padding:.5em 1em;border:2px solid currentColor;border-radius:999px;margin-bottom:0}
.mm-center::after{content:'';display:block;width:2px;height:22px;background:currentColor;opacity:.5;margin:0 auto}
.mm-branches{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;border-top:2px solid currentColor;border-color:rgba(128,128,128,.4);padding-top:0;position:relative;width:100%}
.mm-branch{display:flex;flex-direction:column;align-items:center;flex:1 1 180px;max-width:260px;padding-top:18px;position:relative}
.mm-branch::before{content:'';position:absolute;top:-2px;left:50%;width:2px;height:18px;background:currentColor;opacity:.5}
.mm-branch-h{font-weight:bold;font-size:calc(var(--proj-fs,30px)*0.5);margin-bottom:6px}
.mm-leaves{list-style:none;margin:0;padding:0;font-size:calc(var(--proj-fs,30px)*0.4);opacity:.9}
.mm-leaves li{margin-bottom:4px}
.dash-empty{opacity:.6}
.mmi-node{margin:2px 0}
.mmi-head{display:flex;gap:10px;align-items:flex-start;padding:6px 12px;border-radius:9px}
.mmi-head.has{cursor:pointer}
.mmi-head.has:hover{background:rgba(127,127,127,.16)}
.mmi-tg{opacity:.65;width:1em;flex:0 0 auto}
.mmi-dot{opacity:.45;flex:0 0 auto}
.mmi-kids{margin-left:1.3em;border-left:2px solid rgba(127,127,127,.32);padding-left:.7em;margin-top:2px}
.mmi-d0>.mmi-head{font-weight:700;font-size:1.25em;color:var(--ochre)}
.theme-contrast .mmi-d0>.mmi-head{color:#ffd479}
.mmi-d1>.mmi-head{font-weight:600}
table.md{border-collapse:collapse;margin:10px 0;font-size:.8em}
table.md th,table.md td{border:1px solid var(--line);padding:6px 11px;text-align:left;vertical-align:top}
table.md th{background:rgba(127,127,127,.12);font-weight:600}
.proj-canvas table.md{font-size:.62em}
.proj-canvas table.md th,.proj-canvas table.md td{border-color:rgba(255,255,255,.32)}
.proj-canvas table.md th{background:rgba(255,255,255,.10)}

.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;width:100%;max-width:1000px}
.img-grid img{width:100%;border-radius:10px;cursor:pointer;border:2px solid transparent}
.img-grid img:hover{border-color:var(--ochre)}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:14px;padding:3px 10px;font-size:12px;margin:2px 2px;display:inline-block;cursor:pointer}
.chip:hover{border-color:var(--green);color:var(--green)}
.img-grid .pick{position:relative;cursor:pointer}
.img-grid .pick img{width:100%;border-radius:8px;display:block}
.img-grid .pick.sel img{outline:3px solid var(--green);outline-offset:-1px}
.img-grid .pick.sel::after{content:"\2713";position:absolute;top:6px;right:6px;background:var(--green);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.img-grid .pick{position:relative}
.img-grid .pick .fix{position:absolute;bottom:8px;right:8px}
.img-big{max-width:90vw;max-height:74vh;border-radius:12px}

/* Modais / toast */
.modal-bg{position:fixed;inset:0;background:rgba(20,32,31,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal-h h3{font-family:var(--serif);font-size:18px;flex:1}
.modal-b{padding:20px 22px}
.modal-b .field{margin-bottom:14px}
.modal-b label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.modal-b input,.modal-b textarea,.modal-b select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px}
.modal-b textarea.mono{min-height:90px;font-family:ui-monospace,monospace;font-size:12px;resize:vertical}
.modal-b small{color:var(--muted);font-size:12px;display:block;margin-top:5px;line-height:1.4}
.modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.check{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;margin-bottom:7px}
.turma-list .tl{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.turma-list .tl b{flex:1}
.turma-list .tl span{font-size:12px;color:var(--muted)}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:var(--board-fg);padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);max-width:80vw}
.toast.err{background:var(--danger)}
.toast.ok{background:var(--green)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
.spin.dark{border-color:rgba(20,32,31,.25);border-top-color:var(--green)}
@keyframes sp{to{transform:rotate(360deg)}}

@media (max-width:820px){
  .scope{flex-basis:240px}
  .meta-pane{display:none}
  .topbar nav button{padding:7px 10px}
}

function serieCurta(s){ return ({'1ª série EM':'1ª','2ª série EM':'2ª','3ª série EM':'3ª','6º ano':'6º','7º ano':'7º','8º ano':'8º','9º ano':'9º','—':'—'})[s] || s; }
function turmaNome(t){
  if(!t) return '—';

];

  if(localStorage.getItem('leciona_seeded')) return;

function matrizKey(d,s,b){ return d+'|'+s+'|'+b; }
function matrizDoScope(){ return MATRIZ[matrizKey(scope.disc,scope.serie,scope.bim)]||[]; }
function matrizItem(d,s,b,code){ return (MATRIZ[matrizKey(d,s,b)]||[]).find(x=>x.c===code)||null; }

planejamento:`OBJETIVOS DE APRENDIZAGEM:
- Compreender o Projeto Manhattan e o desenvolvimento da bomba atômica.

textoQuadro:`BOMBA ATÔMICA E O NOVO MEDO DO MUNDO

Projeto Manhattan (1942-1945):
- Programa secreto dos EUA para desenvolver a bomba atômica
- Cientistas: Oppenheimer, Fermi, Szilard
- Teste em Los Alamos, Novo México (julho de 1945)

Hiroshima (6 de agosto de 1945):
- Bomba "Little Boy" (urânio) — 140 mil mortos imediatos; milhares depois por radiação

Nagasaki (9 de agosto de 1945):
- Bomba "Fat Man" (plutônio) — 74 mil mortos imediatos
- Japão se rende em 2 de setembro de 1945

Consequências humanitárias:
- Queimaduras, cegueira, câncer, malformações genéticas
- Trauma psicológico coletivo (hibakusha)

O "novo medo":
- Pela primeira vez, a humanidade pode se auto-destruir
- Guerra Fria: corrida armamentista nuclear (EUA x URSS)
- Dissuasão nuclear: "paz" baseada no medo mútuo

Definição: Bomba atômica = arma de destruição em massa que usa fissão nuclear para liberar energia devastadora, capaz de destruir cidades inteiras em segundos.`,
textoAluno:`Bomba atômica e o novo medo do mundo

Em 6 de agosto de 1945, às 8h15, o avião americano "Enola Gay" lançou uma bomba sobre Hiroshima. Em segundos, uma luz mais brilhante que o sol iluminou o céu, seguida por uma onda de calor de milhares de graus. A cidade desapareceu. Cerca de 140 mil pessoas morreram imediatamente. Três dias depois, outra bomba caiu sobre Nagasaki, matando mais 74 mil.

O Projeto Manhattan foi o programa secreto dos EUA para desenvolver a bomba atômica. Começou em 1942, envolveu milhares de cientistas (Oppenheimer, Fermi, Szilard) e custou 2 bilhões de dólares. Oppenheimer, ao ver a explosão, citou o Bhagavad-Gita: "Agora eu me tornei a Morte, a destruidora de mundos."

Os sobreviventes — hibakusha — sofreram queimaduras, cegueira, câncer e malformações genéticas por gerações. A radiação contaminou terra, água e ar por décadas.

Os EUA justificaram o uso da bomba argumentando que aceleraria a rendição do Japão. Porém, historiadores debatem: alguns dizem que o Japão já estava derrotado e que a bomba foi usada para impressionar a URSS, inaugurando a Guerra Fria.

O "novo medo" que a bomba criou foi a capacidade de auto-destruição da humanidade. Durante a Guerra Fria, EUA e URSS acumularam dezenas de milhares de ogivas nucleares. A "paz" foi baseada no medo mútuo: a dissuasão nuclear.

PERGUNTAS DE REFLEXÃO:
1. Os EUA justificaram a bomba atômica como necessária para acabar a guerra. Você concorda?
2. O que significa viver sob "a sombra da bomba"?

REFERÊNCIAS:
HERSEY, John. Hiroshima. New York: Alfred A. Knopf, 1946.
RHODES, Richard. The Making of the Atomic Bomb. New York: Simon & Schuster, 1986.
TAKAKI, Ronald. Hiroshima: Why America Dropped the Atomic Bomb. Boston: Little, Brown, 1995.`,

equências imediatas e de longo prazo."},{"enunciado":"Texto-base: 'Alguns historiadores argumentam que o Japão já estava derrotado em agosto de 1945 e que a bomba atômica foi usada para impressionar a União Soviética.' A afirmação permite inferir que:","alternativas":["A bomba foi necessária militarmente","O uso da bomba teve motivações políticas além da vitória","A URSS não entrou na guerra contra o Japão","O Japão não estava derrotado","A bomba não teve relação com a Guerra Fria"],"correta":1,"comentario":"A alternativa B está correta: o texto sugere motivações políticas além da necessidade militar."}],

'Redemocratização de 1945 e a Constituição de 1946':{
planejamento:`OBJETIVOS DE APRENDIZAGEM:
- Compreender o contexto da redemocratização após a ditadura do Estado Novo.
- Analisar a Constituição de 1946 e seus avanços e limitações.
- Refletir sobre quem tinha e quem não tinha direitos plenos na redemocratização.

RECURSOS: Trechos da Constituição de 1946. Linha do tempo 1945-1946. Charge política do período.

SEQUÊNCIA DIDÁTICA (50 min):
1. INÍCIO (10 min): "A ditadura de Vargas acabou em 1945. O Brasil voltou a ser democracia. Mas quem podia votar?"
2. DESENVOLVIMENTO (25 min): Fim do Estado Novo (outubro de 1945); eleições de 1945; Constituição de 1946 (direitos sociais, liberdades, voto secreto); limitações (analfabetos sem voto, trabalhadores rurais sem direitos, negros com discriminação, indígenas sem terras); Goiás: Pedro Ludovico Teixeira eleito governador (1945).
3. ANÁLISE (10 min): Grupos leem trechos da Constituição de 1946.
4. SÍNTESE (5 min): "A redemocratização de 1945 foi completa ou limitada?"

REFERÊNCIAS:
FAUSTO, Boris. História do Brasil. São Paulo: EDUSP, 2006.
SKIDMORE, Thomas. Brasil: de Getúlio a Castelo. São Paulo: Paz e Terra, 1982.`,
textoQuadro:`REDEMOCRATIZAÇÃO DE 1945 E A CONSTITUIÇÃO DE 1946

Fim do Estado Novo (outubro de 1945):
- Pressões militares e civis contra Vargas
- Vargas renuncia; eleições em dezembro de 1945
- Primeiro pleito direto desde 1930

Constituição de 1946:
- Direitos sociais e liberdades individuais
- Voto secreto e obrigatório
- Separação dos poderes
- Manutenção da CLT (direitos trabalhistas urbanos)

Limitações da redemocratização:
- Analfabetos: sem direito ao voto
- Trabalhadores rurais: sem direitos trabalhistas
- Negros: discriminação racial continuava
- Indígenas: sem reconhecimento de direitos territoriais

Goiás no período:
- Pedro Ludovico Teixeira eleito governador (1945)
- Marcha para o Oeste continuava

Definição: Redemocratização de 1945 = retorno ao regime democrático após o Estado Novo, com avanços em direitos, mas com exclusões sociais que limitaram a democracia plena.`,
textoAluno:`Redemocratização de 1945 e a Constituição de 1946

A ditadura do Estado Novo (1937-1945) chegou ao fim em outubro de 1945, quando Getúlio Vargas foi forçado a renunciar sob pressão de militares e grupos civis. Em dezembro de 1945, o Brasil realizou seu primeiro pleito direto desde 1930. O general Eurico Gaspar Dutra foi eleito presidente, iniciando a Quarta República (1946-1964).

A Constituição de 1946 trouxe avanços importantes: direitos sociais, liberdades individuais, voto secreto e obrigatório, separação dos poderes. A CLT, criada por Vargas em 1943, foi mantida, garantindo direitos aos trabalhadores urbanos (férias, 13º salário, jornada de 8 horas, licença-maternidade).

Porém, a redemocratização tinha limitações sérias. Analfabetos não tinham direito ao voto, excluindo milhões de brasileiros. Trabalhadores rurais não eram cobertos pela CLT. Negros continuavam enfrentando discriminação racial. Indígenas não tinham reconhecimento de direitos territoriais.

Em Goiás, a redemocratização trouxe Pedro Ludovico Teixeira como primeiro governador eleito após o Estado Novo (1945), representando a continuidade do projeto de interiorização e desenvolvimento do estado.

A redemocratização de 1945, portanto, foi um avanço em relação à ditadura, mas não uma democracia completa. Ela manteve estruturas de exclusão que limitavam o acesso a direitos para a maioria da população brasileira.

PERGUNTAS DE REFLEXÃO:
1. Por que a Constituição de 1946 garantia direitos aos trabalhadores urbanos, mas não aos rurais?
2. Quem estava excluído da redemocratização de 1945 e por quê?

REFERÊNCIAS:
FAUSTO, Boris. História do Brasil. São Paulo: EDUSP, 2006.
SKIDMORE, Thomas. Brasil: de Getúlio a Castelo. São Paulo: Paz e Terra, 1982.`,

gabarito:[{"resposta":"1-d, 2-a, 3-c, 4-b","comentario":"Constituição de 1946 = direitos sociais e liberdades. CLT = direitos trabalhistas urbanos. Voto feminino = 1932, participação restrita. Analfabetos = sem direito ao voto."},{"resposta":"redemocratização, CLT, analfabetos, indígenas, Ludovico","comentario":"Redemocratização de 1945. CLT = direitos trabalhistas urbanos. Analfabetos = sem voto. Indígenas = sem terras reconhecidas. Pedro Ludovico Teixeira = governador de Goiás."},{"resposta":"A redemocratização foi limitada porque, apesar de trazer eleições diretas e direitos formais, manteve exclusões sociais. Trabalhadores rurais não tinham direitos trabalhistas, analfabetos não votavam, indígenas não tinham terras, negros enfrentavam discriminação. A democracia existia no papel, mas não na prática para a maioria.","comentario":"A resposta deve identificar as exclusões específicas e mostrar que a redemocratização era formal, não substantiva."},{"resposta":"A imagem revela que a redemocratização de 1945 era um projeto de homens brancos urbanos. O homem de terno votando simboliza o cidadão pleno. Os trabalhadores rurais e mulheres ao fundo representam os excluídos. A frase 'O Brasil volta a ser livre' é contraditória: liberdade para quem?","comentario":"A resposta deve analisar a imagem como documento histórico, identificando o que é mostrado e o que é omitido."},{"resposta":"A distinção reflete a estrutura social dual do Brasil: modernização urbana (indústria, direitos) e arcaísmo rural (latifúndio, trabalho sem direitos). A CLT beneficiava trabalhadores urbanos porque eram mais organizados e necessários para a industrialização. Trabalhadores rurais eram mantidos sem direitos para garantir mão de obra barata para o latifúndio.","comentario":"A resposta deve conectar a distinção legal com a estrutura social: urbanização, industrialização, latifúndio, controle da mão de obra rural."}],
questoes:[{"enunciado":"Texto-base: 'A Constituição de 1946 garantia direitos sociais e liberdades individuais, mas analfabetos não votavam, trabalhadores rurais não tinham direitos trabalhistas e indígenas não tinham terras reconhecidas.' A análise permite concluir que:","alternativas":["A redemocratização de 1945 foi plena e inclusiva","A Constituição de 1946 excluía grupos sociais específicos","Todos os brasileiros tinham os mesmos direitos em 1946","O Brasil não tinha problemas de analfabetismo em 1946","A CLT beneficiava tanto urbanos quanto rurais"],"correta":1,"comentario":"A alternativa B está correta: o texto mostra exclusões (analfabetos, rurais, indígenas)."},{"enunciado":"Texto-base: 'A redemocratização de 1945 foi um avanço em relação à ditadura do Estado Novo, mas não uma democracia completa. Ela manteve estruturas de exclusão que limitavam o acesso a direitos para a maioria da população.' A afirmação permite inferir que:","alternativas":["O Estado Novo era mais democrático que a Quarta República","A redemocratização beneficiava apenas uma minoria da população","A Quarta República não trouxe nenhum avanço","O Brasil era uma democracia plena em 1946","A exclusão social acabou com a redemocratização"],"correta":1,"comentario":"A alternativa B está correta: a democracia era limitada e beneficiava uma minoria."},{"enunciado":"Texto-base: 'Pedro Ludovico Teixeira foi eleito governador de Goiás em 1945, representando a continuidade do projeto de interiorização e desenvolvimento do estado.' O texto permite concluir que:","alternativas":["Goiás rompeu com o projeto varguista após 1945","A redemocratização trouxe mudanças radicais em Goiás","Houve continuidade entre o Estado Novo e o período democrático em Goiás","Pedro Ludovico era opositor de Vargas","Goiás não participou da redemocratização"],"correta":2,"comentario":"A alternativa C está correta: o texto mostra continuidade do projeto de interiorização."},{"enunciado":"Texto-base: 'A CLT, criada em 1943, foi mantida pela Constituição de 1946, garantindo férias, 13º salário e jornada de 8 horas — mas apenas aos trabalhadores urbanos.' A análise permite inferir que:","alternativas":["A CLT beneficiava todos os trabalhadores brasileiros","Trabalhadores rurais eram intencionalmente excluídos dos direitos","A CLT não existia em 1946","O Brasil não tinha trabalhadores rurais em 1946","A Constituição de 1946 acabou com a CLT"],"correta":1,"comentario":"A alternativa B está correta: a CLT era exclusiva dos urbanos, implicando exclusão intencional dos rurais."},{"enunciado":"Texto-base: 'Mulheres tinham direitos políticos ainda restritos na redemocratização de 1945. O voto feminino era recente (1932) e a participação política feminina era mínima.' A afirmação permite concluir que:","alternativas":["As mulheres não tinham direito ao voto em 1945","A participação política feminina era ampla e igualitária","A redemocratização manteve desigualdades de gênero","O voto feminino não existia no Brasil","As mulheres eram maioria no Congresso em 1946"],"correta":2,"comentario":"A alternativa C está correta: apesar do voto feminino (1932), a participação era mínima, indicando desigualdade de gênero."}],
flashcards:[{"frente":"Quando e como acabou o Estado Novo?","verso":"Outubro de 1945: Getúlio Vargas renunciou sob pressão de militares e civis. Eleições diretas em dezembro de 1945 — primeiro pleito desde 1930."},{"frente":"O que foi a Quarta República?","verso":"Período democrático brasileiro entre 1946 e 1964. Iniciou com a Constituição de 1946 e terminou com o golpe militar de 1964."},{"frente":"Quais os avanços da Constituição de 1946?","verso":"Direitos sociais, liberdades individuais, voto secreto e obrigatório, separação dos poderes, manutenção da CLT (direitos trabalhistas urbanos)."},{"frente":"Quais as limitações da redemocratização de 1945?","verso":"Analfabetos sem voto, trabalhadores rurais sem direitos trabalhistas, negros com discriminação racial, indígenas sem terras reconhecidas."},{"frente":"Quem foi Pedro Ludovico Teixeira?","verso":"Primeiro governador eleito de Goiás após o Estado Novo (1945). Representou continuidade do projeto de interiorização e desenvolvimento do estado."},{"frente":"O que é a CLT?","verso":"Consolidação das Leis do Trabalho (1943). Garantia férias, 13º salário, jornada de 8 horas, licença-maternidade — mas apenas aos trabalhadores urbanos."},{"frente":"Por que a redemocratização de 1945 é considerada 'limitada'?","verso":"Porque, apesar de eleições diretas e direitos formais, manteve exclusões sociais. A democracia existia no papel, mas não na prática para a maioria (analfabetos, rurais, negros, indígenas)."},{"frente":"O que a distinção entre trabalhadores urbanos e rurais revela sobre o Brasil?","verso":"Estrutura social dual: modernização urbana (indústria, direitos) e arcaísmo rural (latifúndio, sem direitos). A CLT beneficiava os urbanos para modernizar as cidades sem alterar o campo."}],
mapaMental:`# REDEMOCRATIZAÇÃO DE 1945 E A CONSTITUIÇÃO DE 1946
## Fim do Estado Novo (1945)
- Pressões militares e civis
- Vargas renuncia (outubro de 1945)
- Eleições diretas (dezembro de 1945)
- General Eurico Gaspar Dutra eleito presidente
## Constituição de 1946
### Avanços
- Direitos sociais e liberdades individuais
- Voto secreto e obrigatório
- Manutenção da CLT
### Limitações
- Analfabetos: sem direito ao voto
- Trabalhadores rurais: sem direitos trabalhistas
- Negros: discriminação racial
- Indígenas: sem terras reconhecidas
## Goiás no período
- Pedro Ludovico Teixeira eleito governador (1945)
- Continuidade da Marcha para o Oeste
## Quarta República (1946-1964)
- Período democrático, terminou com o golpe de 1964
## Democracia limitada
- Avanço formal em relação à ditadura
- Beneficiava minoria (homens brancos, letrados, urbanos)`
},
'"Milagre econômico" x arrocho e concentração de renda':{
planejamento:`OBJETIVOS DE APRENDIZAGEM:
- Compreender o "milagre econômico" brasileiro (1968-1973) e seus indicadores.
- Analisar o arrocho salarial como política econômica da ditadura.
- Refletir sobre a concentração de renda e quem se beneficiou do crescimento.

RECURSOS: Gráficos de crescimento do PIB e concentração de renda (1968-1973). Dados sobre salários reais e inflação.

SEQUÊNCIA DIDÁTICA (50 min):
1. INÍCIO (10 min): "É possível crescer economicamente sem distribuir renda?" Alunos respondem.
2. DESENVOLVIMENTO (25 min): "Milagre econômico" (1968-1973): crescimento do PIB acima de 10% ao ano, obras faraônicas (Transamazônica, Ponte Rio-Niterói, Itaipu). Arrocho salarial: congelamento de salários, repressão a greves. Concentração de renda: 1% mais rico acumulava. Crise do petróleo (1973): fim do "milagre".
3. ANÁLISE (10 min): Grupos analisam gráficos: "Quem cresceu? Quem não cresceu?"
4. SÍNTESE (5 min): "O 'milagre' foi para quem?"

REFERÊNCIAS:
BIELSCHOWSKY, Ricardo. Pensamento econômico brasileiro. Rio de Janeiro: IPEA/INPS, 1988.
FAUSTO, Boris. História do Brasil. São Paulo: EDUSP, 2006.`,
textoQuadro:`"MILAGRE ECONÔMICO" X ARROCHO E CONCENTRAÇÃO DE RENDA

"Milagre econômico" (1968-1973):
- Crescimento do PIB acima de 10% ao ano
- Obras faraônicas: Transamazônica, Ponte Rio-Niterói, Itaipu
- Endividamento externo para financiar o crescimento

Arrocho salarial:
- Congelamento de salários
- Repressão a greves e sindicatos
- Salário mínimo perde poder de compra

Concentração de renda:
- 1% mais rico acumulava riqueza
- Trabalhadores e pobres não se beneficiaram

Crise do petróleo (1973):
- Choque do petróleo quadruplicou preços
- Fim do "milagre" e dívida externa insustentável

Contradição:
- Crescimento econômico sem distribuição de renda
- "Milagre" para poucos, miséria para muitos

Definição: Milagre econômico = período de crescimento acelerado do PIB (1968-1973) baseado em endividamento externo, arrocho salarial e repressão, que beneficiou uma elite e agravou a concentração de renda.`,
textoAluno:`"Milagre econômico" x arrocho e concentração de renda

Entre 1968 e 1973, o Brasil viveu o período de crescimento econômico mais acelerado de sua história. O PIB crescia mais de 10% ao ano, a industrialização avançava, e obras como a Transamazônica, a Ponte Rio-Niterói e a usina de Itaipu simbolizavam a "grandeza" do país. A ditadura chamou esse período de "milagre econômico". Mas era milagre para quem?

O crescimento foi financiado por endividamento externo. O Brasil pegava empréstimos no exterior para investir em infraestrutura e indústria. Essa estratégia funcionou enquanto os juros internacionais eram baixos — mas não duraria para sempre.

Para garantir o crescimento, a ditadura impôs o arrocho salarial. Salários foram congelados, greves foram reprimidas com violência, e sindicatos foram controlados pelo Estado. O salário mínimo perdeu poder de compra ao longo dos anos. Trabalhadores não podiam reivindicar melhores condições sem serem acusados de "subversão".

O resultado foi uma concentração de renda extrema. O 1% mais rico acumulava a maior parte dos benefícios do crescimento. Os trabalhadores rurais e urbanos, os pobres e as periferias não viram melhoria em suas condições de vida.

Em 1973, o choque do petróleo acabou com o "milagre". O Brasil, dependente de importação de petróleo, viu suas contas externas desmoronarem. A dívida externa tornou-se insustentável.

O "milagre econômico" da ditadura foi crescimento sem distribuição. Foi modernização para uma elite, endividamento para o país, e miséria para a maioria.

PERGUNTAS DE REFLEXÃO:
1. Por que a ditadura reprimia sindicatos e greves durante o "milagre econômico"?
2. O que o fim do "milagre" com o choque do petróleo revela sobre a fragilidade do modelo econômico da ditadura?

REFERÊNCIAS:
BIELSCHOWSKY, Ricardo. Pensamento econômico brasileiro. Rio de Janeiro: IPEA/INPS, 1988.
FAUSTO, Boris. História do Brasil. São Paulo: EDUSP, 2006.`,

gabarito:[{"resposta":"1-b, 2-a, 3-c, 4-d","comentario":"Milagre econômico = crescimento acelerado do PIB. Arrocho salarial = congelamento de salários. Choque do petróleo = fim do crescimento. Concentração de renda = acúmulo pelo 1%."},{"resposta":"arrocho, Transamazônica, Itaipu, petróleo, concentração","comentario":"Arrocho salarial = congelamento. Transamazônica = obra na Amazônia. Itaipu = usina hidrelétrica. Choque do petróleo = 1973. Concentração de renda = aumentou na ditadura."},{"resposta":"A contradição é que o crescimento do PIB coexistia com a piora das condições de vida dos trabalhadores. O crescimento era financiado por dívida externa, mas os benefícios iam para uma elite, enquanto os custos eram pagos pelos trabalhadores que não podiam reivindicar por medo da repressão.","comentario":"A resposta deve identificar a contradição entre crescimento do PIB e queda do salário mínimo. A dívida externa e a repressão sindical são elementos centrais."},{"resposta":"O gráfico revela a contradição do 'milagre': enquanto o PIB crescia rapidamente, o salário mínimo real caía. O 'milagre' era para o PIB, não para o povo.","comentario":"A resposta deve interpretar o gráfico mostrando a divergência entre crescimento econômico e queda do poder de compra."},{"resposta":"Benefícios: crescimento acelerado do PIB, industrialização, obras de infraestrutura, modernização da indústria. Custos: arrocho salarial, concentração de renda, endividamento externo, miséria para trabalhadores e pobres. O modelo desmoronou com o choque do petróleo de 1973.","comentario":"A resposta deve equilibrar benefícios e custos, mostrando que o modelo era insustentável e injusto."}],

que:","alternativas":["A concentração de renda diminuiu durante a ditadura","O crescimento foi acompanhado de distribuição de renda","O 'milagre econômico' beneficiou principalmente uma elite","A classe média não cresceu no período","Todos os brasileiros se beneficiaram igualmente"],"correta":2,"comentario":"A alternativa C está correta: o 1% mais rico acumulava os benefícios."},{"enunciado":"Texto-base: 'O milagre econômico foi modernização para uma elite, endividamento para o país, e miséria para a maioria.' A afirmação permite inferir que:","alternativas":["O crescimento foi neutro e sem custos sociais","O modelo econômico da ditadura era excludente e concentrador","A dívida externa não existia no período","A maioria da população se beneficiou","A elite não se beneficiou do 'milagre'"],"correta":1,"comentario":"A alternativa B está correta: o modelo beneficiava elite, endividava o país e excluía a maioria."}],

'Resistências: estudantes, artistas, Igreja e mulheres':{
planejamento:`OBJETIVOS DE APRENDIZAGEM:
- Compreender as diferentes formas de resistência à ditadura militar.
- Analisar o papel de estudantes, artistas, Igreja progressista e mulheres.
- Refletir sobre como a resistência contribuiu para a redemocratização.

RECURSOS: Fotos de manifestações estudantis (1968). Músicas censuradas da época. Documentos da Igreja progressista.

SEQUÊNCIA DIDÁTICA (50 min):
1. INÍCIO (10 min): "Como resistir a uma ditadura que prende, tortura e mata?" Alunos respondem.
2. DESENVOLVIMENTO (25 min): Estudantes: passeatas de 1968 (Manifesto dos Cem Mil), UNE clandestina. Artistas: Tropicalismo (Caetano, Gil), Chico Buarque. Igreja progressista: CEBs, dom Helder Câmara, Teologia da Libertação. Mulheres: presas políticas, mães e familiares, luta pela Anistia.
3. ANÁLISE (10 min): Grupos ouvem trecho de música censurada.
4. SÍNTESE (5 min): "Qual a importância da resistência para a redemocratização?"

REFERÊNCIAS:
ALVES, Maria Helena Moreira. Estado e oposição no Brasil. Petrópolis: Vozes, 1984.
COMISSÃO NACIONAL DA VERDADE. Relatório final. Brasília: CNV, 2014.`,
textoQuadro:`RESISTÊNCIAS: ESTUDANTES, ARTISTAS, IGREJA E MULHERES

Estudantes:
- 1968: Manifesto dos Cem Mil (Rio de Janeiro)
- UNE (União Nacional dos Estudantes) na clandestinidade
- Greves universitárias e passeatas

Artistas:
- Tropicalismo: Caetano Veloso, Gilberto Gil
- Chico Buarque: músicas com duplos sentidos ("Apesar de Você")
- Exílio de Caetano e Gil (1969)

Igreja progressista:
- CEBs (Comunidades Eclesiais de Base)
- Dom Helder Câmara: "Quando dou comida aos pobres, chamam-me de santo; quando pergunto por que são pobres, chamam-me de comunista"
- Comissão de Justiça e Paz: denúncia de tortura

Mulheres:
- Presas políticas e torturadas (violência sexual como arma)
- Mães e familiares denunciando desaparecimentos
- Luta pela Anistia (1979)

Definição: Resistência à ditadura = conjunto de ações de estudantes, artistas, religiosos e mulheres que desafiaram a repressão e contribuíram para a redemocratização.`,
textoAluno:`Resistências: estudantes, artistas, Igreja e mulheres

A ditadura militar brasileira (1964-1985) foi um período de repressão extrema, mas também de resistência corajosa. Diversos setores da sociedade desafiaram o regime, muitas vezes pagando com a prisão, o exílio ou a vida.

Os estudantes foram protagonistas da resistência desde o início. Em 1968, organizaram o Manifesto dos Cem Mil, uma passeata no Rio de Janeiro que reuniu cerca de 100 mil pessoas contra a ditadura. A UNE foi fechada e entrou na clandestinidade. Mesmo assim, estudantes continuaram organizando greves, passeatas e publicações clandestinas.

Os artistas resistiram através da Tropicália. Caetano Veloso e Gilberto Gil criaram uma música que desafiava a censura. A música "Alegria, Alegria" (1968) foi um manifesto contra o autoritarismo. Caetano e Gil foram presos em 1968 e exilados em 1969. Chico Buarque usou duplos sentidos para criticar a ditadura — "Apesar de Você" parece falar de amor, mas é sobre resistência política.

A Igreja Católica progressista foi uma das vozes mais importantes contra a repressão. Os CEBs, inspirados na Teologia da Libertação, uniam fé e luta por justiça social. Dom Helder Câmara denunciava a violência contra os pobres. A Comissão de Justiça e Paz documentou casos de tortura, denunciando-os internacionalmente.

As mulheres resistiram de múltiplas formas. Muitas foram presas políticas e torturadas, sofrendo violência sexual como arma de repressão. Mães e familiares de desaparecidos organizaram grupos de denúncia. A luta pela Anistia (1979) teve participação feminina importante.

Essas resistências mantiveram viva a chama da oposição, criaram cultura de resistência e prepararam o terreno para a redemocratização.

PERGUNTAS DE REFLEXÃO:
1. Como a arte pode ser uma forma de resistência política?
2. Por que a Igreja progressista foi tão importante na denúncia da ditadura?

REFERÊNCIAS:
ALVES, Maria Helena Moreira. Estado e oposição no Brasil. Petrópolis: Vozes, 1984.
COMISSÃO NACIONAL DA VERDADE. Relatório final. Brasília: CNV, 2014.`,
slides:[{"titulo":"Estudantes na resistência","topicos":["1968: Manifesto dos Cem Mil (Rio)","Passeatas contra a ditadura","UNE na clandestinidade","Greves universitárias","Repressão brutal contra estudantes"]},{"titulo":"Artistas e a Tropicália","topicos":["Caetano Veloso e Gilberto Gil","'Alegria, Alegria': manifesto contra censura","Prisão e exílio de Caetano e Gil (1969)","Chico Buarque: duplos sentidos como resistência"]},{"titulo":"Igreja progressista","topicos":["CEBs: Comunidades Eclesiais de Base","Dom Helder Câmara (Recife)","Teologia da Libertação: fé e justiça social","Comissão de Justiça e Paz: denúncia de tortura"]},{"titulo":"Mulheres na resistência","topicos":["Presas políticas e torturadas","Violência sexual como arma de repressão","Mães e familiares denunciando desaparecimentos","Luta pela Anistia (1979)"]},{"titulo":"Importância da resistência","topicos":["Manteve viva a oposição à ditadura","Denúncia nacional e internacional","Criou cultura de resistência","Preparou terreno para redemocratização"]}],
atividade:[{"enunciado":"Relacione as colunas: (1) Estudantes; (2) Caetano Veloso e Gil; (3) Dom Helder Câmara; (4) Mães de desaparecidos. Com: (a) Denúncia de tortura e desaparecimentos; (b) Manifesto dos Cem Mil e greves; (c) Tropicália e exílio; (d) Pressão internacional e luta por respostas."},{"enunciado":"Complete: Tropicália, Cem Mil, Helder, Anistia, CEBs. O Manifesto dos _______ foi uma passeata estudantil de 1968. A _______ foi o movimento musical de Caetano e Gil. Dom _______ Câmara foi o arcebispo de Recife. As Comunidades Eclesiais de Base eram chamadas de _______. A luta pela _______ (1979) teve participação feminina importante."},{"enunciado":"Analise: 'Quando dou comida aos pobres, chamam-me de santo; quando pergunto por que são pobres, chamam-me de comunista.' (Dom Helder Câmara). Explique por que a Igreja progressista foi vista como ameaça pela ditadura."},{"enunciado":"Leia a descrição: 'Foto de 1968 mostra estudantes em passeata no Rio de Janeiro segurando faixas contra a ditadura. Ao fundo, policiais militares em formação com cassetetes.' Descreva o que a imagem representa sobre a resistência estudantil."},{"enunciado":"Discursiva: Chico Buarque usou 'duplos sentidos' em suas músicas para criticar a ditadura. Explique como isso funcionava e por que a arte era uma forma poderosa de resistência."}],
gabarito:[{"resposta":"1-b, 2-c, 3-a, 4-d","comentario":"Estudantes = Manifesto dos Cem Mil. Caetano e Gil = Tropicália e exílio. Dom Helder Câmara = denúncia de tortura. Mães de desaparecidos = pressão internacional."},{"resposta":"Cem Mil, Tropicália, Helder, CEBs, Anistia","comentario":"Manifesto dos Cem Mil = passeata estudantil. Tropicália = movimento musical. Dom Helder Câmara = arcebispo de Recife. CEBs = Comunidades Eclesiais de Base. Anistia = luta de 1979."},{"resposta":"A Igreja progressista foi vista como ameaça porque, além de assistir os pobres, questionava as causas estruturais da pobreza e denunciava a violência da ditadura. A Teologia da Libertação organizava comunidades pobres, criando consciência política. Para a ditadura, isso era 'subversão' — transformar caridade em justiça social.","comentario":"A resposta deve mostrar que a Igreja progressista ia além da caridade: questionava causas estruturais e denunciava a repressão."},{"resposta":"A imagem representa a coragem da resistência estudantil: jovens enfrentando a repressão armada com passeatas pacíficas. A contraposição entre estudantes desarmados e policiais com cassetetes mostra o desequilíbrio de forças. Captura um momento histórico de mobilização popular.","comentario":"A resposta deve analisar a imagem como documento histórico, destacando a coragem dos estudantes e o desequilíbrio de forças."},{"resposta":"Chico Buarque usava metáforas e ambiguidades para que suas músicas passassem pela censura. 'Apesar de Você' parece falar de amor, mas critica a ditadura. A arte era poderosa porque transformava crítica política em beleza estética, alcançando públicos amplos e criando identificação emocional.","comentario":"A resposta deve explicar o mecanismo dos duplos sentidos e por que a arte era eficaz."}],

 como presas e como ativistas","As famílias não se mobilizaram","O movimento feminista não existia na ditadura"],"correta":2,"comentario":"A alternativa C está correta: mulheres como presas e como ativistas."},{"enunciado":"Texto-base: 'Essas resistências, embora fragmentadas e reprimidas, mantiveram viva a chama da oposição e prepararam o terreno para a redemocratização.' A afirmação permite concluir que:","alternativas":["A resistência não teve efeito na redemocratização","A ditadura caiu sem qualquer oposição","A resistência contribuiu para a transição democrática","A redemocratização foi apenas resultado de decisões militares","A sociedade brasileira foi passiva durante a ditadura"],"correta":2,"comentario":"A alternativa C está correta: a resistência preparou o terreno para a redemocratização."}],
flashcards:[{"frente":"O que foi o Manifesto dos Cem Mil?","verso":"Passeata estudantil de 1968 no Rio de Janeiro, com cerca de 100 mil pessoas contra a ditadura. Um dos maiores atos de resistência ao regime militar."},{"frente":"O que foi a Tropicália?","verso":"Movimento cultural de resistência liderado por Caetano Veloso e Gilberto Gil. Misturava tradição brasileira com vanguarda. Caetano e Gil foram presos e exilados (1969)."},{"frente":"Como Chico Buarque resistiu à ditadura?","verso":"Usou duplos sentidos e metáforas. 'Apesar de Você' parece falar de amor, mas critica o regime. Dezenas de músicas foram censuradas."},{"frente":"Quem foi Dom Helder Câmara?","verso":"Arcebispo de Recife, líder da Igreja progressista. Denunciou violência contra pobres e repressão política. Frase famosa sobre 'dar comida' vs. 'perguntar por que são pobres'."},{"frente":"O que eram as CEBs?","verso":"Comunidades Eclesiais de Base. Grupos de fiéis inspirados na Teologia da Libertação que uniam fé e luta por justiça social."},{"frente":"Qual o papel das mulheres na resistência?","verso":"Presas políticas e torturadas (com violência sexual). Mães e familiares denunciaram desaparecimentos internacionalmente. Luta pela Anistia (1979)."},{"frente":"Como a arte foi resistência na ditadura?","verso":"Música, teatro e cinema usaram metáforas e duplos sentidos para criticar o regime. A arte alcançava públicos amplos e criava identificação emocional com a resistência."},{"frente":"Qual a importância da resistência para a redemocratização?","verso":"Manteve viva a oposição, denunciou a ditadura no Brasil e no exterior, criou cultura de resistência e preparou o terreno para a transição democrática."}],

'Anistia, Diretas Já e heranças no presente':{
planejamento:`OBJETIVOS DE APRENDIZAGEM:
- Compreender o processo de Anistia (1979) e suas limitações.
- Analisar o movimento Diretas Já (1984) e sua importância para a redemocratização.
- Refletir sobre as heranças da ditadura no presente brasileiro.

RECURSOS: Trecho do documentário sobre Diretas Já. Fotos das passeatas de 1984. Trechos da Lei de Anistia.

SEQUÊNCIA DIDÁTICA (50 min):
1. INÍCIO (10 min): "Como uma ditadura de 21 anos chega ao fim?" Alunos respondem.
2. DESENVOLVIMENTO (25 min): Anistia (1979): perdoou "crimes políticos" mas não puniu torturadores. Crise econômica: dívida, inflação, recessão. Diretas Já (1984): comícios massivos, emenda rejeitada. Tancredo Neves (1985): eleição indireta, morre antes de tomar posse; Sarney assume. Constituição de 1988: "Constituição Cidadã". Heranças: impunidade, desigualdade, militarização.
3. ANÁLISE (10 min): "A redemocratização brasileira foi completa? O que ficou pendente?"
4. SÍNTESE (5 min): "Quais heranças da ditadura persistem no Brasil de hoje?"

REFERÊNCIAS:
SKIDMORE, Thomas. Brasil: de Castelo a Tancredo. São Paulo: Paz e Terra, 1988.
COMISSÃO NACIONAL DA VERDADE. Relatório final. Brasília: CNV, 2014.`,
textoQuadro:`ANISTIA, DIRETAS JÁ E HERANÇAS NO PRESENTE

Anistia (1979):
- Lei de Anistia de Figueiredo
- Perdoou "crimes políticos" (presos, exilados)
- Não puniu torturadores e agentes da repressão
- Limitação grave: impunidade dos crimes da ditadura

Crise econômica (década de 1980):
- Dívida externa, inflação e recessão
- Fim do "milagre" e descontentamento popular

Diretas Já (1984):
- Movimento popular por eleições diretas para presidente
- Comícios massivos em todo o Brasil
- Emenda rejeitada pelo Congresso

Redemocratização (1985-1988):
- Tancredo Neves eleito indiretamente — morre antes de tomar posse
- José Sarney assume a presidência
- Constituição de 1988: "Constituição Cidadã"

Heranças no presente:
- Impunidade dos torturadores (nenhum condenado no Brasil)
- Desigualdade social e econômica
- Militarização das polícias e periferias
- Cultura do autoritarismo e negacionismo histórico

Definição: Redemocratização brasileira = transição da ditadura para a democracia (1979-1988), com avanços (Constituição de 1988) e limitações (impunidade, heranças autoritárias) que persistem até hoje.`,
textoAluno:`Anistia, Diretas Já e heranças no presente

A redemocratização brasileira não foi um evento único, mas um processo longo e contraditório. Começou com a Anistia de 1979, passou pelo movimento Diretas Já em 1984, e culminou com a Constituição de 1988.

A Lei de Anistia (1979), decretada pelo presidente Figueiredo, perdoou os "crimes políticos" cometidos entre 1961 e 1979. Isso permitiu o retorno de exilados e o fim da clandestinidade para muitos militantes. Porém, a Anistia tinha uma limitação grave: não puniu os torturadores e agentes da repressão. A lei criou uma cultura de impunidade que persiste até hoje: no Brasil, nenhum torturador da ditadura foi condenado pela Justiça.

A década de 1980 foi marcada por crise econômica. A dívida externa, acumulada durante o "milagre econômico", tornou-se insustentável. A inflação galopante destruía salários. O descontentamento popular alimentou a pressão por democracia.

Em 1984, explodiu o movimento Diretas Já — mobilização popular massiva por eleições diretas para presidente. Comícios gigantescos reuniram milhões de pessoas. Porém, o Congresso, dominado por remanescentes da ditadura, rejeitou a emenda das Diretas.

Tancredo Neves foi eleito presidente em 1985 pelo Colégio Eleitoral. Tancredo simbolizava a esperança de uma nova era, mas morreu antes de tomar posse. José Sarney assumiu.

A Constituição de 1988, a "Constituição Cidadã", consolidou a democracia com direitos sociais, liberdades individuais, voto direto, proteção ao trabalhador e direitos indígenas.

As heranças da ditadura persistem no presente: impunidade dos torturadores, desigualdade social agravada, militarização das polícias, cultura do autoritarismo e negacionismo histórico. A redemocratização foi um avanço, mas incompleta.

PERGUNTAS DE REFLEXÃO:
1. Por que a Anistia de 1979 é considerada limitada e controversa?
2. Quais heranças da ditadura você identifica no Brasil de hoje?

REFERÊNCIAS:
SKIDMORE, Thomas. Brasil: de Castelo a Tancredo. São Paulo: Paz e Terra, 1988.
COMISSÃO NACIONAL DA VERDADE. Relatório final. Brasília: CNV, 2014.`,

atividade:[{"enunciado":"Relacione as colunas: (1) Anistia (1979); (2) Diretas Já (1984); (3) Tancredo Neves (1985); (4) Constituição de 1988. Com: (a) 'Constituição Cidadã'; (b) Movimento por eleições diretas; (c) Perdoou crimes políticos, mas não puniu torturadores; (d) Eleição indireta pelo Colégio Eleitoral."},{"enunciado":"Complete: Anistia, Diretas, Tancredo, impunidade, heranças. A _______ de 1979 perdoou crimes políticos, mas não puniu torturadores. O movimento _______ Já exigia eleições diretas em 1984. _______ Neves foi eleito em 1985, mas morreu antes de tomar posse. A não punição dos torturadores criou uma cultura de _______. As _______ da ditadura persistem no Brasil de hoje."},{"enunciado":"Analise: 'A Anistia perdoou os crimes dos opositores, mas também, de forma implícita, perdoou os crimes dos agentes do Estado. No Brasil, nenhum torturador da ditadura foi condenado.' Explique por que a Anistia de 1979 é considerada controversa."},{"enunciado":"Leia a descrição: 'Foto de 1984 mostra multidão em comício do Diretas Já em São Paulo: pessoas de todas as idades, com faixas e bandeiras, sob uma chuva fina.' Descreva o que a imagem representa sobre o movimento Diretas Já."},{"enunciado":"Discursiva: A redemocratização brasileira é frequentemente celebrada como vitória da democracia. Porém, muitas heranças da ditadura persistem. Analise os avanços e as limitações da transição democrática brasileira."}],
gabarito:[{"resposta":"1-c, 2-b, 3-d, 4-a","comentario":"Anistia = perdoou crimes políticos, não puniu torturadores. Diretas Já = movimento por eleições diretas. Tancredo Neves = eleição indireta. Constituição de 1988 = 'Constituição Cidadã'."},{"resposta":"Anistia, Diretas, Tancredo, impunidade, heranças","comentario":"Anistia = 1979. Diretas Já = 1984. Tancredo Neves = eleito 1985. Impunidade = não punição de torturadores. Heranças = persistem no presente."},{"resposta":"A Anistia é controversa porque, ao perdoar 'crimes políticos' de ambos os lados, acabou beneficiando também os agentes da repressão. O resultado foi impunidade: torturadores nunca foram julgados no Brasil, ao contrário de países como Argentina e Chile. A Anistia permitiu a reintegração de opositores, mas selou o esquecimento dos crimes da ditadura.","comentario":"A resposta deve mostrar a ambiguidade da Anistia: perdoou opositores (positivo) e agentes da repressão (negativo). A impunidade como consequência é central."},{"resposta":"A imagem representa a mobilização massiva e diversificada do Diretas Já. Pessoas de todas as idades, sob chuva, mostram determinação. A presença de faixas e bandeiras indica a organização da sociedade civil. É uma imagem de esperança e resistência popular exigindo democracia.","comentario":"A resposta deve analisar a diversidade social, a determinação mesmo com chuva e a dimensão emocional e política do movimento."},{"resposta":"Avanços: abertura política, fim da censura, eleições diretas (a partir de 1989), Constituição de 1988 com amplos direitos. Limitações: impunidade dos torturadores, desigualdade social não desmontada, militarização das polícias, cultura do autoritarismo persistente. A transição foi negociada, não ruptura — preservou estruturas de poder da ditadura.","comentario":"A resposta deve equilibrar avanços e limitações, mostrando que a transição foi incompleta."}],
questoes:[{"enunciado":"Texto-base: 'A Lei de Anistia (1979) perdoou os crimes políticos, mas não puniu torturadores e agentes da repressão. No Brasil, nenhum torturador da ditadura foi condenado.' A análise permite concluir que:","alternativas":["A Anistia puniu todos os responsáveis pela repressão","A Anistia criou uma cultura de impunidade para os agentes do Estado","A Anistia não beneficiou os opositores","Os torturadores foram julgados após a Anistia","A Anistia impediu o retorno dos exilados"],"correta":1,"comentario":"A alternativa B está correta: a não punição dos torturadores criou impunidade."},{"enunciado":"Texto-base: 'O movimento Diretas Já reuniu milhões de pessoas em comícios por todo o Brasil em 1984, exigindo eleições diretas para presidente.' A afirmação permite concluir que:","alternativas":["A sociedade brasileira era indiferente à ditadura","O movimento Diretas Já foi um ato de mobilização popular massiva","As eleições diretas foram aprovadas em 1984","O Congresso apoiou a emenda das Diretas","A ditadura já havia terminado em 1984"],"correta":1,"comentario":"A alternativa B está correta: a mobilização foi massiva, com milhões em todo o Brasil."},{"enunciado":"Texto-base: 'Tancredo Neves foi eleito presidente em 1985 pelo Colégio Eleitoral, mas morreu antes de tomar posse. José Sarney assumiu.' A análise do texto permite inferir que:","alternativas":["A redemocratização começou com eleições diretas","A transição democrática foi livre de contradições","A redemocratização foi marcada por continuidades e imprevistos","Sarney foi eleito diretamente pelo povo","Tancredo tomou posse normalmente"],"correta":2,"comentario":"A alternativa C está correta: eleição indireta e morte de Tancredo mostram continuidades e imprevistos."},{"enunciado":"Texto-base: 'As heranças da ditadura persistem no presente: impunidade dos torturadores, desigualdade, militarização das polícias e cultura do autoritarismo.' A afirmação permite concluir que:","alternativas":["A redemocratização eliminou completamente o legado da ditadura","O Brasil fez plena justiça transicional","A ditadura deixou marcas que persistem no presente","A impunidade não existe no Brasil atual","A redemocratização resolveu todas as desigualdades"],"correta":2,"comentario":"A alternativa C está correta: o texto mostra heranças persistentes."},{"enunciado":"Texto-base: 'A Constituição de 1988, chamada de Constituição Cidadã, garantiu direitos sociais, liberdades individuais e voto direto.' A análise permite concluir que:","alternativas":["A Constituição de 1988 manteve a ditadura","A Constituição não trouxe avanços","A Constituição de 1988 representou avanço democrático significativo","A Constituição não garantia voto direto","Os direitos sociais foram eliminados em 1988"],"correta":2,"comentario":"A alternativa C está correta: a Constituição de 1988 representou avanço democrático."}],
flashcards:[{"frente":"O que foi a Lei de Anistia (1979)?","verso":"Lei decretada por Figueiredo que perdoou 'crimes políticos' de 1961-1979. Permitiu retorno de exilados. Limitação grave: não puniu torturadores — nenhum foi condenado no Brasil."},{"frente":"O que foi o movimento Diretas Já?","verso":"Mobilização popular massiva de 1984 por eleições diretas para presidente. Comícios com milhões de pessoas em todo o Brasil. A emenda foi rejeitada pelo Congresso — eleição de 1985 foi indireta."},{"frente":"Como terminou a ditadura militar no Brasil?","verso":"Processo gradual: Anistia (1979), abertura política, Diretas Já (1984), eleição indireta de Tancredo (1985), morte de Tancredo, Sarney assume, Constituição de 1988."},{"frente":"O que foi a Constituição de 1988?","verso":"'Constituição Cidadã'. Consolidou a democracia com direitos sociais, liberdades individuais, voto direto, proteção ao trabalhador, direitos indígenas e ambientais."},{"frente":"Quais as heranças da ditadura no presente?","verso":"Impunidade dos torturadores, desigualdade social e econômica, militarização das polícias, cultura do autoritarismo e negacionismo histórico."},{"frente":"Por que a redemocratização brasileira é considerada 'incompleta'?","verso":"Porque não fez justiça às vítimas (nenhum torturador condenado), não desmontou estruturas de desigualdade e não impediu o ressurgimento do autoritarismo."},{"frente":"O que diferencia a transição brasileira da Argentina e do Chile?","verso":"Argentina e Chile julgaram e condenaram criminosos das ditaduras. O Brasil manteve a impunidade por meio da Lei de Anistia, que protegeu os agentes da repressão."},{"frente":"Por que conhecer a história da ditadura é importante hoje?","verso":"Para defender a democracia no presente, reconhecer práticas autoritárias quando surgem, fazer justiça às vítimas e construir uma sociedade mais igualitária."}],
mapaMental:`# ANISTIA, DIRETAS JÁ E HERANÇAS NO PRESENTE
## Anistia (1979)
- Perdoou crimes políticos
- Não puniu torturadores
- Impunidade como herança
## Crise econômica (1980s)
- Dívida externa
- Inflação galopante
- Descontentamento popular
## Diretas Já (1984)
- Comícios massivos
- Emenda rejeitada
- Mobilização histórica
## Redemocratização (1985-1988)
- Tancredo Neves (morre antes de tomar posse)
- José Sarney assume
- Constituição de 1988: "Constituição Cidadã"
## Heranças no presente
- Impunidade dos torturadores
- Desigualdade social
- Militarização das polícias
- Cultura do autoritarismo
## Lição
- Avanço incompleto
- Conhecer a história para defender a democracia`
}

'Crise do Império e queda da Monarquia':{
planejamento:`OBJETIVOS: Compreender as crises que enfraqueceram o Império; analisar abolicionismo e republicanismo; refletir sobre quem pagou o preço da mudança.

SEQUÊNCIA (50 min):
1. INÍCIO (5 min): "O que é uma monarquia? Quem manda? Quem obedece?"
2. CONTEXTUALIZAÇÃO (10 min): Crise econômica (endividamento, queda do café, Guerra do Paraguai), Questão Religiosa (1872-1875).
3. ANÁLISE (15 min): Abolicionismo — José do Patrocínio, Joaquim Nabuco. Republicanismo — Benjamin Constant, Rui Barbosa.
4. LEITURA (12 min): Machado de Assis — sátira à sociedade imperial.
5. SÍNTESE (8 min): "Por que a monarquia perdeu apoio?"

AVALIAÇÃO: Participação e qualidade da síntese.

REFERÊNCIAS:
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
CARVALHO, José Murilo de. A construção da ordem. Rio de Janeiro: Campus, 1980.
SCHWARCZ, Lilia Moritz. As barbas do imperador. São Paulo: Companhia das Letras, 1998.`,
textoQuadro:`CRISE DO IMPÉRIO E QUEDA DA MONARQUIA

Império em crise (1880s):
- Endividamento externo, queda do café, custos da Guerra do Paraguai
- Questão Religiosa: conflito Estado x Igreja (1872-1875) — divide a elite

Abolicionismo:
- José do Patrocínio, Joaquim Nabuco
- Lei Áurea (1888): abolição SEM indenizar senhores → elite rural irrita

Republicanismo:
- Benjamin Constant, Rui Barbosa
- Militares insatisfeitos — aderem ao movimento

Dom Pedro II: ilustrado, mas distante das massas

Queda: 15/11/1889 — golpe militar, sem resistência popular

Definição: As elites abandonaram a monarquia; não houve revolução popular.`,
textoAluno:`Crise do Império e queda da Monarquia

O Brasil Imperial manteve uma monarquia constitucional que carregava contradições profundas. Na década de 1880, essas contradições se acumularam até provocar a queda do regime.

A crise econômica foi o primeiro fator. O Império estava endividado com bancos ingleses, a queda dos preços do café reduziu as receitas do Estado, e a Guerra do Paraguai (1864-1870) deixou um rombo nas finanças. A elite cafeeira começou a questionar se a monarquia ainda lhe servia.

A Questão Religiosa (1872-1875) enfraqueceu o Estado ao dividir a elite entre defensores do governo e da Igreja.

O abolicionismo ganhou força. José do Patrocínio e Joaquim Nabuco denunciavam que o Brasil não poderia ser moderno e escravista. A Lei Áurea de 1888 aboliu a escravidão, mas não indenizou os senhores — o que irritou profundamente a elite rural.

O republicanismo, liderado por Benjamin Constant e Rui Barbosa, propunha ruptura. Os militares, insatisfeitos com a hierarquia e o tratamento aos veteranos do Paraguai, aderiram ao movimento.

A monarquia caiu não porque o povo a rejeitasse, mas porque as elites a abandonaram. Dom Pedro II era ilustrado, mas distante das massas. Em 15 de novembro de 1889, pouca gente saiu às ruas para defender a coroa.

PERGUNTAS DE REFLEXÃO:
1. Se a abolição foi um avanço, por que contribuiu para a queda da monarquia?
2. Por que a queda foi um golpe militar e não uma revolução popular?

REFERÊNCIAS:
FAUSTO, Boris. História do Brasil. São Paulo: Edusp, 2012.
CARVALHO, José Murilo de. A construção da ordem. Rio de Janeiro: Campus, 1980.
SCHWARCZ, Lilia Moritz. As barbas do imperador. São Paulo: Companhia das Letras, 1998.`,

atividade:[{"enunciado":"Complete: Na década de 1880, o ____________ enfrentava crise econômica, com ____________ externo e queda dos preços do ____________. O movimento ____________, liderado por José do Patrocínio e Joaquim Nabuco, deslegitimou a monarquia ao denunciar a ____________. A ____________ de 1888 aboliu a escravidão, mas sem indenizar os ____________, o que irritou a elite rural. A monarquia caiu em um ____________ militar. BANCO: abolicionista, café, endividamento, golpe, Império, Lei Áurea, senhores, escravidão."},{"enunciado":"Relacione: 1. Dom Pedro II; 2. José do Patrocínio; 3. Benjamin Constant; 4. Lei Áurea; 5. Questão Religiosa. Com: a) Último imperador; b) Líder abolicionista negro; c) Intelectual republicano; d) Abolição em 1888; e) Conflito Estado x Igreja. Escreva os pares."},{"enunciado":"Análise de trecho: 'A monarquia caiu porque o povo rejeitou o regime.' — Está correto? Reescreva incorporando que foi um golpe das elites. Mínimo 5 linhas."},{"enunciado":"Leia a descrição: 'Gravura de 1888 mostra a princesa Isabel assinando a Lei Áurea, cercada por senhores de cara amarrada. Escravos libertos comemoram ao fundo, mas não estão na mesa.' — O que revela sobre as contradições da abolição? Mínimo 4 linhas."},{"enunciado":"A Guerra do Paraguai custou vidas e dinheiro. Em texto de mínimo 5 linhas: como enfraqueceu a monarquia? Quem pagou? Quem se beneficiou?"}],
gabarito:[{"resposta":"Na década de 1880, o Império enfrentava crise econômica, com endividamento externo e queda dos preços do café. O movimento abolicionista deslegitimou a monarquia ao denunciar a escravidão. A Lei Áurea de 1888 aboliu a escravidão, mas sem indenizar os senhores. A monarquia caiu em um golpe militar.","comentario":"Crise econômica, abolicionismo e republicanismo enfraqueceram a monarquia. A Lei Áurea sem indenização perdeu o apoio da elite rural."},{"resposta":"1-a; 2-b; 3-c; 4-d; 5-e.","comentario":"Dom Pedro II (a), José do Patrocínio (b), Benjamin Constant (c), Lei Áurea (d), Questão Religiosa (e)."},{"resposta":"O trecho está incorreto. A monarquia caiu porque as elites a abandonaram, não porque o povo a rejeitasse. Os militares, apoiados por fazendeiros e intelectuais, proclamaram a República em um golpe. O povo não defendeu a monarquia, mas também não exigiu sua queda. Foi uma mudança de cima para baixo.","comentario":"O aluno deve reconhecer o caráter elitista da queda."},{"resposta":"A imagem mostra que a abolição foi decisão de elite, não conquista das massas. A princesa Isabel aparece como protagonista. Os senhores estão insatisfeitos. Os escravos comemoram ao fundo mas estão fora do poder. Revela que a abolição foi decidida sem a participação dos próprios escravizados.","comentario":"A análise deve identificar contradição entre discurso e prática."},{"resposta":"A guerra enfraqueceu a monarquia porque custou vidas (soldados pobres e escravos alforriados), dinheiro e recursos. O povo pagou. A elite se beneficiou com novos mercados e territórios. Os militares, insatisfeitos com o tratamento recebido, aderiram ao republicanismo.","comentario":"O aluno deve identificar os custos sociais e como a guerra contribuiu para a deslegitimação."}],
questoes:[{"enunciado":"Texto I: 'A monarquia garante estabilidade e ordem.' — Senador imperial, 1885. Texto II: 'A escravidão é o câncer do Brasil, e a monarquia a sustenta.' — José do Patrocínio, 1887. A análise permite concluir que:","alternativas":["ambos defendem a monarquia.","o texto I representa a elite escravocrata; o II, os abolicionistas.","Patrocínio defendia a monarquia.","o senador era abolicionista.","ambos criticam a República."],"correta":1,"comentario":"Texto I defende a monarquia (elite escravocrata). Texto II liga monarquia à escravidão. B é correta."},{"enunciado":"A Lei Áurea de 1888 aboliu a escravidão sem indenizar os senhores. Sobre isso, é correto afirmar que:","alternativas":["a indenização teria fortalecido a monarquia.","a ausência de indenização enfraqueceu o apoio da elite rural, contribuindo para a queda.","os escravos receberam terras.","a abolição foi revolução popular.","a Lei Áurea foi contra a vontade da princesa Isabel."],"correta":1,"comentario":"A elite rural se irritou com a ausência de indenização. B é correta."},{"enunciado":"A Questão Religiosa (1872-1875) enfraqueceu o Império. Sobre esse conflito, é correto afirmar que:","alternativas":["unificou Estado e Igreja.","foi conflito entre governo e Igreja que dividiu a elite.","expulsou todos os padres.","fortaleceu a monarquia.","foi apenas debate teológico."],"correta":1,"comentario":"A Questão Religiosa dividiu a elite. B é correta."},{"enunciado":"Dom Pedro II é descrito como monarca ilustrado. Pela lente decolonial, é correto afirmar que:","alternativas":["era defensor radical da abolição e democracia.","sua ilustração pessoal não se traduziu em políticas para as massas.","era contra a modernização.","abdicou voluntariamente.","sua popularidade impediu a República."],"correta":1,"comentario":"A lente decolonial revela que Dom Pedro II governou um Estado escravista e excludente. B é correta."},{"enunciado":"A 'Proclamação da República' em 1889, pela lente decolonial, é correto afirmar que:","alternativas":["o termo 'proclamação' esconde o caráter golpista e elitista.","foi proclamada por vontade popular em plebiscito.","o povo saiu às ruas para defender a monarquia.","foi aprovada pelo Congresso.","eliminou as desigualdades sociais."],"correta":0,"comentario":"O termo 'proclamação' mascara o golpe. A é correta."}],
