<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#14201f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leciona">
<title>Leciona</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14201f; --board-fg:#f3efe6; --paper:#e9ece7; --surface:#f6f8f4;
  --green:#2f6b5e; --green-d:#234f45; --ochre:#c47a3d; --line:#d2d8cf;
  --muted:#6a7370; --ink-soft:#2a3a38; --danger:#a8442f; --ok:#2f6b5e;
  --radius:10px; --shadow:0 1px 2px rgba(20,32,31,.06),0 8px 24px rgba(20,32,31,.06);
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}
h1,h2,h3{margin:0;font-weight:600}
.hidden{display:none!important}
.serif{font-family:var(--serif)}

#app{display:flex;flex-direction:column;height:100%}
header.topbar{display:flex;align-items:center;gap:16px;padding:10px 18px;background:var(--ink);color:var(--board-fg);flex:0 0 auto}
.brand{display:flex;align-items:baseline;gap:10px;font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:.3px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--ochre);display:inline-block;transform:translateY(-2px)}
.brand small{font-family:var(--sans);font-weight:500;font-size:11px;color:#9fb0ab;letter-spacing:.14em;text-transform:uppercase}
.topbar .spacer{flex:1}
.topbar nav{display:flex;gap:4px;background:rgba(255,255,255,.06);padding:4px;border-radius:8px}
.topbar nav button{background:transparent;border:0;color:#bcc8c4;padding:7px 14px;border-radius:6px;font-weight:500;font-size:13px}
.topbar nav button.active{background:var(--board-fg);color:var(--ink)}
.icon-btn{background:rgba(255,255,255,.06);border:0;color:var(--board-fg);width:34px;height:34px;border-radius:8px;font-size:15px}
.icon-btn:hover{background:rgba(255,255,255,.14)}
.conn{font-size:11px;color:#9fb0ab;display:flex;align-items:center;gap:6px}
.conn .led{width:8px;height:8px;border-radius:50%;background:var(--ochre)}
.conn.online .led{background:#6fcaa9}

#viewGestao{flex:1;display:flex;min-height:0}
#viewHoje{flex:1;overflow:auto}
.hoje-wrap{max-width:760px;margin:0 auto;padding:30px 22px}
.hoje-head h2{font-family:Spectral,serif;font-size:30px;margin:0 0 4px}
.hoje-data{color:var(--muted);font-size:13px;margin-bottom:22px}
.hoje-list{display:flex;flex-direction:column;gap:10px}
.hoje-row{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.hoje-hora{flex:0 0 64px;font-weight:700;color:var(--green);font-size:16px;display:flex;flex-direction:column;line-height:1.15}
.hoje-hora small{font-weight:500;color:var(--muted);font-size:11px}
.hoje-info{flex:1;display:flex;flex-direction:column;gap:2px}
.hoje-info b{font-size:15px}
.hoje-info span{font-size:12px;color:var(--muted)}
.hoje-acoes{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.hoje-wrap .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:16px}
@media(max-width:560px){.hoje-row{flex-wrap:wrap}.hoje-acoes{width:100%;justify-content:flex-start}}
.scope{flex:0 0 290px;border-right:1px solid var(--line);background:var(--surface);padding:18px 16px;overflow:auto;display:flex;flex-direction:column;gap:14px}
.scope .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:600}
.scope select,.scope input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.scope .lbl-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.scope .lbl-row .btn.sm{padding:2px 9px;text-transform:none;letter-spacing:0}
.scope .sep{height:1px;background:var(--line);margin:4px 0}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 13px;border-radius:8px;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.12s}
.btn:hover{border-color:#b9c2b6}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:var(--green-d)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--ink);background:rgba(20,32,31,.05)}
.btn.full{width:100%;justify-content:center}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.danger{color:var(--danger);border-color:transparent}
.btn.danger:hover{background:rgba(168,68,47,.08)}

.themes{flex:1;display:flex;flex-direction:column;min-width:0}
.themes-head{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--surface)}
.themes-head h2{font-family:var(--serif);font-size:18px}
.themes-head .crumb{font-size:12px;color:var(--muted)}
.themes-body{flex:1;overflow:auto;padding:18px 22px}

/* Conteúdo > Tema */
.conteudo{border:1px solid var(--line);background:#fff;border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.conteudo-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(47,107,94,.05);border-bottom:1px solid var(--line)}
.conteudo-head .cname{font-family:var(--serif);font-size:16px;font-weight:600;flex:1;cursor:pointer}
.conteudo-head .ordbtns{display:flex;flex-direction:column;gap:1px}
.ordbtns button{border:1px solid var(--line);background:#fff;width:22px;height:17px;line-height:1;border-radius:4px;font-size:10px;color:var(--muted);padding:0}
.ordbtns button:hover{border-color:var(--green);color:var(--green)}
.conteudo-body{padding:10px 14px}
.selos{display:inline-flex;gap:4px;flex-wrap:wrap}
.selo{font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.selo.revisa{background:#e7efe9;color:#2f6b5e}
.selo.ser{background:#efe6db;color:#a06a2e}
.selo.goiastec{background:#e6e9ef;color:#3a4a8a}

.tlist{display:grid;gap:9px}
.tcard{border:1px solid var(--line);background:#fff;border-radius:9px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.12s}
.tcard:hover{border-color:var(--green);box-shadow:var(--shadow)}
.tcard .tname{font-family:var(--serif);font-size:15px;font-weight:600}
.tcard .tcode{font-size:11px;color:var(--green);font-weight:600;letter-spacing:.04em;margin-right:8px}
.tcard .tsub{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.tcard .tmeta{flex:1;min-width:0}
.tcard .prog{display:flex;gap:3px}
.tcard .prog i{width:7px;height:7px;border-radius:2px;background:var(--line)}
.tcard .prog i.on{background:var(--green)}
.statusdot{font-size:11px;color:var(--muted)}
.statusdot b{color:var(--green)}
.empty{color:var(--muted);text-align:center;padding:44px 20px;font-size:14px}
.empty p{max-width:420px;margin:8px auto}
.addrow{display:flex;gap:8px;margin-top:10px}

/* Editor */
.editor{position:fixed;inset:0;background:var(--paper);z-index:40;display:flex;flex-direction:column}
.editor-top{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--surface)}
.editor-top input.tema-nome{font-family:var(--serif);font-size:20px;font-weight:600;border:0;background:transparent;flex:1;color:var(--ink);padding:4px}
.editor-top input.tema-nome:focus{outline:0;border-bottom:2px solid var(--green)}
.editor-body{flex:1;display:flex;min-height:0}
.meta-pane{flex:0 0 312px;border-right:1px solid var(--line);padding:18px;overflow:auto;background:var(--surface)}
.meta-pane .field{margin-bottom:14px}
.meta-pane label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
.meta-pane input,.meta-pane textarea,.meta-pane select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
.meta-pane textarea{resize:vertical;min-height:60px}
.meta-block{border:1px solid var(--line);border-radius:9px;background:#fff;padding:11px;margin-bottom:14px}
.meta-block h4{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.turma-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.turma-row .tn{font-weight:600;font-size:13px;flex:1;min-width:70px}
.turma-row select,.turma-row input{padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:12px}
.turma-row input.dt{width:128px}
.img-thumbs{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.img-thumbs .it{position:relative;width:74px;height:54px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.img-thumbs .it img{width:100%;height:100%;object-fit:cover}
.img-thumbs .it button{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:0;background:rgba(20,32,31,.78);color:#fff;font-size:11px;line-height:1;padding:0}

.obj-pane{flex:1;display:flex;flex-direction:column;min-width:0}
.obj-tabs{display:flex;gap:2px;padding:10px 16px 0;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--surface)}
.obj-tabs button{border:0;background:transparent;padding:9px 13px;border-radius:8px 8px 0 0;color:var(--muted);font-weight:500;font-size:13px;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
.obj-tabs button.active{color:var(--ink);border-bottom-color:var(--green)}
.obj-tabs button .badge{width:7px;height:7px;border-radius:50%;background:var(--line)}
.obj-tabs button.done .badge{background:var(--green)}
.obj-content{flex:1;overflow:auto;padding:20px 24px;max-width:920px;width:100%;margin:0 auto}
.obj-actions{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.obj-actions .title{font-family:var(--serif);font-size:17px;font-weight:600;flex:1}
.obj-hint{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.45}
textarea.big{width:100%;min-height:320px;padding:14px;border:1px solid var(--line);border-radius:10px;background:#fff;line-height:1.6;resize:vertical}
.card-list{display:grid;gap:12px}
.mini-card{border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px}
.mini-card .row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.mini-card input,.mini-card textarea,.mini-card select{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff}
.mini-card textarea{resize:vertical;min-height:48px}
.mini-card .num{font-family:var(--serif);font-weight:700;color:var(--green);font-size:14px;flex:0 0 auto}
.mini-card label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin:6px 0 3px}

/* Projeção */
#viewProjecao{position:fixed;inset:0;background:var(--ink);color:var(--board-fg);z-index:50;display:flex;flex-direction:column}
#viewProjecao.theme-light{background:#faf8f2;color:#1a1a1a}
#viewProjecao.theme-contrast{background:#000;color:#fff}
.proj-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(0,0,0,.25);flex:0 0 auto}
.theme-light .proj-bar{background:rgba(0,0,0,.05)}
.proj-bar .ptitle{font-family:var(--serif);font-weight:600;font-size:15px;opacity:.85;max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-bar .spacer{flex:1}
.obj-switch{display:flex;gap:2px;background:rgba(255,255,255,.08);padding:4px;border-radius:9px;overflow-x:auto;max-width:60vw}
.theme-light .obj-switch{background:rgba(0,0,0,.06)}
.obj-switch button{border:0;background:transparent;color:inherit;opacity:.6;padding:6px 11px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap}
.obj-switch button.active{background:rgba(255,255,255,.16);opacity:1}
.theme-light .obj-switch button.active{background:rgba(0,0,0,.1)}
.proj-ctrl{display:flex;align-items:center;gap:4px}
.proj-ctrl button{border:0;background:rgba(255,255,255,.08);color:inherit;width:32px;height:32px;border-radius:7px;font-size:14px}
.theme-light .proj-ctrl button{background:rgba(0,0,0,.06)}
.proj-ctrl button:hover{background:rgba(255,255,255,.18)}
.proj-stage{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:5vh 6vw}
.proj-canvas{width:100%;max-width:1100px;font-size:var(--proj-fs,30px);line-height:var(--proj-lh,1.6)}
.proj-canvas h2{font-family:var(--serif);font-size:1.5em;margin-bottom:.6em;color:var(--ochre)}
.theme-contrast .proj-canvas h2{color:#ffd479}
.proj-canvas p{margin:0 0 .8em}
.proj-canvas ul{margin:0 0 .8em;padding-left:1.3em}
.proj-canvas li{margin-bottom:.4em}
.proj-canvas .q{margin-bottom:1.2em}
.proj-canvas .alt{padding:.25em .6em;border-radius:8px;margin:.2em 0}
.proj-canvas .alt.correct{background:rgba(111,202,169,.22);outline:2px solid #6fcaa9}
.theme-light .proj-canvas .alt.correct{background:rgba(47,107,94,.16);outline-color:var(--green)}
.reveal-box{margin-top:.6em;padding:.5em .8em;border-left:4px solid var(--ochre);background:rgba(255,255,255,.06);border-radius:6px;font-size:.85em}
.theme-light .reveal-box{background:rgba(0,0,0,.04)}
.flash{width:100%;max-width:820px;min-height:46vh;border-radius:18px;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;text-align:center;padding:6vh 6vw;cursor:pointer;font-family:var(--serif);font-size:1.2em;position:relative;user-select:none}
.theme-light .flash{border-color:rgba(0,0,0,.14)}
.flash .side-label{position:absolute;top:14px;left:18px;font-family:var(--sans);font-size:13px;letter-spacing:.1em;text-transform:uppercase;opacity:.5}
.slide{width:100%;max-width:1000px;min-height:50vh;border-radius:16px;background:rgba(255,255,255,.05);padding:6vh 6vw;border:1px solid rgba(255,255,255,.1)}
.theme-light .slide{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08)}
.slide h2{font-family:var(--serif);font-size:1.6em;margin-bottom:.7em;color:var(--ochre)}
.theme-contrast .slide h2{color:#ffd479}
.slide li{margin-bottom:.6em;font-size:clamp(15px,1em,28px)}
.slide{max-height:78vh;overflow:auto}
.slide h2{font-size:clamp(20px,1.25em,36px)}
.proj-canvas{overflow-wrap:break-word}
.foco{width:100%;margin:8px 0 2px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface,#fff);color:inherit;font-size:13px}
.foco::placeholder{color:#9aa39d}
/* status chip no card */
.stchip{border:1px solid var(--line);background:#fff;border-radius:12px;padding:2px 9px;font-size:11px;cursor:pointer;margin-left:8px;color:var(--ink-soft);white-space:nowrap}
.stchip:hover{border-color:var(--green)}
.stchip.st-planejado{border-color:#c98a33;color:#9a6b1f;background:#fbf3e5}
.stchip.st-aplicado{border-color:#2f6b5e;color:#235247;background:#e9f3ef}
/* painel bimestre */
.bim-grade{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.bim-day{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--ink-soft)}
.bim-day input{width:52px;padding:5px;border:1px solid var(--line);border-radius:7px;text-align:center}
.bim-tot{font-size:14px;margin:6px 0}
.bim-list{display:flex;flex-direction:column;gap:5px}
.bim-row{display:flex;align-items:center;gap:10px}
.bim-faixa{flex:0 0 96px;font-size:12px;color:var(--green);font-weight:600}
.bim-tema{flex:1;font-size:13px;display:flex;flex-direction:column;gap:2px}
.bim-det{font-size:11px;color:#8a938c}
.gt-checks{display:grid;grid-template-columns:1fr 1fr;gap:7px 16px;margin-top:6px}
.gt-checks .check{display:flex;align-items:center;gap:8px;margin:0;font-size:13px}
.gt-checks .check input{flex:0 0 auto;margin:0}
.pm-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow:auto;padding:2px}
.pm-group{border:1px solid var(--line);border-radius:9px;padding:8px 10px}
.pm-hab{display:flex;align-items:flex-start;gap:8px;margin:0;font-size:13px}
.pm-cod{font-size:10px;color:#8a938c;background:rgba(127,127,127,.1);border-radius:6px;padding:1px 6px;margin-left:auto}
.pm-subs{margin:6px 0 0 24px;display:flex;flex-direction:column;gap:4px}
.pm-sub{display:flex;align-items:flex-start;gap:8px;margin:0;font-size:12.5px;color:var(--ink-soft)}
.bim-n{width:54px;padding:5px;border:1px solid var(--line);border-radius:7px;text-align:center}
.bim-saldo{margin-top:10px;font-size:13px}
/* editor de ordem do PDF */
.rel-list{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow:auto;padding:2px}
.rel-row{display:flex;align-items:center;gap:8px}
.rel-row .rel-up{display:flex;gap:3px;flex:0 0 auto}
.rel-row .rel-up button{padding:2px 8px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;color:var(--ink)}
.rel-row .rel-up button:disabled{opacity:.3;cursor:default}
.rel-lbl{flex:1;padding:5px 9px;border:1px solid var(--line);border-radius:7px;font-size:13px}
/* mapa mental interativo na projeção */
.mmint{width:100%;max-width:1100px;text-align:left;font-size:calc(var(--proj-fs,30px)*0.62);line-height:1.35}
.mmi-node{margin:2px 0}
.mmi-head{display:flex;gap:10px;align-items:flex-start;padding:6px 12px;border-radius:9px}
.mmi-head.has{cursor:pointer}
.mmi-head.has:hover{background:rgba(127,127,127,.16)}
.mmi-tg{opacity:.65;width:1em;flex:0 0 auto}
.mmi-dot{opacity:.45;flex:0 0 auto}
.mmi-kids{margin-left:1.3em;border-left:2px solid rgba(127,127,127,.32);padding-left:.7em;margin-top:2px}
.mmi-d0>.mmi-head{font-weight:700;font-size:1.25em;color:var(--ochre)}
.theme-contrast .mmi-d0>.mmi-head{color:#ffd479}
.mmi-d1>.mmi-head{font-weight:600}
table.md{border-collapse:collapse;margin:10px 0;font-size:.8em}
table.md th,table.md td{border:1px solid var(--line);padding:6px 11px;text-align:left;vertical-align:top}
table.md th{background:rgba(127,127,127,.12);font-weight:600}
.proj-canvas table.md{font-size:.62em}
.proj-canvas table.md th,.proj-canvas table.md td{border-color:rgba(255,255,255,.32)}
.proj-canvas table.md th{background:rgba(255,255,255,.10)}
.theme-light .proj-canvas table.md th,.theme-light .proj-canvas table.md td{border-color:rgba(0,0,0,.25)}
.nav-dots{display:flex;gap:8px;justify-content:center;margin-top:20px}
.nav-dots i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.25)}
.nav-dots i.on{background:var(--ochre)}
.markmap-wrap{width:100%;height:74vh}
.markmap-wrap svg{width:100%;height:100%}
.proj-foot{display:flex;align-items:center;justify-content:center;gap:18px;padding:10px;font-size:13px;opacity:.6;flex:0 0 auto}
.proj-foot button{border:0;background:transparent;color:inherit;font-size:13px;text-decoration:underline;cursor:pointer}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;width:100%;max-width:1000px}
.img-grid img{width:100%;border-radius:10px;cursor:pointer;border:2px solid transparent}
.img-grid img:hover{border-color:var(--ochre)}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:14px;padding:3px 10px;font-size:12px;margin:2px 2px;display:inline-block;cursor:pointer}
.chip:hover{border-color:var(--green);color:var(--green)}
.img-grid .pick{position:relative;cursor:pointer}
.img-grid .pick img{width:100%;border-radius:8px;display:block}
.img-grid .pick.sel img{outline:3px solid var(--green);outline-offset:-1px}
.img-grid .pick.sel::after{content:"\2713";position:absolute;top:6px;right:6px;background:var(--green);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.img-grid .pick{position:relative}
.img-grid .pick .fix{position:absolute;bottom:8px;right:8px}
.img-big{max-width:90vw;max-height:74vh;border-radius:12px}

/* Modais / toast */
.modal-bg{position:fixed;inset:0;background:rgba(20,32,31,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal-h h3{font-family:var(--serif);font-size:18px;flex:1}
.modal-b{padding:20px 22px}
.modal-b .field{margin-bottom:14px}
.modal-b label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.modal-b input,.modal-b textarea,.modal-b select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px}
.modal-b textarea.mono{min-height:90px;font-family:ui-monospace,monospace;font-size:12px;resize:vertical}
.modal-b small{color:var(--muted);font-size:12px;display:block;margin-top:5px;line-height:1.4}
.modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.check{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;margin-bottom:7px}
.turma-list .tl{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.turma-list .tl b{flex:1}
.turma-list .tl span{font-size:12px;color:var(--muted)}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:var(--board-fg);padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);max-width:80vw}
.toast.err{background:var(--danger)}
.toast.ok{background:var(--green)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
.spin.dark{border-color:rgba(20,32,31,.25);border-top-color:var(--green)}
@keyframes sp{to{transform:rotate(360deg)}}

@media (max-width:820px){
  .scope{flex-basis:240px}
  .meta-pane{display:none}
  .topbar nav button{padding:7px 10px}
}

/* ---------- Firebase / localStorage ---------- */
function mergeRemote(local, remote){
  remote = remote||{}; local = local||{};
  const out = Object.assign({}, remote); const pushBack=[];
  for(const id in local){ const l=local[id], r=remote[id];
    if(!r){ out[id]=l; pushBack.push(id); }                         // só existe local: mantém e re-sincroniza
    else if((l.updatedAt||0) > (r.updatedAt||0)){ out[id]=l; pushBack.push(id); } // local mais novo: mantém
  }
  return {merged:out, pushBack};
}
function initFirebase(){
  let cfg=null;
  try{ cfg=JSON.parse(localStorage.getItem(LS_FB)||'null'); }catch(e){}
  if(!cfg || !cfg.databaseURL){ setConn(false); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    DB = firebase.database();
    setConn(true);
    DB.ref('anthropicKey').on('value', s=>{ window.__key = s.val()||''; });
    DB.ref('relCfg').on('value', s=>{ const v=s.val(); if(v&&v.ordem){ let ord=v.ordem.filter(k=>REL_KEYS.includes(k)); REL_KEYS.forEach(k=>{ if(!ord.includes(k)) ord.push(k); }); relCfg.ordem=ord; relCfg.rotulos=Object.assign({},REL_LABELS_DEFAULT,v.rotulos||{}); } });
    DB.ref('leciona/conteudos').on('value', s=>{ const m=mergeRemote(conteudos, s.val()); conteudos=m.merged; m.pushBack.forEach(id=>{ try{ DB.ref('leciona/conteudos/'+id).set(conteudos[id]); }catch(e){} }); lsSet(LS_CONT, JSON.stringify(conteudos)); migrateAndRender(); });
    DB.ref('leciona/temas').on('value', s=>{ const m=mergeRemote(temas, s.val()); temas=m.merged; m.pushBack.forEach(id=>{ try{ DB.ref('leciona/temas/'+id).set(temas[id]); }catch(e){} }); lsSet(LS_TEMAS, JSON.stringify(temas)); migrateAndRender(); });
    DB.ref('leciona/turmas').on('value', s=>{ const m=mergeRemote(turmas, s.val()); turmas=m.merged; m.pushBack.forEach(id=>{ try{ DB.ref('leciona/turmas/'+id).set(turmas[id]); }catch(e){} }); lsSet(LS_TURMAS, JSON.stringify(turmas)); seedTurmasIfEmpty(); renderThemes(); });
  }catch(e){ console.error(e); setConn(false); toast('Falha ao conectar Firebase: '+e.message,'err'); }
}
function setConn(on){
  const el=document.getElementById('conn');
  el.classList.toggle('online',on);
  document.getElementById('connTxt').textContent = on?'Firebase':'Local';
}

  try{ turmas = JSON.parse(localStorage.getItem(LS_TURMAS)||'{}'); }catch(e){ turmas={}; }

}
function persistConteudo(c){

  if(DB) DB.ref('leciona/conteudos/'+c.id).set(c).catch(e=>toast('⚠ Falha ao gravar conteúdo no Firebase (mantido localmente). Verifique as Regras do banco. '+e.message,'err'));
}

/* ---------- Migração: garante turma + conteúdo para tudo ---------- */
let migrated=false;
function autoTurma(d,s){
  let tu=Object.values(turmas).find(x=>x.disciplina===d&&x.serie===s&&x._auto);
  if(!tu){ tu={id:uid(),nome:'Geral — '+s,disciplina:d,serie:s,letra:'',unidade:(scope.unidade||UNIDADES[0]),_auto:true,updatedAt:Date.now()}; persistTurma(tu); }
  return tu.id;
}
function migrateAndRender(){
  // temas/conteúdos sem turma -> turma automática (planos por turma)
  Object.values(conteudos).forEach(c=>{ if(c && !c.turmaId){ c.turmaId=autoTurma(c.disciplina,c.serie); persistConteudo(c); } });
  Object.values(temas).forEach(t=>{ if(t && t.conteudoId && !t.turmaId){ const c=conteudos[t.conteudoId]; t.turmaId=c?c.turmaId:autoTurma(t.disciplina,t.serie); persistTema(t); } });
  const orphans = Object.values(temas).filter(t=>t && !t.conteudoId);
  if(orphans.length){
    // agrupa por disciplina|serie|bimestre, cria conteúdo "Conteúdos avulsos"
    const groups={};
    orphans.forEach(t=>{ const k=t.disciplina+'|'+t.serie+'|'+(t.bimestre||'3º Bimestre'); (groups[k]=groups[k]||[]).push(t); });
    Object.keys(groups).forEach(k=>{
      const [d,s,b]=k.split('|');
      let cont = Object.values(conteudos).find(c=>c.disciplina===d&&c.serie===s&&c.bimestre===b&&c._avulsos);
      if(!cont){
        cont={id:uid(),disciplina:d,serie:s,bimestre:b,turmaId:autoTurma(d,s),nome:'Conteúdos avulsos',resumo:'',ordem:0,_avulsos:true,updatedAt:Date.now()};
        persistConteudo(cont);
      }
      groups[k].forEach((t,i)=>{ t.conteudoId=cont.id; if(t.ordem==null) t.ordem=i; persistTema(t); });
    });
    if(!migrated){ migrated=true; toast('Temas da versão anterior reorganizados em "Conteúdos avulsos".','ok'); }
  }
  renderThemes();
}

function boot(){
  const d=document.getElementById('selDisc');
  Object.keys(SERIES_BY_DISC).forEach(x=>d.add(new Option(x,x)));
  BIMESTRES.forEach(b=>document.getElementById('selBim').add(new Option(b,b)));
  loadScope();
  const us=document.getElementById('selUnidade'); UNIDADES.forEach(u=>us.add(new Option(u,u)));
  loadLocal();
  initFirebase();
  if(!DB) seedTurmasIfEmpty();
  // aplica o contexto salvo aos seletores, na ordem certa
  d.value = (SERIES_BY_DISC[scope.disc]?scope.disc:'História');
  us.value = scope.unidade||UNIDADES[0];
  refreshSeries();
  if((SERIES_BY_DISC[scope.disc]||[]).includes(scope.serie)) document.getElementById('selSerie').value=scope.serie;
  document.getElementById('selBim').value = scope.bim;
  refreshTurmas();
  if(scope.turma && turmas[scope.turma]) document.getElementById('selTurma').value=scope.turma;
  onScopeChange();
  setView('hoje');
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
  document.addEventListener('keydown', projKeys);
}
function refreshSeries(){
  const s=document.getElementById('selSerie'); s.innerHTML='';
  (SERIES_BY_DISC[document.getElementById('selDisc').value]||[]).forEach(x=>s.add(new Option(x,x)));
}
function refreshTurmas(){
  const sel=document.getElementById('selTurma'); if(!sel) return;
  const d=document.getElementById('selDisc').value, s=document.getElementById('selSerie').value;
  const u=(document.getElementById('selUnidade')||{}).value || scope.unidade;
  const list=Object.values(turmas).filter(t=>t.disciplina===d && t.serie===s && (t.unidade? t.unidade===u : true)).sort((a,b)=>turmaNome(a).localeCompare(turmaNome(b)));
  sel.innerHTML='';
  if(!list.length){ sel.add(new Option('— sem turma (cadastre em + turmas) —','')); }
  list.forEach(t=>sel.add(new Option(turmaNome(t),t.id)));
  if(list.find(t=>t.id===scope.turma)) sel.value=scope.turma;
  else { scope.turma=list.length?list[0].id:''; sel.value=scope.turma; }
}
function onScopeChange(){
  try{ const ed=document.getElementById('editor'); if(editing && ed && !ed.classList.contains('hidden')) flushEditor(); }catch(e){}
  const dv=document.getElementById('selDisc').value;
  if(scope.disc!==dv){ scope.disc=dv; refreshSeries(); }
  scope.disc=dv;
  scope.unidade=(document.getElementById('selUnidade')||{}).value||scope.unidade;
  scope.serie=document.getElementById('selSerie').value;
  refreshTurmas();
  scope.turma=document.getElementById('selTurma').value;
  scope.bim=document.getElementById('selBim').value;
  saveScope();
  renderThemes();
}

/* ---------- Selos ---------- */
function selosHtml(d,s,b,code){

}
function selosConteudo(c){
  const ts=temasDoConteudo(c.id);

  ts.forEach(t=>{ const it=matrizItem(t.disciplina,t.serie,t.bimestre,t.dcgo); if(it){any=true; if(it.r===1)r=true; if(it.s===1)s=true; if(it.g===1)g=true;} });

/* ---------- Listagem Conteúdo > Tema ---------- */
function conteudosDoScope(){
  return Object.values(conteudos)
    .filter(c=>c.turmaId===scope.turma && c.bimestre===scope.bim)
    .sort((a,b)=>(a.ordem||0)-(b.ordem||0));
}
function temasDoConteudo(cid){
  return Object.values(temas).filter(t=>t.conteudoId===cid).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
}
function nextOrdemConteudo(){
  const arr=conteudosDoScope();
  return arr.length ? Math.max(...arr.map(c=>c.ordem||0))+1 : 0;
}
function nextOrdemTema(cid){
  const arr=temasDoConteudo(cid);
  return arr.length ? Math.max(...arr.map(t=>t.ordem||0))+1 : 0;
}

function statusResumo(t){
  const st=t.status||{}; const e=st.estado||'';
  const lbl = e==='aplicado' ? ('✓ Aplicado'+(st.data?(' '+st.data.split('-').reverse().join('/')):'')) : e==='planejado' ? '◔ Planejado' : '○ status';
  return '<button class="stchip st-'+(e||'none')+'" onclick="event.stopPropagation();cycleStatus(\''+t.id+'\')" title="Tocar para alternar: — → Planejado → Aplicado">'+lbl+'</button>';
}
function cycleStatus(tid){
  const t=temas[tid]; if(!t) return;
  const cur=(t.status&&t.status.estado)||'';
  const nxt = cur==='' ? 'planejado' : cur==='planejado' ? 'aplicado' : '';
  t.status={estado:nxt, data: nxt==='aplicado'? new Date().toISOString().slice(0,10) : ''};
  persistTema(t);
  if(!DB) renderThemes();
  toast(nxt? ('Marcado como '+nxt+'.') : 'Status removido.','ok');
}
function isFilled(t,k){
  const v=t.obj&&t.obj[k];
  if(v==null) return false;
  if(Array.isArray(v)) return v.length>0;
  return String(v).trim().length>0;
}
function toggleConteudo(id){ expanded[id]=!(expanded[id]!==false); renderThemes(); }

/* ---------- Reordenar ---------- */
function moverConteudo(id,dir){
  const arr=conteudosDoScope(); const i=arr.findIndex(c=>c.id===id); const j=i+dir;
  if(i<0||j<0||j>=arr.length) return;
  const a=arr[i],b=arr[j]; const ta=a.ordem,tb=b.ordem; a.ordem=tb; b.ordem=ta;
  persistConteudo(a); persistConteudo(b); if(!DB) renderThemes();
}
function moverTema(id,dir){
  const t=temas[id]; const arr=temasDoConteudo(t.conteudoId); const i=arr.findIndex(x=>x.id===id); const j=i+dir;
  if(i<0||j<0||j>=arr.length) return;
  const a=arr[i],b=arr[j]; const ta=a.ordem,tb=b.ordem; a.ordem=tb; b.ordem=ta;
  persistTema(a); persistTema(b); if(!DB) renderThemes();
}

async function sugerirSubtemas(){
  const key=getKey(); if(!key){ toast('Configure a chave da IA em ⚙.','err'); return; }
  const arr=matrizDoScope(); const btn=document.getElementById('pmSubBtn'); const msg=document.getElementById('pmSubMsg');
  if(btn) btn.disabled=true; if(msg) msg.innerHTML='<span class="spin dark"></span> buscando em portais educacionais…';
  const lista=arr.map((it,i)=>(i+1)+'. '+(it.t||it.h)+' ('+it.c+')').join('\n');
  try{
    const sys='Você é professora de '+scope.serie+' ('+scope.disc+') no Brasil. Sugira subtemas didáticos relevantes e alinhados à BNCC/DC-GO, pesquisando em portais educacionais e de governo brasileiros (gov.br, secretarias de educação, repositórios públicos).';
    const usr='Para CADA habilidade abaixo, sugira de 3 a 5 subtemas concretos e ensináveis para '+scope.serie+'. Responda APENAS um JSON: array (na MESMA ordem) de arrays de strings curtas. Nada fora do JSON.\n\n'+lista;
    const raw=await callClaudeWeb(sys,usr,key);
    const j=raw.replace(/```json|```/g,'').trim(); const mt=j.match(/\[[\s\S]*\]/); const data=JSON.parse(mt?mt[0]:j);
    if(Array.isArray(data)) data.forEach((subs,i)=>{ if(Array.isArray(subs)) pmSubs[i]=subs.map(x=>String(x).slice(0,90)).filter(Boolean); });
    if(msg) msg.textContent='Subtemas sugeridos — marque os que quiser.';

async function criarPartirMatriz(){
  const arr=matrizDoScope();
  const mode=document.querySelector('input[name=pmMode]:checked').value;
  const objs = mode==='gerar' ? [...document.querySelectorAll('#pmObjs input[type=checkbox]:checked')].map(c=>c.value) : [];
  const sel=[];
  arr.forEach((it,i)=>{ if(pmSel.has('h:'+i)) sel.push({nome:(it.t||it.h||it.c), it}); (pmSubs[i]||[]).forEach((sb,j)=>{ if(pmSel.has('s:'+i+':'+j)) sel.push({nome:sb, it}); }); });
  if(!sel.length){ toast('Selecione ao menos um tema/subtema.','err'); return; }
  const key=getKey();
  if(mode==='gerar' && !key){ toast('Configure a chave da IA para gerar (ou escolha "Só criar").','err'); return; }
  const btn=document.getElementById('pmBtn'); if(btn)btn.disabled=true; const prog=document.getElementById('pmProg');
  let cont=Object.values(conteudos).find(c=>c.turmaId===scope.turma&&c.bimestre===scope.bim&&c.nome==='Matriz — '+scope.bim);
  if(!cont){ cont={id:uid(),disciplina:scope.disc,serie:scope.serie,turmaId:scope.turma,bimestre:scope.bim,nome:'Matriz — '+scope.bim,resumo:'',ordem:nextOrdemConteudo(),updatedAt:Date.now()}; persistConteudo(cont); }
  expanded[cont.id]=true;
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  const totalObj=Math.max(1, sel.length*objs.length); const t0=Date.now();
  let i=0, okObj=0, falhaObj=0, feito=0, ultimoErro='';
  for(const item of sel){
    i++;
    const tema=blankTema(cont.id,{nome:String(item.nome).slice(0,80),dcgo:item.it.c,habilidade:item.it.h,resumo:item.it.h,ordem:nextOrdemTema(cont.id)});
    if(objs.length){
      const ordK=OBJ_DEFS.map(o=>o.k); const ks=objs.slice().sort((a,b)=>ordK.indexOf(a)-ordK.indexOf(b));
      for(const k of ks){
        const pct=Math.round(feito/totalObj*100);
        const elapsed=(Date.now()-t0)/1000; const rest = feito? Math.round(elapsed/feito*(totalObj-feito)) : 0;
        if(prog) prog.innerHTML='<span class="spin dark"></span> <b>'+pct+'%</b> · '+esc(tema.nome)+' — '+k+(rest?(' · ~'+rest+'s restantes'):'')+'…';
        try{ const v=await genObjFor(tema,k); if(v!=null){ tema.obj[k]=v; okObj++; } else falhaObj++; }
        catch(e){ falhaObj++; ultimoErro=e.message; }
        feito++;
        await sleep(350);
      }
    }
    persistTema(tema);
  }
  if(btn)btn.disabled=false; if(!DB) renderThemes();
  if(objs.length && prog){
    prog.innerHTML = 'Pronto: <b>'+sel.length+'</b> tema(s) criados · <b>'+okObj+'</b> objeto(s) gerados'+(falhaObj?(' · <b style="color:#b4451f">'+falhaObj+' falharam</b>'+(ultimoErro?(' ('+esc(ultimoErro.slice(0,120))+')'):'')):'')+'. Pode fechar.';
  } else { closeModal(); }
  toast(sel.length+' tema(s) em "Matriz — '+scope.bim+'"'+(objs.length?(' · '+okObj+' objetos gerados'+(falhaObj?(', '+falhaObj+' falharam'):'')):'')+'.', falhaObj?'err':'ok');
}
function sugerirNoConteudo(cid){

}

function renderStatusEditor(){
  const box=document.getElementById('edTurmas');
  // status migra de formato antigo {turmaId:{}} para {estado,data}
  let st=editing.status||{};
  if(st && (st.estado===undefined) && Object.keys(st).length){ const first=Object.values(st)[0]||{}; st={estado:first.estado||'',data:first.data||''}; editing.status=st; }
  if(st.estado===undefined) editing.status={estado:'',data:''}, st=editing.status;
  const tu=turmas[editing.turmaId];
  box.innerHTML='<div class="turma-row"><span class="tn">'+esc(tu?tu.nome:'(turma)')+'</span>'+
    '<select onchange="setStatus(\'estado\',this.value)">'+
      '<option value="" '+(st.estado===''?'selected':'')+'>—</option>'+
      '<option value="planejado" '+(st.estado==='planejado'?'selected':'')+'>Planejado</option>'+
      '<option value="aplicado" '+(st.estado==='aplicado'?'selected':'')+'>Aplicado</option>'+
    '</select>'+
    (st.estado==='aplicado'?'<input class="dt" type="date" value="'+esc(st.data||'')+'" onchange="setStatus(\'data\',this.value)">':'')+
  '</div>';
}
function setStatus(field,val){
  if(!editing.status||editing.status.estado===undefined) editing.status={estado:'',data:''};
  editing.status[field]=val;
  if(field==='estado'){
    if(val==='aplicado' && !editing.status.data) editing.status.data=new Date().toISOString().slice(0,10);
    if(val==='') editing.status.data='';
    renderStatusEditor();
  }
  edDirty();
}
/* ---- Exportar conteúdo (e temas) para outra turma ---- */
function openExportConteudo(cid){
  const c=conteudos[cid]; if(!c) return;
  const alvos=Object.values(turmas).filter(t=>t.id!==c.turmaId).sort((a,b)=>((a.disciplina||'')+(a.serie||'')+turmaNome(a)).localeCompare((b.disciplina||'')+(b.serie||'')+turmaNome(b)));
  const opts = alvos.length ? alvos.map(t=>'<option value="'+t.id+'">'+esc(turmaNome(t))+' — '+esc(t.disciplina)+' · '+esc(t.unidade||'—')+'</option>').join('') : '';
  const inner = alvos.length
    ? '<small>Copia o conteúdo "<b>'+esc(c.nome)+'</b>" e todos os seus temas/objetos para <b>qualquer turma</b> (útil para projetos interdisciplinares e temas transversais). A cópia fica <b>independente</b>: editar ou excluir lá não afeta a turma de origem.</small>'+
      '<div class="field" style="margin-top:12px"><label>Turma de destino</label><select id="expTurma">'+opts+'</select></div>'
    : '<small>Não há outra turma cadastrada. Crie a turma de destino em "+ turmas" primeiro.</small>';
  const foot = alvos.length ? '<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="doExportConteudo(\''+cid+'\')">Copiar</button>' : '<button class="btn ghost" onclick="closeModal()">Fechar</button>';
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h3>Copiar para outra turma</h3></div><div class="modal-b">'+inner+'</div><div class="modal-f">'+foot+'</div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);
}
function doExportConteudo(cid){
  const c=conteudos[cid]; const dest=document.getElementById('expTurma').value;
  const dt=turmas[dest]; if(!c||!dt) return;
  if(!confirm('Copiar "'+c.nome+'" e todos os seus temas para a turma '+turmaNome(dt)+' ('+dt.disciplina+')?\nA cópia será independente da turma de origem.')) return;
  const novoC=JSON.parse(JSON.stringify(c)); novoC.id=uid(); novoC.turmaId=dest; novoC.disciplina=dt.disciplina; novoC.serie=dt.serie; novoC._avulsos=false; novoC.ordem=99; novoC.updatedAt=Date.now();
  persistConteudo(novoC);
  temasDoConteudo(cid).forEach((t,i)=>{
    const nt=JSON.parse(JSON.stringify(t)); nt.id=uid(); nt.conteudoId=novoC.id; nt.turmaId=dest; nt.disciplina=dt.disciplina; nt.serie=dt.serie; nt.status={estado:'',data:''}; nt.ordem=i; nt.updatedAt=Date.now();
    persistTema(nt);
  });
  closeModal(); if(!DB) renderThemes();
  toast('Conteúdo copiado para a turma '+dt.nome+'.','ok');
}
function openExportTema(tid){
  const t=temas[tid]; if(!t) return;
  const alvos=Object.values(turmas).filter(x=>x.id!==t.turmaId).sort((a,b)=>((a.disciplina||'')+(a.serie||'')+turmaNome(a)).localeCompare((b.disciplina||'')+(b.serie||'')+turmaNome(b)));
  const opts=alvos.map(x=>'<option value="'+x.id+'">'+esc(turmaNome(x))+' — '+esc(x.disciplina)+' · '+esc(x.unidade||'—')+'</option>').join('');
  const inner = alvos.length

function doExportTema(tid){
  const t=temas[tid]; const dest=document.getElementById('expTurmaT').value; const dt=turmas[dest]; if(!t||!dt) return;
  if(!confirm('Copiar a aula "'+t.nome+'" para a turma '+turmaNome(dt)+' ('+dt.disciplina+')?')) return;
  const srcC=conteudos[t.conteudoId]; const nomeC=srcC?srcC.nome:'Aulas importadas';
  let destC=Object.values(conteudos).find(c=>c.turmaId===dest && c.bimestre===t.bimestre && c.nome===nomeC);
  if(!destC){ destC={id:uid(),disciplina:dt.disciplina,serie:dt.serie,turmaId:dest,bimestre:t.bimestre,nome:nomeC,resumo:'',ordem:99,updatedAt:Date.now()}; persistConteudo(destC); }
  const nt=JSON.parse(JSON.stringify(t)); nt.id=uid(); nt.conteudoId=destC.id; nt.turmaId=dest; nt.disciplina=dt.disciplina; nt.serie=dt.serie; nt.status={estado:'',data:''}; nt.ordem=nextOrdemTema(destC.id); nt.updatedAt=Date.now();
  persistTema(nt);
  closeModal(); if(!DB) renderThemes();
  toast('Aula copiada para '+turmaNome(dt)+'.','ok');
}

/* ---------- Objetos (tabs + conteúdo) ---------- */
function renderObjTabs(){
  const el=document.getElementById('objTabs'); el.innerHTML='';
  OBJ_DEFS.forEach(o=>{
    const b=document.createElement('button');
    b.className=(o.k===activeObj?'active ':'')+(isFilled(editing,o.k)?'done':'');
    b.innerHTML='<span class="badge"></span>'+o.label;
    b.onclick=()=>{ saveActiveObj(); activeObj=o.k; renderObjTabs(); renderObjContent(); };
    el.appendChild(b);
  });
}
function renderObjContent(){
  const def=OBJ_DEFS.find(o=>o.k===activeObj);
  const c=document.getElementById('objContent');
  let body=''; const v=editing.obj[activeObj];
  if(def.tipo==='texto'){ body='<textarea class="big" id="objText" oninput="onObjText()">'+esc(v||'')+'</textarea>'; }
  else if(def.tipo==='slides'){ body=renderListEditor((v||[]),'slide'); }
  else if(def.tipo==='atividade'){ body=renderListEditor((v||[]),'atividade'); }
  else if(def.tipo==='gabarito'){ body=renderListEditor((v||[]),'gabarito'); }
  else if(def.tipo==='questoes'){ body=renderListEditor((v||[]),'questao'); }
  else if(def.tipo==='flashcards'){ body=renderListEditor((v||[]),'flash'); }
  else if(def.tipo==='mapa'){ body='<textarea class="big" id="objText" oninput="onObjText()" placeholder="# Tema central&#10;## Ramo&#10;- subitem">'+esc(v||'')+'</textarea>'; }
  const listTypes=['slides','atividade','gabarito','questoes','flashcards'];
  const maisBtn = listTypes.includes(def.tipo) ? '<button class="btn ghost" id="genMoreBtn" onclick="gerarObjeto(true)">+ gerar mais</button>' : '';
  const focoVal = esc(window.__foco||'');
  c.innerHTML='<div class="obj-actions"><span class="title">'+def.label+'</span>'+
    '<button class="btn primary" id="genBtn" onclick="gerarObjeto()">&#10022; Gerar com IA</button>'+maisBtn+
    '<button class="btn ghost" onclick="openGerarTudo()" title="Gerar vários objetos de uma vez a partir do título/foco">&#10022; tema completo</button>'+'<button class="btn ghost" onclick="undoObj()" title="Desfazer a última geração/exclusão">&#8634;</button></div>'+
    '<input id="genFoco" class="foco" value="'+focoVal+'" oninput="window.__foco=this.value" placeholder="Foco opcional (ex.: governos populistas na América Latina — Vargas, Perón, Cárdenas)">'+
    '<div class="obj-hint">'+def.hint+'</div>'+body;
}
function saveActiveObj(){ const def=OBJ_DEFS.find(o=>o.k===activeObj); if(!def||!editing) return; if(def.tipo==='texto'||def.tipo==='mapa'){ const ta=document.getElementById('objText'); if(ta) editing.obj[activeObj]=ta.value; } }
function onObjText(){
  const def=OBJ_DEFS.find(o=>o.k===activeObj);
  if(def.tipo==='texto'||def.tipo==='mapa'){ editing.obj[activeObj]=document.getElementById('objText').value; edDirty(); }
}
function renderListEditor(arr,kind){
  let html='<div class="card-list" id="cardList">';
  arr.forEach((item,i)=>html+=cardHtml(kind,item,i));
  html+='</div><button class="btn full sm" style="margin-top:12px" onclick="addCard(\''+kind+'\')">+ adicionar</button>';
  return html;
}
function cardHtml(kind,item,i){
  item=item||{};
  if(kind==='slide'){
    return '<div class="mini-card"><div class="row"><span class="num">'+(i+1)+'</span>'+
      '<input placeholder="Título do slide" value="'+esc(item.titulo||'')+'" oninput="updCard(\'slide\','+i+',\'titulo\',this.value)">'+
      '<button class="btn ghost sm" onclick="delCard('+i+')">remover</button></div>'+
      '<label>Tópicos (um por linha)</label>'+
      '<textarea oninput="updCard(\'slide\','+i+',\'topicos\',this.value)">'+esc((item.topicos||[]).join('\n'))+'</textarea></div>';
  }
  if(kind==='atividade'){
    return '<div class="mini-card"><div class="row"><span class="num">'+(i+1)+'</span>'+
      '<button class="btn ghost sm" style="margin-left:auto" onclick="delCard('+i+')">remover</button></div>'+
      '<textarea placeholder="Enunciado da questão/atividade" oninput="updCard(\'atividade\','+i+',\'enunciado\',this.value)">'+esc(item.enunciado||'')+'</textarea></div>';
  }
  if(kind==='gabarito'){
    return '<div class="mini-card"><div class="row"><span class="num">'+(i+1)+'</span>'+
      '<button class="btn ghost sm" style="margin-left:auto" onclick="delCard('+i+')">remover</button></div>'+
      '<label>Resposta</label><textarea oninput="updCard(\'gabarito\','+i+',\'resposta\',this.value)">'+esc(item.resposta||'')+'</textarea>'+
      '<label>Comentário</label><textarea oninput="updCard(\'gabarito\','+i+',\'comentario\',this.value)">'+esc(item.comentario||'')+'</textarea></div>';
  }
  if(kind==='questao'){
    const alts=(item.alternativas||[]); let opt='';
    for(let a=0;a<alts.length;a++) opt+='<option value="'+a+'" '+(item.correta===a?'selected':'')+'>Alt. '+String.fromCharCode(65+a)+'</option>';
    return '<div class="mini-card"><div class="row"><span class="num">'+(i+1)+'</span>'+
      '<button class="btn ghost sm" style="margin-left:auto" onclick="delCard('+i+')">remover</button></div>'+
      '<label>Enunciado</label><textarea oninput="updCard(\'questao\','+i+',\'enunciado\',this.value)">'+esc(item.enunciado||'')+'</textarea>'+
      '<label>Alternativas (uma por linha)</label>'+
      '<textarea oninput="updCard(\'questao\','+i+',\'alternativas\',this.value)">'+esc(alts.join('\n'))+'</textarea>'+
      '<div class="row" style="margin-top:8px"><label style="margin:0">Correta:</label><select onchange="updCard(\'questao\','+i+',\'correta\',this.value)">'+(opt||'<option>—</option>')+'</select></div>'+
      '<label>Comentário</label><textarea oninput="updCard(\'questao\','+i+',\'comentario\',this.value)">'+esc(item.comentario||'')+'</textarea></div>';
  }
  if(kind==='flash'){
    return '<div class="mini-card"><div class="row"><span class="num">'+(i+1)+'</span>'+
      '<button class="btn ghost sm" style="margin-left:auto" onclick="delCard('+i+')">remover</button></div>'+
      '<label>Frente</label><textarea oninput="updCard(\'flash\','+i+',\'frente\',this.value)">'+esc(item.frente||'')+'</textarea>'+
      '<label>Verso</label><textarea oninput="updCard(\'flash\','+i+',\'verso\',this.value)">'+esc(item.verso||'')+'</textarea></div>';
  }
  return '';
}
function curArr(){ if(!Array.isArray(editing.obj[activeObj])) editing.obj[activeObj]=[]; return editing.obj[activeObj]; }
function addCard(kind){
  const a=curArr();
  if(kind==='slide')a.push({titulo:'',topicos:[]});
  else if(kind==='atividade')a.push({enunciado:''});
  else if(kind==='gabarito')a.push({resposta:'',comentario:''});
  else if(kind==='questao')a.push({enunciado:'',alternativas:['','','',''],correta:0,comentario:''});
  else if(kind==='flash')a.push({frente:'',verso:''});
  edDirty(); renderObjContent();
}
let undoStack=[];
function pushUndo(){ if(editing&&editing.obj){ undoStack.push(JSON.stringify(editing.obj)); if(undoStack.length>15) undoStack.shift(); } }
function undoObj(){ if(!undoStack.length){ toast('Nada para desfazer.',''); return; } editing.obj=JSON.parse(undoStack.pop()); collectMeta(); persistTema(editing); dirty=false; renderObjTabs(); renderObjContent(); toast('Desfeito.','ok'); }
function delCard(i){ pushUndo(); curArr().splice(i,1); edDirty(); renderObjContent(); }
function updCard(kind,i,field,val){
  const a=curArr();
  if(field==='topicos'||field==='alternativas') a[i][field]=val.split('\n');
  else if(field==='correta') a[i][field]=parseInt(val,10);
  else a[i][field]=val;
  edDirty();
}

/* ---------- Geração com Claude ---------- */
async function gerarObjeto(append){
  const key=getKey();
  if(!key){ toast('Configure a chave da API Claude em ⚙ primeiro.','err'); return; }
  collectMeta();
  const def=OBJ_DEFS.find(o=>o.k===activeObj);
  const existente=editing.obj[activeObj];
  pushUndo();
  const btn=document.getElementById(append?'genMoreBtn':'genBtn');
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span> Gerando…'; }
  try{
    const foco=(document.getElementById('genFoco')||{}).value||'';
    const {system,user,parse}=promptFor(def, editing, append?existente:null, foco);
    const raw=await callClaude(system,user,key);
    const novo=parse(raw);
    const vazio=(Array.isArray(novo)&&!novo.length)||(typeof novo==='string'&&!novo.trim());
    if(vazio){ toast('A IA retornou vazio — mantive o que já existia. Tente de novo ou ajuste o foco.','err'); if(btn){btn.disabled=false;btn.innerHTML='✦ Gerar com IA';} return; }
    if(append && Array.isArray(existente) && Array.isArray(novo)) editing.obj[activeObj]=existente.concat(novo);
    else editing.obj[activeObj]=novo;
    collectMeta(); persistTema(editing); dirty=false;   // salva já — não perde no reload
    renderObjTabs(); renderObjContent();
    toast(append?'Itens adicionais gerados e salvos.':'Conteúdo gerado e salvo.','ok');
  }catch(e){ console.error(e); toast('Erro na geração: '+e.message,'err');
    if(btn){ btn.disabled=false; btn.innerHTML='✦ Gerar com IA'; } }
}
async function genObjFor(temaObj, objKey){
  const def=OBJ_DEFS.find(o=>o.k===objKey);
  if(!def) throw new Error('objeto desconhecido: '+objKey);
  const {system,user,parse}=promptFor(def, temaObj, null, '');
  let raw;
  for(let tent=0; tent<2; tent++){
    try{ raw=await callClaude(system,user,getKey()); break; }
    catch(e){ if(tent===0 && /\b429\b|rate/i.test(e.message)){ await new Promise(r=>setTimeout(r,1600)); continue; } throw e; }
  }
  const novo=parse(raw);
  const vazio=(Array.isArray(novo)&&!novo.length)||(typeof novo==='string'&&!novo.trim());
  return vazio?null:novo;
}
function openGerarTudo(){
  if(!editing){ toast('Abra um tema primeiro.','err'); return; }
  const itens=[['textoQuadro','Texto de quadro'],['textoAluno','Estudo'],['slides','Slides'],['atividade','Atividade'],['gabarito','Gabarito'],['questoes','Questões'],['flashcards','Flash cards'],['mapaMental','Mapa mental'],['planejamento','Planejamento']];
  const defOn=['textoQuadro','textoAluno','slides','atividade','gabarito'];
  const checks=itens.map(([k,l])=>'<label class="check"><input type="checkbox" value="'+k+'" '+(defOn.includes(k)?'checked':'')+'> '+l+'</label>').join('');
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h3>Gerar tema completo</h3></div>'+
    '<div class="modal-b"><small>A IA preenche de uma vez os objetos marcados, a partir do título/foco. Os objetos marcados serão substituídos.</small>'+
    '<div class="field" style="margin-top:10px"><label>Tema / foco</label><input id="gtFoco" value="'+esc(editing.nome||'')+'" placeholder="ex.: Governos populistas na América Latina (Vargas, Perón, Cárdenas)"></div>'+
    '<div class="field"><label>Gerar</label><div class="gt-checks">'+checks+'</div></div>'+
    '<div id="gtProg" class="statusdot"></div></div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" id="gtBtn" onclick="gerarTudo()">Gerar</button></div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);
}
async function genOne(key, foco){
  const def=OBJ_DEFS.find(o=>o.k===key);
  const {system,user,parse}=promptFor(def, editing, null, foco);
  const raw=await callClaude(system,user,getKey());
  const novo=parse(raw);
  const vazio=(Array.isArray(novo)&&!novo.length)||(typeof novo==='string'&&!novo.trim());
  if(vazio) return false;
  editing.obj[key]=novo; return true;
}
async function gerarTudo(){
  const key=getKey();
  if(!key){ toast('Configure a chave da API em ⚙.','err'); return; }
  const foco=document.getElementById('gtFoco').value.trim();
  let keys=[...document.querySelectorAll('#modalWrap input[type=checkbox]:checked')].map(c=>c.value);
  if(!keys.length){ toast('Marque ao menos um objeto.','err'); return; }
  const ord=OBJ_DEFS.map(o=>o.k); keys.sort((a,b)=>ord.indexOf(a)-ord.indexOf(b));
  const btn=document.getElementById('gtBtn'); btn.disabled=true;
  const prog=document.getElementById('gtProg');
  collectMeta(); if(foco && !editing.nome) editing.nome=foco;
  let ok=0;
  for(const k of keys){
    const def=OBJ_DEFS.find(o=>o.k===k);
    prog.innerHTML='<span class="spin dark"></span> Gerando '+def.label+'… ('+(ok+1)+'/'+keys.length+')';
    try{ const okk=await genOne(k, foco); if(okk){ ok++; collectMeta(); persistTema(editing); dirty=false; } }
    catch(e){ prog.textContent='Erro em '+def.label+': '+e.message; }
  }
  collectMeta(); persistTema(editing); dirty=false; closeModal();
  const ed=document.getElementById('editor');
  if(ed && !ed.classList.contains('hidden')){ document.getElementById('edNome').value=editing.nome||''; renderObjTabs(); renderObjContent(); }
  toast('Tema gerado ('+ok+'/'+keys.length+'). Revise e Salve.','ok');
}
function ctx(t, opt){
  opt=opt||{};
  const bimNum=(t.bimestre||'').charAt(0);
  let s='Disciplina: '+t.disciplina+'\nSérie/Ano: '+t.serie+'\nTema: '+t.nome+'\n';
  if(!opt.semCodigo){
    if(t.dcgo) s+='Código DC-GO/BNCC: '+t.dcgo+'\n';
    if(t.habilidade) s+='Habilidade essencial: '+t.habilidade+'\n';
  }
  if(t.resumo) s+='Resumo: '+t.resumo+'\n';
  s+='Contexto curricular: Matrizes Essenciais SEDUC-GO / DC-GO Ampliado, '+bimNum+'º bimestre.';
  // GoiásTec como referência curricular prioritária quando a habilidade tem o selo
  if(!opt.semCodigo && t.dcgo){ const it=matrizItem(t.disciplina,t.serie,t.bimestre,t.dcgo); if(it&&it.g===1) s+='\nEsta habilidade possui material no GoiásTec (plataforma oficial SEDUC-GO): alinhe o conteúdo à abordagem das Matrizes Essenciais/GoiásTec para esta habilidade.'; }
  // anti-redundância: avisa dos temas vizinhos do mesmo conteúdo
  try{
    const irmaos=Object.values(temas).filter(x=>x && x.conteudoId===t.conteudoId && x.id!==t.id).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
    if(irmaos.length){ s+='\n\nOUTROS TEMAS DO MESMO CONTEÚDO (serão tratados em aulas separadas — NÃO repita o que pertence a eles; foque apenas no recorte específico de "'+t.nome+'"): '+irmaos.map(x=>x.nome).filter(Boolean).join('; ')+'.'; }
  }catch(e){}
  return s;
}
function promptFor(def,t,existentes,foco){
  const temFoco = foco && foco.trim();
  let base=ctx(t, temFoco?{semCodigo:true}:null);
  if(temFoco){
    base = 'ASSUNTO/FOCO PRINCIPAL (prioridade máxima, gere SOBRE ISTO): '+foco.trim()+'\n\n'+base+
      '\n\nIMPORTANTE: produza o conteúdo sobre o ASSUNTO/FOCO acima, mesmo que vá além do título do tema (há projetos interdisciplinares e temas transversais). Mantenha rigor histórico e linguagem da série.';
  }
  if(existentes && existentes.length){
    const resumo=existentes.map((x,i)=>(i+1)+'. '+(x.enunciado||x.frente||x.titulo||x.resposta||'').slice(0,80)).join('\n');
    base+='\n\nJÁ EXISTEM estes itens — gere itens ADICIONAIS, DIFERENTES e que não repitam os abaixo:\n'+resumo;
  }
  const sysBase='Você é uma professora experiente de Ciências Humanas da rede estadual de Goiás. Escreva em português do Brasil, com rigor historiográfico e linguagem adequada à série. Responda apenas com o conteúdo pedido, sem preâmbulos.';
  const txt=(s)=>({system:sysBase,user:s,parse:r=>r.trim()});
  const json=(sys,u)=>({system:sys+' Responda SOMENTE com JSON válido, sem cercas de código nem texto fora do JSON.',user:u,parse:r=>parseJSON(r)});
  switch(def.k){
    case 'planejamento': return txt(base+'\n\nProduza um PLANEJAMENTO de aula: objetivos de aprendizagem, recursos, sequência didática em passos e formas de avaliação. Texto corrido com subtítulos simples. Ao final, inclua uma seção "Referências" com 2 a 4 obras/autores acadêmicos REAIS e reconhecidos sobre o tema (formato ABNT). Não invente títulos, autores, anos, páginas ou DOIs; se não tiver certeza de um dado, omita-o em vez de inventar.');
    case 'textoQuadro': return txt(base+'\n\nProduza um TEXTO DE QUADRO curto, para os alunos copiarem da lousa em UMA aula: entre 100 e 250 palavras no total. Use um título, poucos tópicos curtos com palavras-chave e, no máximo, uma definição essencial. Nada de parágrafos longos. Se o tema for amplo, foque apenas no recorte de uma aula.');
    case 'textoAluno': return txt(base+'\n\nProduza um TEXTO PARA ESTUDO DO ALUNO: prosa explicativa, parágrafos completos e linguagem adequada à série, para leitura e estudo. Inclua 2 perguntas de reflexão e, ao final, uma seção "Referências" com 2 a 4 obras/autores acadêmicos REAIS e reconhecidos sobre o tema (formato ABNT). Não invente títulos, autores, anos ou páginas; na dúvida, omita o dado em vez de inventar.');
    case 'slides': return json('Você cria slides de aula para projeção.', base+'\n\nGere de 5 a 7 slides como JSON: array de {"titulo": string, "topicos": [string,...]}. Cada slide com 3 a 5 tópicos curtos.');
    case 'atividade': return json('Você cria atividades escolares formativas, com rigor histórico, sem múltipla escolha com distratores e sem entregar a resposta no enunciado.', base+'\n\nGere uma ATIVIDADE com 5 itens como JSON: array de {"enunciado": string}. REGRAS: (1) NUNCA inclua a resposta no próprio enunciado nem deixe a resposta óbvia pela formulação; o gabarito fica só na aba Gabarito. (2) Em itens de completar lacunas, você pode oferecer um banco de palavras EM ORDEM ALEATÓRIA, mas sem indicar qual palavra vai em qual lacuna. (3) NÃO use múltipla escolha com alternativas. (4) Varie os tipos: discursiva, completar lacunas, relacionar colunas (descreva as duas colunas embaralhadas, sem o par pronto), análise de trecho de texto e leitura de imagem/charge. (5) Mantenha rigor historiográfico e linguagem da série.');
    case 'gabarito': {
      const at=(t.obj.atividade||[]).map((x,i)=>(i+1)+'. '+x.enunciado).join('\n');
      return json('Você corrige atividades escolares.', base+'\n\n'+(at?('Atividade existente:\n'+at):'Crie respostas para 5 questões coerentes com o tema.')+'\n\nGere o gabarito comentado como JSON: array de {"resposta": string, "comentario": string}, na mesma ordem.');
    }
    case 'questoes': return json('Você elabora questões de múltipla escolha no estilo ENEM (texto-base ou contexto + comando claro).', base+'\n\nGere 5 questões estilo ENEM como JSON: array de {"enunciado": string (pode conter um pequeno texto-base seguido do comando), "alternativas": [5 strings], "correta": índice 0-4, "comentario": string explicando a correta e por que cada distrator está errado}.');
    case 'flashcards': return json('Você cria flash cards de revisão.', base+'\n\nGere 8 flash cards como JSON: array de {"frente": string, "verso": string}.');
    case 'mapaMental': return {system:'Você organiza conteúdos em mapas mentais hierárquicos.',user:base+'\n\nProduza um mapa mental em MARKDOWN hierárquico: "# Tema central", depois "## Ramos" e "- subitens". Apenas o markdown.',parse:r=>r.replace(/```[a-z]*|```/g,'').trim()};
  }
}
function parseJSON(raw){
  let s=raw.replace(/```json|```/g,'').trim();
  const a=s.indexOf('['), b=s.lastIndexOf(']');
  if(a>=0&&b>a) s=s.slice(a,b+1);
  return JSON.parse(s);
}
async function callClaude(system,user,key){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:getModel(),max_tokens:2500,system,messages:[{role:'user',content:user}]})
  });
  if(!res.ok){ const e=await res.text(); throw new Error('API '+res.status+': '+e.slice(0,160)); }
  const data=await res.json();
  return (data.content||[]).map(b=>b.text||'').join('\n').trim();
}
async function callClaudeWeb(system,user,key){

/* ---------- Busca de imagem (Wikimedia) — projeção e fixar no tema ---------- */
async function wikimediaSearch(term){
  const url='https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrsearch='+
    encodeURIComponent(term)+'&gsrlimit=40&prop=imageinfo&iiprop=url|mime|mediatype&iiurlwidth=480&format=json&origin=*';
  const r=await fetch(url); const d=await r.json();
  const pages=d.query?Object.values(d.query.pages):[];
  return pages.map(p=>p.imageinfo&&p.imageinfo[0]).filter(Boolean)
    // remove só PDFs, DjVu, TIFF e SVG (digitalizações/páginas de texto); mantém fotos/figuras
    .filter(im=>{ const u=(im.url||'').split('?')[0].toLowerCase(); if(/\.(pdf|djvu|tif|tiff|svg|ogg|ogv|webm|wav|mid)$/.test(u)) return false; if(im.mediatype && im.mediatype!=='BITMAP' && im.mediatype!=='DRAWING') return false; return !!(im.thumburl||im.url); })
    .map(im=>({thumburl:im.thumburl||im.url, url:im.url, fonte:'Wikimedia'}));
}
async function openverseSearch(term){
  try{
    const url='https://api.openverse.org/v1/images/?q='+encodeURIComponent(term)+'&page_size=30&mature=false';
    const r=await fetch(url); if(!r.ok) return []; const d=await r.json();
    return (d.results||[]).map(x=>({thumburl:x.thumbnail||x.url, url:x.url, fonte:'Openverse'})).filter(x=>x.url);
  }catch(e){ return []; }
}
async function searchImages(term){
  const [a,b]=await Promise.all([wikimediaSearch(term).catch(()=>[]), openverseSearch(term).catch(()=>[])]);
  const seen=new Set(), out=[]; const max=Math.max(a.length,b.length);
  for(let i=0;i<max;i++){ [a[i],b[i]].forEach(im=>{ if(im&&!seen.has(im.url)){ seen.add(im.url); out.push(im); } }); }
  return out;
}

async function imgBuscar(){

/* ================= FASE 2 — ABA BIMESTRE ================= */
const BIM_RANGES = {
  '1º Bimestre':['2026-01-20','2026-04-10'],
  '2º Bimestre':['2026-04-11','2026-06-30'],
  '3º Bimestre':['2026-08-03','2026-10-07'],
  '4º Bimestre':['2026-10-08','2026-12-18']
};
const FERIADOS_2026 = new Set(['2026-01-01','2026-02-17','2026-04-03','2026-04-05','2026-04-21','2026-05-01','2026-06-04','2026-06-15','2026-09-07','2026-10-12','2026-10-24','2026-10-28','2026-11-02','2026-11-15','2026-11-20','2026-11-30','2026-12-25']);
const WD_NOMES = {1:'Segunda',2:'Terça',3:'Quarta',4:'Quinta',5:'Sexta'};
// grades conhecidas do horário do CEPI Marajó (getDay: 2=Ter,3=Qua)
const KNOWN_GRADES = { 'História|9º ano|A|CEPI Marajó':{2:1,3:2}, 'História|9º ano|C|CEPI Marajó':{2:2,3:1} };
function turmaKey(t){ return [t.disciplina,t.serie,t.letra||'',t.unidade||''].join('|'); }
function gradeDe(t){ return (t&&t.grade) || KNOWN_GRADES[turmaKey(t)] || {}; }
function isoLocal(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function contarAulas(t, bim){
  const r=BIM_RANGES[bim]; const grade=gradeDe(t); if(!r) return {total:0,semanas:0};
  const [iy,im,id]=r[0].split('-').map(Number), [fy,fm,fd]=r[1].split('-').map(Number);
  let cur=new Date(iy,im-1,id); const end=new Date(fy,fm-1,fd);
  let total=0;
  while(cur<=end){ const wd=cur.getDay(); if(grade[wd] && !FERIADOS_2026.has(isoLocal(cur))) total+=grade[wd]; cur.setDate(cur.getDate()+1); }
  return {total};
}
function openBimestre(){
  if(!scope.turma){ toast('Selecione uma turma primeiro.','err'); return; }
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:680px">'+
    '<div class="modal-h"><h3>Bimestre — aulas e distribuição</h3></div>'+
    '<div class="modal-b" id="bimBody"></div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Fechar</button></div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);
  renderBimBody();
}
function renderBimBody(){
  const box=document.getElementById('bimBody'); if(!box) return;
  const tu=turmas[scope.turma]||{}; const grade=gradeDe(tu);
  const cont=contarAulas(tu, scope.bim);
  // editor de dias/aulas por semana
  let gradeHtml='<div class="bim-grade">'+[1,2,3,4,5].map(wd=>{
    const n=grade[wd]||0;
    return '<label class="bim-day"><span>'+WD_NOMES[wd]+'</span><input type="number" min="0" max="4" value="'+n+'" onchange="setGrade('+wd+',this.value)"></label>';
  }).join('')+'</div>';
  // temas do bimestre (todos os conteúdos), em ordem cronológica
  const temasBim=[];
  conteudosDoScope().forEach(c=> temasDoConteudo(c.id).forEach(t=>temasBim.push(t)) );
  let aula=1, linhas='';
  temasBim.forEach(t=>{
    const n=Math.max(1, parseInt(t.aulasEstim,10)||1);
    const ini=aula, fim=aula+n-1; const faixa = ini===fim?('Aula '+ini):('Aulas '+ini+'–'+fim);
    aula=fim+1;
    const d=t.tempoDetalhe; const det = d? '<span class="bim-det">≈ '+d.explic+' min explicar/corrigir + '+d.mec+' min copiar/ler/responder = '+d.total+' min</span>':'';
    linhas+='<div class="bim-row"><span class="bim-faixa">'+faixa+'</span>'+

    '</div>';
  });
  const usadas=aula-1;
  const saldo = cont.total - usadas;

  box.innerHTML =
    '<small>Turma <b>'+esc(turmaNome(tu))+'</b> · '+esc(scope.bim)+'. As aulas são contadas pelo período oficial menos os feriados do calendário. Ajuste os dias/aulas por semana da turma:</small>'+
    gradeHtml+

    (Object.keys(grade).length? '' : '<div class="statusdot" style="color:#b4451f">Defina os dias/aulas acima para esta turma (não tenho a grade dela).</div>')+
    '<div class="field" style="margin-top:12px"><label>Distribuição dos temas (ordem cronológica)</label>'+
      '<button class="btn ghost sm" onclick="estimarAulasIA()" id="estBtn">✦ estimar aulas por tema (IA)</button>'+
      '<div class="bim-list" style="margin-top:8px">'+(linhas||'<div class="statusdot">Nenhum tema neste bimestre ainda.</div>')+'</div>'+
      '<div class="bim-saldo" style="color:'+cor+'">Aulas usadas: <b>'+usadas+'</b> de '+cont.total+(saldo<0?(' — faltam '+(-saldo)+' aula(s)'):(saldo>0?(' — sobram '+saldo+' aula(s)'):' — encaixe exato'))+'</div>'+
    '</div>';
}
function setGrade(wd,val){
  const tu=turmas[scope.turma]; if(!tu) return;
  if(!tu.grade) tu.grade=Object.assign({},gradeDe(tu));
  const n=parseInt(val,10)||0; if(n>0) tu.grade[wd]=n; else delete tu.grade[wd];
  persistTurma(tu); renderBimBody();
}
function setAulasTema(tid,val){
  const t=temas[tid]; if(!t) return; t.aulasEstim=Math.max(1,parseInt(val,10)||1); persistTema(t); renderBimBody();
}
function wordCount(x){ return String(x||'').trim().split(/\s+/).filter(Boolean).length; }
/* tempo MECÂNICO (alunos): cópia ~10 pal/min, leitura ~120 pal/min, ~6min/atividade, ~4min/questão */
function tempoMecanico(t){
  const o=t.obj||{};
  const copia   = wordCount(o.textoQuadro)/10;
  const leitura = wordCount(o.textoAluno)/120;
  const resposta= (o.atividade||[]).length*6 + (o.questoes||[]).length*4;
  const flash   = (o.flashcards||[]).length*0.5;
  return Math.round(copia+leitura+resposta+flash);
}
async function estimarAulasIA(){
  const key=getKey(); if(!key){ toast('Configure a chave da IA em ⚙.','err'); return; }
  const temasBim=[]; conteudosDoScope().forEach(c=> temasDoConteudo(c.id).forEach(t=>temasBim.push(t)) );
  if(!temasBim.length){ toast('Nenhum tema neste bimestre.','err'); return; }
  const btn=document.getElementById('estBtn'); if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin dark"></span> estimando…'; }
  // manda o CONTEÚDO REAL (resumido) para a IA julgar a densidade da explicação
  const blocos=temasBim.map((t,i)=>{
    const o=t.obj||{};
    const conteudo=[o.textoQuadro,o.textoAluno].filter(Boolean).join('\n').slice(0,900);
    return 'TEMA '+(i+1)+': '+(t.nome||'(sem título)')+'\nConteúdo: '+(conteudo||'(ainda sem texto gerado — estime pelo título)');
  }).join('\n\n');
  try{
    const sys='Você é professora experiente de '+(temasBim[0].serie||'')+' ('+(temasBim[0].disciplina||'')+'). Estime o tempo de AULA, em minutos, para EXPLICAR e DISCUTIR/CORRIGIR cada tema, conforme a densidade do conteúdo real. NÃO inclua tempo de cópia, leitura ou resposta dos alunos (isso é somado à parte). Aula padrão = 50 min.';
    const usr='Para cada tema, devolva o tempo de explicação+correção em MINUTOS. Responda APENAS um JSON: array de inteiros (10 a 200), na MESMA ordem dos temas, sem texto extra.\n\n'+blocos;
    const raw=await callClaude(sys,usr,key);
    const arr=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(Array.isArray(arr)) temasBim.forEach((t,i)=>{
      const explic=Math.max(0,parseInt(arr[i],10)||0);
      const mec=tempoMecanico(t);
      const total=explic+mec;
      t.aulasEstim=Math.max(1, Math.round(total/50));
      t.tempoDetalhe={explic, mec, total};
      persistTema(t);
    });
    toast('Estimativa recalculada: explicação (IA) + cópia/leitura/resposta (réguas).','ok');
  }catch(e){ toast('Não consegui estimar agora: '+e.message,'err'); }
  if(btn){ btn.disabled=false; btn.innerHTML='✦ estimar aulas por tema (IA)'; }
  renderBimBody();
}

function closeModal(){ const w=document.getElementById('modalWrap'); if(w)w.remove(); }
function saveConfig(){
  const key=document.getElementById('cfgKey').value.trim();
  const model=document.getElementById('cfgModel').value.trim()||'claude-sonnet-4-6';
  const fb=document.getElementById('cfgFb').value.trim();
  localStorage.setItem(LS_MODEL,model);
  let fbChanged=false;
  if(fb!==(localStorage.getItem(LS_FB)||'')){
    if(fb){ try{ JSON.parse(fb); }catch(e){ toast('Firebase: JSON inválido.','err'); return; } }
    localStorage.setItem(LS_FB,fb); fbChanged=true;
  }
  if(DB){ DB.ref('anthropicKey').set(key); } else { localStorage.setItem(LS_KEY,key); }
  closeModal();
  if(fbChanged){ toast('Configurações salvas. Recarregando…','ok'); setTimeout(()=>location.reload(),700); }
  else toast('Configurações salvas.','ok');
}
function exportBackup(){
  const data=JSON.stringify({version:2,exportedAt:new Date().toISOString(),conteudos,temas,turmas},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='leciona-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('Backup exportado.','ok');
}
function importBackup(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    let n=0;
    if(d.conteudos) Object.values(d.conteudos).forEach(c=>{ if(c&&c.id){ persistConteudo(c); } });
    if(d.turmas) Object.values(d.turmas).forEach(t=>{ if(t&&t.id){ persistTurma(t); } });
    const imp=d.temas||d;
    Object.values(imp).forEach(t=>{ if(t&&t.id){ persistTema(t); n++; } });
    if(!DB){ migrateAndRender(); }
    toast(n+' tema(s) importado(s).','ok');
  }catch(e){ toast('Arquivo inválido.','err'); } };
  r.readAsText(f); ev.target.value='';
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ if(e&&(e.name==='QuotaExceededError'||/quota/i.test(e.message))) toast('Armazenamento local cheio — baixe um backup ou confie no Firebase.','err'); } }
function mdInline(s){
  let h=esc(s);
  h=h.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/__([^_\n]+)__/g,'<strong>$1</strong>');
  h=h.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<em>$2</em>');
  return h;
}
function mdCells(line){ let s=line.trim(); if(s.startsWith('|'))s=s.slice(1); if(s.endsWith('|'))s=s.slice(0,-1); return s.split('|').map(c=>c.trim()); }
function mdIsSep(line){ const t=line.trim(); return /^[\s|:\-]+$/.test(t) && t.indexOf('-')>=0; }
function renderMd(s, mode){
  const HB = mode==='print' ? '<p class="mh">' : '<h2>';
  const HE = mode==='print' ? '</p>' : '</h2>';
  const lines=String(s||'').split('\n'); let out='',inList=false,i=0;
  const closeL=()=>{ if(inList){out+='</ul>';inList=false;} };
  while(i<lines.length){
    const t=lines[i].trim();
    if(t.startsWith('|') && i+1<lines.length && mdIsSep(lines[i+1])){
      closeL(); const head=mdCells(lines[i]); i+=2; const rows=[];
      while(i<lines.length && lines[i].trim().startsWith('|')){ rows.push(mdCells(lines[i])); i++; }
      out+='<table class="md"><thead><tr>'+head.map(c=>'<th>'+mdInline(c)+'</th>').join('')+'</tr></thead><tbody>'+
        rows.map(r=>'<tr>'+head.map((_,ci)=>'<td>'+mdInline(r[ci]||'')+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
      continue;
    }
    if(/^#{1,6}\s/.test(t)){ closeL(); out+=HB+mdInline(t.replace(/^#+\s/,''))+HE; }
    else if(/^[-*•]\s/.test(t)){ if(!inList){out+='<ul>';inList=true;} out+='<li>'+mdInline(t.replace(/^[-*•]\s/,''))+'</li>'; }
    else if(t===''){ closeL(); }
    else { closeL(); out+='<p>'+mdInline(t)+'</p>'; }
    i++;
  }
  closeL(); return out;
}
function textToHtml(s){ return renderMd(s,'screen'); }
/* Mapa mental gráfico (blocos hierárquicos) para o PDF */
function buildMapTree(md){
  const lines=String(md||'').split('\n').filter(l=>l.trim());
  const root={text:'',level:-1,children:[]}; const stack=[root];
  lines.forEach(l=>{
    let level,text; const h=l.match(/^(#{1,6})\s+(.*)/);
    if(h){ level=h[1].length-1; text=h[2]; }
    else { const m=l.match(/^(\s*)[-*•]\s+(.*)/);
      if(m){ const ind=m[1].replace(/\t/g,'  ').length; level=2+Math.floor(ind/2); text=m[2]; }
      else { level=2; text=l.replace(/^[-*•]\s*/,''); } }
    const node={text:text.trim(),level,children:[]};
    while(stack.length>1 && stack[stack.length-1].level>=level) stack.pop();
    stack[stack.length-1].children.push(node); stack.push(node);
  });
  return root;
}
function mdMapToHtml(md){
  const root=buildMapTree(md);
  const render=(nodes,d)=> nodes.length? '<ul class="mm-tree">'+nodes.map(c=>'<li><div class="mm-box mm-l'+Math.min(d,4)+'">'+mdInline(c.text)+'</div>'+render(c.children,d+1)+'</li>').join('')+'</ul>' : '';
  let central=null;
  if(root.children.length===1) central=root.children[0];
  if(central) return '<div class="mm"><div class="mm-box mm-root">'+mdInline(central.text)+'</div>'+render(central.children,1)+'</div>';
  return '<div class="mm">'+render(root.children,1)+'</div>';
}
let _mmiId=0;
function mapInterativo(md){
  const root=buildMapTree(md);
  function node(n,depth){
    const has=n.children.length; const nid='mmi'+(_mmiId++);
    return '<div class="mmi-node mmi-d'+Math.min(depth,4)+'">'+
      '<div class="mmi-head'+(has?' has':'')+'"'+(has?(' onclick="mmiToggle(\''+nid+'\')"'):'')+'>'+
        (has?('<span class="mmi-tg" id="tg'+nid+'">▾</span>'):'<span class="mmi-dot">•</span>')+
        '<span>'+mdInline(n.text)+'</span></div>'+
      (has?('<div class="mmi-kids" id="'+nid+'">'+n.children.map(c=>node(c,depth+1)).join('')+'</div>'):'')+
    '</div>';
  }
  _mmiId=0;
  let central=root.children.length===1?root.children[0]:null;
  if(central) return node(central,0);
  return root.children.map(c=>node(c,0)).join('');
}
function mmiToggle(id){ const el=document.getElementById(id), tg=document.getElementById('tg'+id); if(!el)return; const hide=el.style.display!=='none'; el.style.display=hide?'none':''; if(tg)tg.textContent=hide?'▸':'▾'; }

function toast(msg,kind){
  const el=document.getElementById('toast');
  const d=document.createElement('div'); d.className='toast '+(kind||''); d.textContent=msg;
  el.appendChild(d); setTimeout(()=>d.remove(),4200);
}
