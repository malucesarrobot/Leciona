  box.innerHTML = imgs.length ? imgs.map((im,i)=>'<div class="it"><img src="'+esc(im.thumburl||im.url)+'"><button onclick="removerImagem('+i+')" title="remover">✕</button></div>').join('') : '<div class="statusdot">Nenhuma imagem fixada.</div>';
}
function removerImagem(i){ editing.imagens.splice(i,1); renderImagensEditor(); edDirty(); }

/* ---------- Cronograma (planejamento por conteúdo) ----------
   O campo 'planejamento' vive no CONTEÚDO (não no tema/objeto): um conteúdo
   pode ter vários temas/aulas, e o cronograma é a distribuição deles no
   tempo — data prevista + qual dos 5 objetos será dado naquela aula.
   Cada entrada: {id, data:'AAAA-MM-DD', temaId, objeto, obs}. */
function renderCronograma(){
  const box=document.getElementById('edCronograma'); if(!box) return;
  // lê do <select> (não de editing.conteudoId) pra refletir a troca de Conteúdo
  // na hora, mesmo antes do autosave rodar collectMeta() e persistir a mudança.
  const cid=(document.getElementById('edConteudo')||{}).value || editing.conteudoId;
  const cont=cid?conteudos[cid]:null;
  if(!cont){ box.innerHTML='<p class="statusdot" style="font-size:12px">Escolha um Conteúdo (acima) pra habilitar o cronograma.</p>'; return; }
  const plan=(cont.planejamento||[]).slice().sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const temasDoCont=temasDoConteudo(cid);
  const temaOpts=temasDoCont.map(t=>'<option value="'+t.id+'"'+(t.id===editing.id?' selected':'')+'>'+esc((t.nome||'(sem nome)').slice(0,40))+'</option>').join('');
  const objOpts=OBJ_DEFS.map(o=>'<option value="'+o.k+'">'+esc(o.label)+'</option>').join('');
  const lista = plan.length ? plan.map(p=>{
    const tm=temas[p.temaId];
    const objLabel=(OBJ_DEFS.find(o=>o.k===p.objeto)||{}).label||p.objeto||'—';
    const dataFmt=p.data?new Date(p.data+'T00:00:00').toLocaleDateString('pt-BR'):'—';
    return '<div class="turma-row"><span class="tn" style="flex:0 0 76px">'+esc(dataFmt)+'</span>'+
      '<span style="flex:1;font-size:12px">'+esc(tm?tm.nome:'(tema removido)')+' · '+esc(objLabel)+(p.obs?(' · '+esc(p.obs)):'')+'</span>'+
      '<button class="btn ghost sm" onclick="remPlanejamento(\''+p.id+'\')" title="Remover">✕</button></div>';
  }).join('') : '<p class="statusdot" style="font-size:12px">Nenhuma aula planejada ainda.</p>';
  box.innerHTML = lista+
    '<div class="addrow" style="margin-top:8px;flex-wrap:wrap">'+
      '<input type="date" id="cronData" style="flex:0 0 132px">'+
      '<select id="cronTema" style="flex:1;min-width:130px">'+temaOpts+'</select>'+
      '<select id="cronObjeto" style="flex:0 0 116px">'+objOpts+'</select>'+
    '</div>'+
    '<div class="addrow" style="margin-top:6px">'+
      '<input id="cronObs" placeholder="observação (opcional)" style="flex:1">'+
      '<button class="btn sm" onclick="addPlanejamento()">+ Adicionar</button>'+
    '</div>';
}
function addPlanejamento(){
  const cid=(document.getElementById('edConteudo')||{}).value || editing.conteudoId;
  if(!cid){ toast('Escolha um Conteúdo primeiro.','err'); return; }
  const cont=conteudos[cid]; if(!cont) return;
  const data=(document.getElementById('cronData')||{}).value;
  const temaId=(document.getElementById('cronTema')||{}).value;
  const objeto=(document.getElementById('cronObjeto')||{}).value;
  const obs=(document.getElementById('cronObs')||{}).value.trim();
  if(!data){ toast('Escolha uma data.','err'); return; }
  if(!temaId){ toast('Este conteúdo ainda não tem tema pra planejar.','err'); return; }
  if(!cont.planejamento) cont.planejamento=[];
  cont.planejamento.push({id:uid(),data,temaId,objeto,obs});
  persistConteudo(cont);
  renderCronograma();
  toast('Aula adicionada ao cronograma.','ok');
}
function remPlanejamento(pid){
  const cid=(document.getElementById('edConteudo')||{}).value || editing.conteudoId;
  const cont=cid?conteudos[cid]:null; if(!cont||!cont.planejamento) return;
  cont.planejamento=cont.planejamento.filter(p=>p.id!==pid);
  persistConteudo(cont);
  renderCronograma();
}
/* Todas as aulas planejadas (em qualquer conteúdo/turma) para uma data. */
function planejamentosDoDia(dataISO){
  const out=[];
  Object.values(conteudos).forEach(c=>{
    (c.planejamento||[]).forEach(p=>{ if(p.data===dataISO){ const t=temas[p.temaId]; if(t) out.push({conteudo:c, entry:p, tema:t}); } });
  });
  return out;
}
/* Abre o editor já no tema certo, ajustando o escopo (disciplina/turma/bimestre)
   a partir do conteúdo — usado pelos atalhos do cronograma na tela Hoje. */
function abrirTemaDoDia(temaId){
  const t=temas[temaId]; if(!t) return;
  const c=conteudos[t.conteudoId]; const tu=c?turmas[c.turmaId]:null;
  if(tu){
    scope.disc=tu.disciplina; scope.unidade=tu.unidade; scope.serie=tu.serie||'—'; scope.bim=t.bimestre||scope.bim; scope.turma=tu.id;
    const selDisc=document.getElementById('selDisc'); if(selDisc) selDisc.value=scope.disc;
    refreshSeries();
    const selSerie=document.getElementById('selSerie'); if(selSerie) selSerie.value=scope.serie;
    const selUnidade=document.getElementById('selUnidade'); if(selUnidade) selUnidade.value=scope.unidade;
    const selBim=document.getElementById('selBim'); if(selBim) selBim.value=scope.bim;
    refreshTurmas();
    const selTurma=document.getElementById('selTurma'); if(selTurma) selTurma.value=tu.id;
    saveScope();
  }
  setView('gestao'); renderThemes();
  abrirEditor(temaId);
}

function collectMeta(){
  editing.nome=document.getElementById('edNome').value.trim()||'Sem título';
  editing.dcgo=document.getElementById('edDcgo').value.trim();
  editing.resumo=document.getElementById('edResumo').value.trim();
  editing.palavras=document.getElementById('edPalavras').value.trim();
  editing.tempo=document.getElementById('edTempo').value;
  const cid=document.getElementById('edConteudo').value;
  if(cid && cid!==editing.conteudoId){ editing.conteudoId=cid; editing.ordem=nextOrdemTema(cid); }
}
function salvarTema(){
  collectMeta(); persistTema(editing); dirty=false;

}

function fmtWrap(marcador){
  const ta=document.getElementById('objText'); if(!ta) return;
  const ini=ta.selectionStart, fim=ta.selectionEnd;
  const antes=ta.value.slice(0,ini), meio=ta.value.slice(ini,fim), depois=ta.value.slice(fim);
  const novoMeio = meio ? (marcador+meio+marcador) : (marcador+'texto'+marcador);
  ta.value = antes+novoMeio+depois;
  const novaPos = meio ? ini+novoMeio.length : ini+marcador.length;

  ta.focus();

function addCard(kind){
  const a=curArr();
  if(kind==='slide')a.push({titulo:'',topicos:[]});
  else if(kind==='atividade')a.push({enunciado:''});
  else if(kind==='gabarito')a.push({resposta:'',comentario:''});
  else if(kind==='questao')a.push({enunciado:'',alternativas:['','','',''],correta:0,comentario:''});

let undoStack=[];
function pushUndo(){ if(editing&&editing.obj){ undoStack.push(JSON.stringify(editing.obj)); if(undoStack.length>15) undoStack.shift(); } }
function undoObj(){ if(!undoStack.length){ toast('Nada para desfazer.',''); return; } editing.obj=JSON.parse(undoStack.pop()); collectMeta(); persistTema(editing); dirty=false; renderObjTabs(); renderObjContent(); toast('Desfeito.','ok'); }
function delCard(i){ pushUndo(); curArr().splice(i,1); edDirty(); renderObjContent(); }
function updCard(kind,i,field,val){
  const a=curArr();
  if(field==='topicos'||field==='alternativas') a[i][field]=val.split('\n');
  else if(field==='correta') a[i][field]=parseInt(val,10);
  else a[i][field]=val;
  edDirty();
}

async function gerarObjeto(append){
  collectMeta();
  const def=OBJ_DEFS.find(o=>o.k===activeObj);
  const existente=activeObj==='avaliacao' ? ((editing.obj.avaliacao||{})[window.__avalTab||'questoes']) : editing.obj[activeObj];
  pushUndo();
  const btn=document.getElementById(append?'genMoreBtn':'genBtn');
  let __timerId=null;
  if(btn){ btn.disabled=true; __timerId=startGenTimer(()=>'Gerando',t=>{ btn.innerHTML='<span class="spin"></span> '+t; },'single'); }
  try{
    const foco=(document.getElementById('genFoco')||{}).value||'';
    const {system,user,parse}=promptFor(def, editing, append?existente:null, foco);
    const raw=await callClaude(system,user);
    stopGenTimer(__timerId);
    const novo=parse(raw);
    const vazio=(Array.isArray(novo)&&!novo.length)||(typeof novo==='string'&&!novo.trim());
    if(vazio){ toast('A IA retornou vazio — mantive o que já existia. Tente de novo ou ajuste o foco.','err'); if(btn){btn.disabled=false;btn.innerHTML='✦ Gerar com IA';} return; }
    if(activeObj==='avaliacao'){
      const tab=window.__avalTab||'questoes';
      if(!editing.obj.avaliacao) editing.obj.avaliacao={questoes:[],flashcards:[],atividade:[],gabarito:[]};
      const existArr=editing.obj.avaliacao[tab]||[];
      editing.obj.avaliacao[tab]=(append&&Array.isArray(existArr)&&Array.isArray(novo))?existArr.concat(novo):novo;
    } else if(append && Array.isArray(existente) && Array.isArray(novo)) editing.obj[activeObj]=existente.concat(novo);
    else editing.obj[activeObj]=novo;
    collectMeta(); persistTema(editing); dirty=false;   // salva já — não perde no reload
    renderObjTabs(); renderObjContent();
    toast(append?'Itens adicionais gerados e salvos.':'Conteúdo gerado e salvo.','ok');
  }catch(e){ stopGenTimer(__timerId); console.error(e); toast('Erro na geração: '+e.message,'err');
    if(btn){ btn.disabled=false; btn.innerHTML='✦ Gerar com IA'; } }
}
async function genObjFor(temaObj, objKey){
  if(objKey==='avaliacao'){
    // Gera os 4 sub-campos em sequência
    const subKeys=['questoes','flashcards','atividade','gabarito'];
    const av={questoes:[],flashcards:[],atividade:[],gabarito:[]};
    for(const sub of subKeys){
      const fakeDef={k:sub,tipo:sub};
      try{
        const {system,user,parse}=promptFor(fakeDef, temaObj, null, '');
        const raw=await callClaude(system,user);
        const novo=parse(raw);
        if(Array.isArray(novo)&&novo.length) av[sub]=novo;
      }catch(e){ console.warn('genObjFor avaliacao/'+sub+':',e); }
      await new Promise(r=>setTimeout(r,350));
    }
    const temAlgo=Object.values(av).some(a=>a.length>0);
    return temAlgo?av:null;
  }
  const def=OBJ_DEFS.find(o=>o.k===objKey);
  if(!def) throw new Error('objeto desconhecido: '+objKey);
  const {system,user,parse}=promptFor(def, temaObj, null, '');
  const raw=await callClaude(system,user);
  const novo=parse(raw);
  const vazio=(Array.isArray(novo)&&!novo.length)||(typeof novo==='string'&&!novo.trim());
  return vazio?null:novo;
}

async function genOne(key, foco){
  if(key==='avaliacao'){
    // Avaliação delega ao genObjFor que gera os 4 sub-campos
    const av=await genObjFor(editing,'avaliacao');
    if(!av) return false;
    editing.obj.avaliacao=av; return true;
  }
  const def=OBJ_DEFS.find(o=>o.k===key);
  const {system,user,parse}=promptFor(def, editing, null, foco);
  const raw=await callClaude(system,user);
  const novo=parse(raw);
  const vazio=(Array.isArray(novo)&&!novo.length)||(typeof novo==='string'&&!novo.trim());

function ctx(t, opt){
  opt=opt||{};
  const bimNum=(t.bimestre||'').charAt(0);
  let s='Disciplina: '+t.disciplina+'\nSérie/Ano: '+t.serie+'\nTema: '+t.nome+'\n';
  if(!opt.semCodigo){
    if(t.dcgo) s+='Código DC-GO/BNCC: '+t.dcgo+'\n';
    if(t.habilidade) s+='Habilidade essencial: '+t.habilidade+'\n';
  }
  if(t.resumo) s+='Resumo: '+t.resumo+'\n';
  s+='Contexto curricular: Matrizes Essenciais SEDUC-GO / DC-GO Ampliado, '+bimNum+'º bimestre.';
  // GoiásTec como referência curricular prioritária quando a habilidade tem o selo
  if(!opt.semCodigo && t.dcgo){ const it=matrizItem(t.disciplina,t.serie,t.bimestre,t.dcgo); if(it&&it.g===1) s+='\nEsta habilidade possui material no GoiásTec (plataforma oficial SEDUC-GO): alinhe o conteúdo à abordagem das Matrizes Essenciais/GoiásTec para esta habilidade.'; }
  // anti-redundância: avisa dos temas vizinhos do mesmo conteúdo
  try{
    const irmaos=Object.values(temas).filter(x=>x && x.conteudoId===t.conteudoId && x.id!==t.id).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
    if(irmaos.length){ s+='\n\nOUTROS TEMAS DO MESMO CONTEÚDO (serão tratados em aulas separadas — NÃO repita o que pertence a eles; foque apenas no recorte específico de "'+t.nome+'"): '+irmaos.map(x=>x.nome).filter(Boolean).join('; ')+'.'; }
  }catch(e){}
  return s;
}
function promptFor(def,t,existentes,foco){
  const temFoco = foco && foco.trim();

    base = 'ASSUNTO/FOCO PRINCIPAL (prioridade máxima, gere SOBRE ISTO): '+foco.trim()+'\n\n'+base+
      '\n\nIMPORTANTE: produza o conteúdo sobre o ASSUNTO/FOCO acima, mesmo que vá além do título do tema (há projetos interdisciplinares e temas transversais). Mantenha rigor histórico e linguagem da série.';
  }
  if(existentes && existentes.length){
    const resumo=existentes.map((x,i)=>(i+1)+'. '+(x.enunciado||x.frente||x.titulo||x.resposta||'').slice(0,80)).join('\n');
    base+='\n\nJÁ EXISTEM estes itens — gere itens ADICIONAIS, DIFERENTES e que não repitam os abaixo:\n'+resumo;
  }
  const sysBase='Você é uma professora experiente de Ciências Humanas da rede estadual de Goiás. Escreva em português do Brasil, com rigor historiográfico e linguagem adequada à série. Responda apenas com o conteúdo pedido, sem preâmbulos.';
  const txt=(s)=>({system:sysBase,user:s,parse:r=>r.trim()});
  const json=(sys,u)=>({system:sys+' Responda SOMENTE com JSON válido, sem cercas de código nem texto fora do JSON.',user:u,parse:r=>parseJSON(r)});
  switch(def.k){
    case 'quadro': return txt(base+'\n\nProduza um TEXTO DE QUADRO curto, para os alunos copiarem da lousa em UMA aula: entre 100 e 250 palavras no total. Use um título, poucos tópicos curtos com palavras-chave e, no máximo, uma definição essencial. Nada de parágrafos longos. Se o tema for amplo, foque apenas no recorte de uma aula.');
    case 'estudo': return txt(base+'\n\nProduza um TEXTO PARA ESTUDO DO ALUNO: prosa explicativa, parágrafos completos e linguagem adequada à série, para leitura e estudo. Inclua 2 perguntas de reflexão e, ao final, uma seção "Referências" com 2 a 4 obras/autores acadêmicos REAIS e reconhecidos sobre o tema (formato ABNT). Não invente títulos, autores, anos ou páginas; na dúvida, omita o dado em vez de inventar.');
    case 'slides': return json('Você cria slides de aula para projeção.', base+'\n\nGere de 5 a 7 slides como JSON: array de {"titulo": string, "topicos": [string,...]}. Cada slide com 3 a 5 tópicos curtos.');
    case 'atividade': return json('Você cria atividades escolares formativas, com rigor histórico, sem múltipla escolha com distratores e sem entregar a resposta no enunciado.', base+'\n\nGere uma ATIVIDADE com 5 itens como JSON: array de {"enunciado": string}. REGRAS: (1) NUNCA inclua a resposta no próprio enunciado nem deixe a resposta óbvia pela formulação; o gabarito fica só na aba Gabarito. (2) Em itens de completar lacunas, você pode oferecer um banco de palavras EM ORDEM ALEATÓRIA, mas sem indicar qual palavra vai em qual lacuna. (3) NÃO use múltipla escolha com alternativas. (4) Varie os tipos: discursiva, completar lacunas, relacionar colunas (descreva as duas colunas embaralhadas, sem o par pronto), análise de trecho de texto e leitura de imagem/charge. (5) Mantenha rigor historiográfico e linguagem da série.');
    case 'gabarito': {
      const at=((t.obj.avaliacao&&t.obj.avaliacao.atividade)||t.obj.atividade||[]).map((x,i)=>(i+1)+'. '+x.enunciado).join('\n');
      return json('Você corrige atividades escolares.', base+'\n\n'+(at?('Atividade existente:\n'+at):'Crie respostas para 5 questões coerentes com o tema.')+'\n\nGere o gabarito comentado como JSON: array de {"resposta": string, "comentario": string}, na mesma ordem.');
    }

    case 'flashcards': return json('Você cria flash cards de revisão.', base+'\n\nGere 8 flash cards como JSON: array de {"frente": string, "verso": string}.');
    case 'mapaMental': return {system:'Você organiza conteúdos em mapas mentais hierárquicos.',user:base+'\n\nProduza um mapa mental em MARKDOWN hierárquico: "# Tema central", depois "## Ramos" e "- subitens". Apenas o markdown.',parse:r=>r.replace(/```[a-z]*|```/g,'').trim()};
    case 'avaliacao': {
      // Delega para a sub-aba ativa
      const tab=window.__avalTab||'questoes';
      const fakeKey=tab==='flash'?'flashcards':tab;
      const fakeDef=OBJ_DEFS.find(o=>o.k===fakeKey)||{k:fakeKey,tipo:fakeKey};
      return promptFor(fakeDef,t,existentes,foco);

  }
}
function parseJSON(raw){
  let s=raw.replace(/```json|```/g,'').trim();
  const a=s.indexOf('['), b=s.lastIndexOf(']');
  if(a>=0&&b>a) s=s.slice(a,b+1);
  return JSON.parse(s);
}
/* Todas as chamadas de IA passam pela Cloud Function gerarComIA — a chave da
   API Anthropic fica só no servidor (Secret Manager), nunca no navegador.
   A function já faz o retry em 429 internamente; aqui só repassamos o erro. */
async function chamarIA(system, messages, opts){
  opts=opts||{};
  const fn=firebase.app().functions('southamerica-east1').httpsCallable('gerarComIA');
  const r=await fn({system, messages, maxTokens:opts.maxTokens||2500, useWeb:!!opts.useWeb, model:getModel()});
  return (r.data&&r.data.resposta)||'';
}
async function callClaude(system,user){
  return chamarIA(system,[{role:'user',content:user}]);
}
async function callClaudeWeb(system,user){
  return chamarIA(system,[{role:'user',content:user}],{maxTokens:3000,useWeb:true});
}

/* Lista achatada de temas com conteúdo, percorrendo TODAS as turmas da mesma disciplina/bimestre — permite circular entre turmas sem sair da projeção */
function projListaGlobal(){
  const d=scope.disc, b=scope.bim, s=scope.serie;
  // Filtra por MESMA disciplina E MESMA série — evita pular de 9º ano para EM durante a projeção
  const turmasList=Object.values(turmas).filter(t=>t.disciplina===d && t.serie===s).sort((a,c)=>turmaNome(a).localeCompare(turmaNome(c)));
  let flat=[];
  turmasList.forEach(tu=>{
    const conts=Object.values(conteudos).filter(c=>c.turmaId===tu.id && c.bimestre===b).sort((a,c)=>(a.ordem||0)-(c.ordem||0));
    conts.forEach(c=>{
      temasDoConteudo(c.id).filter(t=>PROJ_ORDER.some(k=>isFilled(t,k))).forEach(t=>flat.push({turmaId:tu.id, temaId:t.id}));
    });
  });
  return flat;
}
function projProximaTurma(dir){
  const flat=projListaGlobal();
  if(!flat.length){ toast('Nenhum outro tema com conteúdo para projetar.',''); return; }
  const curIdx=flat.findIndex(x=>x.temaId===(proj.tema&&proj.tema.id));
  const next=flat[(curIdx===-1?0:(curIdx+dir+flat.length)%flat.length)];
  scope.turma=next.turmaId; saveScope();
  try{ const sel=document.getElementById('selTurma'); if(sel) sel.value=scope.turma; }catch(e){}
  proj.tema=temas[next.temaId]; proj.idx=0; proj.flip=false; proj.imgMode=false;
  proj.obj=PROJ_ORDER.find(k=>isFilled(proj.tema,k))||'quadro';
  applyProjVars(); renderProjSwitch(); renderProj();
  toast('Turma '+turmaNome(turmas[next.turmaId])+' · '+proj.tema.nome,'');
}
/* Deslizar (swipe) para navegar — útil sobretudo nos slides, sem precisar dos botões */
function initProjSwipe(){
  const stage=document.getElementById('projStage');
  if(!stage || stage.__swipeInit) return; stage.__swipeInit=true;
  let x0=null,y0=null;
  stage.addEventListener('touchstart',e=>{ const t=e.touches[0]; x0=t.clientX; y0=t.clientY; },{passive:true});
  stage.addEventListener('touchend',e=>{
    if(x0===null) return;
    const t=e.changedTouches[0]; const dx=t.clientX-x0, dy=t.clientY-y0; x0=null;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0){ if(proj.obj==='flashcards'&&!proj.flip){flipFlash();} else projNav(1); }
      else { projNav(-1); }
    }
  },{passive:true});
}

/* ---------- Busca de imagem (Wikimedia) — projeção e fixar no tema ---------- */
async function wikimediaSearch(term){
  const url='https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrsearch='+
    encodeURIComponent(term)+'&gsrlimit=40&prop=imageinfo&iiprop=url|mime|mediatype&iiurlwidth=480&format=json&origin=*';
  const r=await fetch(url); const d=await r.json();
  const pages=d.query?Object.values(d.query.pages):[];
  return pages.map(p=>p.imageinfo&&p.imageinfo[0]).filter(Boolean)
    // remove só PDFs, DjVu, TIFF e SVG (digitalizações/páginas de texto); mantém fotos/figuras
    .filter(im=>{ const u=(im.url||'').split('?')[0].toLowerCase(); if(/\.(pdf|djvu|tif|tiff|svg|ogg|ogv|webm|wav|mid)$/.test(u)) return false; if(im.mediatype && im.mediatype!=='BITMAP' && im.mediatype!=='DRAWING') return false; return !!(im.thumburl||im.url); })
    .map(im=>({thumburl:im.thumburl||im.url, url:im.url, fonte:'Wikimedia'}));
}
async function openverseSearch(term){
  try{
    const url='https://api.openverse.org/v1/images/?q='+encodeURIComponent(term)+'&page_size=30&mature=false';
    const r=await fetch(url); if(!r.ok) return []; const d=await r.json();
    return (d.results||[]).map(x=>({thumburl:x.thumbnail||x.url, url:x.url, fonte:'Openverse'})).filter(x=>x.url);
  }catch(e){ return []; }
}
async function searchImages(term){
  const [a,b]=await Promise.all([wikimediaSearch(term).catch(()=>[]), openverseSearch(term).catch(()=>[])]);
  const seen=new Set(), out=[]; const max=Math.max(a.length,b.length);
  for(let i=0;i<max;i++){ [a[i],b[i]].forEach(im=>{ if(im&&!seen.has(im.url)){ seen.add(im.url); out.push(im); } }); }
  return out;
}
async function projImagem(){
  const term=prompt('Buscar imagem no Wikimedia Commons (livre para aula):', proj.tema?proj.tema.nome:'');
  if(!term) return;
  proj.imgMode=true;

  stage.innerHTML='<div class="proj-canvas"><span class="spin"></span> buscando imagens…</div>';
  document.getElementById('projFoot').innerHTML='<button onclick="sairImagem()">‹ voltar ao conteúdo</button>';
  try{
    const imgs=await searchImages(term);
    if(!imgs.length){ stage.innerHTML='<div class="proj-canvas">Nenhuma imagem para "'+esc(term)+'".</div>'; return; }
    stage.innerHTML='<div class="img-grid">'+imgs.map(im=>'<div class="pick"><img src="'+esc(im.thumburl)+'" data-full="'+esc(im.url)+'" onclick="ampliarImg(this)"></div>').join('')+'</div>';

async function imgSugerir(){
  const chips=document.getElementById('imgChips');
  chips.innerHTML='<span class="spin dark"></span>';
  try{
    const u='Liste de 8 a 12 termos curtos de BUSCA DE IMAGENS associados ao tema escolar abaixo, para achar boas imagens no acervo Wikimedia Commons. Inclua nomes próprios, lugares, obras, personagens, documentos e conceitos visuais; pode misturar português e inglês. Responda só com os termos separados por vírgula, sem numeração.\n\n'+ctx(editing);
    const raw=await callClaude('Você ajuda professores a encontrar imagens didáticas livres.',u);
    const termos=[...new Set(raw.replace(/\n/g,',').split(',').map(x=>x.replace(/^[\d.\-•\s]+/,'').trim()).filter(x=>x&&x.length<40))].slice(0,12);

async function imgBuscar(){
  const term=document.getElementById('imgQuery').value.trim();
  if(!term){ toast('Digite um termo.','err'); return; }
  const box=document.getElementById('imgResults');
  box.innerHTML='<div class="statusdot"><span class="spin dark"></span> buscando…</div>';
  try{
    const novos=await searchImages(term);
    if(!novos.length && !imgResults.length){ box.innerHTML='<div class="statusdot">Nada encontrado para "'+esc(term)+'". Tente outro termo.</div>'; return; }
    // evita duplicar mesma URL
    const have=new Set(imgResults.map(x=>x.url));
    novos.forEach(im=>{ if(!have.has(im.url)) imgResults.push(im); });
    renderImgResults();
  }catch(e){ box.innerHTML='<div class="statusdot">Erro ao buscar (precisa de internet).</div>'; }
}
function renderImgResults(){
  const box=document.getElementById('imgResults');
  if(!imgResults.length){ box.innerHTML='<div class="statusdot">Sem resultados ainda.</div>'; }
  else box.innerHTML=imgResults.map((im,i)=>'<div class="pick'+(imgSel.has(i)?' sel':'')+'" onclick="imgToggle('+i+')"><img src="'+esc(im.thumburl)+'"></div>').join('');
  const btn=document.getElementById('imgAddBtn'); if(btn){ btn.disabled=imgSel.size===0; btn.textContent='Fixar selecionadas ('+imgSel.size+')'; }
}
function imgToggle(i){ if(imgSel.has(i))imgSel.delete(i); else imgSel.add(i); renderImgResults(); }
function imgAddSelected(){
  if(!imgSel.size) return;
  if(!editing.imagens) editing.imagens=[];
  [...imgSel].forEach(i=>{ const im=imgResults[i]; if(im) editing.imagens.push({thumburl:im.thumburl,url:im.url,titulo:''}); });
  const n=imgSel.size; imgSel=new Set();
  renderImagensEditor(); edDirty(); renderImgResults();
  toast(n+' imagem(ns) fixada(s). Pode continuar buscando.','ok');
}

function excluirTurma(id){
  const t=turmas[id]; if(!t) return;
  // Excluir a turma sozinha deixava conteúdo/temas/alunos/notas órfãos (existiam
  // no banco mas ficavam invisíveis, sem turma pra aparecer). Agora avisa com
  // números reais e apaga tudo que depende dela junto.
  const conts=Object.values(conteudos).filter(c=>c.turmaId===id);
  const temasDaTurma=Object.values(temas).filter(x=>x.turmaId===id);
  const alunosDaT=Object.values(alunos).filter(a=>a.turmaId===id);
  const registrosDaT=Object.values(registros).filter(r=>r.turmaId===id);
  const notasDaT=Object.values(notasCtrl).filter(n=>n.turmaId===id);
  const ativsAfetadas=Object.values(atividadesCtrl).filter(av=>(av.turmaIds||[]).includes(id));
  const ocorrDaT=Object.values(ocorrencias).filter(o=>o.turmaId===id);

  const partes=[];
  if(conts.length) partes.push(conts.length+' conteúdo(s)');
  if(temasDaTurma.length) partes.push(temasDaTurma.length+' tema(s)/aula(s)');
  if(alunosDaT.length) partes.push(alunosDaT.length+' aluno(s)');
  if(registrosDaT.length) partes.push(registrosDaT.length+' registro(s) de aplicação');
  if(notasDaT.length) partes.push(notasDaT.length+' nota(s) lançada(s)');
  if(ocorrDaT.length) partes.push(ocorrDaT.length+' ocorrência(s)');
  const aviso = partes.length
    ? 'Excluir a turma "'+turmaNome(t)+'" também vai apagar: '+partes.join(', ')+'. Não pode ser desfeito. Continuar?'
    : 'Excluir a turma "'+turmaNome(t)+'"? Não pode ser desfeito.';
  if(!confirm(aviso)) return;

  temasDaTurma.forEach(x=>removeTema(x.id)); // já limpa os registros vinculados a cada tema
  conts.forEach(c=>removeConteudo(c.id));
  alunosDaT.forEach(a=>{ delete alunos[a.id]; if(DB) DB.ref('leciona/alunos/'+a.id).remove().catch(()=>{}); });
  if(alunosDaT.length) lsSet(LS_ALUNOS, JSON.stringify(alunos));
  notasDaT.forEach(n=>{ delete notasCtrl[n.id]; if(DB) DB.ref('leciona/notas_ctrl/'+n.id).remove().catch(()=>{}); });
  if(notasDaT.length) lsSet(LS_NOTAS, JSON.stringify(notasCtrl));
  ativsAfetadas.forEach(av=>{
    av.turmaIds=(av.turmaIds||[]).filter(tid=>tid!==id);
    if(av.turmaIds.length) persistAtivCtrl(av);
    else { delete atividadesCtrl[av.id]; lsSet(LS_ATVCTRL, JSON.stringify(atividadesCtrl)); if(DB) DB.ref('leciona/atividades_ctrl/'+av.id).remove().catch(()=>{}); }
  });
  ocorrDaT.forEach(o=>{ delete ocorrencias[o.id]; if(DB) DB.ref('leciona/ocorrencias/'+o.id).remove().catch(()=>{}); });
  if(ocorrDaT.length) lsSet(LS_OCORR, JSON.stringify(ocorrencias));

  removeTurma(id);
  closeModal(); if(!DB) renderThemes(); openTurmas();
  toast('Turma e todo o conteúdo vinculado foram excluídos.','ok');
}

const BIM_RANGES = {
  '1º Bimestre':['2026-01-20','2026-04-10'],
  '2º Bimestre':['2026-04-11','2026-06-30'],
  '3º Bimestre':['2026-08-03','2026-10-07'],
  '4º Bimestre':['2026-10-08','2026-12-18']
};
const FERIADOS_2026 = new Set(['2026-01-01','2026-02-17','2026-04-03','2026-04-05','2026-04-21','2026-05-01','2026-06-04','2026-06-15','2026-09-07','2026-10-12','2026-10-24','2026-10-28','2026-11-02','2026-11-15','2026-11-20','2026-11-30','2026-12-25']);
const WD_NOMES = {1:'Segunda',2:'Terça',3:'Quarta',4:'Quinta',5:'Sexta'};
// grades conhecidas do horário do CEPI Marajó (getDay: 2=Ter,3=Qua)
const KNOWN_GRADES = { 'História|9º ano|A|CEPI Marajó':{2:1,3:2}, 'História|9º ano|C|CEPI Marajó':{2:2,3:1} };
function turmaKey(t){ return [t.disciplina,t.serie,t.letra||'',t.unidade||''].join('|'); }
function gradeDe(t){ return (t&&t.grade) || KNOWN_GRADES[turmaKey(t)] || {}; }
function isoLocal(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function contarAulas(t, bim){
  const r=BIM_RANGES[bim]; const grade=gradeDe(t); if(!r) return {total:0,semanas:0};
  const [iy,im,id]=r[0].split('-').map(Number), [fy,fm,fd]=r[1].split('-').map(Number);
  let cur=new Date(iy,im-1,id); const end=new Date(fy,fm-1,fd);
  let total=0;
  while(cur<=end){ const wd=cur.getDay(); if(grade[wd] && !FERIADOS_2026.has(isoLocal(cur))) total+=grade[wd]; cur.setDate(cur.getDate()+1); }
  return {total};
}

function wordCount(x){ return String(x||'').trim().split(/\s+/).filter(Boolean).length; }
/* tempo MECÂNICO (alunos): cópia ~10 pal/min, leitura ~120 pal/min, ~6min/atividade, ~4min/questão */
function tempoMecanico(t){
  const o=t.obj||{};
  const copia   = wordCount(o.quadro||o.textoQuadro||'')/10;
  const leitura = wordCount(o.estudo||o.textoAluno||'')/120;
  const av2=o.avaliacao||{}; const resposta=(av2.atividade||o.atividade||[]).length*6+(av2.questoes||o.questoes||[]).length*4;
  const flash   = (o.flashcards||[]).length*0.5;
  return Math.round(copia+leitura+resposta+flash);
}
async function estimarAulasIA(){
  const temasBim=[]; conteudosDoScope().forEach(c=> temasDoConteudo(c.id).forEach(t=>temasBim.push(t)) );

  // manda o CONTEÚDO REAL (resumido) para a IA julgar a densidade da explicação
  const blocos=temasBim.map((t,i)=>{
    const o=t.obj||{};
    const conteudo=[o.quadro||o.textoQuadro,o.estudo||o.textoAluno].filter(Boolean).join('\n').slice(0,900);
    return 'TEMA '+(i+1)+': '+(t.nome||'(sem título)')+'\nConteúdo: '+(conteudo||'(ainda sem texto gerado — estime pelo título)');
  }).join('\n\n');
  try{
    const sys='Você é professora experiente de '+(temasBim[0].serie||'')+' ('+(temasBim[0].disciplina||'')+'). Estime o tempo de AULA, em minutos, para EXPLICAR e DISCUTIR/CORRIGIR cada tema, conforme a densidade do conteúdo real. NÃO inclua tempo de cópia, leitura ou resposta dos alunos (isso é somado à parte). Aula padrão = 50 min.';
    const usr='Para cada tema, devolva o tempo de explicação+correção em MINUTOS. Responda APENAS um JSON: array de inteiros (10 a 200), na MESMA ordem dos temas, sem texto extra.\n\n'+blocos;
    const raw=await callClaude(sys,usr);
    const arr=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(Array.isArray(arr)) temasBim.forEach((t,i)=>{
      const explic=Math.max(0,parseInt(arr[i],10)||0);
      const mec=tempoMecanico(t);
      const total=explic+mec;

  }catch(e){ toast('Não consegui estimar agora: '+e.message,'err'); }

      // Gabarito: só incluir se 'gabarito' explicitamente está no relIncluded (padrão: NÃO)

function importBackup(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    // Proteção contra prototype pollution: rejeita chaves perigosas.
    const chavePerigosa=(id)=>id==='__proto__'||id==='constructor'||id==='prototype';
    // Conta o que será importado, para avisar antes de sobrescrever.
    const nTemas=Object.keys(d.temas||d||{}).filter(k=>!chavePerigosa(k)).length;
    const nCont=Object.keys(d.conteudos||{}).length;
    const nTurmas=Object.keys(d.turmas||{}).length;
    const nExcluir=Array.isArray(d.excluirTemas)?d.excluirTemas.length:0;
    const resumo='Este backup vai importar/sobrescrever:\n• '+nTemas+' tema(s)\n'+(nCont?'• '+nCont+' conteúdo(s)\n':'')+(nTurmas?'• '+nTurmas+' turma(s)\n':'')+(nExcluir?'• excluir '+nExcluir+' tema(s)\n':'')+'\nTemas com o mesmo código serão substituídos pelos do arquivo. Deseja continuar?';
    if(!confirm(resumo)){ ev.target.value=''; return; }
    let n=0, del=0;
    if(d.conteudos) Object.entries(d.conteudos).forEach(([k,c])=>{ if(!chavePerigosa(k)&&c&&c.id&&!chavePerigosa(c.id)){ persistConteudo(c); } });
    if(d.turmas) Object.entries(d.turmas).forEach(([k,t])=>{ if(!chavePerigosa(k)&&t&&t.id&&!chavePerigosa(t.id)){ persistTurma(t); } });
    const imp=d.temas||d;
    Object.entries(imp).forEach(([k,t])=>{ if(!chavePerigosa(k)&&t&&t.id&&!chavePerigosa(t.id)){ persistTema(t); n++; } });
    if(Array.isArray(d.excluirTemas)) d.excluirTemas.forEach(id=>{ if(!chavePerigosa(id)&&temas[id]){ removeTema(id); del++; } });
    if(!DB){ migrateAndRender(); }
    toast(n+' tema(s) importado(s)/corrigido(s)'+(del?', '+del+' excluído(s)':'')+'.','ok');
  }catch(e){ toast('Arquivo inválido.','err'); } };
  r.readAsText(f); ev.target.value='';
}

    const badgeReg=regHoje.length?'<span class="reg-badge" title="'+regHoje.map(r=>r.objetos.join('+')).join(', ')+' registrado(s)">✓ aplicado</span>':'';
    const badgeAtraso=(tuHoje&&turmaAtrasada(tuHoje.id))?'<span class="reg-badge" style="background:#a8442f" title="Tem ocorrência sem resolver — clique em ⚠ pra ver ou resolver">⚠ atrasada</span>':'';
    const acoes = x.disc==='Estudo Orientado'
      ? '<span class="statusdot">sem planejamento</span>'
      : '<button class="btn ghost sm" onclick="abrirAula(\''+x.disc+'\',\''+u+'\',\''+serie+'\',\''+x.letra+'\')">abrir</button>'+
        '<button class="btn ghost sm" onclick="projetarAula(\''+x.disc+'\',\''+u+'\',\''+serie+'\',\''+x.letra+'\')">projetar</button>'+
        (tuHoje?'<button class="btn ghost sm" onclick="abrirOcorrenciaHoje(\''+tuHoje.id+'\')" title="Essa turma não teve aula normal (passeio, palestra, dispensa...)">⚠</button>':'');
    return '<div class="hoje-row'+(regHoje.length?' aplicada':'')+'"><div class="hoje-hora">'+x.ini+'<small>'+x.fim+'</small></div>'+
      '<div class="hoje-info"><b>'+esc(titulo)+'</b><span>'+esc(u)+'</span>'+badgeReg+badgeAtraso+'</div>'+
      '<div class="hoje-acoes">'+acoes+'</div></div>';
  }).join('')+'</div>';
  box.innerHTML=html;
}
function acharOuCriarTurma(disc,uni,serie,letra){
  let t=Object.values(turmas).find(x=>x.disciplina===disc&&x.unidade===uni&&x.serie===serie&&(x.letra||'')===letra);
  if(!t){ t={id:uid(),disciplina:disc,unidade:uni,serie:serie,letra:letra,updatedAt:Date.now()}; t.nome=turmaNome(t); persistTurma(t); toast('Turma '+turmaNome(t)+' criada.','ok'); }
  return t;
}
function irParaAula(disc,uni,serie,letra){
  const t=acharOuCriarTurma(disc,uni,serie,letra);
  scope.disc=disc; scope.unidade=uni; scope.serie=serie; scope.bim=bimAtual();
  document.getElementById('selDisc').value=disc; refreshSeries();
  document.getElementById('selSerie').value=serie;
  document.getElementById('selUnidade').value=uni;
  document.getElementById('selBim').value=scope.bim;
  refreshTurmas(); document.getElementById('selTurma').value=t.id; scope.turma=t.id;
  saveScope(); return t;
}
function abrirAula(disc,uni,serie,letra){ irParaAula(disc,uni,serie,letra); setView('gestao'); renderThemes(); }
function projetarAula(disc,uni,serie,letra){
  irParaAula(disc,uni,serie,letra); renderThemes();
  const cs=conteudosDoScope(); let primeiro=null;
  for(const c of cs){ const ts=temasDoConteudo(c.id); if(ts.length){ primeiro=ts[0]; break; } }
  if(primeiro) projetarTemaId(primeiro.id);
  else { setView('gestao'); toast('Sem temas nesta turma ainda — crie ou use "Partir da matriz".',''); }
}

}

    '<div class="notas-progresso" style="border:1px solid #a8442f;background:#fdecea;margin-bottom:10px">'+
      '<div class="prog-titulo"><span>⚠ '+esc(turmaNome(tu))+' está atrasada — '+abertas.length+' ocorrência(s) sem resolver ('+abertas.map(o=>esc(OCORR_CATEGORIAS[o.categoria]||o.categoria)).join(', ')+')</span>'+

    '</div>' : '';
  const conts=conteudosDoScope();
  let totalTemas=0, temasComReg=0;
  const objContadores={};
  PROJ_ORDER.forEach(k=>objContadores[k]=0);
  conts.forEach(c=>{
    temasDoConteudo(c.id).forEach(t=>{
      totalTemas++;
      const regsT=registrosDoTema(t.id).filter(r=>r.turmaId===scope.turma);
      if(regsT.length) temasComReg++;
      regsT.forEach(r=>(r.objetos||[]).forEach(k=>{ if(k in objContadores) objContadores[k]++; }));
    });
  });
  if(!totalTemas){ box.innerHTML=avisoAtraso; return; }
  const pct=Math.round(temasComReg/totalTemas*100);
  const objDots=PROJ_ORDER.map(k=>{
    const label=OBJ_DEFS.find(o=>o.k===k)?.label||k;
    const n=objContadores[k];
    return '<span class="prog-obj'+(n>0?' feito':'')+'" title="'+label+(n?' — '+n+'x':'')+'">'+label+(n?' ×'+n:'')+'</span>';
  }).join('');
  box.innerHTML=avisoAtraso+'<div class="notas-progresso">'+
    '<div class="prog-titulo">'+
      '<span>'+esc(turmaNome(tu))+' · '+esc(scope.bim)+' · '+temasComReg+'/'+totalTemas+' temas aplicados</span>'+
      '<button class="btn ghost sm" onclick="abrirRelatorioTurma()">📈 Relatório</button>'+
    '</div>'+
    '<div class="prog-barra-wrap"><div class="prog-barra" style="width:'+pct+'%"></div></div>'+
    '<div class="prog-objetos">'+objDots+'</div>'+
  '</div>';
}

      }).join('')+

  const h='<div class="modal-bg" onclick="if(event.target===this)closeModal()">'+
    '<div class="modal" style="max-width:760px">'+
    '<div class="modal-h"><h3>📈 Relatório — '+esc(scope.disc)+' · '+esc(serie)+' · '+esc(scope.bim)+'</h3></div>'+
    '<div class="modal-b">'+

      '<div style="overflow-x:auto"><table class="rel-table">'+tHead2+tBody2+'</table></div>'+

function limparDuplicatasAcervo(temaIds){
  const lista=temaIds.map(id=>temas[id]).filter(Boolean);
  if(lista.length<2){ toast('Nada para limpar.',''); return; }
  // pontua cada duplicata: aplicado > tem registro > mais campos preenchidos > mais recente
  const pontuar=t=>{
    let p=0;
    if((registrosDoTema(t.id)||[]).length) p+=1000;
    p += OBJ_DEFS.filter(o=>isFilled(t,o.k)).length*10;
    p += (t.updatedAt||0)/1e13; // desempate: mais recente pontua um pouco mais
    return p;
  };
  const ordenado=lista.slice().sort((a,b)=>pontuar(b)-pontuar(a));
  const manter=ordenado[0], apagar=ordenado.slice(1);
  const nomes=apagar.map(t=>t.nome).join(', ');
  if(!confirm('Manter 1 tema ("'+manter.nome+'") e apagar '+apagar.length+' duplicata(s)? Essa ação não pode ser desfeita.')) return;
  apagar.forEach(t=>removeTema(t.id));
  toast(apagar.length+' duplicata(s) removida(s). Mantido o mais completo.','ok');
  renderAcervoLista();
}
function renderAcervoLista(){
  const box=document.getElementById('acervoLista'); if(!box) return;

  // Coletar todos os temas de todas as turmas
  let itens=[];
  Object.values(turmas).forEach(tu=>{
    if(_acervoDisc && tu.disciplina!==_acervoDisc) return;
    if(_acervoSerie && tu.serie!==_acervoSerie) return;
    Object.values(conteudos).filter(c=>c.turmaId===tu.id&&(!_acervoBim||c.bimestre===_acervoBim)).forEach(c=>{
      temasDoConteudo(c.id).forEach(t=>{
        itens.push({t, tu, c});
      });
    });
  });

  // Filtro por busca com ranking
  if(_acervoBusca){
    itens=itens.map(x=>{
      const nome=(x.t.nome||'').toLowerCase();
      const dcgo=(x.t.dcgo||'').toLowerCase();
      const hab=(x.t.habilidade||'').toLowerCase();
      let score=0;
      if(nome.includes(_acervoBusca)) score+=nome.startsWith(_acervoBusca)?4:3;
      if(dcgo.includes(_acervoBusca)) score+=2;
      if(hab.includes(_acervoBusca)) score+=1;
      return {...x, score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  } else {
    itens=itens.sort((a,b)=>(a.t.nome||'').localeCompare(b.t.nome||''));
  }

  if(!itens.length){
    box.innerHTML='<div class="acervo-vazio"><p>'+(_acervoBusca?'Nenhum tema encontrado para "'+esc(_acervoBusca)+'"':'Nenhum tema no acervo. Crie conteúdos na Gestão.')+'</p></div>';
    return;
  }

  // Agrupar temas com mesmo dcgo+nome (mesma "aula" em turmas diferentes)
  const grupos={};
  itens.forEach(x=>{
    const chave=(x.t.dcgo||'')+'::'+(x.t.nome||'');
    if(!grupos[chave]) grupos[chave]={nome:x.t.nome, dcgo:x.t.dcgo, hab:x.t.habilidade, disc:x.tu.disciplina, serie:x.tu.serie, bim:x.c.bimestre, turmas:[]};
    // Status dos objetos via registros
    const regs=registrosDoTema(x.t.id);
    const objsExec=new Set(regs.flatMap(r=>r.objetos||[]));
    const temConteudo=PROJ_ORDER.some(k=>isFilled(x.t,k));
    const aplicado=regs.length>0;
    grupos[chave].turmas.push({tu:x.tu, temaId:x.t.id, temConteudo, aplicado, objsExec, cont:x.c});
  });

  let html='<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+Object.keys(grupos).length+' tema(s)</div>';

  Object.values(grupos).forEach(g=>{
    // Agrupa por turma real (uma turma pode ter mais de um tema duplicado
    // no mesmo grupo — nesse caso mostra 1 tag só, com contador, em vez de
    // repetir a etiqueta idêntica várias vezes)
    const porTurma={};
    g.turmas.forEach(entry=>{
      const tid=entry.tu.id;
      if(!porTurma[tid]) porTurma[tid]={tu:entry.tu, n:0, aplicado:false, temConteudo:false, temaIds:[]};
      porTurma[tid].n++;
      porTurma[tid].temaIds.push(entry.temaId);
      if(entry.aplicado) porTurma[tid].aplicado=true;
      if(entry.temConteudo) porTurma[tid].temConteudo=true;
    });
    // detecta se o mesmo nome de turma (ex.: "1ªA") aparece em mais de uma
    // escola/unidade diferente — só aí mostra a unidade, pra não poluir à toa
    const nomesContagem={};
    Object.values(porTurma).forEach(p=>{ const n=turmaNome(p.tu); nomesContagem[n]=(nomesContagem[n]||0)+1; });
    const precisaUnidade=nome=>nomesContagem[nome]>1;
    const tuHtml=Object.values(porTurma).map(p=>{
      const cls=p.aplicado?'aplicado':p.temConteudo?'tem-conteudo':'';
      const nome=turmaNome(p.tu);
      const rotulo=precisaUnidade(nome) ? (nome+' · '+esc(p.tu.unidade||'?')) : nome;
      const dupAviso = p.n>1 ? (' <span class="dup-fix" onclick="event.stopPropagation();limparDuplicatasAcervo([\''+p.temaIds.join('\',\'')+'\'])" title="Clique para manter só o melhor e apagar os outros '+(p.n-1)+' duplicado(s)">⚠️×'+p.n+'</span>') : '';
      const title=(p.aplicado?'✓ aplicado':(p.temConteudo?'tem conteúdo':'vazio'))+' — '+esc(p.tu.unidade||'')+(p.n>1?' — clique no aviso ⚠️ para limpar as duplicatas':'');
      return '<span class="acervo-tu '+cls+'" title="'+title+'">'+esc(rotulo)+dupAviso+'</span>';
    }).join('');

    // Objetos executados (union de todas as turmas)
    const todosObjs=new Set(g.turmas.flatMap(e=>[...e.objsExec]));
    const objDotsHtml=PROJ_ORDER.map(k=>{
      const label=OBJ_DEFS.find(o=>o.k===k)?.label||k;
      const feito=todosObjs.has(k);
      return '<span class="obj-dot'+(feito?' feito':'')+'" title="'+label+(feito?' — executado':'')+'">'+label+'</span>';
    }).join('');

    // Ações: usa primeira turma do grupo como contexto
    const primeiro=g.turmas[0];
    const tuId=primeiro.tu.id, tId=primeiro.temaId;

    html+='<div class="acervo-card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'+
        '<div style="flex:1">'+
          '<h4>'+esc(g.nome)+'</h4>'+
          '<div class="acervo-meta">'+esc(g.disc)+' · '+esc(g.serie)+' · '+esc(g.bim)+(g.dcgo?' · '+esc(g.dcgo):'')+'</div>'+
          '<div class="acervo-turmas">'+tuHtml+'</div>'+
          '<div class="obj-status-row">'+objDotsHtml+'</div>'+
        '</div>'+
        '<div class="acervo-acoes">'+
          '<button class="btn ghost sm" onclick="acervoAbrir(this.dataset.tu,this.dataset.ti)" data-tu="'+tuId+'" data-ti="'+tId+'">abrir</button>'+
          '<button class="btn ghost sm" onclick="acervoProjetar(this.dataset.ti)" data-ti="'+tId+'">projetar</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  });

  box.innerHTML=html;
}

function acervoAbrir(turmaId, temaId){
  const tu=turmas[turmaId]; if(!tu) return;
  // Ir para gestão na turma certa e abrir o tema
  scope.disc=tu.disciplina; scope.serie=tu.serie; scope.unidade=tu.unidade;
  const cont=Object.values(conteudos).find(c=>c.turmaId===turmaId);
  if(cont) scope.bim=cont.bimestre;
  saveScope();
  setView('gestao');
  setTimeout(()=>{ renderThemes(); setTimeout(()=>abrirEditor(temaId), 200); }, 100);
}
function acervoProjetar(temaId){
  const t=temas[temaId]; if(!t) return;
  projetarTemaId(temaId);
}

   STATUS POR OBJETO — mostrado no card do tema na Gestão
   ═══════════════════════════════════════════════════════════════════════ */
function objStatusHtml(temaId, turmaId){
  const regs=registrosDoTema(temaId).filter(r=>r.turmaId===turmaId);
  if(!regs.length) return '';
  const feitos=new Set(regs.flatMap(r=>r.objetos||[]));
  return '<div class="obj-status-row">'+
    PROJ_ORDER.map(k=>{
      const label=OBJ_DEFS.find(o=>o.k===k)?.label||k;
      return feitos.has(k)?'<span class="obj-dot feito">'+label+'</span>':'';
    }).join('')+
  '</div>';
}

   CONTROLE DE NOTAS — Alunos · Atividades · Notas · Stats · CSV
   Inspirado no Cepi-Marajó, integrado ao Leciona.

// ── Tipos de atividade ───────────────────────────────────────────────────
const ATIV_TIPOS={
  texto:       {label:'📖 Texto/Estudo',        cor:'#2f6b5e', bg:'#dff0eb', checklist:false},
  atividade:   {label:'📝 Atividade/Questões',  cor:'#b5355a', bg:'#fce4ef', checklist:false},
  debate:      {label:'🎤 Debate/Participação', cor:'#b56a1a', bg:'#fdecd5', checklist:true},
  mapa:        {label:'🗺 Mapa/Revisão',        cor:'#2e5a9a', bg:'#ddeaf8', checklist:false},
  prova:       {label:'🏫 Prova/Simulado',      cor:'#6a3a9a', bg:'#ecdff8', checklist:false},
  extra:       {label:'⭐ Extra/Bônus',         cor:'#2e7a73', bg:'#dff5f3', checklist:true},
};
// Mapa objeto → tipo padrão sugerido
const OBJ_TIPO_PADRAO={quadro:'texto',estudo:'texto',slides:'debate',mapaMental:'mapa',avaliacao:'atividade'};

// ── Persist ──────────────────────────────────────────────────────────────
function persistAluno(a){ a._ts=Date.now(); alunos[a.id]=a; lsSet(LS_ALUNOS,JSON.stringify(alunos)); if(DB) DB.ref('leciona/alunos/'+a.id).set(a).catch(e=>console.warn(e)); }
function persistAtivCtrl(av){ av._ts=Date.now(); atividadesCtrl[av.id]=av; lsSet(LS_ATVCTRL,JSON.stringify(atividadesCtrl)); if(DB) DB.ref('leciona/atividades_ctrl/'+av.id).set(av).catch(e=>console.warn(e)); }
function persistNota(n){ n._ts=Date.now(); notasCtrl[n.id]=n; lsSet(LS_NOTAS,JSON.stringify(notasCtrl)); if(DB) DB.ref('leciona/notas_ctrl/'+n.id).set(n).catch(e=>console.warn(e)); }
function removerAluno(id){
  const al=alunos[id]; if(!al) return;
  if(!confirm('Remover "'+(al.nome||'este aluno')+'"? As notas lançadas para ele também serão removidas. Não pode ser desfeito.')) return;
  delete alunos[id];
  lsSet(LS_ALUNOS,JSON.stringify(alunos));
  if(DB) DB.ref('leciona/alunos/'+id).remove().catch(e=>toast('⚠ Removido localmente, mas falhou ao remover no Firebase: '+e.message,'err'));
  // notas lançadas pra esse aluno ficariam órfãs (sem aluno pra aparecer) — limpa junto
  const notasApagar=Object.keys(notasCtrl).filter(nid=>notasCtrl[nid].alunoId===id);
  notasApagar.forEach(nid=>{ delete notasCtrl[nid]; if(DB) DB.ref('leciona/notas_ctrl/'+nid).remove().catch(()=>{}); });
  if(notasApagar.length) lsSet(LS_NOTAS,JSON.stringify(notasCtrl));
  renderNotas();
  toast('Aluno removido.','ok');
}
function abrirEditarAluno(id){
  const al=alunos[id]; if(!al) return;
  const h='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:380px">'+
    '<div class="modal-h"><h3>Editar aluno</h3></div>'+
    '<div class="modal-b">'+
      '<div class="field"><label>Nome completo</label><input id="alunoEdNome" value="'+esc(al.nome||'')+'" autofocus></div>'+
      '<div class="field"><label>Número (opcional)</label><input id="alunoEdNum" type="number" value="'+esc(al.numero!=null?String(al.numero):'')+'" placeholder="ex.: 1"></div>'+
    '</div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn primary" onclick="salvarEdicaoAluno(\''+id+'\')">Salvar</button></div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=h; document.body.appendChild(w);
  setTimeout(()=>document.getElementById('alunoEdNome')?.focus(),50);
}
function salvarEdicaoAluno(id){
  const al=alunos[id]; if(!al) return;
  const nome=(document.getElementById('alunoEdNome')?.value||'').trim();
  const numStr=document.getElementById('alunoEdNum')?.value;
  if(!nome){ toast('Digite o nome do aluno.','err'); return; }
  al.nome=nome;
  al.numero=numStr?parseInt(numStr,10):null;
  persistAluno(al);
  closeModal();
  renderNotas();
  toast('Aluno atualizado.','ok');
}

// ── Helpers ───────────────────────────────────────────────────────────────
function alunosDaTurma(turmaId){ return Object.values(alunos).filter(a=>a.turmaId===turmaId&&a.ativo!==false).sort((a,b)=>(a.numero||999)-(b.numero||999)||(a.nome||'').localeCompare(b.nome||'')); }
function atividadesDaTurma(turmaId){
  return Object.values(atividadesCtrl)
    .filter(av=>av.turmaIds&&av.turmaIds.includes(turmaId))
    .sort((a,b)=>(a.data||'').localeCompare(b.data||'')||(a.nome||'').localeCompare(b.nome||''));
}
function notaDoAluno(alunoId,atividadeId){ return Object.values(notasCtrl).find(n=>n.alunoId===alunoId&&n.atividadeId===atividadeId)||null; }
function mediaAtividade(atividadeId,turmaId){
  const av=atividadesCtrl[atividadeId]||{};
  const als=alunosDaTurma(turmaId);
  if(!als.length) return null;
  let soma=0;
  als.forEach(al=>{
    const n=notaDoAluno(al.id,atividadeId);
    if(av.checklist===true){
      soma += (n && n.valor>0) ? 10 : 0;
    } else {
      if(n && n.valor!=null){ const max=av.valorMax||10; soma += max>0?(n.valor/max)*10:n.valor; }
      // sem nota = 0, já incluído por não somar nada
    }
  });
  return soma/als.length;
}
// Faixa que mostra, por tema, os objetos de aula já aplicados nesta turma,
// cada um na cor do padrão estabelecido (OBJ_TIPO_PADRAO → ATIV_TIPOS).
function renderFaixaAplicados(turmaId){
  const regs=Object.values(registros).filter(r=>r.turmaId===turmaId && (scope.bim? (temas[r.temaId]&&temas[r.temaId].bimestre===scope.bim):true));
  if(!regs.length) return '';
  // agrupa por tema: união dos objetos aplicados
  const porTema={};
  regs.forEach(r=>{
    const t=temas[r.temaId]; if(!t) return;
    if(!porTema[r.temaId]) porTema[r.temaId]={nome:t.nome, objs:new Set()};
    (r.objetos||[]).forEach(o=>porTema[r.temaId].objs.add(o));
  });
  const rotObj={quadro:'Texto',estudo:'Texto',slides:'Slide',mapaMental:'Mapa',avaliacao:'Avaliação'};
  let linhas=Object.values(porTema).map(info=>{
    const tags=[...info.objs].map(o=>{
      const tipo=OBJ_TIPO_PADRAO[o]||'texto';
      const c=ATIV_TIPOS[tipo]||ATIV_TIPOS.texto;
      return '<span class="apl-tag" style="background:'+c.bg+';color:'+c.cor+'">'+esc(rotObj[o]||o)+'</span>';
    }).join('');
    return '<div class="apl-row"><span class="apl-tema">'+esc(info.nome)+'</span>'+tags+'</div>';
  }).join('');
  return '<details class="apl-faixa"><summary>📌 Conteúdo aplicado nesta turma ('+Object.keys(porTema).length+' tema(s))</summary>'+linhas+'</details>';
}
let mediaModo = {}; // { turmaId: 'ponderada'|'aritmetica' }
function getMediaModo(turmaId){ return mediaModo[turmaId]||'ponderada'; }
function setMediaModo(turmaId,modo){
  mediaModo[turmaId]=modo;
  try{ lsSet('leciona_media_modo', JSON.stringify(mediaModo)); }catch(e){}
  if(DB) DB.ref('leciona/media_modo/'+turmaId).set(modo).catch(()=>{});
  renderNotas();
}
function mediaAluno(alunoId,atvs,turmaId){
  const modo = getMediaModo(turmaId || (atvs[0]&&atvs[0].turmaIds&&atvs[0].turmaIds[0]));
  const pares=atvs.map(av=>{
    const n=notaDoAluno(alunoId,av.id);
    let notaEm10;
    if(av.checklist===true){
      // checkbox = atividade por execução: a atividade foi dada a todos.
      // marcado = fez (10); desmarcado OU sem registro = não fez (0).
      notaEm10 = (n && n.valor>0) ? 10 : 0;
    } else {
      // nota digitada: a atividade foi cobrada de todos. Sem nota lançada = não
      // entregou = 0. Assim quem fez menos atividades tem média proporcionalmente menor.
      if(!n || n.valor==null){ notaEm10 = 0; }
      else { const max=av.valorMax||10; notaEm10 = max>0 ? (n.valor/max)*10 : n.valor; }
    }
    const peso = modo==='aritmetica' ? 1 : (av.peso||1);
    return {v:notaEm10, p:peso};
  });
  if(!pares.length) return null; // turma sem nenhuma atividade ainda
  const total=pares.reduce((s,x)=>s+x.v*x.p,0);
  const pesos=pares.reduce((s,x)=>s+x.p,0);
  return pesos>0?total/pesos:null;
}

// ── Render principal ──────────────────────────────────────────────────────
function renderNotas(){
  const box=document.getElementById('notasBody'); if(!box) return;
  const turmaId=scope.turma;
  const todasTurmasInit=Object.values(turmas).sort((a,b)=>turmaNome(a).localeCompare(turmaNome(b)));
  if(!turmaId||!todasTurmasInit.length){
    box.innerHTML='<div class="notas-toolbar"><h3>📊 Notas</h3></div>'+
      '<div class="acervo-vazio"><p>'+(!todasTurmasInit.length?'Nenhuma turma cadastrada. Crie turmas na Gestão.':'Selecione uma turma acima para começar.')+'</p></div>';
    if(todasTurmasInit.length){
      const sel='<div class="notas-toolbar" style="margin-top:0"><select onchange="scope.turma=this.value;scope.disc=(turmas[this.value]||{}).disciplina||scope.disc;renderNotas()" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)"><option value="">— Selecionar turma —</option>'+todasTurmasInit.map(t=>'<option value="'+t.id+'">'+esc(turmaNome(t))+'</option>').join('')+'</select></div>';
      box.innerHTML=sel+box.innerHTML;
    }
    return;
  }
  const tu=turmas[turmaId]||{};
  const als=alunosDaTurma(turmaId);
  const atvs=atividadesDaTurma(turmaId);

  // Stats
  const medias=als.map(a=>mediaAluno(a.id,atvs,turmaId)).filter(m=>m!=null);
  const mediaGeral=medias.length?(medias.reduce((s,m)=>s+m,0)/medias.length).toFixed(1):'-';
  const aprovados=medias.filter(m=>m>=6).length;
  const reprovados=medias.filter(m=>m<6).length;

  let h='<div class="notas-toolbar">'+
    '<h3>📊 '+esc(turmaNome(tu))+'</h3>'+
    '<button class="btn ghost sm" onclick="abrirAddAluno()">+ Aluno</button>'+
    '<button class="btn ghost sm" onclick="abrirAddAlunoLista()">+ Lista</button>'+
    '<button class="btn ghost sm" onclick="abrirAddAtividade()">+ Atividade</button>'+
    '<span style="margin-left:auto;font-size:12px;color:var(--muted)">Média: </span>'+
    '<select onchange="setMediaModo(scope.turma,this.value)" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:12px">'+
      '<option value="ponderada"'+(getMediaModo(turmaId)==='ponderada'?' selected':'')+'>ponderada (usa pesos)</option>'+
      '<option value="aritmetica"'+(getMediaModo(turmaId)==='aritmetica'?' selected':'')+'>aritmética (todos iguais)</option>'+
    '</select>'+
    '<button class="btn ghost sm" onclick="exportarNotasCSV()">↓ CSV</button>'+
  '</div>';

  // Stats boxes
  h+='<div class="notas-stats">'+
    '<div class="stat-box"><strong>'+als.length+'</strong><span>alunos</span></div>'+
    '<div class="stat-box"><strong>'+atvs.length+'</strong><span>atividades</span></div>'+
    '<div class="stat-box"><strong>'+mediaGeral+'</strong><span>média geral</span></div>'+
    '<div class="stat-box"><strong style="color:var(--green)">'+aprovados+'</strong><span>aprovados ≥6</span></div>'+
    '<div class="stat-box"><strong style="color:var(--err)">'+reprovados+'</strong><span>abaixo de 6</span></div>'+
  '</div>';

  // Faixa indicadora (c): objetos de aula aplicados nesta turma/bimestre
  h+=renderFaixaAplicados(turmaId);

  if(!als.length){ h+='<div class="acervo-vazio"><p>Nenhum aluno cadastrado. Clique em "+ Aluno" ou "+ Lista".</p></div>'; box.innerHTML=h; return; }

  // Tabela
  h+='<div class="notas-table-wrap"><table class="notas-table"><thead><tr>'+
    '<th class="aluno-col">Aluno</th>'+
    atvs.map(av=>{
      const tp=ATIV_TIPOS[av.tipo]||{label:av.tipo,cor:'#888',bg:'#f5f5f5'};
      const isCheck=av.checklist===true; // respeita só o que foi salvo explicitamente
      return '<th style="background:'+tp.bg+';border-bottom:3px solid '+tp.cor+'" title="'+esc(av.nome)+'" data-avid="'+av.id+'">'+
        '<span class="atv-col-header">'+esc(av.nome)+'</span>'+
        '<span class="atv-tipo">peso '+av.peso+(isCheck?' &middot; &check;':'')+'</span>'+
      '</th>';
    }).join('')+
    '<th>Média</th><th></th>'+
  '</tr></thead><tbody>';

  als.forEach(al=>{
    const med=mediaAluno(al.id,atvs,turmaId);
    const medStr=med!=null?med.toFixed(1):'-';
    const medCls=med==null?'':(med>=6?'aprovado':'reprovado');
    h+='<tr><td class="aluno-nome" style="cursor:pointer" onclick="abrirEditarAluno(\''+al.id+'\')" title="Clique para editar nome/número">'+
      (al.numero?'<span style="color:var(--muted);font-size:11px;margin-right:4px">'+al.numero+'</span>':'')+
      esc(al.nome)+
    '</td>'+
    atvs.map(av=>{
      const tp=ATIV_TIPOS[av.tipo]||{bg:'#fff',checklist:false};
      const isCheck=av.checklist===true; // respeita só o que foi salvo explicitamente
      const n=notaDoAluno(al.id,av.id);
      if(isCheck){
        const checked=n&&n.valor===1;
        return '<td style="text-align:center;background:'+tp.bg+'20">'+
          '<input class="nota-check" type="checkbox" '+(checked?'checked':'')+' '+
          'data-al="'+al.id+'" data-av="'+av.id+'" data-tu="'+turmaId+'" '+
          'onchange="salvarNotaCheck(this)"></td>';
      }
      const val=n&&n.valor!=null?n.valor:'';
      const cls=val===''?'':(val>=7?'alta':val<5?'baixa':'');
      return '<td style="background:'+tp.bg+'20"><input class="nota-input '+cls+'" type="number" min="0" max="10" step="0.5" value="'+esc(String(val))+'" '+
        'data-al="'+al.id+'" data-av="'+av.id+'" data-tu="'+turmaId+'" '+
        'onchange="salvarNota(this)" onblur="salvarNota(this)"></td>';
    }).join('')+
    '<td><span class="nota-media '+medCls+'">'+medStr+'</span></td>'+
    '<td><button class="btn ghost sm danger" data-aid="'+al.id+'" onclick="removerAluno(this.dataset.aid)" title="Remover aluno">✕</button></td>'+
    '</tr>';
  });

  // Linha de médias por atividade
  h+='<tr style="background:var(--surface);font-weight:600">'+
    '<td class="aluno-nome">Média turma</td>'+
    atvs.map(av=>{ const m=mediaAtividade(av.id,turmaId); return '<td style="text-align:center">'+(m!=null?m.toFixed(1):'-')+'</td>'; }).join('')+
    '<td></td><td></td></tr>';

  h+='</tbody></table></div>';
  box.innerHTML=h;
  // Delegação de eventos para remover atividade via .atv-remover
  // Botão ✕ nos cabeçalhos via dblclick
  box.querySelectorAll('th[data-avid]').forEach(th=>{
    th.style.cursor='pointer';
    th.addEventListener('dblclick', ()=>{
      if(confirm('Remover atividade "'+th.querySelector('.atv-col-header')?.textContent+'"?'))
        removerAtividade(th.getAttribute('data-avid'));
    });
    const hint=document.createElement('span');
    hint.style.cssText='display:block;font-size:9px;color:rgba(0,0,0,.35)';
    hint.textContent='2× para remover';
    th.appendChild(hint);
  });
}

function salvarNota(input){
  const alunoId=input.dataset.al, atividadeId=input.dataset.av, turmaId=input.dataset.tu;
  const val=input.value.trim();
  // Encontrar ou criar nota
  let n=notaDoAluno(alunoId,atividadeId);
  if(!n) n={id:uid(),alunoId,atividadeId,turmaId};
  n.valor=val===''?null:Math.min(10,Math.max(0,parseFloat(val)||0));
  persistNota(n);
  // Atualizar cor
  input.className='nota-input '+(n.valor==null?'':(n.valor>=7?'alta':n.valor<5?'baixa':''));
  // Recalcular médias sem re-render completo
  const al=alunos[alunoId], atvs=atividadesDaTurma(turmaId);
  const med=mediaAluno(alunoId,atvs,turmaId);
  const row=input.closest('tr');
  if(row){ const medCell=row.querySelector('.nota-media'); if(medCell){ medCell.textContent=med!=null?med.toFixed(1):'-'; medCell.className='nota-media '+(med==null?'':(med>=6?'aprovado':'reprovado')); } }
}

// ── Modais ────────────────────────────────────────────────────────────────
function abrirAddAluno(){
  const h='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:380px">'+
    '<div class="modal-h"><h3>+ Aluno</h3></div>'+
    '<div class="modal-b">'+
      '<div class="field"><label>Nome completo</label><input id="alunoNome" autofocus placeholder="Nome do aluno"></div>'+
      '<div class="field"><label>Número (opcional)</label><input id="alunoNum" type="number" placeholder="ex.: 1"></div>'+
    '</div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancelar</button>'+

let _lsCheioAte=0, _lsAvisou=false;
function lsSet(k,v){

  try{ localStorage.setItem(k,v); }
  catch(e){
    if(e&&(e.name==='QuotaExceededError'||/quota/i.test(e.message))){

        return;
      }catch(e2){}
      _lsCheioAte=Date.now()+300000; // espera 5 min antes de tentar de novo
      if(!_lsAvisou){ // avisa só UMA vez por sessão, pra não incomodar
        _lsAvisou=true;
        toast('Este navegador atingiu o limite de armazenamento local. Seus dados continuam salvos no Firebase normalmente — só a cópia local deste aparelho parou de crescer. Nada foi perdido.','');
      }

  }
}
function mdInline(s){
  let h=esc(s);
  h=h.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/__([^_\n]+)__/g,'<strong>$1</strong>');
  h=h.replace(/==([^=\n]+)==/g,'<mark class="grifo">$1</mark>');
  h=h.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<em>$2</em>');
  return h;
}
function mdCells(line){ let s=line.trim(); if(s.startsWith('|'))s=s.slice(1); if(s.endsWith('|'))s=s.slice(0,-1); return s.split('|').map(c=>c.trim()); }
function mdIsSep(line){ const t=line.trim(); return /^[\s|:\-]+$/.test(t) && t.indexOf('-')>=0; }
function renderMd(s, mode){
  const HB = mode==='print' ? '<p class="mh">' : '<h2>';
  const HE = mode==='print' ? '</p>' : '</h2>';
  const SB = mode==='print' ? '<p class="msh">' : '<h3 class="proj-sub">';
  const SE = mode==='print' ? '</p>' : '</h3>';
  const lines=String(s||'').split('\n'); let out='',inList=false,i=0,tituloFeito=false;
  const closeL=()=>{ if(inList){out+='</ul>';inList=false;} };
  const ehCaixaAlta=(txt)=>{ const letras=txt.replace(/[^A-Za-zÀ-ÖØ-öø-ÿ]/g,''); return letras.length>=3 && letras===letras.toUpperCase(); };
  while(i<lines.length){
    const t=lines[i].trim();
    if(t.startsWith('|') && i+1<lines.length && mdIsSep(lines[i+1])){
      closeL(); const head=mdCells(lines[i]); i+=2; const rows=[];
      while(i<lines.length && lines[i].trim().startsWith('|')){ rows.push(mdCells(lines[i])); i++; }
      out+='<table class="md"><thead><tr>'+head.map(c=>'<th>'+mdInline(c)+'</th>').join('')+'</tr></thead><tbody>'+
        rows.map(r=>'<tr>'+head.map((_,ci)=>'<td>'+mdInline(r[ci]||'')+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
      continue;
    }
    if(/^([-*_])\1{2,}$/.test(t)){ closeL(); out+='<hr style="border:none;border-top:1px solid currentColor;opacity:.3;margin:.8em 0">'; i++; continue; }
    if(t.startsWith('>')){ closeL(); const ql=[]; while(i<lines.length && lines[i].trim().startsWith('>')){ ql.push(lines[i].trim().replace(/^>\s?/,'')); i++; } out+='<blockquote style="border-left:4px solid #c9762f;background:rgba(127,127,127,.12);padding:.3em .8em;margin:.6em 0;border-radius:4px">'+ql.map(q=>mdInline(q)).join('<br>')+'</blockquote>'; continue; }
    if(/^#{1,6}\s/.test(t)){ closeL(); out+=HB+mdInline(t.replace(/^#+\s/,''))+HE; tituloFeito=true; }
    else if(t!=='' && !tituloFeito && ehCaixaAlta(t) && t.length<=100){
      // primeira linha, em CAIXA ALTA e curta = título do texto (padrão do
      // Quadro). Parágrafos normais (mesmo na 1ª linha) NÃO viram título.
      closeL(); out+=HB+mdInline(t)+HE; tituloFeito=true;
    }
    else if(/^\d+[.)]\s+\S/.test(t) && ehCaixaAlta(t.replace(/^\d+[.)]\s+/,''))){
      // linha numerada em CAIXA ALTA = subtítulo de seção (padrão do conteúdo gerado)
      closeL(); out+=SB+mdInline(t)+SE;
    }
    else if(/^[-*•]\s/.test(t)){ if(!inList){out+='<ul>';inList=true;} out+='<li>'+mdInline(t.replace(/^[-*•]\s/,''))+'</li>'; }
    else if(t===''){ closeL(); }
    else { closeL(); out+='<p>'+mdInline(t)+'</p>'; }
    i++;
  }
  closeL(); return out;
}
function textToHtml(s){ return renderMd(s,'screen'); }
/* Mapa mental gráfico (blocos hierárquicos) para o PDF */
function buildMapTree(md){
  const lines=String(md||'').split('\n').filter(l=>l.trim());
  const root={text:'',level:-1,children:[]}; const stack=[root];
  lines.forEach(l=>{
    let level,text; const h=l.match(/^(#{1,6})\s+(.*)/);
    if(h){ level=h[1].length-1; text=h[2]; }
    else { const m=l.match(/^(\s*)[-*•]\s+(.*)/);
      if(m){ const ind=m[1].replace(/\t/g,'  ').length; level=2+Math.floor(ind/2); text=m[2]; }
      else { level=2; text=l.replace(/^[-*•]\s*/,''); } }
    const node={text:text.trim(),level,children:[]};
    while(stack.length>1 && stack[stack.length-1].level>=level) stack.pop();
    stack[stack.length-1].children.push(node); stack.push(node);
  });
  return root;
}
function mdMapToHtml(md){
  const root=buildMapTree(md);
  const render=(nodes,d)=> nodes.length? '<ul class="mm-tree">'+nodes.map(c=>'<li><div class="mm-box mm-l'+Math.min(d,4)+'">'+mdInline(c.text)+'</div>'+render(c.children,d+1)+'</li>').join('')+'</ul>' : '';
  let central=null;
  if(root.children.length===1) central=root.children[0];
  if(central) return '<div class="mm"><div class="mm-box mm-root">'+mdInline(central.text)+'</div>'+render(central.children,1)+'</div>';
  return '<div class="mm">'+render(root.children,1)+'</div>';
}
let _mmiId=0;
function mapInterativo(md){
  const root=buildMapTree(md);
  function node(n,depth){
    const has=n.children.length; const nid='mmi'+(_mmiId++);
    return '<div class="mmi-node mmi-d'+Math.min(depth,4)+'">'+
      '<div class="mmi-head'+(has?' has':'')+'"'+(has?(' onclick="mmiToggle(\''+nid+'\')"'):'')+'>'+
        (has?('<span class="mmi-tg" id="tg'+nid+'">▾</span>'):'<span class="mmi-dot">•</span>')+
        '<span>'+mdInline(n.text)+'</span></div>'+
      (has?('<div class="mmi-kids" id="'+nid+'">'+n.children.map(c=>node(c,depth+1)).join('')+'</div>'):'')+
    '</div>';
  }
  _mmiId=0;
  let central=root.children.length===1?root.children[0]:null;
  if(central) return node(central,0);
  return root.children.map(c=>node(c,0)).join('');
}
/* Dashboard: quadros com os tópicos essenciais, em vez da árvore de mapa mental — leitura mais rápida na projeção */
/* Diagrama radial: núcleo central + ramos ligados por linhas — pensado para SÍNTESE/REVISÃO (ver tudo de uma vez e as relações entre os conceitos), ao contrário do slide, que é sequencial (uma ideia de cada vez) */
function mapDashboard(md){
  const root=buildMapTree(md);
  let central=root.children.length===1?root.children[0]:null;
  const ramos=central?central.children:root.children;
  const tituloCentral=central?central.text:(md||'').split('\n')[0]||'Tema';
  if(!ramos.length) return '<div class="dash-empty">Sem tópicos.</div>';
  const folhas=(n)=>{ let out=[]; (n.children||[]).forEach(k=>{ if(!k.children.length) out.push(k.text); else out=out.concat(folhas(k)); }); return out; };
  let html='<div class="mm-radial"><div class="mm-center">'+mdInline(tituloCentral)+'</div><div class="mm-branches">';
  ramos.forEach(r=>{
    const topicos=folhas(r);
    html+='<div class="mm-branch"><div class="mm-branch-h">'+mdInline(r.text)+'</div>'+
      (topicos.length?('<ul class="mm-leaves">'+topicos.map(t=>'<li>'+mdInline(t)+'</li>').join('')+'</ul>'):'')+
    '</div>';
  });
  html+='</div></div>';
  return html;
}
function mmiToggle(id){ const el=document.getElementById(id), tg=document.getElementById('tg'+id); if(!el)return; const hide=el.style.display!=='none'; el.style.display=hide?'none':''; if(tg)tg.textContent=hide?'▸':'▾'; }

/* ---------- Contador de tempo de geração (progride s -> min -> h) ---------- */
function fmtElapsed(ms){
  const totalSec=Math.max(0,Math.floor(ms/1000));
  const h=Math.floor(totalSec/3600), m=Math.floor((totalSec%3600)/60), s=totalSec%60;
  const pad=n=>String(n).padStart(2,'0');
  return h>0 ? (h+':'+pad(m)+':'+pad(s)) : (m+':'+pad(s));
}
/* Aprende a duração média de gerações passadas (por tipo) para estimar quanto falta — contagem regressiva, não progressiva */
function genTimeKey(kind){ return 'leciona_gentime_'+kind; }
function genTimeEstimate(kind){
  try{ const v=parseFloat(localStorage.getItem(genTimeKey(kind))); if(v>0) return v; }catch(e){}
  return kind==='adapt' ? 25000 : kind==='lote' ? 35000 : 40000; // ms — chute inicial até termos histórico
}
function genTimeLearn(kind, ms){
  try{ const prev=parseFloat(localStorage.getItem(genTimeKey(kind)))||ms;
    const novo=Math.round(prev*0.7+ms*0.3); // média móvel — se estabiliza com o uso
    localStorage.setItem(genTimeKey(kind), String(novo));
  }catch(e){}
}
function startGenTimer(getLabel, onTick, kind){
  const t0=Date.now(); const estimate=genTimeEstimate(kind||'single');
  const tick=()=>{
    const decorrido=Date.now()-t0; const falta=estimate-decorrido;
    const txt = falta>1000 ? ('faltam ~'+fmtElapsed(falta)) : 'finalizando…';
    onTick(getLabel()+' · '+txt);
  };
  tick();
  const id=setInterval(tick,1000);
  return {id:id, t0:t0, kind:kind||'single'};
}
function stopGenTimer(h){ if(!h) return; clearInterval(h.id); genTimeLearn(h.kind, Date.now()-h.t0); }
let _ultimoToastMsg='', _ultimoToastTs=0, _toastRepeticoes=0;
function toast(msg,kind){
  const agora=Date.now();
  if(msg===_ultimoToastMsg && agora-_ultimoToastTs<3000){
    _toastRepeticoes++;
    if(_toastRepeticoes>2) return; // já mostrou esse aviso 3x seguidas em 3s — não empilha mais
  } else {
    _toastRepeticoes=0;
  }
  _ultimoToastMsg=msg; _ultimoToastTs=agora;
  const el=document.getElementById('toast');
  const d=document.createElement('div'); d.className='toast '+(kind||''); d.textContent=msg;
  el.appendChild(d); setTimeout(()=>d.remove(),4200);
  // trava de segurança: nunca deixa mais de 5 toasts na tela ao mesmo tempo
  while(el.children.length>5) el.removeChild(el.firstChild);
}

      '<button class="btn ghost sm" onclick="verAdaptado(\''+pk+'\')">ver</button>'+
      '<button class="btn ghost sm" onclick="removerAdaptado(\''+pk+'\')">excluir</button></div>';
  }).join('')+'</div>' : '';
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h3>Material adaptado (inclusão)</h3></div>'+
    '<div class="modal-b"><small>Gera uma versão acessível do conteúdo deste tema, <b>mantendo o objetivo e a habilidade da matriz</b> — muda só o acesso. Cada perfil sai numa folha própria (neutra, sem rótulo do perfil) para imprimir e entregar ao aluno.</small>'+
    '<div class="field" style="margin-top:10px"><label>Perfis</label><div class="gt-checks">'+perfChecks+'</div></div>'+
    '<div class="field"><label>Adaptar a partir de</label><div class="gt-checks" id="adBases">'+baseChecks+'</div></div>'+
    cards+
    '<div id="adProg" class="statusdot"></div></div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Fechar</button><button class="btn primary" id="adBtn" onclick="gerarAdaptado()">Gerar adaptações</button></div></div></div>';
  const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);
}

async function gerarAdaptado(){
  const perfis=[...document.querySelectorAll('input[name=adPerf]:checked')].map(c=>c.value);
  const bases=[...document.querySelectorAll('#adBases input[type=checkbox]:checked')].map(c=>c.value);
  if(!perfis.length){ toast('Marque ao menos um perfil.','err'); return; }
  if(!bases.length){ toast('Marque ao menos uma base com conteúdo.','err'); return; }
  if(!confirm('Isto fará até '+(perfis.length*bases.length)+' geração(ões) na API (uma por base × perfil, mais robusto contra falhas; consome créditos da sua conta). Continuar?')) return;
  const btn=document.getElementById('adBtn'); if(btn)btn.disabled=true;
  const prog=document.getElementById('adProg');
  if(!editing.adaptado) editing.adaptado={};
  let ok=0, falha=0, err='';
  for(let i=0;i<perfis.length;i++){
    const pk=perfis[i]; const pl=(ADAPT_PERFIS.find(pf=>pf.k===pk)||{}).label||pk;
    const __label='adaptando para '+esc(pl)+'… ('+(i+1)+'/'+perfis.length+')';
    const __timerId=prog?startGenTimer(()=>__label,t=>{ prog.innerHTML='<span class="spin dark"></span> '+t; },'adapt'):null;
    try{
      const r=await genAdaptOne(pk,bases);
      if(r){ editing.adaptado[pk]=r; ok++; collectMeta(); persistTema(editing); dirty=false; }
      else falha++;
    }catch(e){ falha++; err=e.message; }
    finally{ stopGenTimer(__timerId); }
  }
  if(btn)btn.disabled=false;
  closeModal(); openAdaptar();
  toast(ok+' adaptação(ões) gerada(s)'+(falha?(', '+falha+' falhou ('+(err||'').slice(0,80)+')'):'')+'.', falha?'err':'ok');
}

async function genAdaptOne(perfK,bases){
  const pl=(ADAPT_PERFIS.find(pf=>pf.k===perfK)||{}).label||perfK;
  const t=editing;
  const bimNum=(t.bimestre||'').charAt(0);
  const sys='Você é professora especialista em educação inclusiva ('+t.disciplina+', '+t.serie+', Brasil). Produz material adaptado para o perfil "'+pl+'". REGRA INEGOCIÁVEL: mantenha o MESMO objetivo de aprendizagem e o conteúdo essencial da matriz (DC-GO/BNCC); adapte apenas a FORMA de acesso, NUNCA esvazie o conteúdo. Orientação para este perfil: '+(ADAPT_GUIA[perfK]||'')+' Responda APENAS o material adaptado em texto/markdown (use ## para títulos, - para listas; para questões mantenha alternativas A) B) C)), sem nenhum texto fora do conteúdo (sem JSON, sem preâmbulo).';
  const out={}; let any=false;
  // Uma chamada por base: evita que uma falha de parse de JSON combinado derrube todas as adaptações de uma vez
  for(let i=0;i<bases.length;i++){
    const bk=bases[i];
    const label=(ADAPT_BASES.find(b=>b.k===bk)||{}).label||bk;
    const txt=adaptSourceText(t,bk);
    if(!txt || !txt.trim()) continue;
    const usr='Tema: '+t.nome+(t.dcgo?('\nCódigo: '+t.dcgo):'')+(t.habilidade?('\nHabilidade: '+t.habilidade):'')+'\nContexto: Matrizes Essenciais SEDUC-GO / DC-GO, '+bimNum+'º bimestre.\n'+
      'Adapte o material ORIGINAL de "'+label+'" abaixo para o perfil "'+pl+'". Mantenha o objetivo; adeque linguagem e estrutura ao perfil.'+
      '\n\n### '+label+' (original)\n'+txt;
    try{
      const raw=await callClaude(sys,usr);
      const clean=(raw||'').replace(/```markdown|```/g,'').trim();
      if(clean){ out[bk]=clean; any=true; }
    }catch(e){ /* segue tentando as outras bases mesmo se uma falhar */ }
  }
  return any?out:null;
}

function _adaptBody(ad){
  let body='';
  ADAPT_BASES.forEach(b=>{ const v=ad[b.k]; if(v){ body+='<h4>'+esc(b.label)+'</h4>'+(b.k==='mapaMental'?mdMapToHtml(v):renderMd(v,'print')); } });
  return body;
}

function verAdaptado(perfK){
  const ad=(editing.adaptado||{})[perfK]; if(!ad){ toast('Sem adaptação gerada.','err'); return; }
  const pl=(ADAPT_PERFIS.find(pf=>pf.k===perfK)||{}).label||perfK;
  const body=_adaptBody(ad);
  const html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h3>Adaptação \u2014 '+esc(pl)+'</h3></div>'+
    '<div class="modal-b">'+(body||'<p>Sem conteúdo.</p>')+'</div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="openAdaptar()">Voltar</button><button class="btn primary" onclick="imprimirAdaptado(\''+perfK+'\')">&#128424; imprimir folha do aluno</button></div></div></div>';
  closeModal(); const w=document.createElement('div'); w.id='modalWrap'; w.innerHTML=html; document.body.appendChild(w);
}

function removerAdaptado(perfK){
  if(!confirm('Excluir a adaptação deste perfil?')) return;
  if(editing.adaptado) delete editing.adaptado[perfK];
  collectMeta(); persistTema(editing); dirty=false; closeModal(); openAdaptar();
}

function imprimirAdaptado(perfK){
  const ad=(editing.adaptado||{})[perfK]; if(!ad){ toast('Sem adaptação gerada.','err'); return; }
  const tu=turmas[scope.turma]||{};
  let body='<div class="tema">';
  ADAPT_BASES.forEach(b=>{ const v=ad[b.k]; if(!v) return;
    body+='<h4>'+esc(b.label)+'</h4>'+(b.k==='mapaMental'?mdMapToHtml(v):renderMd(v,'print'));
    if(b.k==='atividade'||b.k==='questoes'){ body+='<div class="resp"><p class="rl">Respostas:</p>'+Array(7).join('<div class="ln"></div>')+'</div>'; }
  });
  body+='</div>';
  const titulo=editing.nome||'Atividade';
  const win=window.open('','_blank');
  if(!win){ toast('Libere pop-ups para imprimir.','err'); return; }
  win.document.write(adaptShell(titulo, body, tu));
  win.document.close();
  setTimeout(()=>{ try{win.focus();win.print();}catch(e){} },400);
}

function adaptShell(titulo, body, tu){
  return '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>'+esc(titulo)+'</title><style>'+
    'body{font-family:Verdana,Arial,sans-serif;color:#1a1a1a;max-width:720px;margin:26px auto;padding:0 22px;line-height:1.75;font-size:15px;letter-spacing:.2px}'+
    'h1{font-size:20px;margin:0 0 2px}.sub{color:#555;font-size:12px;margin-bottom:14px;border-bottom:2px solid #333;padding-bottom:8px}'+
    'h4{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:#222;margin:16px 0 6px;background:#efefef;padding:5px 9px;border-radius:5px}'+
    'p{margin:0 0 9px}ul,ol{margin:0 0 10px;padding-left:24px}li{margin-bottom:6px}'+
    'table.md{border-collapse:collapse;margin:6px 0 10px}table.md th,table.md td{border:1px solid #999;padding:6px 10px;text-align:left}'+
    '.mm-box{display:inline-block;border:1px solid #333;border-radius:8px;padding:4px 10px;margin:3px 0;font-size:14px}ul.mm-tree{list-style:none;margin:0 0 0 14px;padding-left:16px;border-left:2px solid #bbb}ul.mm-tree li{position:relative}'+
    '.resp{margin:8px 0 16px}.resp .rl{font-size:12px;color:#666;margin-bottom:6px}.ln{border-bottom:1px solid #999;height:26px}'+
    '.aluno{margin:6px 0 14px;font-size:13px;color:#333}'+
    '@media print{body{margin:0}}'+
    '</style></head><body>'+
    '<h1>'+esc(titulo)+'</h1><div class="sub">'+esc(scope.disc)+' \u00b7 Turma '+esc(turmaNome(tu))+' \u00b7 '+esc(scope.bim)+'</div>'+
    '<div class="aluno">Nome: ____________________________________   Data: ____ / ____ / ______</div>'+
    body+'</body></html>';
}
</script>
